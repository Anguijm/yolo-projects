<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Spiro Forge</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#050508;overflow:hidden;font-family:system-ui,sans-serif;touch-action:manipulation;-webkit-tap-highlight-color:transparent;color:#ccc}
canvas{display:block;position:absolute;inset:0}
#panel{position:fixed;top:8px;right:8px;width:195px;background:rgba(5,5,12,0.92);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px;z-index:5;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);opacity:0.35;transition:opacity 0.3s}
#panel:hover{opacity:1}
.p-title{font-size:0.6rem;color:#555;letter-spacing:0.2em;margin-bottom:6px;font-weight:300}
.p-row{display:flex;align-items:center;gap:4px;margin-bottom:4px}
.p-label{font-size:0.4rem;color:#444;min-width:35px;letter-spacing:0.05em}
.p-val{font-size:0.4rem;color:#555;font-family:monospace;min-width:24px;text-align:right}
input[type="range"]{flex:1;height:2px;accent-color:#555}
select{width:100%;background:#111;border:1px solid #1a1a1a;color:#888;padding:3px 5px;font-family:inherit;font-size:0.5rem;border-radius:3px;outline:none;margin-bottom:4px}
.p-btn{padding:3px 7px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#555;font-family:inherit;font-size:0.4rem;cursor:pointer;border-radius:3px;letter-spacing:0.05em}
.p-btn:active{border-color:rgba(255,255,255,0.2);color:#aaa}
.p-btns{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:4px}
.p-sep{height:1px;background:rgba(255,255,255,0.04);margin:5px 0}
.p-check{display:flex;align-items:center;gap:4px;font-size:0.4rem;color:#444;margin-bottom:3px}
.p-check input{accent-color:#555}
#progress{font-size:0.4rem;color:#333;font-family:monospace}





/* UI-UPGRADE:START */
/* Injected by sync_project_ui.py — accessibility override.
   Uses !important to beat project-specific illegible "retro terminal"
   styling (grey-on-black body text, 0.38rem fonts, etc.). max() preserves
   hierarchy for elements already larger than the floor. */
html { font-size: 19px !important; }
body {
  line-height: 1.65 !important;
  color: #e8e8e8 !important;
  -webkit-font-smoothing: antialiased;
}
/* Enforce minimum 15px on all readable text containers. max() means any
   project rule asking for MORE than 15px wins; anything smaller gets lifted. */
body, p, div, span, li, td, th, label, a,
dl, dt, dd, blockquote, caption, code, pre, kbd, samp, figcaption {
  font-size: max(15px, 1em) !important;
}
/* Form controls get larger minimum + bigger tap targets */
input, button, select, textarea {
  font-size: max(16px, 1rem) !important;
  min-height: 40px !important;
  line-height: 1.4 !important;
}
/* Heading floor — preserves larger intentional sizes via max() */
h1 { font-size: max(26px, 1.6em) !important; }
h2 { font-size: max(22px, 1.35em) !important; }
h3 { font-size: max(19px, 1.2em) !important; }
h4, h5, h6 { font-size: max(17px, 1.05em) !important; }
/* Fix low-contrast "dim" text across common class naming conventions.
   Replaces #333/#444/#555/#666 greys with #b8b8b8 (contrast ~7.6:1 on #000). */
.dim, .muted, .hint, .help, .subtitle, .secondary, .meta, .sub,
.small, .tiny, .mini, .note, .footer, .desc, .description,
[class*="-dim"], [class*="-muted"], [class*="-hint"], [class*="-help"],
[class*="-meta"], [class*="-sub"], [class*="-label"], [class*="-desc"],
[class*="-note"] {
  color: #b8b8b8 !important;
}
/* UI-UPGRADE:END */
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <div class="p-title">SPIRO FORGE</div>
  <select id="sel-preset">
    <option value="">— Presets —</option>
    <option value="classic">Classic Flower</option>
    <option value="star">Star Burst</option>
    <option value="lace">Fine Lace</option>
    <option value="atom">Atomic Orbit</option>
    <option value="bloom">Bloom</option>
    <option value="wild">Wild Spiral</option>
  </select>
  <div class="p-sep"></div>
  <div class="p-row"><span class="p-label">R</span><input type="range" id="sl-R" min="50" max="250" value="150"><span class="p-val" id="v-R">150</span></div>
  <div class="p-row"><span class="p-label">r</span><input type="range" id="sl-r" min="5" max="150" value="55"><span class="p-val" id="v-r">55</span></div>
  <div class="p-row"><span class="p-label">d</span><input type="range" id="sl-d" min="5" max="200" value="80"><span class="p-val" id="v-d">80</span></div>
  <div class="p-row"><span class="p-label">Speed</span><input type="range" id="sl-speed" min="1" max="30" value="8"><span class="p-val" id="v-speed">8</span></div>
  <div class="p-row"><span class="p-label">Width</span><input type="range" id="sl-width" min="0.5" max="4" step="0.5" value="1"><span class="p-val" id="v-width">1.0</span></div>
  <div class="p-sep"></div>
  <label class="p-check"><input type="checkbox" id="ck-epi"> Epitrochoid (outer)</label>
  <label class="p-check"><input type="checkbox" id="ck-gears"> Show gears</label>
  <label class="p-check"><input type="checkbox" id="ck-gradient" checked> Gradient color</label>
  <div class="p-sep"></div>
  <div class="p-btns">
    <button class="p-btn" id="btn-clear">Clear</button>
    <button class="p-btn" id="btn-instant">Instant</button>
    <button class="p-btn" id="btn-save">Save PNG</button>
  </div>
  <div id="progress"></div>
</div>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H,cx,cy;

// Parameters
var R=150,r=55,d=80,speed=8,lineWidth=1;
var epi=false,showGears=false,useGradient=true;

// Animation state
var theta=0,prevX=null,prevY=null;
var animating=true,complete=false;
var totalRotations=0,maxTheta=0;
var animFrameId=null;

// Off-screen canvas for permanent path (prevents gear smearing)
var offCanvas=document.createElement('canvas');
var offCtx=offCanvas.getContext('2d');

// ============ MATH ============
function gcd(a,b){a=Math.abs(Math.round(a));b=Math.abs(Math.round(b));while(b){var t=b;b=a%b;a=t}return a}

function calcMaxTheta(){
  // Guard against r=0 which causes division by zero
  if(r===0){totalRotations=0;maxTheta=0;return;}
  var g=gcd(R,r);
  totalRotations=r/g;
  maxTheta=totalRotations*Math.PI*2;
}

function getXY(t){
  if(epi){
    // Epitrochoid (rolling outside)
    return{
      x:(R+r)*Math.cos(t)-d*Math.cos((R+r)/r*t),
      y:(R+r)*Math.sin(t)-d*Math.sin((R+r)/r*t)
    };
  }else{
    // Hypotrochoid (rolling inside)
    return{
      x:(R-r)*Math.cos(t)+d*Math.cos((R-r)/r*t),
      y:(R-r)*Math.sin(t)-d*Math.sin((R-r)/r*t)
    };
  }
}

// ============ DRAWING ============
function drawSegment(t1,t2){
  var p1=getXY(t1),p2=getXY(t2);
  var progress=maxTheta>0?t2/maxTheta:0;

  if(useGradient){
    var hue=(progress*360)%360;
    offCtx.strokeStyle='hsl('+hue+',75%,55%)';
  }else{
    offCtx.strokeStyle='#0ff';
  }
  offCtx.lineWidth=lineWidth;
  offCtx.lineCap='round';
  offCtx.beginPath();
  offCtx.moveTo(cx+p1.x,cy+p1.y);
  offCtx.lineTo(cx+p2.x,cy+p2.y);
  offCtx.stroke();
}

function drawGears(t){
  var rollingCx,rollingCy,penX,penY;
  if(epi){
    rollingCx=cx+(R+r)*Math.cos(t);
    rollingCy=cy+(R+r)*Math.sin(t);
    penX=cx+(R+r)*Math.cos(t)-d*Math.cos((R+r)/r*t);
    penY=cy+(R+r)*Math.sin(t)-d*Math.sin((R+r)/r*t);
  }else{
    rollingCx=cx+(R-r)*Math.cos(t);
    rollingCy=cy+(R-r)*Math.sin(t);
    penX=cx+(R-r)*Math.cos(t)+d*Math.cos((R-r)/r*t);
    penY=cy+(R-r)*Math.sin(t)-d*Math.sin((R-r)/r*t);
  }

  // Fixed circle
  ctx.strokeStyle='rgba(255,255,255,0.08)';ctx.lineWidth=1;
  ctx.beginPath();ctx.arc(cx,cy,R,0,Math.PI*2);ctx.stroke();

  // Rolling circle
  ctx.strokeStyle='rgba(88,166,255,0.15)';
  ctx.beginPath();ctx.arc(rollingCx,rollingCy,r,0,Math.PI*2);ctx.stroke();

  // Pen arm
  ctx.strokeStyle='rgba(255,255,255,0.1)';
  ctx.beginPath();ctx.moveTo(rollingCx,rollingCy);ctx.lineTo(penX,penY);ctx.stroke();

  // Pen dot
  ctx.fillStyle='#fff';
  ctx.beginPath();ctx.arc(penX,penY,2,0,Math.PI*2);ctx.fill();
}

// ============ ANIMATION ============
function animate(){
  if(!animating)return;

  // FIX: don't spin the rAF loop forever when done
  if(complete){
    document.getElementById('progress').textContent='100% | '+totalRotations+' rotations';
    return;
  }

  var step=0.02*speed;
  for(var i=0;i<3;i++){
    var nextTheta=theta+step;
    if(nextTheta>=maxTheta){nextTheta=maxTheta;complete=true}
    drawSegment(theta,nextTheta);
    theta=nextTheta;
    if(complete)break;
  }

  // Composite: clear main canvas, blit offscreen path, then draw gears on top
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);
  ctx.drawImage(offCanvas,0,0);
  if(showGears&&!complete){drawGears(theta);}

  var pct=maxTheta>0?Math.min(100,Math.round(theta/maxTheta*100)):0;
  document.getElementById('progress').textContent=pct+'% | '+totalRotations+' rotations';

  animFrameId=requestAnimationFrame(animate);
}

function startDrawing(){
  // FIX: cancel any running loop before starting a new one
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
  calcMaxTheta();
  theta=0;prevX=null;prevY=null;complete=false;animating=true;
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);
  offCtx.clearRect(0,0,W,H);
  animFrameId=requestAnimationFrame(animate);
}

function instantDraw(){
  if(animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;}
  calcMaxTheta();
  ctx.fillStyle='#050508';ctx.fillRect(0,0,W,H);
  offCtx.clearRect(0,0,W,H);
  if(maxTheta>0){
    var steps=Math.ceil(maxTheta/0.01);
    for(var i=0;i<=steps;i++){
      var t1=i/steps*maxTheta;
      var t2=Math.min((i+1)/steps*maxTheta,maxTheta);
      drawSegment(t1,t2);
    }
  }
  ctx.drawImage(offCanvas,0,0);
  theta=maxTheta;complete=true;
  document.getElementById('progress').textContent='100% | '+totalRotations+' rotations';
}

// ============ PRESETS ============
var PRESETS={
  classic:{R:150,r:55,d:80,epi:false},
  star:{R:200,r:120,d:120,epi:false},
  lace:{R:180,r:11,d:60,epi:false},
  atom:{R:120,r:80,d:100,epi:true},
  bloom:{R:160,r:45,d:140,epi:false},
  wild:{R:200,r:77,d:190,epi:true}
};

function loadPreset(name){
  var p=PRESETS[name];if(!p)return;
  R=p.R;r=p.r;d=p.d;epi=p.epi;
  document.getElementById('sl-R').value=R;document.getElementById('v-R').textContent=R;
  document.getElementById('sl-r').value=r;document.getElementById('v-r').textContent=r;
  document.getElementById('sl-d').value=d;document.getElementById('v-d').textContent=d;
  document.getElementById('ck-epi').checked=epi;
  startDrawing();
}

// ============ CONTROLS ============
document.getElementById('sel-preset').addEventListener('change',function(e){
  if(e.target.value)loadPreset(e.target.value);
});

function bindSlider(id,vid,setter){
  document.getElementById(id).addEventListener('input',function(e){
    var v=parseFloat(e.target.value);if(isNaN(v))return;
    setter(v);document.getElementById(vid).textContent=v%1?v.toFixed(1):v;
    startDrawing();
  });
}
bindSlider('sl-R','v-R',function(v){R=v});
bindSlider('sl-r','v-r',function(v){r=v});
bindSlider('sl-d','v-d',function(v){d=v});
bindSlider('sl-speed','v-speed',function(v){speed=v});
bindSlider('sl-width','v-width',function(v){lineWidth=v});

document.getElementById('ck-epi').addEventListener('change',function(){epi=this.checked;startDrawing()});
document.getElementById('ck-gears').addEventListener('change',function(){showGears=this.checked});
document.getElementById('ck-gradient').addEventListener('change',function(){useGradient=this.checked;startDrawing()});

document.getElementById('btn-clear').addEventListener('click',startDrawing);
document.getElementById('btn-instant').addEventListener('click',instantDraw);
document.getElementById('btn-save').addEventListener('click',function(){
  canvas.toBlob(function(blob){
    if(!blob)return;
    var url=URL.createObjectURL(blob);
    var a=document.createElement('a');a.href=url;a.download='spirograph-'+Date.now()+'.png';
    a.click();setTimeout(function(){URL.revokeObjectURL(url)},1000);
  },'image/png');
});

// ============ RESIZE ============
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
  offCanvas.width=W;offCanvas.height=H;
  cx=W/2;cy=H/2;
  startDrawing();
}
var _resizeTimer;
function onResize(){clearTimeout(_resizeTimer);_resizeTimer=setTimeout(resize,150);}

// ============ INIT ============
resize();window.addEventListener('resize',onResize);

})();
</script>
