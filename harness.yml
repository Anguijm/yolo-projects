# harness.yml — AI Development Harness Configuration
# Generated by: harness init

name: yolo-projects
description: ""

stack: python
language: python

council:
  # Personas auto-discovered from .harness/council/*.md (excludes README + lead-architect).
  # To disable an angle, rename to <angle>.md.disabled.
  default_model: gemini-2.5-pro

  # Specialized-personas mode: when true, `harness check` and `drift-check.yml`
  # skip the canonical 7 reviewer personas (architecture, security, bugs, cost,
  # product, accessibility, maintainability) when reporting "missing" files.
  # Set true if this repo deliberately replaces the canonical reviewer set with
  # domain-specific personas (e.g., sportsdata uses data-quality / statistical-
  # validity / prediction-accuracy / domain-expert / mathematics). lead-architect
  # is still required (the council runner expects it as the synthesis persona).
  specialized: true

  # Must stay in sync with MONTHLY_CAP in .github/workflows/council.yml.
  monthly_cap: 60
  # Hard-enforced by CALL_CAP in .harness/scripts/council.py — change the
  # value there (this is a documentation mirror only).
  per_run_cap: 20

# Build commands — used by harness recipes and CI workflow templates.
commands:
  install: pip install -r requirements.txt
  lint: ruff check .
  typecheck: pyright
  test: pytest

# Research — pre-plan parallel persona panel (`harness research`).
# Runs the active reviewer panel (canonical 7 or specialized set) against
# a feature description plus recall-style prior context, then writes a
# ## Research block to .harness/active_plan.md so the planner sees concerns
# BEFORE writing the plan body. Default model matches the council's
# reasoning tier; downgrade only if cost is the binding constraint.
research:
  model: gemini-2.5-pro     # match council's tier — research shapes the plan
  # max_personas: 4         # uncomment to cap (e.g. 4 cheapest panel for cost)

# Recall — vector retrieval blend settings (`harness recall`, `harness reindex`).
# When .harness/embeddings.json exists and is fresh, `harness recall` adds
# a cosine-similarity term to its score. Without an index (or with --no-vector)
# recall stays at today's keyword × recency behavior.
recall:
  embedding_model: text-embedding-004   # 768-dim Gemini embeddings; cheap, fast.
  vector_weight: 0.5                    # Vector contribution scaled by max_keyword_score
                                        # so 0.5 reads as "half a top keyword hit."
  # Persistent kill switch. Set `vector: false` to disable the blend
  # without per-call --no-vector flags. Stronger than deleting the
  # embeddings.json cache (which `harness reindex` would silently
  # regenerate). Short-circuits before the embed API call, so there's
  # no cost even if an index exists.
  # IMPORTANT: must be the YAML boolean `false`, not the string
  # `"false"` — the implementation uses strict equality (`=== false`)
  # so any other value (string "false", number 0, null) leaves the
  # blend ENABLED. The strictness is deliberate: defensive against
  # typos like `vector: 0` (which YAML would parse as a number, not a
  # falsy intent).
  # vector: false

# Synthesis page generation — `harness synthesize` settings.
# When .harness/failures.jsonl accumulates ≥ min_cluster_size failures sharing
# `failure_class | sensor_involved | guide_gap`, `harness synthesize --apply`
# drafts an auto-marked synthesis section in learnings.md. Read-only by
# default; --apply requires GEMINI_API_KEY.
synthesize:
  model: gemini-2.5-flash   # cheaper/faster model for drafting
  max: 5                    # cap clusters per --apply run (cost guardrail)
  min_cluster_size: 3       # threshold matches lint's duplicate_signal check

# Methodology
cadence: tick-tock        # tick = new feature, tock = refine/cleanup
memory: true              # persist decisions across sessions in .harness/

# Circuit breaker — pause for human approval at every council verdict.
interactive: true
