name: Council Review (Gemini) — DEFERRED for yolo-projects

# This workflow is intentionally a NO-OP placeholder for yolo-projects.
#
# The canonical V0.3.1 council.yml runs the multi-persona Gemini council
# in DIFF mode against PRs. Yolo's `.harness/scripts/council.py` is a
# bespoke GATE-mode runner (reviews `plan/implementation/tests/outcome`
# deliverables, not arbitrary diffs) used by the hourly `tick_tock.yml`
# cron. The two scripts share no compatible CLI surface — wiring the
# canonical workflow to yolo's runner produces argparse errors before
# any review starts (caught by Codex P1 on PR #7).
#
# The file exists at the canonical path so that drift-check.yml stays
# happy (the canonical topology requires .github/workflows/council.yml).
# The workflow body is a no-op echo — no Gemini calls, no PR comments.
#
# === ROADMAP TO REAL DIFF-MODE COUNCIL ON YOLO PRs ===
#
# Iteration 1 (this PR): neutralize this workflow. Conformance ships.
# Iteration 2 (next PR): add a `--diff` stub to `.harness/scripts/council.py`
#   that computes the diff via git and posts a placeholder comment. End-
#   to-end wiring confirmed without real Gemini calls.
# Iteration 3 (PR after): real per-angle review — `--diff` runs all 7
#   yolo angles via existing `call_angle()` against the diff, framed as
#   a synthetic "implementation" gate. Outputs JSON Verdicts; this
#   workflow gets a transform step that renders Verdicts as a markdown
#   PR comment.
# Iteration 4 (final): polish — prior-round context fetch (PR comment
#   history), lead-architect-style synthesis, score normalization.
#
# See PR #7 council review thread for the design discussion.

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  council-deferred:
    runs-on: ubuntu-latest
    steps:
      - name: Surface the deferred-status note
        run: |
          echo "Yolo's PR-triggered council is deferred — see roadmap in this workflow file."
          echo "The hourly tick_tock.yml cron continues to run yolo's gate-mode council."
          echo "PR review for yolo: human + Codex (the two reviewers active today)."
