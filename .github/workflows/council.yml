name: Council Review (Gemini)

# Runs the Gemini multi-persona council on every PR and posts the Lead
# Architect synthesis as a single (re-edited) PR comment.
#
# Setup:
#   1. Add GEMINI_API_KEY as a repo secret.
#   2. That's it.
#
# Cost: ~7 Gemini-2.5-pro calls per PR. Monthly cap enforced via a serialized
# pre-flight job (see `budget` below). Budget state is in the GitHub Actions
# cache, outside the PR's blast radius (Denial-of-Wallet-safe — a malicious
# PR can't reset the counter by editing repo files).

on:
  pull_request:
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: write
  actions: write          # save/restore cache
  security-events: write  # gitleaks SARIF upload

jobs:
  # Pre-flight: serialized budget check + reservation. The concurrency group
  # is keyed on (repo, month) with cancel-in-progress: false, so this job
  # runs at most once at a time across the whole repo for a given month.
  # Effect: parallel council.yml invocations queue here briefly (~10s), then
  # see the up-to-date counter — eliminating the original cache-based race
  # where two PRs could both pass the check at count=N-1.
  #
  # The increment happens BEFORE the council runs (speculative reservation).
  # If the council itself fails, the budget is not decremented — accepted as
  # a small overcount in exchange for atomicity. Workflow re-runs reuse the
  # same run_id so they do not double-charge.
  budget:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    # Serialize the budget step across ALL council runs in this repo. The
    # group key is repo-wide (no PR / month component), so every budget job
    # queues against every other one. cancel-in-progress=false so an
    # in-flight budget job is never cancelled mid-cache-save (which would
    # leave the counter inconsistent).
    concurrency:
      group: council-budget-${{ github.repository }}
      cancel-in-progress: false
    if: |
      github.event.pull_request.head.repo.full_name == github.repository
    outputs:
      go: ${{ steps.decide.outputs.go }}
      reason: ${{ steps.decide.outputs.reason }}
      used: ${{ steps.decide.outputs.used }}
      cap: ${{ steps.decide.outputs.cap }}
      month: ${{ steps.month.outputs.key }}
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      - name: Compute month key
        id: month
        run: echo "key=$(date -u +%Y-%m)" >> "$GITHUB_OUTPUT"

      - name: Check skip directive
        id: skip
        env:
          TITLE: ${{ github.event.pull_request.title }}
        run: |
          TITLE_LOWER="${TITLE,,}"
          if [[ "$TITLE_LOWER" == *"[skip council]"* ]]; then
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Circuit breaker
        id: halt
        run: |
          if [ -f .harness_halt ]; then
            echo "halted=true" >> "$GITHUB_OUTPUT"
          else
            echo "halted=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Restore budget counter
        id: budget-restore
        uses: actions/cache/restore@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .budget
          key: council-budget-${{ steps.month.outputs.key }}-latest
          restore-keys: |
            council-budget-${{ steps.month.outputs.key }}-

      # Decide go/no-go AND speculatively increment in a single step. This is
      # the critical section the concurrency group is serializing.
      - name: Decide and reserve
        id: decide
        env:
          # Monthly cap on Gemini API calls across the whole repo. Sized for
          # ~20 PRs/month × ~3 council runs/PR = 60 calls. Raise if project
          # velocity increases; lower if cost ceiling is the binding constraint.
          # Hard-enforced by the pre-flight check above (per-run cap is in
          # .harness/scripts/council.py:CALL_CAP).
          MONTHLY_CAP: 60
          SKIPPED: ${{ steps.skip.outputs.skip }}
          HALTED: ${{ steps.halt.outputs.halted }}
        run: |
          set -euo pipefail
          mkdir -p .budget
          RAW="$(cat .budget/count 2>/dev/null || echo 0)"
          if [[ "$RAW" =~ ^[0-9]+$ ]]; then
            COUNT="$RAW"
          else
            echo "::warning::.budget/count not numeric ('$RAW'); defaulting to 0."
            COUNT=0
          fi

          echo "used=$COUNT" >> "$GITHUB_OUTPUT"
          echo "cap=$MONTHLY_CAP" >> "$GITHUB_OUTPUT"

          if [ "$SKIPPED" = "true" ]; then
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "reason=skip-directive" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$HALTED" = "true" ]; then
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "reason=halt" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$COUNT" -ge "$MONTHLY_CAP" ]; then
            echo "go=false" >> "$GITHUB_OUTPUT"
            echo "reason=over-budget" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # Reserve a slot speculatively.
          echo $((COUNT + 1)) > .budget/count
          echo "go=true" >> "$GITHUB_OUTPUT"
          echo "reason=ok" >> "$GITHUB_OUTPUT"

      - name: Save budget counter (after reservation)
        if: steps.decide.outputs.go == 'true'
        uses: actions/cache/save@0057852bfaa89a56745cba8c7296529d2fc39830  # v4
        with:
          path: .budget
          key: council-budget-${{ steps.month.outputs.key }}-${{ github.run_id }}-${{ github.run_attempt }}

      - name: Comment skipped reason
        if: |
          steps.decide.outputs.go == 'false' &&
          steps.decide.outputs.reason != 'skip-directive' &&
          github.event.pull_request.number != ''
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
          REASON: ${{ steps.decide.outputs.reason }}
          USED: ${{ steps.decide.outputs.used }}
          CAP: ${{ steps.decide.outputs.cap }}
        run: |
          case "$REASON" in
            halt)
              MSG="Council skipped — circuit breaker active (\`.harness_halt\`)."
              if [ -f .harness_halt ]; then
                REASON_TEXT="$(cat .harness_halt)"
                [ -n "$REASON_TEXT" ] && MSG="$MSG Reason: $REASON_TEXT"
              fi
              ;;
            over-budget)
              MSG="Council skipped — monthly cap reached ($USED/$CAP). Wait until next month or raise \`MONTHLY_CAP\` in \`.github/workflows/council.yml\`."
              ;;
            *)
              MSG="Council skipped — reason: $REASON."
              ;;
          esac
          gh pr comment "$PR" --body "$MSG"

  council:
    needs: budget
    if: needs.budget.outputs.go == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 10
    concurrency:
      group: council-${{ github.event.pull_request.number || github.run_id }}
      cancel-in-progress: true
    steps:
      - name: Checkout PR
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4
        with:
          fetch-depth: 0
          ref: ${{ github.event.pull_request.head.sha || github.ref }}

      # Secret scan BEFORE any LLM call. Fails the workflow if gitleaks
      # detects a key/PII in the PR diff, preventing exfiltration to Gemini.
      - name: Scan diff for secrets (gitleaks)
        # Pinned to commit SHA (supply-chain guard) — currently resolves to tag v2.
        uses: gitleaks/gitleaks-action@dcedce43c6f43de0b836d1fe38946645c9c638dc
        with:
          config-path: .gitleaks.toml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify GEMINI_API_KEY secret
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          if [ -z "${GEMINI_API_KEY:-}" ]; then
            MSG="Council action could not run: \`GEMINI_API_KEY\` secret is not set. Add it at Settings → Secrets and variables → Actions."
            if [ -n "$PR" ]; then
              gh pr comment "$PR" --body "$MSG"
            fi
            echo "::error::$MSG"
            exit 1
          fi

      - name: Setup Python
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065  # v5
        with:
          python-version: '3.11'
          cache: pip
          cache-dependency-path: .harness/scripts/requirements.txt

      - name: Install council deps
        run: pip install -r .harness/scripts/requirements.txt

      - name: Run council
        id: council-run
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          BASE_REF: origin/${{ github.event.pull_request.base.ref }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        # No || fallbacks. If council.py fails, the job fails — loud and
        # visible. The post-comment step still runs (always()) so the human
        # sees what happened.
        #
        # CRITICAL: --allow-untracked is FORBIDDEN in CI. That flag exists
        # so local devs can bootstrap with a scratch plan file; in CI it
        # would let an attacker-controlled PR ship an "approval" against a
        # plan that's not in git history.
        run: |
          PR_ARG=""
          if [ -n "${PR_NUMBER:-}" ]; then PR_ARG="--pr-number ${PR_NUMBER}"; fi
          python3 .harness/scripts/council.py --diff --base "$BASE_REF" $PR_ARG

      - name: Post or update council comment
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
          PR: ${{ github.event.pull_request.number }}
        run: |
          set -euo pipefail
          MARKER='<!-- council-report -->'
          BODY_FILE="$(mktemp)"
          {
            echo "$MARKER"
            echo
            if [ -f .harness/last_council.md ]; then
              cat .harness/last_council.md
            else
              echo "Council failed to produce a report. See [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})."
            fi
            echo
            echo "---"
            echo "_Auto-posted by \`.github/workflows/council.yml\`. Add \`[skip council]\` (any case) to PR title to bypass next push._"
          } > "$BODY_FILE"

          if [ -z "${PR:-}" ]; then
            echo "Not a PR context (workflow_dispatch?). Skipping comment."
            exit 0
          fi

          EXISTING_ID="$(gh api "repos/$REPO/issues/$PR/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$MARKER\")) | .id" | head -n1)"

          if [ -n "$EXISTING_ID" ]; then
            jq -Rs '{body: .}' < "$BODY_FILE" \
              | gh api "repos/$REPO/issues/comments/$EXISTING_ID" --method PATCH --input -
            echo "Updated existing council comment $EXISTING_ID."
          else
            gh pr comment "$PR" --body-file "$BODY_FILE"
            echo "Posted new council comment."
          fi
