name: Tick-Tock Builder (Hourly)

on:
  # Re-enabled 2026-06-24: hourly cron turned back on to work through the
  # 67-item tick_queue_approved promoted from the backlog triage. (Was
  # disabled 2026-05-06 per "kill the cron and just work when I want.")
  schedule:
    # Every hour on the hour (UTC)
    - cron: '0 * * * *'
  workflow_dispatch: # Manual trigger also available

concurrency:
  group: tick-tock
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install anthropic requests google-generativeai

      - name: Install Claude Code CLI
        run: npm install -g @anthropic-ai/claude-code

      - name: Configure git
        run: |
          git config user.name "tick-tock-bot"
          git config user.email "tick-tock-bot@users.noreply.github.com"

      - name: Pre-flight halt check
        id: halt
        run: |
          if [ -f .harness_halt ]; then
            echo "HALTED — .harness_halt present:"
            cat .harness_halt
            echo "halted=true" >> $GITHUB_OUTPUT
          else
            echo "halted=false" >> $GITHUB_OUTPUT
          fi

      # WORKFLOW-LEVEL ESCALATION GUARD
      # ADVISORY MODE (2026-06-26): council is non-blocking during the backlog
      # drain (owner directive). This step now only surfaces any pending
      # escalation as a warning and always lets the agent run. Council verdicts
      # are still produced and logged per gate; they just cannot halt the build.
      - name: Council escalation guard
        if: steps.halt.outputs.halted != 'true'
        id: escalation
        run: |
          set -e
          # ADVISORY MODE (2026-06-26, owner directive: "council review cannot stop
          # backlog drain"). Council still runs and logs verdicts, but it never
          # blocks. Any pending escalation is surfaced as a warning only; the agent
          # ALWAYS runs (skipped=false).
          COUNT=$(python3 -c "import json; s=json.load(open('.harness/session_state.json')); print(len(s.get('council_escalations', [])))")
          if [ "$COUNT" -gt 0 ]; then
            echo "::warning::Council escalation(s) present ($COUNT) — advisory only, agent still runs"
          else
            echo "No pending escalations"
          fi
          echo "skipped=false" >> $GITHUB_OUTPUT

      - name: Run tick-tock agent
        if: steps.halt.outputs.halted != 'true' && steps.escalation.outputs.skipped != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          claude -p "$(cat .github/workflows/tick_tock_prompt.md)" \
            --dangerously-skip-permissions \
            --allowed-tools "Bash,Read,Write,Edit,Glob,Grep"

      - name: Safety-net commit (if agent didn't push)
        if: steps.halt.outputs.halted != 'true' && steps.escalation.outputs.skipped != 'true'
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "Agent left uncommitted changes — committing as safety net"
            git add -A
            git commit -m "cron(tick-tock): safety-net commit (agent did not push)"
            git pull --rebase origin main || true
            git push origin main || true
          else
            echo "Working tree clean — agent either pushed or made no changes"
          fi
