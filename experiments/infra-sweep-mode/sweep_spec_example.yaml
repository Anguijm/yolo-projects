# sweep_spec_example.yaml — a realistic worked example for sweep_runner.py
#
# This sweep would have saved ~2 human cycles: instead of hand-authoring three
# near-identical "evaluate Opus 4.7 as council backbone" ticks (one per
# deliverable artifact), it generates all three from one base spec.
#
# Uses ONLY the documented YAML subset so it parses without PyYAML (the CI
# reality): top-level scalars, one level of nested mapping, block + flow lists.

sweep_id: eval-opus-47-backbone

base_tick:
  name: eval-opus-47-backbone
  type: infrastructure
  idea: "Evaluate Opus 4.7 as the council backbone — produce the {deliverable} artifact"
  rationale: "Sweep variant probing whether Opus 4.7 improves council verdict quality; one run per evaluation artifact so each gets its own focused tick."
  council_focus: "Does the {deliverable} artifact isolate the Opus-4.7-vs-current signal cleanly? Confounds controlled?"
  plan_summary: "Produce experiments/eval-opus-47-backbone/{deliverable}.md evaluating Opus 4.7 on the council backbone for the {deliverable} dimension. Read-only analysis; no pipeline changes."
  deliverable_paths:
    - "experiments/eval-opus-47-backbone/{deliverable}.md"

param_grid:
  deliverable: [model-quality, cost-latency, verdict-stability]

max_runs: 10
budget_cap: 5.0
