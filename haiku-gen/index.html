<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>haiku-gen</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:ui-serif,Georgia,Cambria,'Times New Roman',Times,serif;transition:background 1.2s,color 1.2s}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;color:#c8c0b0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

#poem{text-align:center;padding:20px;max-width:480px;transition:opacity 0.5s;cursor:pointer}
#poem.fade{opacity:0}
.line{font-size:1.3rem;line-height:2.2;font-weight:300;letter-spacing:0.04em}
#season-label{font-size:0.3rem;letter-spacing:0.25em;text-transform:uppercase;opacity:0.3;margin-top:16px}
#theme-label{font-size:0.28rem;letter-spacing:0.15em;opacity:0.25;margin-top:4px}

#controls{position:fixed;bottom:20px;display:flex;gap:8px;align-items:center;z-index:5}
.btn{padding:6px 16px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.3);font-size:0.4rem;cursor:pointer;border-radius:6px;font-family:inherit;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.08em}
.btn:active{color:rgba(255,255,255,0.6)}
#theme-input{padding:5px 10px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);font-size:0.4rem;border-radius:6px;font-family:ui-monospace,monospace;width:100px;outline:none;text-align:center}
#theme-input:focus{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.7)}
#theme-input::placeholder{color:rgba(255,255,255,0.15)}
#hint{position:fixed;bottom:56px;font-size:0.28rem;color:rgba(255,255,255,0.1);letter-spacing:0.1em}
#saved-count{position:fixed;top:12px;right:12px;font-size:0.3rem;color:rgba(255,255,255,0.15);font-family:system-ui,sans-serif}
</style>
</head>
<body>
<div id="poem">
  <div class="line" id="l1"></div>
  <div class="line" id="l2"></div>
  <div class="line" id="l3"></div>
</div>
<div id="season-label"></div>
<div id="theme-label"></div>
<span id="hint">tap anywhere or press space</span>
<div id="controls">
  <input type="text" id="theme-input" placeholder="theme..." maxlength="20" spellcheck="false">
  <button class="btn" id="btn-gen">New</button>
  <button class="btn" id="btn-copy">Copy</button>
  <button class="btn" id="btn-save">Save</button>
</div>
<span id="saved-count"></span>

  'silence':['still','quiet','calm','hush','peace','empty','void','rest','mute','soft','breath','snow','night','space','alone'],
  'hope':['light','dawn','seed','spring','rise','dream','star','warm','grow','faith','bright','door','path','new','trust'],
  'fear':['dark','shadow','cold','trembling','night','hollow','sharp','deep','hide','flight','storm','unknown','wild','edge','chill'],
  'joy':['light','warm','laugh','dance','bright','song','play','free','bloom','golden','sweet','pure','spark','rise','child'],
  'sorrow':['tear','grey','cold','rain','shadow','weight','loss','empty','pale','silence','mourn','deep','ache','dark','drift'],
  'anger':['fire','storm','red','burn','sharp','strike','thunder','blood','wild','rage','heat','crack','fierce','blaze','fury'],
  'zen':['stone','water','still','breath','calm','empty','moon','bamboo','silence','path','bell','temple','lotus','peace','flow']
};

var SEASONS=[
  {name:'Spring',bg:'#0a0f0a',text:'#a0c0a0',words:THEME_MAP['spring']},
  {name:'Summer',bg:'#0f0a05',text:'#c0b090',words:THEME_MAP['summer']},
  {name:'Autumn',bg:'#0f0808',text:'#c0a080',words:THEME_MAP['autumn']},
  {name:'Winter',bg:'#080a0f',text:'#90a0c0',words:THEME_MAP['winter']}
];

var TEMPLATES_5=[
  [['adj',2],['noun',3]],
  [['adj',1],['noun',2],['verb',2]],
  [['det',1],['adj',1],['noun',3]],
  [['noun',2],['verb',1],['adj',2]],
  [['adj',2],['noun',1],['verb',2]],
  [['det',1],['adj',2],['noun',2]],
  [['noun',1],['prep',1],['det',1],['noun',2]],
  [['adj',3],['noun',2]],
  [['det',1],['noun',1],['verb',1],['adj',2]],
  [['verb',2],['det',1],['noun',2]]
];

var TEMPLATES_7=[
  [['adj',2],['noun',2],['verb',1],['adj',2]],
  [['det',1],['adj',2],['noun',1],['verb',1],['adj',2]],
  [['noun',2],['verb',2],['prep',1],['noun',2]],
  [['adj',3],['noun',2],['verb',2]],
  [['prep',2],['det',1],['adj',2],['noun',2]],
  [['det',1],['noun',3],['verb',1],['adj',2]],
  [['adj',1],['noun',2],['verb',2],['adj',2]],
  [['noun',2],['prep',1],['det',1],['adj',1],['noun',2]],
  [['det',1],['adj',1],['noun',1],['verb',2],['adj',2]],
  [['verb',2],['prep',2],['det',1],['noun',2]]
];

function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function getThemeWords(theme){
  if(!theme)return null;
  var t=theme.toLowerCase().trim();
  if(THEME_MAP[t])return THEME_MAP[t];
  /* fuzzy: check if theme word exists anywhere in word banks */
  var related=[];
  for(var pos in WORDS){
    for(var syl in WORDS[pos]){
      for(var i=0;i<WORDS[pos][syl].length;i++){
        if(WORDS[pos][syl][i].indexOf(t)>=0||t.indexOf(WORDS[pos][syl][i])>=0){
          related.push(WORDS[pos][syl][i]);
        }
      }
    }
  }
  return related.length>0?related:null;
}

function generateLine(templates,biasWords){
  var words=[];
  var attempts=0;
  while(attempts<30){
    var tmpl=pick(templates);
    words=[];
    var valid=true;
    for(var i=0;i<tmpl.length;i++){
      var pos=tmpl[i][0],syl=tmpl[i][1];
      var bank=WORDS[pos];
      if(!bank||!bank[syl]||bank[syl].length===0){valid=false;break}
      var w=pick(bank[syl]);
      if(biasWords&&Math.random()<0.35){
        var matches=bank[syl].filter(function(word){return biasWords.indexOf(word)>=0});
        if(matches.length>0)w=pick(matches);
      }
      words.push(w);
    }
    if(valid&&new Set(words).size===words.length)break;
    attempts++;
  }
  var line=words.join(' ');
  return line.replace(/\ba ([aeiou])/gi,'an $1');
}

var fadeTimeout=null;
var themeInput=document.getElementById('theme-input');

function generate(){
  var season=pick(SEASONS);
  var userTheme=themeInput.value.trim();
  var biasWords=season.words;

  if(userTheme){
    var themeWords=getThemeWords(userTheme);
    if(themeWords){
      biasWords=themeWords;
    }
    document.getElementById('theme-label').textContent=userTheme;
  } else {
    document.getElementById('theme-label').textContent='';
  }

  document.body.style.background=season.bg;
  document.body.style.color=season.text;
  document.getElementById('season-label').textContent=season.name;

  var poem=document.getElementById('poem');
  poem.classList.add('fade');

  if(fadeTimeout)clearTimeout(fadeTimeout);
  fadeTimeout=setTimeout(function(){
    document.getElementById('l1').textContent=generateLine(TEMPLATES_5,biasWords);
    document.getElementById('l2').textContent=generateLine(TEMPLATES_7,biasWords);
    document.getElementById('l3').textContent=generateLine(TEMPLATES_5,biasWords);
    poem.classList.remove('fade');
  },500);
}

/* Saved poems */
var saved=[];
function loadSaved(){
  try{saved=JSON.parse(localStorage.getItem('haiku_saved'))||[]}catch(e){saved=[]}
  updateSavedCount();
}
function saveCurrent(){
  var text=document.getElementById('l1').textContent+'\n'+document.getElementById('l2').textContent+'\n'+document.getElementById('l3').textContent;
  if(!text.trim())return;
  if(saved.indexOf(text)>=0)return;
  saved.push(text);
  try{localStorage.setItem('haiku_saved',JSON.stringify(saved))}catch(e){}
  updateSavedCount();
}
function updateSavedCount(){
  document.getElementById('saved-count').textContent=saved.length>0?saved.length+' saved':'';
}

/* Controls */
document.getElementById('poem').addEventListener('click',function(){
  generate();
  document.getElementById('hint').style.opacity='0';
});

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key===' '){e.preventDefault();generate();document.getElementById('hint').style.opacity='0'}
});

document.getElementById('btn-gen').addEventListener('click',function(e){
  e.stopPropagation();
  generate();
  document.getElementById('hint').style.opacity='0';
});

document.getElementById('btn-copy').addEventListener('click',function(e){
  e.stopPropagation();
  var text=document.getElementById('l1').textContent+'\n'+document.getElementById('l2').textContent+'\n'+document.getElementById('l3').textContent;
  if(navigator.clipboard&&window.isSecureContext){
    var self=this;
    navigator.clipboard.writeText(text).then(function(){
      self.textContent='Copied!';setTimeout(function(){self.textContent='Copy'},1200);
    });
  } else {
    var tmp=document.createElement('textarea');
    tmp.value=text;tmp.style.position='fixed';tmp.style.opacity='0';
    document.body.appendChild(tmp);tmp.select();
    try{document.execCommand('copy')}catch(ex){}
    document.body.removeChild(tmp);
    this.textContent='Copied!';var self=this;
    setTimeout(function(){self.textContent='Copy'},1200);
  }
});

document.getElementById('btn-save').addEventListener('click',function(e){
  e.stopPropagation();
  saveCurrent();
  this.textContent='Saved!';
  var self=this;
  setTimeout(function(){self.textContent='Save'},1200);
});

themeInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();generate()}
});

/* Init */
loadSaved();
generate();
})();
</script>
