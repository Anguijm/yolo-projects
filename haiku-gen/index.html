<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;font-family:ui-serif,Georgia,Cambria,'Times New Roman',Times,serif;transition:background 1.2s,color 1.2s}
body{display:flex;flex-direction:column;align-items:center;justify-content:center;background:#0a0a0f;color:#c8c0b0;-webkit-tap-highlight-color:transparent;touch-action:manipulation}

#poem{text-align:center;padding:20px;max-width:520px;cursor:default;user-select:none;-webkit-user-select:none}
.line{font-size:1.3rem;line-height:2.4;font-weight:300;letter-spacing:0.04em;opacity:0;transform:translateY(8px);transition:opacity 0.6s ease,transform 0.6s ease;position:relative;display:flex;align-items:center;justify-content:center;gap:6px}
.line.visible{opacity:1;transform:translateY(0)}
.line-text{display:inline}
.line-text .word{cursor:pointer;transition:color 0.15s,text-shadow 0.15s;padding:0 1px}
.line-text .word:hover{text-shadow:0 0 12px currentColor}
.lock-btn{font-size:0.55rem;opacity:0.15;cursor:pointer;transition:opacity 0.2s;padding:2px;user-select:none;-webkit-user-select:none}
.lock-btn:hover{opacity:0.4}
.lock-btn.locked{opacity:0.7}

#daily-bar{position:fixed;top:12px;left:50%;transform:translateX(-50%);display:flex;align-items:center;gap:10px;font-size:0.32rem;color:rgba(255,255,255,0.2);letter-spacing:0.1em;text-transform:uppercase}
#daily-theme{color:rgba(255,255,255,0.4)}
#streak{color:rgba(255,200,50,0.5)}
#season-label{font-size:0.3rem;letter-spacing:0.25em;text-transform:uppercase;opacity:0.25;margin-top:16px}
#theme-label{font-size:0.28rem;letter-spacing:0.15em;opacity:0.2;margin-top:4px}

#controls{position:fixed;bottom:20px;display:flex;gap:6px;align-items:center;z-index:5;flex-wrap:wrap;justify-content:center;max-width:90vw}
.btn{padding:5px 12px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.25);font-size:0.38rem;cursor:pointer;border-radius:6px;font-family:inherit;transition:all 0.15s;text-transform:uppercase;letter-spacing:0.08em}
.btn:active{color:rgba(255,255,255,0.6)}
.btn.active{border-color:rgba(255,200,50,0.3);color:rgba(255,200,50,0.5)}
#theme-input{padding:4px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);font-size:0.38rem;border-radius:6px;font-family:ui-monospace,monospace;width:80px;outline:none;text-align:center}
#theme-input:focus{border-color:rgba(255,255,255,0.2);color:rgba(255,255,255,0.7)}
#theme-input::placeholder{color:rgba(255,255,255,0.12)}
#hint{position:fixed;bottom:52px;font-size:0.26rem;color:rgba(255,255,255,0.08);letter-spacing:0.1em}
#saved-count{position:fixed;top:12px;right:12px;font-size:0.3rem;color:rgba(255,255,255,0.15);font-family:system-ui,sans-serif;cursor:pointer}
#saved-count:hover{color:rgba(255,255,255,0.3)}

#anthology{position:fixed;top:0;right:-320px;width:320px;height:100%;background:rgba(10,10,15,0.95);border-left:1px solid rgba(255,255,255,0.06);z-index:20;transition:right 0.3s ease;overflow-y:auto;padding:20px}
#anthology.open{right:0}
#anthology h3{font-size:0.4rem;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.3);margin-bottom:12px}
.saved-card{padding:10px;margin-bottom:8px;border:1px solid rgba(255,255,255,0.06);border-radius:6px;font-size:0.75rem;line-height:1.8;cursor:pointer;transition:border-color 0.2s}
.saved-card:hover{border-color:rgba(255,255,255,0.15)}
#anthology-close{position:absolute;top:12px;right:12px;background:none;border:none;color:rgba(255,255,255,0.3);cursor:pointer;font-size:0.8rem;font-family:inherit}

  'flower':['bloom','stem','rose','lily','iris','garden','scent','spring','bee','nectar','bud','wilt'],
  'stone':['rock','granite','cliff','weight','cold','ancient','moss','hard','still','carved','grey','mountain','pebble','smooth','worn'],
  'tree':['root','branch','leaf','bark','oak','pine','shade','ring','tall','ancient','forest','canopy','green','trunk','seed'],
  'water':['flow','stream','river','rain','drop','clear','deep','pool','wave','current','ripple','splash','pour','fresh'],
  'light':['glow','beam','ray','sun','star','bright','dawn','flame','shine','gold','warm','flash','spark','lamp','candle'],
  'dark':['shadow','night','void','black','deep','hidden','blind','cave','silent','cold','moon','mystery','fear','abyss','gloom'],
  'silence':['still','quiet','calm','hush','peace','empty','void','rest','mute','soft','breath','snow','night','alone'],
  'hope':['light','dawn','seed','spring','rise','dream','star','warm','grow','faith','bright','door','path','new','trust'],
  'fear':['dark','shadow','cold','trembling','night','hollow','sharp','deep','hide','flight','storm','wild','edge','chill'],
  'joy':['light','warm','dance','bright','song','play','free','bloom','golden','sweet','pure','spark','rise'],
  'sorrow':['tear','grey','cold','rain','shadow','weight','loss','empty','pale','silence','deep','ache','dark','drift'],
  'anger':['fire','storm','red','burn','sharp','strike','thunder','blood','wild','rage','heat','crack','fierce','blaze','fury'],
  'zen':['stone','water','still','breath','calm','empty','moon','bamboo','silence','path','bell','temple','lotus','peace','flow'],
  'coffee':['steam','morning','warm','dark','bitter','cup','dawn','rich','brown','brew','aroma','wake','smooth','bold'],
  'space':['star','void','dark','vast','light','orbit','deep','cold','silence','nebula','cosmic','dust','infinite','glow'],
  'code':['loop','stack','node','branch','tree','root','flow','build','forge','run','break','key','link','path','clean']
};

var THEME_KEYS=Object.keys(THEME_MAP);

var SEASONS=[
  {name:'Spring',bg:'#0a0f0a',text:'#a0c0a0',words:THEME_MAP['spring']},
  {name:'Summer',bg:'#0f0a05',text:'#c0b090',words:THEME_MAP['summer']},
  {name:'Autumn',bg:'#0f0808',text:'#c0a080',words:THEME_MAP['autumn']},
  {name:'Winter',bg:'#080a0f',text:'#90a0c0',words:THEME_MAP['winter']}
];

var TEMPLATES_5=[
  [['adj',2],['noun',3]],
  [['adj',1],['noun',2],['verb',2]],
  [['det',1],['adj',1],['noun',3]],
  [['noun',2],['verb',1],['adj',2]],
  [['adj',2],['noun',1],['verb',2]],
  [['det',1],['adj',2],['noun',2]],
  [['noun',1],['prep',1],['det',1],['noun',2]],
  [['adj',3],['noun',2]],
  [['det',1],['noun',1],['verb',1],['adj',2]],
  [['verb',2],['det',1],['noun',2]]
];

var TEMPLATES_7=[
  [['adj',2],['noun',2],['verb',1],['adj',2]],
  [['det',1],['adj',2],['noun',1],['verb',1],['adj',2]],
  [['noun',2],['verb',2],['prep',1],['noun',2]],
  [['adj',3],['noun',2],['verb',2]],
  [['prep',2],['det',1],['adj',2],['noun',2]],
  [['det',1],['noun',3],['verb',1],['adj',2]],
  [['adj',1],['noun',2],['verb',2],['adj',2]],
  [['noun',2],['prep',1],['det',1],['adj',1],['noun',2]],
  [['det',1],['adj',1],['noun',1],['verb',2],['adj',2]],
  [['verb',2],['prep',2],['det',1],['noun',2]]
];

/* ── Utils ── */
function pick(arr){return arr[Math.floor(Math.random()*arr.length)]}

function getThemeWords(theme){
  if(!theme)return null;
  var t=theme.toLowerCase().trim();
  if(THEME_MAP[t])return THEME_MAP[t];
  var related=[];
  for(var pos in WORDS){
    for(var syl in WORDS[pos]){
      for(var i=0;i<WORDS[pos][syl].length;i++){
        if(WORDS[pos][syl][i].indexOf(t)>=0||t.indexOf(WORDS[pos][syl][i])>=0){
          related.push(WORDS[pos][syl][i]);
        }
      }
    }
  }
  return related.length>0?related:null;
}

/* ── Line Generation ── */
/* Returns array of {word, pos, syl} objects */
function generateLineWords(templates,biasWords){
  var words=[];
  var attempts=0;
  while(attempts<30){
    var tmpl=pick(templates);
    words=[];
    var valid=true;
    for(var i=0;i<tmpl.length;i++){
      var pos=tmpl[i][0],syl=tmpl[i][1];
      var bank=WORDS[pos];
      if(!bank||!bank[syl]||bank[syl].length===0){valid=false;break}
      var w=pick(bank[syl]);
      if(biasWords&&Math.random()<0.35){
        var matches=bank[syl].filter(function(word){return biasWords.indexOf(word)>=0});
        if(matches.length>0)w=pick(matches);
      }
      words.push({word:w,pos:pos,syl:syl});
    }
    if(valid){
      var uniq=new Set(words.map(function(w){return w.word}));
      if(uniq.size===words.length)break;
    }
    attempts++;
  }
  /* a/an fix */
  for(var j=0;j<words.length-1;j++){
    if((words[j].word==='a')&&words[j+1].word.match(/^[aeiou]/i)){
      words[j].word='an';
    }
  }
  return words;
}

function renderLineHtml(wordObjs){
  return wordObjs.map(function(w){
    return '<span class="word" data-pos="'+w.pos+'" data-syl="'+w.syl+'">'+w.word+'</span>';
  }).join(' ');
}

/* ── State ── */
var lineData=[[],[],[]]; /* word objects per line */
var lineLocked=[false,false,false];
var currentSeason=null;
var currentBias=null;
var mashupMode=false;
var themeInput=document.getElementById('theme-input');

/* ── Daily Prompt ── */
function getDailyTheme(){
  var day=Math.floor(Date.now()/86400000);
  return THEME_KEYS[day%THEME_KEYS.length];
}

function getStreak(){
  try{
    var data=JSON.parse(localStorage.getItem('haiku_streak'))||{};
    return data;
  }catch(e){return{}}
}

function updateStreak(){
  var today=new Date().toISOString().slice(0,10);
  var data=getStreak();
  if(data.lastDate===today)return data.count||1;
  var yesterday=new Date(Date.now()-86400000).toISOString().slice(0,10);
  if(data.lastDate===yesterday){
    data.count=(data.count||1)+1;
  }else{
    data.count=1;
  }
  data.lastDate=today;
  try{localStorage.setItem('haiku_streak',JSON.stringify(data))}catch(e){}
  return data.count;
}

function renderDaily(){
  var daily=getDailyTheme();
  document.getElementById('daily-theme').textContent='daily: '+daily;
  var streak=getStreak();
  var count=streak.count||0;
  var today=new Date().toISOString().slice(0,10);
  if(streak.lastDate===today||streak.lastDate===new Date(Date.now()-86400000).toISOString().slice(0,10)){
    document.getElementById('streak').textContent=count>0?count+' day streak':'';
  }else{
    document.getElementById('streak').textContent='';
  }
}

/* ── Generation ── */
function generate(){
  var season=pick(SEASONS);
  currentSeason=season;
  var userTheme=themeInput.value.trim();
  var biasWords=season.words;

  if(mashupMode){
    var t1=pick(THEME_KEYS),t2=pick(THEME_KEYS);
    while(t2===t1)t2=pick(THEME_KEYS);
    biasWords=THEME_MAP[t1].concat(THEME_MAP[t2]);
    document.getElementById('theme-label').textContent=t1+' x '+t2;
  }else if(userTheme){
    var tw=getThemeWords(userTheme);
    if(tw)biasWords=tw;
    document.getElementById('theme-label').textContent=userTheme;
  }else{
    document.getElementById('theme-label').textContent='';
  }
  currentBias=biasWords;

  document.body.style.background=season.bg;
  document.body.style.color=season.text;
  document.getElementById('season-label').textContent=season.name;

  var lines=document.querySelectorAll('.line');
  var templates=[TEMPLATES_5,TEMPLATES_7,TEMPLATES_5];

  /* hide all lines */
  for(var i=0;i<3;i++) lines[i].classList.remove('visible');

  setTimeout(function(){
    for(var i=0;i<3;i++){
      if(!lineLocked[i]){
        lineData[i]=generateLineWords(templates[i],biasWords);
        lines[i].querySelector('.line-text').innerHTML=renderLineHtml(lineData[i]);
        wireWordClicks(lines[i],i);
      }
      /* staggered reveal */
      (function(idx){
        setTimeout(function(){lines[idx].classList.add('visible')},idx*200);
      })(i);
    }
  },100);
}

/* ── Word Click to Swap ── */
function wireWordClicks(lineEl,lineIdx){
  lineEl.querySelectorAll('.word').forEach(function(span,wordIdx){
    span.addEventListener('click',function(e){
      e.stopPropagation();
      var pos=span.dataset.pos;
      var syl=parseInt(span.dataset.syl,10);
      var bank=WORDS[pos]&&WORDS[pos][syl];
      if(!bank||bank.length<2)return;
      var current=span.textContent;
      var next=current;
      var attempts=0;
      while(next===current&&attempts<20){next=pick(bank);attempts++}
      span.textContent=next;
      lineData[lineIdx][wordIdx].word=next;
      /* fix a/an */
      if(wordIdx<lineData[lineIdx].length-1){
        var prev=lineData[lineIdx][wordIdx];
        var nxt=lineData[lineIdx][wordIdx+1];
        if(prev.word==='a'&&nxt.word.match(/^[aeiou]/i)){
          prev.word='an';
          lineEl.querySelectorAll('.word')[wordIdx].textContent='an';
        }else if(prev.word==='an'&&!nxt.word.match(/^[aeiou]/i)){
          prev.word='a';
          lineEl.querySelectorAll('.word')[wordIdx].textContent='a';
        }
      }
    });
  });
}

/* ── Lock Toggle ── */
document.querySelectorAll('.lock-btn').forEach(function(btn){
  btn.addEventListener('click',function(e){
    e.stopPropagation();
    var idx=parseInt(btn.dataset.line,10);
    lineLocked[idx]=!lineLocked[idx];
    btn.classList.toggle('locked',lineLocked[idx]);
    btn.innerHTML=lineLocked[idx]?'&#9679;':'&#9675;';
  });
});

/* ── Canvas Image Export ── */
function exportImage(){
  var canvas=document.createElement('canvas');
  canvas.width=1080;canvas.height=1080;
  var ctx=canvas.getContext('2d');

  /* bg */
  var bg=currentSeason?currentSeason.bg:'#0a0a0f';
  ctx.fillStyle=bg;
  ctx.fillRect(0,0,1080,1080);

  /* text */
  var textColor=currentSeason?currentSeason.text:'#c8c0b0';
  ctx.fillStyle=textColor;
  ctx.textAlign='center';
  ctx.textBaseline='middle';

  var lines=[
    lineData[0].map(function(w){return w.word}).join(' '),
    lineData[1].map(function(w){return w.word}).join(' '),
    lineData[2].map(function(w){return w.word}).join(' ')
  ];

  ctx.font='300 52px Georgia, serif';
  ctx.fillText(lines[0],540,420);
  ctx.fillText(lines[1],540,500);
  ctx.fillText(lines[2],540,580);

  /* season label */
  ctx.font='300 18px Georgia, serif';
  ctx.globalAlpha=0.2;
  ctx.fillText(currentSeason?currentSeason.name:'',540,680);

  /* watermark */
  ctx.font='14px system-ui, sans-serif';
  ctx.globalAlpha=0.1;
  ctx.fillText('haiku-gen',540,1040);
  ctx.globalAlpha=1;

  /* download */
  var url=canvas.toDataURL('image/png');
  var a=document.createElement('a');
  a.href=url;a.download='haiku.png';
  document.body.appendChild(a);a.click();document.body.removeChild(a);
}

/* ── Saved Poems (Anthology) ── */
var saved=[];
function loadSaved(){
  try{saved=JSON.parse(localStorage.getItem('haiku_saved'))||[]}catch(e){saved=[]}
  updateSavedCount();
}
function saveCurrent(){
  var text=lineData.map(function(ld){return ld.map(function(w){return w.word}).join(' ')}).join('\n');
  if(!text.trim())return;
  if(saved.indexOf(text)>=0)return;
  saved.push(text);
  try{localStorage.setItem('haiku_saved',JSON.stringify(saved))}catch(e){}
  updateSavedCount();
  updateStreak();
  renderDaily();
}
function updateSavedCount(){
  document.getElementById('saved-count').textContent=saved.length>0?saved.length+' saved':'';
}
function renderAnthology(){
  var body=document.getElementById('anthology-body');
  if(saved.length===0){body.innerHTML='<div style="opacity:0.3;font-size:0.6rem">No saved haiku yet</div>';return}
  body.innerHTML=saved.slice().reverse().map(function(text){
    return '<div class="saved-card">'+text.replace(/\n/g,'<br>')+'</div>';
  }).join('');
}

/* ── Controls ── */
document.getElementById('poem').addEventListener('click',function(){
  generate();
  document.getElementById('hint').style.opacity='0';
});

document.addEventListener('keydown',function(e){
  if(e.target.tagName==='INPUT'||e.target.tagName==='TEXTAREA')return;
  if(e.key===' '){e.preventDefault();generate();document.getElementById('hint').style.opacity='0'}
});

document.getElementById('btn-gen').addEventListener('click',function(e){
  e.stopPropagation();generate();document.getElementById('hint').style.opacity='0';
});

document.getElementById('btn-mashup').addEventListener('click',function(e){
  e.stopPropagation();
  mashupMode=!mashupMode;
  this.classList.toggle('active',mashupMode);
  generate();
});

document.getElementById('btn-img').addEventListener('click',function(e){
  e.stopPropagation();exportImage();
});

document.getElementById('btn-copy').addEventListener('click',function(e){
  e.stopPropagation();
  var text=lineData.map(function(ld){return ld.map(function(w){return w.word}).join(' ')}).join('\n');
  if(navigator.clipboard&&window.isSecureContext){
    var self=this;
    navigator.clipboard.writeText(text).then(function(){
      self.textContent='Copied!';setTimeout(function(){self.textContent='Copy'},1200);
    });
  }else{
    var tmp=document.createElement('textarea');tmp.value=text;tmp.style.position='fixed';tmp.style.opacity='0';
    document.body.appendChild(tmp);tmp.select();
    try{document.execCommand('copy')}catch(ex){}
    document.body.removeChild(tmp);
    this.textContent='Copied!';var self=this;setTimeout(function(){self.textContent='Copy'},1200);
  }
});

document.getElementById('btn-save').addEventListener('click',function(e){
  e.stopPropagation();saveCurrent();
  this.textContent='Saved!';var self=this;setTimeout(function(){self.textContent='Save'},1200);
});

document.getElementById('saved-count').addEventListener('click',function(){
  renderAnthology();
  document.getElementById('anthology').classList.toggle('open');
});

document.getElementById('anthology-close').addEventListener('click',function(){
  document.getElementById('anthology').classList.remove('open');
});

themeInput.addEventListener('keydown',function(e){
  if(e.key==='Enter'){e.preventDefault();generate()}
});

/* ── Init ── */
loadSaved();
renderDaily();
generate();
})();
</script>
