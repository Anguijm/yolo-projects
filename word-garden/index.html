<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Word Garden</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; overflow: hidden; touch-action: manipulation; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', system-ui, sans-serif; }
#app { height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: center; position: relative; }
canvas { display: block; }

#input-wrap { position: absolute; bottom: 40px; z-index: 10; display: flex; flex-direction: column; align-items: center; gap: 8px; }
#word-input { background: transparent; border: none; border-bottom: 1px solid #222; color: #888; font-family: inherit; font-size: 1.2rem; padding: 6px 12px; text-align: center; outline: none; letter-spacing: 0.1em; width: 220px; }
#word-input::placeholder { color: #1a1a1a; }
#word-input:focus { border-color: #444; color: #fff; }
.sub-text { font-size: 0.55rem; color: #1a1a1a; }
#btn-save { background: transparent; border: 1px solid #1a1a1a; color: #333; padding: 4px 14px; border-radius: 14px; font-size: 0.6rem; cursor: pointer; font-family: inherit; }
#btn-save:active { border-color: #555; color: #888; }
#current-word { position: absolute; top: 16px; font-size: 0.65rem; color: #222; letter-spacing: 0.2em; text-transform: uppercase; font-family: monospace; }
</style>
</head>
<body>
<div id="app">
  <div id="current-word"></div>
  <canvas id="c"></canvas>
  <div id="input-wrap">
    <input type="text" id="word-input" placeholder="type a name..." maxlength="20" autocomplete="off" spellcheck="false">
    <span class="sub-text">Each word grows a unique plant</span>
    <button id="btn-save">Save PNG</button>
  </div>
</div>

<script>
(function() {
'use strict';

var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var W, H;

// ============ PALETTES ============
var PALETTES = [
  { bg: '#000', trunk: '#4a3728', leaf: '#3fb950', accent: '#86efac' },
  { bg: '#000', trunk: '#5c4033', leaf: '#f472b6', accent: '#fbcfe8' },
  { bg: '#000', trunk: '#374151', leaf: '#60a5fa', accent: '#bfdbfe' },
  { bg: '#000', trunk: '#78350f', leaf: '#fbbf24', accent: '#fef3c7' },
  { bg: '#000', trunk: '#4c1d95', leaf: '#a78bfa', accent: '#ddd6fe' },
  { bg: '#000', trunk: '#1e3a5f', leaf: '#2dd4bf', accent: '#99f6e4' },
  { bg: '#000', trunk: '#831843', leaf: '#fb923c', accent: '#fed7aa' },
  { bg: '#000', trunk: '#1c1917', leaf: '#e7e5e4', accent: '#fafaf9' },
];

// ============ SEEDED PRNG (mulberry32) ============
function hashString(str) {
  var hash = 0;
  for (var i = 0; i < str.length; i++) {
    var ch = str.charCodeAt(i);
    hash = ((hash << 5) - hash) + ch;
    hash = hash & hash; // Convert to 32-bit integer
  }
  return Math.abs(hash);
}

function mulberry32(seed) {
  return function() {
    seed = (seed + 0x6D2B79F5) | 0;
    var t = Math.imul(seed ^ (seed >>> 15), 1 | seed);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

// ============ SIZING ============
function resize() {
  W = Math.min(window.innerWidth, 600);
  H = Math.min(window.innerHeight - 120, 600);
  canvas.width = W;
  canvas.height = H;
}
var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 200);
});
resize();

// ============ TREE DRAWING ============
var branches = [];
var drawIdx = 0;
var animId = null;
var currentPalette = PALETTES[0];

function generateTree(word) {
  if (!word || word.length === 0) return;
  var seed = hashString(word.toLowerCase());
  var rng = mulberry32(seed);

  // Select palette deterministically
  currentPalette = PALETTES[seed % PALETTES.length];

  // Tree parameters from seed
  var baseAngle = -Math.PI / 2; // Start pointing up
  var baseLength = H * 0.22 + rng() * H * 0.08;
  var branchDecay = 0.62 + rng() * 0.15;
  var angleSpread = 0.3 + rng() * 0.5;
  var maxDepth = 7 + Math.floor(rng() * 4);
  var curvature = 0.1 + rng() * 0.3;
  var asymmetry = (rng() - 0.5) * 0.3;

  branches = [];
  var startX = W / 2 + (rng() - 0.5) * 20;
  var startY = H - 10;

  // Recursive branch generation
  function branch(x, y, angle, length, depth, thickness) {
    if (depth > maxDepth || length < 2 || branches.length > 15000) return;

    // End point with curvature
    var curve = (rng() - 0.5) * curvature;
    var endX = x + Math.cos(angle + curve) * length;
    var endY = y + Math.sin(angle + curve) * length;

    // Control point for bezier
    var cpX = x + Math.cos(angle + curve * 0.5) * length * 0.5 + (rng() - 0.5) * length * 0.2;
    var cpY = y + Math.sin(angle + curve * 0.5) * length * 0.5 + (rng() - 0.5) * length * 0.2;

    // Color: trunk for early, leaf for later
    var depthRatio = depth / maxDepth;
    var isLeaf = depthRatio > 0.6;
    var color = isLeaf ? currentPalette.leaf : currentPalette.trunk;
    var alpha = 0.4 + depthRatio * 0.6;

    branches.push({
      x1: x, y1: y, cpx: cpX, cpy: cpY, x2: endX, y2: endY,
      thickness: thickness, color: color, alpha: alpha,
      isLeaf: isLeaf, depth: depth
    });

    // Terminal nodes: draw a "leaf" or "bloom"
    if (depth >= maxDepth - 1 || length < 6) {
      branches.push({
        type: 'leaf', x: endX, y: endY,
        size: 2 + rng() * 4,
        color: rng() > 0.5 ? currentPalette.leaf : currentPalette.accent,
        alpha: 0.5 + rng() * 0.5
      });
      return;
    }

    // Branch into 2 (sometimes 3)
    var numBranches = rng() > 0.7 ? 3 : 2;
    for (var i = 0; i < numBranches; i++) {
      var a = angle + (i - (numBranches - 1) / 2) * angleSpread + asymmetry * rng();
      var l = length * (branchDecay + (rng() - 0.5) * 0.1);
      var t = thickness * 0.7;
      branch(endX, endY, a, l, depth + 1, t);
    }
  }

  branch(startX, startY, baseAngle, baseLength, 0, 4 + rng() * 2);

  // Sort by depth for natural bottom-up growth animation
  branches.sort(function(a, b) { return (a.depth || 0) - (b.depth || 0); });
}

// ============ ANIMATED DRAWING ============
function startDrawing() {
  drawIdx = 0;
  ctx.fillStyle = currentPalette.bg;
  ctx.fillRect(0, 0, W, H);
  if (animId) cancelAnimationFrame(animId);
  animDraw();
}

function animDraw() {
  // Draw several branches per frame for speed
  var perFrame = Math.max(3, Math.ceil(branches.length / 90));
  for (var i = 0; i < perFrame && drawIdx < branches.length; i++, drawIdx++) {
    var b = branches[drawIdx];
    if (b.type === 'leaf') {
      // Draw leaf/bloom
      ctx.globalAlpha = b.alpha;
      ctx.fillStyle = b.color;
      ctx.shadowBlur = 6;
      ctx.shadowColor = b.color;
      ctx.beginPath();
      ctx.arc(b.x, b.y, b.size, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    } else {
      // Draw branch as bezier curve
      ctx.globalAlpha = b.alpha;
      ctx.strokeStyle = b.color;
      ctx.lineWidth = b.thickness;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.moveTo(b.x1, b.y1);
      ctx.quadraticCurveTo(b.cpx, b.cpy, b.x2, b.y2);
      ctx.stroke();
    }
  }
  ctx.globalAlpha = 1;

  if (drawIdx < branches.length) {
    animId = requestAnimationFrame(animDraw);
  }
}

// ============ INPUT ============
var inputEl = document.getElementById('word-input');
var debounceTimer;

inputEl.addEventListener('input', function() {
  clearTimeout(debounceTimer);
  debounceTimer = setTimeout(function() {
    var word = inputEl.value.trim();
    document.getElementById('current-word').textContent = word;
    if (word.length > 0) {
      generateTree(word);
      startDrawing();
    } else {
      ctx.fillStyle = '#000';
      ctx.fillRect(0, 0, W, H);
      document.getElementById('current-word').textContent = '';
    }
  }, 400);
});

// Save
document.getElementById('btn-save').addEventListener('click', function() {
  var link = document.createElement('a');
  link.download = 'word-garden-' + (inputEl.value.trim() || 'plant') + '.png';
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Auto-focus
setTimeout(function() { inputEl.focus(); }, 300);

})();
</script>
</body>
</html>
