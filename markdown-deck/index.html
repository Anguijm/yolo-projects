<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0a; color: #ccc; }
.editor-mode { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }

.toolbar { padding: 0.5rem 1rem; background: #0d0d0d; border-bottom: 1px solid #1a1a1a; display: flex; gap: 0.5rem; align-items: center; }
.toolbar h2 { font-size: 0.8rem; color: #fff; margin-right: auto; }

textarea:focus { outline: none; }
.slide-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; overflow: hidden; }
.slide { width: 100%; max-width: 700px; aspect-ratio: 16/9; background: #0a0a0a; border-radius: 8px; border: 1px solid #222; padding: 3rem; display: flex; flex-direction: column; justify-content: center; overflow: auto; position: relative; }
.slide.has-positioned { justify-content: flex-start; }
.pos-block { position: absolute; box-sizing: border-box; }
.slide h1 { font-size: 2rem; color: #fff; margin-bottom: 1rem; line-height: 1.2; }
.slide h2 { font-size: 1.4rem; color: #60a5fa; margin-bottom: 0.8rem; }
.slide h3 { font-size: 1.1rem; color: #a78bfa; margin-bottom: 0.6rem; }
.slide p { font-size: 0.9rem; color: #ccc; margin-bottom: 0.7rem; line-height: 1.6; }
.slide ul, .slide ol { margin: 0.5rem 0 0.5rem 1.5rem; font-size: 0.9rem; color: #ccc; line-height: 1.8; }

.slide code { background: #1a1a1a; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.8rem; color: #4ade80; }

.slide em { color: #fbbf24; }
.slide hr { border: none; border-top: 1px solid #333; margin: 1rem 0; }

.columns { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; align-items: start; flex: 1; }
.columns .col { min-width: 0; }
/* Presentation mode */
.present-mode { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0a; z-index: 1000; }
.present-mode.active { display: flex; align-items: center; justify-content: center; }

.present-slide.has-positioned { justify-content: flex-start; }

---

## How It Works

- Write markdown in the left panel
- Separate slides with `---`
- Hit **Present** to go fullscreen
- Click **Theme** to style with design tokens
- Click **Export** to download as `.pptx`

---

## Rich Formatting

- **Bold text** and *italic text*
- ~~Strikethrough~~ for deletions
- ==Highlighted text== for emphasis
- `inline code` with distinct styling
- H~2~O for subscript, x^2^ for superscript
- [Links](https://example.com) open in new tabs

---

## Lists &amp; Tasks

- Top-level bullet
  - Nested bullet
    - Deep nested bullet
- Back to top level

#### Task List
- [x] Design the slides
- [x] Add PPTX export
- [ ] Present to the team

---

## Code Blocks

```python
def hello():
    print("shipped and ugly")
    print("over planned and pretty")
```

> The best presentation is the one
> you actually make. Multi-line
> blockquotes just work.

---

- Left column bullet

- Use `|||` to split

<script>
const inputEl = document.getElementById('input');
const previewEl = document.getElementById('slide-preview');
const presentEl = document.getElementById('present');
const presentSlideEl = document.getElementById('present-slide');
const thumbsEl = document.getElementById('thumbs');
const slideCountEl = document.getElementById('slide-count');

let slides = [];
let currentSlide = 0;
let presenting = false;

// ============ SYNTAX HIGHLIGHTER (extracted from syntax-glow) ============
var SG_GRAMMARS = {
  javascript: [
    { type: 'comment',  regex: /\/\/.*$|\/\*[\s\S]*?(?:\*\/|$)/gm },
    { type: 'string',   regex: /`(?:[^`\\]|\\.)*`|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/g },
    { type: 'regex',    regex: /\/(?![*/])(?:[^/\\]|\\.)+\/[gimsuy]*/g },
    { type: 'number',   regex: /\b(?:0[xXoObB][\da-fA-F_]+|\d[\d_]*\.?\d*(?:[eE][+-]?\d+)?)\b/g },
    { type: 'keyword',  regex: /\b(?:async|await|break|case|catch|class|const|continue|debugger|default|delete|do|else|export|extends|finally|for|from|function|if|import|in|instanceof|let|new|of|return|static|super|switch|this|throw|try|typeof|var|void|while|with|yield)\b/g },
    { type: 'builtin',  regex: /\b(?:true|false|null|undefined|NaN|Infinity|console|Math|JSON|Object|Array|String|Number|Boolean|Promise|Map|Set|Date|RegExp|Error)\b/g },
    { type: 'function', regex: /\b[a-zA-Z_$][\w$]*(?=\s*\()/g },
    { type: 'operator', regex: /=>|[+\-*/%]=?|[!=]==?|&&?|\|\|?|\?\??|<<?=?|>>?=?|[~^!]/g },
    { type: 'punct',    regex: /[{}()\[\];:.,]/g }
  ],
  js: 'javascript',
  python: [
    { type: 'comment',   regex: /#.*$/gm },
    { type: 'string',    regex: /"""[\s\S]*?(?:"""|$)|'''[\s\S]*?(?:'''|$)|f"(?:[^"\\]|\\.)*"|f'(?:[^'\\]|\\.)*'|"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/g },
    { type: 'decorator', regex: /@\w+/g },
    { type: 'number',    regex: /\b(?:0[xXoObB][\da-fA-F_]+|\d[\d_]*\.?\d*(?:[eE][+-]?\d+)?j?)\b/g },
    { type: 'keyword',   regex: /\b(?:and|as|assert|async|await|break|class|continue|def|del|elif|else|except|finally|for|from|global|if|import|in|is|lambda|nonlocal|not|or|pass|raise|return|try|while|with|yield)\b/g },
    { type: 'builtin',   regex: /\b(?:True|False|None|self|cls|print|len|range|int|str|float|list|dict|tuple|set|type|isinstance|enumerate|zip|map|filter|sorted|reversed|open|super|property|staticmethod|classmethod|__\w+__)\b/g },
    { type: 'function',  regex: /\b[a-zA-Z_]\w*(?=\s*\()/g },
    { type: 'operator',  regex: /[+\-*/%@]=?|[!=]=|<[=<]?|>[=>]?|\*\*=?|\/\/=?|[~^&|]/g },
    { type: 'punct',     regex: /[{}()\[\]:;.,]/g }
  ],
  py: 'python',
  html: [
    { type: 'comment', regex: /<!--[\s\S]*?-->/g },
    { type: 'string',  regex: /"[^"]*"|'[^']*'/g },
    { type: 'tag',     regex: /<\/?[a-zA-Z][\w-]*/g },
    { type: 'attr',    regex: /\b[a-zA-Z-]+(?==)/g },
    { type: 'punct',   regex: /[<>\/=]/g }
  ],
  css: [
    { type: 'comment',  regex: /\/\*[\s\S]*?\*\//g },
    { type: 'string',   regex: /"(?:[^"\\]|\\.)*"|'(?:[^'\\]|\\.)*'/g },
    { type: 'selector', regex: /[.#][\w-]+|@[\w-]+|\b[a-z][\w-]*(?=\s*[{,])/g },
    { type: 'property', regex: /[\w-]+(?=\s*:)/g },
    { type: 'number',   regex: /\b\d+\.?\d*(?:%|px|em|rem|vh|vw|s|ms|deg|fr)?\b/g },
    { type: 'value',    regex: /#[0-9a-fA-F]{3,8}\b/g },
    { type: 'keyword',  regex: /\b(?:important|inherit|initial|unset|none|auto|solid|flex|grid|block|inline|absolute|relative|fixed|sticky)\b/g },
    { type: 'function', regex: /\b[\w-]+(?=\()/g },
    { type: 'operator', regex: /[{}():;,>~+*]/g }
  ]
};

function sgHighlight(code, lang) {
  if (typeof code !== 'string' || !code) return '';
  var grammar = SG_GRAMMARS[lang];
  if (typeof grammar === 'string') grammar = SG_GRAMMARS[grammar]; // alias
  if (!grammar) return esc(code);
  if (!grammar._sticky) {
    grammar._sticky = grammar.map(function(rule) {
      var baseFlags = rule.regex.flags.replace(/[gy]/g, '');
      return { type: rule.type, regex: new RegExp(rule.regex.source, baseFlags + 'y') };
    });
  }
  var sticky = grammar._sticky;
  var result = '', pos = 0;
  while (pos < code.length) {
    var bestMatch = null, bestType = '';
    for (var g = 0; g < sticky.length; g++) {
      var rule = sticky[g];
      rule.regex.lastIndex = pos;
      var m = rule.regex.exec(code);
      if (m && m.index === pos && m[0].length > 0) {
        if (!bestMatch || m[0].length > bestMatch[0].length) { bestMatch = m; bestType = rule.type; }
      }
    }
    if (bestMatch) {
      result += '<span class="sg-' + bestType + '">' + esc(bestMatch[0]) + '</span>';
      pos += bestMatch[0].length;
    } else {
      result += esc(code[pos]);
      pos++;
    }
  }
  return result;
}

// Full markdown parser with code-block protection
function md(text) {
  // 0. Split off speaker notes (after ???)
  var notesSep = text.indexOf('\n???');
  var speakerNotes = '';
  if (notesSep >= 0) {
    speakerNotes = text.substring(notesSep + 4).trim();
    text = text.substring(0, notesSep);
  }

  // 1. Extract fenced code blocks into placeholders
  var codeBlocks = [];
  var html = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    var langAttr = lang ? ' data-lang="' + esc(lang) + '"' : '';
    var langLabel = lang ? '<span class="code-lang">' + esc(lang) + '</span>' : '';
    var highlighted = lang ? sgHighlight(code.trimEnd(), lang.toLowerCase()) : esc(code.trimEnd());
    codeBlocks.push(langLabel + '<pre' + langAttr + '><code>' + highlighted + '</code></pre>');
    return '\n__CODEBLOCK_' + (codeBlocks.length - 1) + '__\n';
  });

  // 2. Extract inline code
  var inlineCodes = [];
  html = html.replace(/`([^`]+)`/g, function(_, code) {
    inlineCodes.push('<code>' + esc(code) + '</code>');
    return '__INLINE_' + (inlineCodes.length - 1) + '__';
  });

  // 3. Block-level elements
  // Headings
  html = html
    .replace(/^#### (.+)$/gm, '<h4>$1</h4>')
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>');

  // Multi-line blockquotes: merge consecutive > lines
  html = html.replace(/(^> .+\n?)+/gm, function(match) {
    var lines = match.trim().split('\n').map(function(l) { return l.replace(/^> ?/, ''); });
    return '<blockquote>' + lines.join('<br>') + '</blockquote>';
  });

  // Horizontal rules (standalone --- or *** or ___)
  html = html.replace(/^([-*_]){3,}\s*$/gm, '<hr>');

  // Images (before links so ![...](...) isn't caught by link regex)
  html = html.replace(/!\[([^\]]*)\]\(([^)]+)\)/g, function(_, alt, src) {
    return '<img src="' + esc(src.trim()) + '" alt="' + esc(alt) + '" style="max-width:100%;max-height:60vh;border-radius:4px">';
  });

  // Links
  html = html.replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, t, url) {
    var safeUrl = url.trim().toLowerCase().startsWith('javascript:') ? '#' : url;
    return '<a href="' + esc(safeUrl) + '" target="_blank">' + t + '</a>';
  });

  // 4. List handling — supports nested indentation
  html = html.replace(/^( *)([-*]) \[([xX ])\] (.+)$/gm, function(_, indent, bullet, check, text) {
    var depth = Math.floor(indent.length / 2);
    var icon = (check === 'x' || check === 'X') ? '&#9745;' : '&#9744;';
    return '<li class="uli task" data-depth="' + depth + '">' + icon + ' ' + text + '</li>';
  });
  html = html.replace(/^( *)[*-] (.+)$/gm, function(_, indent, text) {
    var depth = Math.floor(indent.length / 2);
    return '<li class="uli" data-depth="' + depth + '">' + text + '</li>';
  });
  html = html.replace(/^( *)\d+\. (.+)$/gm, function(_, indent, text) {
    var depth = Math.floor(indent.length / 2);
    return '<li class="oli" data-depth="' + depth + '">' + text + '</li>';
  });

  // Wrap consecutive list items
  html = html.replace(/((?:<li class="uli[^"]*"[^>]*>.*<\/li>\n?)+)/g, function(match) {
    return buildNestedList(match, 'ul');
  });
  html = html.replace(/((?:<li class="oli"[^>]*>.*<\/li>\n?)+)/g, function(match) {
    return buildNestedList(match, 'ol');
  });

  // 5. Tables — with header row support
  var tableBlocks = [];
  html = html.replace(/((?:^\|.+\|$\n?)+)/gm, function(block) {
    var rows = block.trim().split('\n');
    var result = '<table style="border-collapse:collapse;font-size:0.85rem;margin:0.5rem 0;width:auto">';
    var isHeader = true;
    for (var r = 0; r < rows.length; r++) {
      var content = rows[r].replace(/^\||\|$/g, '');
      if (content.match(/^[\s\-:|]+$/)) { isHeader = false; continue; } // separator row
      var cells = content.split('|').map(function(c) { return c.trim(); });
      var tag = isHeader ? 'th' : 'td';
      var style = isHeader
        ? 'padding:0.4rem 1rem;border-bottom:2px solid #444;text-align:left;font-weight:600;color:#fff'
        : 'padding:0.3rem 1rem;border-bottom:1px solid #222';
      result += '<tr>' + cells.map(function(c) { return '<' + tag + ' style="' + style + '">' + c + '</' + tag + '>'; }).join('') + '</tr>';
      if (isHeader && r === 0 && rows.length > 1 && rows[1].match(/^\|[\s\-:|]+\|$/)) {
        // Keep isHeader true only for first row
      }
      isHeader = false;
    }
    result += '</table>';
    tableBlocks.push(result);
    return '\n__TABLE_' + (tableBlocks.length - 1) + '__\n';
  });

  // 6. Inline formatting
  html = html
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/~~(.+?)~~/g, '<del>$1</del>')
    .replace(/==(.+?)==/g, '<mark>$1</mark>')
    .replace(/\^(.+?)\^/g, '<sup>$1</sup>')
    .replace(/~([^~]+)~/g, '<sub>$1</sub>');

  // 7. Paragraphs
  html = html.split(/\n\n+/).map(function(block) {
    block = block.trim();
    if (!block) return '';
    if (block.match(/^<(h[1-4]|ul|ol|li|pre|blockquote|hr|table|tr|td|th|img|__CODEBLOCK|__TABLE)/)) return block;
    if (block.match(/<\/(h[1-4]|ul|ol|pre|blockquote|table)>$/)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  // 8. Re-inject protected blocks
  html = html.replace(/__CODEBLOCK_(\d+)__/g, function(_, i) { return codeBlocks[i]; });
  html = html.replace(/__INLINE_(\d+)__/g, function(_, i) { return inlineCodes[i]; });
  html = html.replace(/__TABLE_(\d+)__/g, function(_, i) { return tableBlocks[i]; });

  // 9. Positioned blocks: [@ x:... y:... w:... h:... align:... size:...]
  // Split HTML by position directives and wrap each in a positioned div
  var posRe = /(?:<p>)?\[@\s*((?:[a-z]+:\s*[^\]\s]+\s*)+)\](?:<\/p>)?/g;
  var posMatch = posRe.exec(html);
  if (posMatch) {
    posRe.lastIndex = 0; // reset
    var segments = [];
    var lastIdx = 0;
    var hasPositioned = false;

    while ((posMatch = posRe.exec(html)) !== null) {
      hasPositioned = true;
      // Content before this directive (if any, and if it follows a previous directive)
      if (segments.length > 0) {
        // Close the previous positioned block with content between last directive and this one
        segments[segments.length - 1].content = html.substring(segments[segments.length - 1].contentStart, posMatch.index);
      } else if (posMatch.index > 0) {
        // Free-flowing content before the first directive — keep as normal flow
        segments.push({ style: '', content: html.substring(0, posMatch.index), isFlow: true });
      }

      // Parse directive properties
      var props = {};
      var propRe = /([a-z]+):\s*([^\s\]]+)/g;
      var pm;
      while ((pm = propRe.exec(posMatch[1])) !== null) {
        props[pm[1]] = pm[2];
      }

      var style = 'position:absolute;';
      if (props.x) style += 'left:' + props.x + ';';
      if (props.y) style += 'top:' + props.y + ';';
      if (props.w) style += 'width:' + props.w + ';';
      if (props.h) style += 'height:' + props.h + ';';
      if (props.align) style += 'text-align:' + props.align + ';';
      if (props.size) style += 'font-size:' + props.size + ';';

      segments.push({ style: style, content: '', contentStart: posMatch.index + posMatch[0].length, props: props });
    }

    // Last segment gets remaining content
    if (segments.length > 0 && !segments[segments.length - 1].isFlow) {
      segments[segments.length - 1].content = html.substring(segments[segments.length - 1].contentStart);
    }

    if (hasPositioned) {
      var rebuilt = '';
      for (var si = 0; si < segments.length; si++) {
        var seg = segments[si];
        var trimmed = seg.content.trim();
        if (!trimmed) continue;
        if (seg.isFlow) {
          rebuilt += trimmed;
        } else {
          rebuilt += '<div class="pos-block" style="' + seg.style + '">' + trimmed + '</div>';
        }
      }
      html = '<div class="pos-flag"></div>' + rebuilt;
    }
  }

  // 10. Two-column layout: split on ||| separator
  if (html.indexOf('|||') >= 0) {
    // Find top-level content before first |||, and split the rest
    // Strategy: extract any leading heading as slide title, then wrap columns
    var parts = html.split(/\n?<p>\|\|\|<\/p>\n?|\n?\|\|\|\n?/);
    if (parts.length >= 2) {
      // Check if first part starts with a heading — keep it above columns
      var titleHtml = '';
      var leftContent = parts[0];
      var headingMatch = leftContent.match(/^(\s*<h[1-3]>[\s\S]*?<\/h[1-3]>)\s*/);
      if (headingMatch) {
        titleHtml = headingMatch[1];
        leftContent = leftContent.substring(headingMatch[0].length);
      }
      var rightContent = parts.slice(1).join('');
      html = titleHtml + '<div class="columns"><div class="col">' + leftContent + '</div><div class="col">' + rightContent + '</div></div>';
    }
  }

  return html;
}

// Build nested list from flat li elements with data-depth
function buildNestedList(liBlock, tag) {
  var re = /<li class="[^"]*"(?: data-depth="(\d+)")?>([\s\S]*?)<\/li>/g;
  var items = [], m;
  while ((m = re.exec(liBlock)) !== null) {
    items.push({ depth: parseInt(m[1] || '0', 10), content: m[2] });
  }
  if (items.length === 0) return liBlock;

  var result = '';
  var stack = []; // stack of open list depths

  for (var i = 0; i < items.length; i++) {
    var d = items[i].depth;
    while (stack.length > 0 && stack[stack.length - 1] >= d) {
      result += '</li></' + tag + '>';
      stack.pop();
    }
    if (stack.length === 0 || d > stack[stack.length - 1]) {
      var indent = d * 1.2;
      result += '<' + tag + ' style="margin-left:' + indent + 'rem">';
      stack.push(d);
    }
    result += '<li>' + items[i].content;
  }
  while (stack.length > 0) {
    result += '</li></' + tag + '>';
    stack.pop();
  }
  return result;
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function parseSlides() {
  const raw = inputEl.value;
  slides = raw.split(/\n---\n/).map(s => s.trim()).filter(s => s);
  slideCountEl.textContent = `${slides.length} slides`;
  if (currentSlide >= slides.length) currentSlide = Math.max(0, slides.length - 1);
}

function renderPreview() {
  if (slides.length === 0) {
    previewEl.innerHTML = '<p style="color:#555">Type markdown and separate slides with ---</p>';
    return;
  }
  previewEl.innerHTML = md(slides[currentSlide]);
  // Toggle positioned layout mode
  var slideEl = previewEl.closest('.slide') || previewEl;
  if (previewEl.querySelector('.pos-flag')) {
    slideEl.classList.add('has-positioned');
  } else {
    slideEl.classList.remove('has-positioned');
  }

  // Thumbnails
  thumbsEl.innerHTML = slides.map((s, i) => {
    const preview = s.split('\n').slice(0, 3).join(' ').slice(0, 60);
    return `<div class="thumb ${i === currentSlide ? 'active' : ''}" onclick="goSlide(${i})">${i + 1}. ${esc(preview)}</div>`;
  }).join('');
}

function renderPresent() {
  if (slides.length === 0) return;
  presentSlideEl.innerHTML = md(slides[currentSlide]);
  if (presentSlideEl.querySelector('.pos-flag')) {
    presentSlideEl.classList.add('has-positioned');
  } else {
    presentSlideEl.classList.remove('has-positioned');
  }
  document.getElementById('present-counter').textContent = `${currentSlide + 1} / ${slides.length}`;
}

window.goSlide = function(i) {
  currentSlide = i;
  renderPreview();
  if (presenting) renderPresent();
};

window.nextSlide = function() {
  if (currentSlide < slides.length - 1) { currentSlide++; renderPreview(); if (presenting) renderPresent(); }
};

window.prevSlide = function() {
  if (currentSlide > 0) { currentSlide--; renderPreview(); if (presenting) renderPresent(); }
};

window.startPresent = function() {
  presenting = true;
  presentEl.classList.add('active');
  renderPresent();
  document.body.requestFullscreen?.();
};

function stopPresent() {
  presenting = false;
  presentEl.classList.remove('active');
  if (document.fullscreenElement) document.exitFullscreen?.();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { stopPresent(); return; }
  if (e.key === 'f' && !presenting && document.activeElement !== inputEl) { startPresent(); return; }
  if (e.key === 'ArrowRight' || e.key === ' ') {
    if (presenting || document.activeElement !== inputEl) { e.preventDefault(); nextSlide(); }
  }
  if (e.key === 'ArrowLeft') {
    if (presenting || document.activeElement !== inputEl) { e.preventDefault(); prevSlide(); }
  }
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && presenting) stopPresent();
});

let debounce;
inputEl.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { parseSlides(); renderPreview(); }, 200);
});

let designStyleEl = null;

// Parse design.md tokens into a flat object
function parseDesignTokens(src) {
  var tokens = {};
  var lines = src.split('\n');
  for (var i = 0; i < lines.length; i++) {
    var line = lines[i].trim();
    if (!line || line.startsWith('#')) continue;
    var idx = line.indexOf(':');
    if (idx < 1) continue;
    var key = line.substring(0, idx).trim();
    var val = line.substring(idx + 1).trim();
    if (key && val) tokens[key] = val;
  }
  return tokens;
}

// Convert tokens to CSS targeting both .slide and .present-slide
function tokensToCss(t) {
  var S = '.slide, .present-slide';
  var css = '';
  // Background & base
  css += S + ' {\n';
  if (t['background']) css += '  background: ' + t['background'] + ';\n';
  if (t['text']) css += '  color: ' + t['text'] + ';\n';
  if (t['body-font']) css += '  font-family: ' + t['body-font'] + ';\n';
  if (t['body-size']) css += '  font-size: ' + t['body-size'] + ';\n';
  if (t['line-height']) css += '  line-height: ' + t['line-height'] + ';\n';
  if (t['slide-padding']) css += '  padding: ' + t['slide-padding'] + ';\n';
  if (t['border-radius']) css += '  border-radius: ' + t['border-radius'] + ';\n';
  if (t['content-align']) css += '  text-align: ' + t['content-align'] + ';\n';
  css += '}\n';
  // Headings
  if (t['heading'] || t['heading-font'] || t['h1-size']) {
    css += S.replace(/, /g, ' h1, ') + ' h1 {\n';
    if (t['heading']) css += '  color: ' + t['heading'] + ';\n';
    if (t['heading-font']) css += '  font-family: ' + t['heading-font'] + ';\n';
    if (t['h1-size']) css += '  font-size: ' + t['h1-size'] + ';\n';
    if (t['h1-weight']) css += '  font-weight: ' + t['h1-weight'] + ';\n';
    css += '}\n';
  }
  if (t['subheading'] || t['h2-size']) {
    css += S.replace(/, /g, ' h2, ') + ' h2 {\n';
    if (t['subheading']) css += '  color: ' + t['subheading'] + ';\n';
    if (t['heading-font']) css += '  font-family: ' + t['heading-font'] + ';\n';
    if (t['h2-size']) css += '  font-size: ' + t['h2-size'] + ';\n';
    if (t['h2-weight']) css += '  font-weight: ' + t['h2-weight'] + ';\n';
    css += '}\n';
  }
  if (t['accent'] || t['h3-size']) {
    css += S.replace(/, /g, ' h3, ') + ' h3 {\n';
    if (t['accent']) css += '  color: ' + t['accent'] + ';\n';
    if (t['h3-size']) css += '  font-size: ' + t['h3-size'] + ';\n';
    css += '}\n';
  }
  // Paragraphs & lists
  if (t['text'] || t['body-size']) {
    css += S.replace(/, /g, ' p, ') + ' p, ' + S.replace(/, /g, ' ul, ') + ' ul, ' + S.replace(/, /g, ' ol, ') + ' ol {\n';
    if (t['text']) css += '  color: ' + t['text'] + ';\n';
    css += '}\n';
  }
  // Strong
  if (t['strong']) {
    css += S.replace(/, /g, ' strong, ') + ' strong { color: ' + t['strong'] + '; }\n';
  }
  // Emphasis
  if (t['emphasis']) {
    css += S.replace(/, /g, ' em, ') + ' em { color: ' + t['emphasis'] + '; }\n';
  }
  // Code
  if (t['code-text'] || t['code-bg'] || t['code-font'] || t['code-size']) {
    css += S.replace(/, /g, ' code, ') + ' code {\n';
    if (t['code-text']) css += '  color: ' + t['code-text'] + ';\n';
    if (t['code-bg']) css += '  background: ' + t['code-bg'] + ';\n';
    if (t['code-font']) css += '  font-family: ' + t['code-font'] + ';\n';
    if (t['code-size']) css += '  font-size: ' + t['code-size'] + ';\n';
    css += '}\n';
  }
  if (t['pre-bg']) {
    css += S.replace(/, /g, ' pre, ') + ' pre { background: ' + t['pre-bg'] + '; }\n';
    css += S.replace(/, /g, ' pre code, ') + ' pre code { background: none; }\n';
  }
  // Blockquote
  if (t['quote-text'] || t['quote-border']) {
    css += S.replace(/, /g, ' blockquote, ') + ' blockquote {\n';
    if (t['quote-text']) css += '  color: ' + t['quote-text'] + ';\n';
    if (t['quote-border']) css += '  border-left-color: ' + t['quote-border'] + ';\n';
    css += '}\n';
  }
  // Links
  if (t['link']) {
    css += S.replace(/, /g, ' a, ') + ' a { color: ' + t['link'] + '; }\n';
  }
  // HR
  if (t['hr']) {
    css += S.replace(/, /g, ' hr, ') + ' hr { border-top-color: ' + t['hr'] + '; }\n';
  }
  return css;
}

// Minimal ZIP writer (store-only, no compression — PPTX readers handle it fine)
function miniZip(files) {
  var localHeaders = [], centralHeaders = [], offset = 0;
  var enc = new TextEncoder();
  for (var i = 0; i < files.length; i++) {
    var f = files[i], nameBytes = enc.encode(f.name);
    var data = typeof f.data === 'string' ? enc.encode(f.data) : f.data;
    var crc = crc32(data);
    // Local file header (30 bytes + name + data)
    var lh = new Uint8Array(30 + nameBytes.length + data.length);
    var v = new DataView(lh.buffer);
    v.setUint32(0, 0x04034b50, true); // sig
    v.setUint16(4, 20, true); // version
    v.setUint16(8, 0, true); // method: stored
    v.setUint32(14, crc, true);
    v.setUint32(18, data.length, true); // compressed
    v.setUint32(22, data.length, true); // uncompressed
    v.setUint16(26, nameBytes.length, true);
    lh.set(nameBytes, 30);
    lh.set(data, 30 + nameBytes.length);
    localHeaders.push(lh);
    // Central directory header
    var ch = new Uint8Array(46 + nameBytes.length);
    var cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, data.length, true);
    cv.setUint32(24, data.length, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint32(42, offset, true);
    ch.set(nameBytes, 46);
    centralHeaders.push(ch);
    offset += lh.length;
  }
  var cdOffset = offset, cdSize = centralHeaders.reduce(function(s,c){return s+c.length;},0);
  var eocd = new Uint8Array(22);
  var ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, cdSize, true);
  ev.setUint32(16, cdOffset, true);
  var parts = localHeaders.concat(centralHeaders, [eocd]);
  var total = parts.reduce(function(s,p){return s+p.length;},0);
  var out = new Uint8Array(total), pos = 0;
  for (var j = 0; j < parts.length; j++) { out.set(parts[j], pos); pos += parts[j].length; }
  return out;
}

function crc32(buf) {
  if (!crc32.table) {
    crc32.table = new Uint32Array(256);
    for (var i = 0; i < 256; i++) {
      var c = i;
      for (var j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      crc32.table[i] = c;
    }
  }
  var crc = 0xFFFFFFFF;
  for (var k = 0; k < buf.length; k++) crc = crc32.table[(crc ^ buf[k]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// EMU helpers (1 inch = 914400 EMU, 1 pt = 12700 EMU)
var EMU_IN = 914400, PT = 12700;

function escXml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Parse markdown slide into structured elements
function parseBodyLines(lines) {
  var body = [];
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i];
    if (/^### /.test(l)) { body.push({ type: 'heading', text: l.replace(/^### /, '') }); }
    else if (/^> /.test(l)) { body.push({ type: 'quote', text: l.replace(/^> /, '') }); }
    else if (/^```/.test(l)) {
      var code = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      body.push({ type: 'code', text: code.join('\n') });
    }
    else if (/^[*\-] /.test(l)) { body.push({ type: 'bullet', text: l.replace(/^[*\-] /, '') }); }
    else if (/^\d+\. /.test(l)) { body.push({ type: 'bullet', text: l.replace(/^\d+\. /, '') }); }
    else if (l.trim()) { body.push({ type: 'text', text: l.trim() }); }
  }
  return body;
}

function parseSlideContent(src) {
  var lines = src.split('\n');
  var title = '', subtitle = '';
  var bodyStart = 0;

  // Extract title and subtitle from top
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i];
    if (/^# /.test(l) && !title) { title = l.replace(/^# /, ''); bodyStart = i + 1; }
    else if (/^## /.test(l) && !subtitle) { subtitle = l.replace(/^## /, ''); bodyStart = i + 1; }
    else if (l.trim()) break;
  }

  var remaining = lines.slice(bodyStart);

  // Check for positioned blocks ([@ ...] directives)
  var posBlocks = [];
  var posBlockStart = -1;
  var posProps = null;
  for (var j = 0; j < remaining.length; j++) {
    var posM = remaining[j].match(/^\[@\s*((?:[a-z]+:\s*\S+\s*)+)\]$/);
    if (posM) {
      // Close previous block
      if (posBlockStart >= 0) {
        posBlocks.push({ props: posProps, lines: remaining.slice(posBlockStart, j) });
      }
      posBlockStart = j + 1;
      posProps = {};
      var pRe = /([a-z]+):\s*(\S+)/g, pp;
      while ((pp = pRe.exec(posM[1])) !== null) posProps[pp[1]] = pp[2];
    }
  }
  if (posBlockStart >= 0) {
    posBlocks.push({ props: posProps, lines: remaining.slice(posBlockStart) });
  }

  if (posBlocks.length > 0) {
    return {
      title: title, subtitle: subtitle,
      columns: false, positioned: true,
      blocks: posBlocks.map(function(b) { return { props: b.props, body: parseBodyLines(b.lines) }; }),
      body: []
    };
  }

  // Check for two-column layout (||| separator)
  var colIdx = -1;
  for (var j = 0; j < remaining.length; j++) {
    if (remaining[j].trim() === '|||') { colIdx = j; break; }
  }

  if (colIdx >= 0) {
    var leftLines = remaining.slice(0, colIdx);
    var rightLines = remaining.slice(colIdx + 1);
    return {
      title: title, subtitle: subtitle,
      columns: true,
      left: parseBodyLines(leftLines),
      right: parseBodyLines(rightLines),
      body: []
    };
  }

  return { title: title, subtitle: subtitle, columns: false, body: parseBodyLines(remaining) };
}

// Convert inline markdown to PPTX runs
function mdRuns(text, sz, color) {
  sz = sz || 1800; color = color || 'CCCCCC';
  var tc = getThemeColors();
  var bf = tc.bodyFont.split(',')[0].trim();
  var cf = tc.codeFont.split(',')[0].trim();
  var runs = '', re = /(\*\*(.+?)\*\*|\*(.+?)\*|`([^`]+)`|([^*`]+))/g, m;
  while ((m = re.exec(text)) !== null) {
    if (m[2]) { // bold
      runs += '<a:r><a:rPr lang="en-US" sz="'+sz+'" b="1" dirty="0"><a:solidFill><a:srgbClr val="'+tc.strong+'"/></a:solidFill><a:latin typeface="'+escXml(bf)+'"/></a:rPr><a:t>'+escXml(m[2])+'</a:t></a:r>';
    } else if (m[3]) { // italic
      runs += '<a:r><a:rPr lang="en-US" sz="'+sz+'" i="1" dirty="0"><a:solidFill><a:srgbClr val="'+tc.emphasis+'"/></a:solidFill><a:latin typeface="'+escXml(bf)+'"/></a:rPr><a:t>'+escXml(m[3])+'</a:t></a:r>';
    } else if (m[4]) { // code
      runs += '<a:r><a:rPr lang="en-US" sz="'+(sz-200)+'" dirty="0"><a:solidFill><a:srgbClr val="'+tc.codeText+'"/></a:solidFill><a:latin typeface="'+escXml(cf)+'"/></a:rPr><a:t>'+escXml(m[4])+'</a:t></a:r>';
    } else if (m[5]) { // plain
      runs += '<a:r><a:rPr lang="en-US" sz="'+sz+'" dirty="0"><a:solidFill><a:srgbClr val="'+color+'"/></a:solidFill><a:latin typeface="'+escXml(bf)+'"/></a:rPr><a:t>'+escXml(m[5])+'</a:t></a:r>';
    }
  }
  return runs || '<a:r><a:rPr lang="en-US" sz="'+sz+'" dirty="0"><a:solidFill><a:srgbClr val="'+color+'"/></a:solidFill><a:latin typeface="'+escXml(bf)+'"/></a:rPr><a:t>'+escXml(text)+'</a:t></a:r>';
}

function getThemeColors() {
  var t = window._designTokens || {};
  return {
    bg: (t['background'] || '#0a0a0a').replace('#',''),
    text: (t['text'] || '#cccccc').replace('#',''),
    heading: (t['heading'] || '#ffffff').replace('#',''),
    subheading: (t['subheading'] || '#60a5fa').replace('#',''),
    accent: (t['accent'] || '#a78bfa').replace('#',''),
    strong: (t['strong'] || '#ffffff').replace('#',''),
    emphasis: (t['emphasis'] || '#fbbf24').replace('#',''),
    codeText: (t['code-text'] || '#4ade80').replace('#',''),
    quoteText: (t['quote-text'] || '#888888').replace('#',''),
    headingFont: t['heading-font'] || 'Calibri',
    bodyFont: t['body-font'] || 'Calibri',
    codeFont: t['code-font'] || 'Consolas'
  };
}

function buildSlideXml(parsed, idx) {
  var W = 12192000, H = 6858000;
  var shapes = '', shapeId = 2;
  var yPos = 457200;
  var tc = getThemeColors();

  // Title
  if (parsed.title) {
    shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Title"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="457200" y="'+yPos+'"/><a:ext cx="11277600" cy="1143000"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr anchor="b"/><a:lstStyle/><a:p>'+mdRuns(parsed.title, 4000, tc.heading)+'</a:p></p:txBody></p:sp>';
    yPos += 1200000;
  }
  if (parsed.subtitle) {
    shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Subtitle"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="457200" y="'+yPos+'"/><a:ext cx="11277600" cy="571500"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr/><a:lstStyle/><a:p>'+mdRuns(parsed.subtitle, 2400, tc.subheading)+'</a:p></p:txBody></p:sp>';
    yPos += 700000;
  }

  // Body content helper
  function bodyToParas(items) {
    var paras = '';
    for (var i = 0; i < items.length; i++) {
      var item = items[i];
      if (item.type === 'heading') {
        paras += '<a:p><a:pPr><a:spcBef><a:spcPts val="600"/></a:spcBef></a:pPr>'+mdRuns(item.text, 2200, tc.accent)+'</a:p>';
      } else if (item.type === 'bullet') {
        paras += '<a:p><a:pPr marL="342900" indent="-342900"><a:buChar char="\u2022"/><a:spcBef><a:spcPts val="400"/></a:spcBef></a:pPr>'+mdRuns(item.text, 1800, tc.text)+'</a:p>';
      } else if (item.type === 'quote') {
        paras += '<a:p><a:pPr marL="457200"><a:spcBef><a:spcPts val="400"/></a:spcBef></a:pPr><a:r><a:rPr lang="en-US" sz="1800" i="1" dirty="0"><a:solidFill><a:srgbClr val="'+tc.quoteText+'"/></a:solidFill><a:latin typeface="'+escXml(tc.bodyFont)+'"/></a:rPr><a:t>'+escXml(item.text)+'</a:t></a:r></a:p>';
      } else if (item.type === 'code') {
        var codeLines = item.text.split('\n');
        for (var cl = 0; cl < codeLines.length; cl++) {
          paras += '<a:p><a:pPr><a:spcBef><a:spcPts val="0"/></a:spcBef></a:pPr><a:r><a:rPr lang="en-US" sz="1400" dirty="0"><a:solidFill><a:srgbClr val="'+tc.text+'"/></a:solidFill><a:latin typeface="'+escXml(tc.codeFont)+'"/></a:rPr><a:t>'+escXml(codeLines[cl])+'</a:t></a:r></a:p>';
        }
      } else {
        paras += '<a:p><a:pPr><a:spcBef><a:spcPts val="400"/></a:spcBef></a:pPr>'+mdRuns(item.text, 1800, tc.text)+'</a:p>';
      }
    }
    return paras;
  }

  var bodyH = H - yPos - 457200;

  if (parsed.positioned && parsed.blocks) {
    // Positioned blocks — convert % positions to EMU
    for (var bi = 0; bi < parsed.blocks.length; bi++) {
      var blk = parsed.blocks[bi];
      var bp = blk.props;
      var bx = bp.x ? Math.round(parseFloat(bp.x) / 100 * W) : 457200;
      var by = bp.y ? Math.round(parseFloat(bp.y) / 100 * H) : yPos;
      var bw = bp.w ? Math.round(parseFloat(bp.w) / 100 * W) : Math.round(W * 0.4);
      var bh = bp.h ? Math.round(parseFloat(bp.h) / 100 * H) : Math.round(H * 0.3);
      var blkParas = bodyToParas(blk.body);
      if (!blkParas) continue;
      shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Block '+(bi+1)+'"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="'+bx+'" y="'+by+'"/><a:ext cx="'+bw+'" cy="'+bh+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr anchor="t" lIns="91440" tIns="45720" rIns="91440" bIns="45720"/><a:lstStyle/>'+blkParas+'</p:txBody></p:sp>';
    }
  } else if (parsed.columns && parsed.left && parsed.right) {
    // Two-column layout: left half and right half as separate text boxes
    var colW = 5400000; // ~47% of slide width each
    var gap = 228600;   // ~0.25in gap
    var leftParas = bodyToParas(parsed.left);
    var rightParas = bodyToParas(parsed.right);
    shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Left Column"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="457200" y="'+yPos+'"/><a:ext cx="'+colW+'" cy="'+bodyH+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr anchor="t" lIns="91440" tIns="45720" rIns="91440" bIns="45720"/><a:lstStyle/>'+leftParas+'</p:txBody></p:sp>';
    shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Right Column"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="'+(457200 + colW + gap)+'" y="'+yPos+'"/><a:ext cx="'+colW+'" cy="'+bodyH+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr anchor="t" lIns="91440" tIns="45720" rIns="91440" bIns="45720"/><a:lstStyle/>'+rightParas+'</p:txBody></p:sp>';
  } else if (parsed.body.length > 0) {
    // Single-column layout
    var bodyParas = bodyToParas(parsed.body);
    shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Body"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="457200" y="'+yPos+'"/><a:ext cx="11277600" cy="'+bodyH+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr anchor="t" lIns="91440" tIns="45720" rIns="91440" bIns="45720"/><a:lstStyle/>'+bodyParas+'</p:txBody></p:sp>';
  }

  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"><p:cSld><p:bg><p:bgPr><a:solidFill><a:srgbClr val="'+tc.bg+'"/></a:solidFill><a:effectLst/></p:bgPr></p:bg><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/><a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>'+shapes+'</p:spTree></p:cSld></p:sld>';
}

window.exportDeck = function() {
  if (slides.length === 0) return;
  var files = [];

  // [Content_Types].xml
  var ctSlides = '';
  for (var i = 0; i < slides.length; i++) {
    ctSlides += '<Override PartName="/ppt/slides/slide'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>';
  }
  files.push({ name: '[Content_Types].xml', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/>'+ctSlides+'</Types>' });

  // _rels/.rels
  files.push({ name: '_rels/.rels', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/></Relationships>' });

  // ppt/presentation.xml
  var sldIdList = '';
  for (var i = 0; i < slides.length; i++) {
    sldIdList += '<p:sldId id="'+(256+i)+'" r:id="rId'+(i+1)+'"/>';
  }
  files.push({ name: 'ppt/presentation.xml', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"><p:sldMasterIdLst/><p:sldIdLst>'+sldIdList+'</p:sldIdLst><p:sldSz cx="12192000" cy="6858000"/><p:notesSz cx="6858000" cy="9144000"/></p:presentation>' });

  // ppt/_rels/presentation.xml.rels
  var presRels = '';
  for (var i = 0; i < slides.length; i++) {
    presRels += '<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide'+(i+1)+'.xml"/>';
  }
  files.push({ name: 'ppt/_rels/presentation.xml.rels', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+presRels+'</Relationships>' });

  // Slide files
  for (var i = 0; i < slides.length; i++) {
    var parsed = parseSlideContent(slides[i]);
    files.push({ name: 'ppt/slides/slide'+(i+1)+'.xml', data: buildSlideXml(parsed, i) });
    files.push({ name: 'ppt/slides/_rels/slide'+(i+1)+'.xml.rels', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"/>' });
  }

  var zipData = miniZip(files);
  var blob = new Blob([zipData], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'presentation.pptx';
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
};

parseSlides();
renderPreview();
