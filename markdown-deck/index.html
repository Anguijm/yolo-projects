<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0a; color: #ccc; }
.editor-mode { display: grid; grid-template-columns: 1fr 1fr; height: 100vh; }
.editor-panel { display: flex; flex-direction: column; border-right: 1px solid #1a1a1a; }
.preview-panel { display: flex; flex-direction: column; overflow: hidden; background: #111; }
.toolbar { padding: 0.5rem 1rem; background: #0d0d0d; border-bottom: 1px solid #1a1a1a; display: flex; gap: 0.5rem; align-items: center; }
.toolbar h2 { font-size: 0.8rem; color: #fff; margin-right: auto; }
.toolbar button { background: #1a1a1a; border: 1px solid #333; color: #999; padding: 0.3rem 0.6rem; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.7rem; }

textarea:focus { outline: none; }
.slide-container { flex: 1; display: flex; align-items: center; justify-content: center; padding: 1rem; overflow: hidden; }
.slide { width: 100%; max-width: 700px; aspect-ratio: 16/9; background: #0a0a0a; border-radius: 8px; border: 1px solid #222; padding: 3rem; display: flex; flex-direction: column; justify-content: center; overflow: auto; }
.slide h1 { font-size: 2rem; color: #fff; margin-bottom: 1rem; line-height: 1.2; }
.slide h2 { font-size: 1.4rem; color: #60a5fa; margin-bottom: 0.8rem; }
.slide h3 { font-size: 1.1rem; color: #a78bfa; margin-bottom: 0.6rem; }
.slide p { font-size: 0.9rem; color: #ccc; margin-bottom: 0.7rem; line-height: 1.6; }
.slide ul, .slide ol { margin: 0.5rem 0 0.5rem 1.5rem; font-size: 0.9rem; color: #ccc; line-height: 1.8; }
.slide li { margin-bottom: 0.3rem; }
.slide code { background: #1a1a1a; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.8rem; color: #4ade80; }
.slide pre { background: #111; padding: 1rem; border-radius: 6px; overflow-x: auto; margin: 0.5rem 0; }
.slide pre code { background: none; padding: 0; font-size: 0.75rem; color: #ccc; }
.slide blockquote { border-left: 3px solid #333; padding-left: 1rem; color: #888; font-style: italic; margin: 0.5rem 0; }
.slide strong { color: #fff; }
.slide em { color: #fbbf24; }
.slide hr { border: none; border-top: 1px solid #333; margin: 1rem 0; }
.slide a { color: #60a5fa; }
/* Presentation mode */
.present-mode { display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: #0a0a0a; z-index: 1000; }
.present-mode.active { display: flex; align-items: center; justify-content: center; }
.present-slide { width: 90vw; height: 85vh; max-width: 1200px; padding: 4rem 5rem; display: flex; flex-direction: column; justify-content: center; }
.present-slide h1 { font-size: 3.5rem; color: #fff; margin-bottom: 1.5rem; }
.present-slide h2 { font-size: 2.2rem; color: #60a5fa; margin-bottom: 1rem; }
.present-slide h3 { font-size: 1.6rem; color: #a78bfa; margin-bottom: 0.8rem; }
.present-slide p { font-size: 1.4rem; color: #ccc; margin-bottom: 1rem; line-height: 1.6; }
.present-slide ul, .present-slide ol { font-size: 1.3rem; margin: 0.5rem 0 0.5rem 2rem; line-height: 2; color: #ccc; }
.present-slide code { font-size: 1.1rem; background: #1a1a1a; padding: 0.2rem 0.5rem; border-radius: 4px; color: #4ade80; }
.present-slide pre { padding: 1.5rem; border-radius: 8px; background: #111; }
.present-slide pre code { font-size: 1rem; background: none; padding: 0; color: #ccc; }
.present-slide blockquote { border-left: 4px solid #333; padding-left: 1.5rem; font-size: 1.3rem; color: #888; }
.present-slide strong { color: #fff; }
.present-slide em { color: #fbbf24; }
.present-slide a { color: #60a5fa; }
.present-counter { position: fixed; bottom: 1rem; right: 1.5rem; font-size: 0.9rem; color: #444; z-index: 1001; }
.present-help { position: fixed; bottom: 1rem; left: 1.5rem; font-size: 0.7rem; color: #333; z-index: 1001; }
.thumb-strip { display: flex; gap: 4px; padding: 0.5rem 1rem; overflow-x: auto; border-top: 1px solid #1a1a1a; background: #0d0d0d; min-height: 60px; }
.thumb { min-width: 80px; height: 45px; background: #111; border: 1px solid #222; border-radius: 4px; cursor: pointer; font-size: 0.35rem; padding: 4px; overflow: hidden; color: #666; line-height: 1.3; }
.thumb:hover { border-color: #444; }
.thumb.active { border-color: #4ade80; }
/* Design panel */
.design-panel { display: none; position: fixed; top: 0; right: 0; width: 340px; height: 100vh; background: #0d0d0d; border-left: 1px solid #1a1a1a; z-index: 900; flex-direction: column; }
.design-panel.open { display: flex; }
.design-panel .toolbar { border-bottom: 1px solid #1a1a1a; }
.design-panel textarea { flex: 1; background: #0a0a0a; border: none; color: #a78bfa; padding: 0.75rem; font-family: 'SF Mono', 'Fira Code', monospace; font-size: 0.7rem; resize: none; line-height: 1.5; }
.design-panel textarea:focus { outline: none; }
.design-help { padding: 0.5rem 0.75rem; font-size: 0.55rem; color: #444; border-top: 1px solid #1a1a1a; line-height: 1.4; }

/*

  background: #0f172a;
  font-family: system-ui, sans-serif;
}

.slide h1, .present-slide h1 {

<script>
const inputEl = document.getElementById('input');
const previewEl = document.getElementById('slide-preview');
const presentEl = document.getElementById('present');
const presentSlideEl = document.getElementById('present-slide');
const thumbsEl = document.getElementById('thumbs');
const slideCountEl = document.getElementById('slide-count');

let slides = [];
let currentSlide = 0;
let presenting = false;

// Minimal markdown parser with code-block protection
function md(text) {
  // 1. Extract code blocks into placeholders (protect from inner parsing)
  var codeBlocks = [];
  var html = text.replace(/```(\w*)\n([\s\S]*?)```/g, function(_, lang, code) {
    codeBlocks.push('<pre><code>' + esc(code.trim()) + '</code></pre>');
    return '__CODEBLOCK_' + (codeBlocks.length - 1) + '__';
  });

  // 2. Extract inline code into placeholders (and escape content)
  var inlineCodes = [];
  html = html.replace(/`([^`]+)`/g, function(_, code) {
    inlineCodes.push('<code>' + esc(code) + '</code>');
    return '__INLINE_' + (inlineCodes.length - 1) + '__';
  });

  // 3. Parse markdown
  html = html
    .replace(/^### (.+)$/gm, '<h3>$1</h3>')
    .replace(/^## (.+)$/gm, '<h2>$1</h2>')
    .replace(/^# (.+)$/gm, '<h1>$1</h1>')
    .replace(/\*\*(.+?)\*\*/g, '<strong>$1</strong>')
    .replace(/\*(.+?)\*/g, '<em>$1</em>')
    .replace(/^> (.+)$/gm, '<blockquote>$1</blockquote>')
    .replace(/^---$/gm, '<hr>')
    .replace(/\[([^\]]+)\]\(([^)]+)\)/g, function(_, t, url) {
      var safeUrl = url.trim().toLowerCase().startsWith('javascript:') ? '#' : url;
      return '<a href="' + safeUrl + '">' + t + '</a>';
    })
    .replace(/^[*-] (.+)$/gm, '<li class="uli">$1</li>')
    .replace(/^\d+\. (.+)$/gm, '<li class="oli">$1</li>');

  // 4. Wrap consecutive list items in proper list tags
  html = html.replace(/((?:<li class="uli">.*<\/li>\n?)+)/g, '<ul>$1</ul>');
  html = html.replace(/((?:<li class="oli">.*<\/li>\n?)+)/g, '<ol>$1</ol>');

  // 5. Tables
  html = html.replace(/^\|(.+)\|$/gm, function(match, content) {
    if (content.match(/^[\s\-|]+$/)) return '';
    var cells = content.split('|').map(function(c) { return c.trim(); });
    return '<tr>' + cells.map(function(c) { return '<td style="padding:0.3rem 0.8rem;border-bottom:1px solid #222">' + c + '</td>'; }).join('') + '</tr>';
  });
  html = html.replace(/((?:<tr>.*<\/tr>\n?)+)/g, '<table style="border-collapse:collapse;font-size:0.85rem;margin:0.5rem 0">$1</table>');

  // 6. Paragraphs (split by double newline for proper paragraph breaks)
  html = html.split(/\n\n+/).map(function(block) {
    block = block.trim();
    if (!block) return '';
    if (block.match(/^<(h[1-3]|ul|ol|li|pre|blockquote|hr|table|tr|td|__CODEBLOCK)/)) return block;
    if (block.match(/<\/(h[1-3]|ul|ol|pre|blockquote|table)>/)) return block;
    return '<p>' + block.replace(/\n/g, '<br>') + '</p>';
  }).join('\n');

  // 7. Re-inject code blocks and inline code
  html = html.replace(/__CODEBLOCK_(\d+)__/g, function(_, i) { return codeBlocks[i]; });
  html = html.replace(/__INLINE_(\d+)__/g, function(_, i) { return inlineCodes[i]; });

  return html;
}

function esc(s) { return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;'); }

function parseSlides() {
  const raw = inputEl.value;
  slides = raw.split(/\n---\n/).map(s => s.trim()).filter(s => s);
  slideCountEl.textContent = `${slides.length} slides`;
  if (currentSlide >= slides.length) currentSlide = Math.max(0, slides.length - 1);
}

function renderPreview() {
  if (slides.length === 0) {
    previewEl.innerHTML = '<p style="color:#555">Type markdown and separate slides with ---</p>';
    return;
  }
  previewEl.innerHTML = md(slides[currentSlide]);

  // Thumbnails
  thumbsEl.innerHTML = slides.map((s, i) => {
    const preview = s.split('\n').slice(0, 3).join(' ').slice(0, 60);
    return `<div class="thumb ${i === currentSlide ? 'active' : ''}" onclick="goSlide(${i})">${i + 1}. ${esc(preview)}</div>`;
  }).join('');
}

function renderPresent() {
  if (slides.length === 0) return;
  presentSlideEl.innerHTML = md(slides[currentSlide]);
  document.getElementById('present-counter').textContent = `${currentSlide + 1} / ${slides.length}`;
}

window.goSlide = function(i) {
  currentSlide = i;
  renderPreview();
  if (presenting) renderPresent();
};

window.nextSlide = function() {
  if (currentSlide < slides.length - 1) { currentSlide++; renderPreview(); if (presenting) renderPresent(); }
};

window.prevSlide = function() {
  if (currentSlide > 0) { currentSlide--; renderPreview(); if (presenting) renderPresent(); }
};

window.startPresent = function() {
  presenting = true;
  presentEl.classList.add('active');
  renderPresent();
  document.body.requestFullscreen?.();
};

function stopPresent() {
  presenting = false;
  presentEl.classList.remove('active');
  if (document.fullscreenElement) document.exitFullscreen?.();
}

document.addEventListener('keydown', e => {
  if (e.key === 'Escape') { stopPresent(); return; }
  if (e.key === 'f' && !presenting && document.activeElement !== inputEl) { startPresent(); return; }
  if (e.key === 'ArrowRight' || e.key === ' ') {
    if (presenting || document.activeElement !== inputEl) { e.preventDefault(); nextSlide(); }
  }
  if (e.key === 'ArrowLeft') {
    if (presenting || document.activeElement !== inputEl) { e.preventDefault(); prevSlide(); }
  }
});

document.addEventListener('fullscreenchange', () => {
  if (!document.fullscreenElement && presenting) stopPresent();
});

let debounce;
inputEl.addEventListener('input', () => {
  clearTimeout(debounce);
  debounce = setTimeout(() => { parseSlides(); renderPreview(); }, 200);
});

// Design panel
let designStyleEl = null;

window.toggleDesignPanel = function() {
  document.getElementById('design-panel').classList.toggle('open');
};

window.applyDesign = function() {
  const css = document.getElementById('design-input').value;
  if (!designStyleEl) {
    designStyleEl = document.createElement('style');
    designStyleEl.id = 'custom-theme';
    document.head.appendChild(designStyleEl);
  }
  designStyleEl.textContent = css;
  try { localStorage.setItem('mdeck_theme', css); } catch(e) {}
};

// Load saved theme on startup
try {
  const savedTheme = localStorage.getItem('mdeck_theme');
  if (savedTheme) {
    document.getElementById('design-input').value = savedTheme;
    designStyleEl = document.createElement('style');
    designStyleEl.id = 'custom-theme';
    designStyleEl.textContent = savedTheme;
    document.head.appendChild(designStyleEl);
  }
} catch(e) {}

// ============ PPTX EXPORT ============
// Minimal ZIP writer (store-only, no compression — PPTX readers handle it fine)
function miniZip(files) {
  var localHeaders = [], centralHeaders = [], offset = 0;
  var enc = new TextEncoder();
  for (var i = 0; i < files.length; i++) {
    var f = files[i], nameBytes = enc.encode(f.name);
    var data = typeof f.data === 'string' ? enc.encode(f.data) : f.data;
    var crc = crc32(data);
    // Local file header (30 bytes + name + data)
    var lh = new Uint8Array(30 + nameBytes.length + data.length);
    var v = new DataView(lh.buffer);
    v.setUint32(0, 0x04034b50, true); // sig
    v.setUint16(4, 20, true); // version
    v.setUint16(8, 0, true); // method: stored
    v.setUint32(14, crc, true);
    v.setUint32(18, data.length, true); // compressed
    v.setUint32(22, data.length, true); // uncompressed
    v.setUint16(26, nameBytes.length, true);
    lh.set(nameBytes, 30);
    lh.set(data, 30 + nameBytes.length);
    localHeaders.push(lh);
    // Central directory header
    var ch = new Uint8Array(46 + nameBytes.length);
    var cv = new DataView(ch.buffer);
    cv.setUint32(0, 0x02014b50, true);
    cv.setUint16(4, 20, true);
    cv.setUint16(6, 20, true);
    cv.setUint32(16, crc, true);
    cv.setUint32(20, data.length, true);
    cv.setUint32(24, data.length, true);
    cv.setUint16(28, nameBytes.length, true);
    cv.setUint32(42, offset, true);
    ch.set(nameBytes, 46);
    centralHeaders.push(ch);
    offset += lh.length;
  }
  var cdOffset = offset, cdSize = centralHeaders.reduce(function(s,c){return s+c.length;},0);
  var eocd = new Uint8Array(22);
  var ev = new DataView(eocd.buffer);
  ev.setUint32(0, 0x06054b50, true);
  ev.setUint16(8, files.length, true);
  ev.setUint16(10, files.length, true);
  ev.setUint32(12, cdSize, true);
  ev.setUint32(16, cdOffset, true);
  var parts = localHeaders.concat(centralHeaders, [eocd]);
  var total = parts.reduce(function(s,p){return s+p.length;},0);
  var out = new Uint8Array(total), pos = 0;
  for (var j = 0; j < parts.length; j++) { out.set(parts[j], pos); pos += parts[j].length; }
  return out;
}

function crc32(buf) {
  if (!crc32.table) {
    crc32.table = new Uint32Array(256);
    for (var i = 0; i < 256; i++) {
      var c = i;
      for (var j = 0; j < 8; j++) c = (c & 1) ? (0xEDB88320 ^ (c >>> 1)) : (c >>> 1);
      crc32.table[i] = c;
    }
  }
  var crc = 0xFFFFFFFF;
  for (var k = 0; k < buf.length; k++) crc = crc32.table[(crc ^ buf[k]) & 0xFF] ^ (crc >>> 8);
  return (crc ^ 0xFFFFFFFF) >>> 0;
}

// EMU helpers (1 inch = 914400 EMU, 1 pt = 12700 EMU)
var EMU_IN = 914400, PT = 12700;

function escXml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

// Parse markdown slide into structured elements
function parseSlideContent(src) {
  var lines = src.split('\n');
  var title = '', subtitle = '', body = [];
  for (var i = 0; i < lines.length; i++) {
    var l = lines[i];
    if (/^# /.test(l) && !title) { title = l.replace(/^# /, ''); }
    else if (/^## /.test(l) && !subtitle) { subtitle = l.replace(/^## /, ''); }
    else if (/^### /.test(l)) { body.push({ type: 'heading', text: l.replace(/^### /, '') }); }
    else if (/^> /.test(l)) { body.push({ type: 'quote', text: l.replace(/^> /, '') }); }
    else if (/^```/.test(l)) {
      var code = [];
      i++;
      while (i < lines.length && !/^```/.test(lines[i])) { code.push(lines[i]); i++; }
      body.push({ type: 'code', text: code.join('\n') });
    }
    else if (/^[*\-] /.test(l)) { body.push({ type: 'bullet', text: l.replace(/^[*\-] /, '') }); }
    else if (/^\d+\. /.test(l)) { body.push({ type: 'bullet', text: l.replace(/^\d+\. /, '') }); }
    else if (l.trim()) { body.push({ type: 'text', text: l.trim() }); }
  }
  return { title: title, subtitle: subtitle, body: body };
}

// Convert inline markdown to PPTX runs
function mdRuns(text, sz, color) {
  sz = sz || 1800; color = color || 'CCCCCC';
  var runs = '', re = /(\*\*(.+?)\*\*|\*(.+?)\*|`([^`]+)`|([^*`]+))/g, m;
  while ((m = re.exec(text)) !== null) {
    if (m[2]) { // bold
      runs += '<a:r><a:rPr lang="en-US" sz="'+sz+'" b="1" dirty="0"><a:solidFill><a:srgbClr val="FFFFFF"/></a:solidFill><a:latin typeface="Calibri"/></a:rPr><a:t>'+escXml(m[2])+'</a:t></a:r>';
    } else if (m[3]) { // italic
      runs += '<a:r><a:rPr lang="en-US" sz="'+sz+'" i="1" dirty="0"><a:solidFill><a:srgbClr val="FBBF24"/></a:solidFill><a:latin typeface="Calibri"/></a:rPr><a:t>'+escXml(m[3])+'</a:t></a:r>';
    } else if (m[4]) { // code
      runs += '<a:r><a:rPr lang="en-US" sz="'+(sz-200)+'" dirty="0"><a:solidFill><a:srgbClr val="4ADE80"/></a:solidFill><a:latin typeface="Consolas"/></a:rPr><a:t>'+escXml(m[4])+'</a:t></a:r>';
    } else if (m[5]) { // plain
      runs += '<a:r><a:rPr lang="en-US" sz="'+sz+'" dirty="0"><a:solidFill><a:srgbClr val="'+color+'"/></a:solidFill><a:latin typeface="Calibri"/></a:rPr><a:t>'+escXml(m[5])+'</a:t></a:r>';
    }
  }
  return runs || '<a:r><a:rPr lang="en-US" sz="'+sz+'" dirty="0"><a:solidFill><a:srgbClr val="'+color+'"/></a:solidFill><a:latin typeface="Calibri"/></a:rPr><a:t>'+escXml(text)+'</a:t></a:r>';
}

function buildSlideXml(parsed, idx) {
  var W = 12192000, H = 6858000; // 16:9 standard (EMU)
  var shapes = '', shapeId = 2;
  var yPos = 457200; // start 0.5in from top

  // Title
  if (parsed.title) {
    shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Title"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="457200" y="'+yPos+'"/><a:ext cx="11277600" cy="1143000"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr anchor="b"/><a:lstStyle/><a:p>'+mdRuns(parsed.title, 4000, 'FFFFFF')+'</a:p></p:txBody></p:sp>';
    yPos += 1200000;
  }
  if (parsed.subtitle) {
    shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Subtitle"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="457200" y="'+yPos+'"/><a:ext cx="11277600" cy="571500"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr/><a:lstStyle/><a:p>'+mdRuns(parsed.subtitle, 2400, '60A5FA')+'</a:p></p:txBody></p:sp>';
    yPos += 700000;
  }

  // Body content
  if (parsed.body.length > 0) {
    var bodyParas = '';
    for (var i = 0; i < parsed.body.length; i++) {
      var item = parsed.body[i];
      if (item.type === 'heading') {
        bodyParas += '<a:p><a:pPr><a:spcBef><a:spcPts val="600"/></a:spcBef></a:pPr>'+mdRuns(item.text, 2200, 'A78BFA')+'</a:p>';
      } else if (item.type === 'bullet') {
        bodyParas += '<a:p><a:pPr marL="342900" indent="-342900"><a:buChar char="\u2022"/><a:spcBef><a:spcPts val="400"/></a:spcBef></a:pPr>'+mdRuns(item.text, 1800, 'CCCCCC')+'</a:p>';
      } else if (item.type === 'quote') {
        bodyParas += '<a:p><a:pPr marL="457200"><a:spcBef><a:spcPts val="400"/></a:spcBef></a:pPr><a:r><a:rPr lang="en-US" sz="1800" i="1" dirty="0"><a:solidFill><a:srgbClr val="888888"/></a:solidFill><a:latin typeface="Calibri"/></a:rPr><a:t>'+escXml(item.text)+'</a:t></a:r></a:p>';
      } else if (item.type === 'code') {
        var codeLines = item.text.split('\n');
        for (var cl = 0; cl < codeLines.length; cl++) {
          bodyParas += '<a:p><a:pPr><a:spcBef><a:spcPts val="0"/></a:spcBef></a:pPr><a:r><a:rPr lang="en-US" sz="1400" dirty="0"><a:solidFill><a:srgbClr val="CCCCCC"/></a:solidFill><a:latin typeface="Consolas"/></a:rPr><a:t>'+escXml(codeLines[cl])+'</a:t></a:r></a:p>';
        }
      } else {
        bodyParas += '<a:p><a:pPr><a:spcBef><a:spcPts val="400"/></a:spcBef></a:pPr>'+mdRuns(item.text, 1800, 'CCCCCC')+'</a:p>';
      }
    }
    var bodyH = H - yPos - 457200;
    shapes += '<p:sp><p:nvSpPr><p:cNvPr id="'+(shapeId++)+'" name="Body"/><p:cNvSpPr><a:spLocks noGrp="1"/></p:cNvSpPr><p:nvPr/></p:nvSpPr><p:spPr><a:xfrm><a:off x="457200" y="'+yPos+'"/><a:ext cx="11277600" cy="'+bodyH+'"/></a:xfrm><a:prstGeom prst="rect"><a:avLst/></a:prstGeom></p:spPr><p:txBody><a:bodyPr anchor="t" lIns="91440" tIns="45720" rIns="91440" bIns="45720"/><a:lstStyle/>'+bodyParas+'</p:txBody></p:sp>';
  }

  return '<?xml version="1.0" encoding="UTF-8" standalone="yes"?>\n<p:sld xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"><p:cSld><p:bg><p:bgPr><a:solidFill><a:srgbClr val="0A0A0A"/></a:solidFill><a:effectLst/></p:bgPr></p:bg><p:spTree><p:nvGrpSpPr><p:cNvPr id="1" name=""/><p:cNvGrpSpPr/><p:nvPr/></p:nvGrpSpPr><p:grpSpPr><a:xfrm><a:off x="0" y="0"/><a:ext cx="0" cy="0"/><a:chOff x="0" y="0"/><a:chExt cx="0" cy="0"/></a:xfrm></p:grpSpPr>'+shapes+'</p:spTree></p:cSld></p:sld>';
}

window.exportDeck = function() {
  if (slides.length === 0) return;
  var files = [];

  // [Content_Types].xml
  var ctSlides = '';
  for (var i = 0; i < slides.length; i++) {
    ctSlides += '<Override PartName="/ppt/slides/slide'+(i+1)+'.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.slide+xml"/>';
  }
  files.push({ name: '[Content_Types].xml', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Types xmlns="http://schemas.openxmlformats.org/package/2006/content-types"><Default Extension="rels" ContentType="application/vnd.openxmlformats-package.relationships+xml"/><Default Extension="xml" ContentType="application/xml"/><Override PartName="/ppt/presentation.xml" ContentType="application/vnd.openxmlformats-officedocument.presentationml.presentation.main+xml"/>'+ctSlides+'</Types>' });

  // _rels/.rels
  files.push({ name: '_rels/.rels', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"><Relationship Id="rId1" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/officeDocument" Target="ppt/presentation.xml"/></Relationships>' });

  // ppt/presentation.xml
  var sldIdList = '';
  for (var i = 0; i < slides.length; i++) {
    sldIdList += '<p:sldId id="'+(256+i)+'" r:id="rId'+(i+1)+'"/>';
  }
  files.push({ name: 'ppt/presentation.xml', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><p:presentation xmlns:a="http://schemas.openxmlformats.org/drawingml/2006/main" xmlns:r="http://schemas.openxmlformats.org/officeDocument/2006/relationships" xmlns:p="http://schemas.openxmlformats.org/presentationml/2006/main"><p:sldMasterIdLst/><p:sldIdLst>'+sldIdList+'</p:sldIdLst><p:sldSz cx="12192000" cy="6858000"/><p:notesSz cx="6858000" cy="9144000"/></p:presentation>' });

  // ppt/_rels/presentation.xml.rels
  var presRels = '';
  for (var i = 0; i < slides.length; i++) {
    presRels += '<Relationship Id="rId'+(i+1)+'" Type="http://schemas.openxmlformats.org/officeDocument/2006/relationships/slide" Target="slides/slide'+(i+1)+'.xml"/>';
  }
  files.push({ name: 'ppt/_rels/presentation.xml.rels', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships">'+presRels+'</Relationships>' });

  // Slide files
  for (var i = 0; i < slides.length; i++) {
    var parsed = parseSlideContent(slides[i]);
    files.push({ name: 'ppt/slides/slide'+(i+1)+'.xml', data: buildSlideXml(parsed, i) });
    files.push({ name: 'ppt/slides/_rels/slide'+(i+1)+'.xml.rels', data: '<?xml version="1.0" encoding="UTF-8" standalone="yes"?><Relationships xmlns="http://schemas.openxmlformats.org/package/2006/relationships"/>' });
  }

  var zipData = miniZip(files);
  var blob = new Blob([zipData], { type: 'application/vnd.openxmlformats-officedocument.presentationml.presentation' });
  var url = URL.createObjectURL(blob);
  var a = document.createElement('a');
  a.href = url;
  a.download = 'presentation.pptx';
  a.click();
  setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
};

parseSlides();
renderPreview();
</script>
