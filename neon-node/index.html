<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Neon Node</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #0a0a0c; color: #ccc; font-family: system-ui, sans-serif; overflow-y: auto; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
#app { min-height: 100%; display: flex; flex-direction: column; align-items: center; padding: 12px; }

#header { display: flex; gap: 16px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; justify-content: center; }
#title { font-size: 0.7rem; color: #333; letter-spacing: 0.25em; font-weight: 300; }
.stat { text-align: center; }
.stat-label { font-size: 0.4rem; color: #333; letter-spacing: 0.1em; }
.stat-val { font-size: 0.8rem; color: #888; font-family: monospace; }

#board { display: grid; gap: 6px; perspective: 600px; margin-bottom: 10px; }
.card { aspect-ratio: 1; cursor: pointer; position: relative; transform-style: preserve-3d; transition: transform 0.4s cubic-bezier(0.4,0,0.2,1); }
.card.flipped { transform: rotateY(180deg); }
.card.matched { transform: rotateY(180deg); }
.card.matched .card-front { opacity: 0.3; }
.card-face { position: absolute; inset: 0; backface-visibility: hidden; border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.card-back { background: #151518; border: 1px solid #1a1a1a; }
.card-back::after { content: '?'; font-size: 1.2rem; color: #222; }
.card-front { background: #0a0a14; border: 1px solid #1a1a2e; transform: rotateY(180deg); font-size: clamp(1.2rem, 5vw, 2rem); }
.card.matched .card-front { border-color: #1a3a1a; }

@keyframes shake { 0%,100%{transform:rotateY(180deg) translateX(0)} 25%{transform:rotateY(180deg) translateX(-4px)} 75%{transform:rotateY(180deg) translateX(4px)} }
.card.miss { animation: shake 0.15s ease-in-out 2; }

@keyframes glow { 0%{box-shadow:0 0 8px rgba(57,255,20,0.4)} 100%{box-shadow:0 0 0 transparent} }
.card.matched .card-front { animation: glow 0.6s ease-out; }

#controls { display: flex; gap: 4px; margin-bottom: 8px; }
.diff-btn { padding: 4px 10px; background: transparent; border: 1px solid #1a1a1a; color: #444; font-family: inherit; font-size: 0.5rem; cursor: pointer; border-radius: 4px; letter-spacing: 0.08em; }
.diff-btn:active { border-color: #555; }
.diff-btn.active { border-color: #58a6ff; color: #58a6ff; }
#btn-reset { padding: 4px 10px; background: transparent; border: 1px solid #1a1a1a; color: #444; font-family: inherit; font-size: 0.5rem; cursor: pointer; border-radius: 4px; letter-spacing: 0.08em; }

#msg { font-size: 0.6rem; color: #3fb950; min-height: 1.2em; letter-spacing: 0.1em; margin-bottom: 6px; }
</style>
</head>
<body>
<div id="app">
  <div id="header">
    <span id="title">NEON NODE</span>
    <div class="stat"><div class="stat-label">MOVES</div><div class="stat-val" id="v-moves">0</div></div>
    <div class="stat"><div class="stat-label">TIME</div><div class="stat-val" id="v-time">0:00</div></div>
    <div class="stat"><div class="stat-label">PAIRS</div><div class="stat-val" id="v-pairs">0/8</div></div>
  </div>
  <div id="msg"></div>
  <div id="board"></div>
  <div id="controls">
    <button class="diff-btn" data-cols="4" data-rows="3">4x3</button>
    <button class="diff-btn active" data-cols="4" data-rows="4">4x4</button>
    <button class="diff-btn" data-cols="5" data-rows="4">5x4</button>
    <button id="btn-reset">Reset</button>
  </div>
</div>

<script>
(function() {
'use strict';

// Card symbols (Unicode)
var SYMBOLS = [
  '\u2660', '\u2663', '\u2665', '\u2666', '\u2605', '\u2600',
  '\u2602', '\u2708', '\u266B', '\u2622', '\u2764', '\u2702',
  '\u2615', '\u269B', '\u2618', '\u2693'
];

var PAIR_COLORS = [
  '#0ff', '#f0f', '#0f0', '#ff0', '#f80', '#58a6ff', '#f85149',
  '#bc8cff', '#3fb950', '#d29922', '#39ff14', '#ff6688',
  '#66ffcc', '#ffcc66', '#cc66ff', '#66ccff'
];

var cols = 4, rows = 4;
var cards = []; // [{symbol, color, matched, el}]
var flipped = []; // indices of currently flipped cards
var locked = false;
var matched = 0;
var totalPairs = 0;
var moves = 0;
var timerInterval = null;
var startTime = 0;
var gameStarted = false;
var missTimeout1 = null, missTimeout2 = null;

// ============ GAME SETUP ============
function newGame() {
  clearInterval(timerInterval);
  clearTimeout(missTimeout1);
  clearTimeout(missTimeout2);
  gameStarted = false;
  matched = 0;
  moves = 0;
  flipped = [];
  locked = false;
  totalPairs = (cols * rows) / 2;

  // Pick symbols
  var syms = SYMBOLS.slice(0, totalPairs);
  var deck = [];
  for (var i = 0; i < totalPairs; i++) {
    deck.push({ symbol: syms[i], color: PAIR_COLORS[i % PAIR_COLORS.length], id: i });
    deck.push({ symbol: syms[i], color: PAIR_COLORS[i % PAIR_COLORS.length], id: i });
  }

  // Fisher-Yates shuffle
  for (var i = deck.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = deck[i]; deck[i] = deck[j]; deck[j] = t;
  }

  // Build DOM
  var board = document.getElementById('board');
  board.innerHTML = '';
  board.style.gridTemplateColumns = 'repeat(' + cols + ', 1fr)';
  var cardSize = Math.min(70, (Math.min(window.innerWidth - 24, 400) - (cols - 1) * 6) / cols);
  board.style.width = (cardSize * cols + (cols - 1) * 6) + 'px';

  cards = [];
  for (var i = 0; i < deck.length; i++) {
    var card = document.createElement('div');
    card.className = 'card';
    card.dataset.idx = i;
    card.innerHTML = '<div class="card-face card-back"></div>' +
      '<div class="card-face card-front" style="color:' + deck[i].color + '">' + deck[i].symbol + '</div>';
    board.appendChild(card);
    cards.push({ symbol: deck[i].symbol, id: deck[i].id, matched: false, el: card });
  }

  updateUI();
  document.getElementById('v-time').textContent = '0:00';
  document.getElementById('msg').textContent = '';
}

// ============ FLIP LOGIC ============
function flipCard(idx) {
  if (locked) return;
  if (cards[idx].matched) return;
  if (flipped.indexOf(idx) >= 0) return;
  if (flipped.length >= 2) return;

  // Start timer on first flip
  if (!gameStarted) {
    gameStarted = true;
    startTime = Date.now();
    timerInterval = setInterval(updateTimer, 200);
  }

  cards[idx].el.classList.add('flipped');
  flipped.push(idx);

  if (flipped.length === 2) {
    moves++;
    locked = true;
    var a = flipped[0], b = flipped[1];

    if (cards[a].id === cards[b].id) {
      // Match!
      cards[a].matched = true;
      cards[b].matched = true;
      cards[a].el.classList.add('matched');
      cards[b].el.classList.add('matched');
      matched++;
      flipped = [];
      locked = false;
      updateUI();

      if (matched === totalPairs) {
        clearInterval(timerInterval);
        var elapsed = formatTime(Date.now() - startTime);
        document.getElementById('msg').textContent = 'Breached in ' + moves + ' moves, ' + elapsed;
        if (navigator.vibrate) navigator.vibrate([30, 20, 30]);
      }
    } else {
      // Mismatch — show briefly then flip back
      missTimeout1 = setTimeout(function() {
        if (!cards[a] || !cards[b]) return;
        cards[a].el.classList.add('miss');
        cards[b].el.classList.add('miss');
        missTimeout2 = setTimeout(function() {
          if (!cards[a] || !cards[b]) return;
          cards[a].el.classList.remove('flipped', 'miss');
          cards[b].el.classList.remove('flipped', 'miss');
          flipped = [];
          locked = false;
        }, 300);
      }, 600);
    }
    updateUI();
  }
}

// ============ UI ============
function updateUI() {
  document.getElementById('v-moves').textContent = moves;
  document.getElementById('v-pairs').textContent = matched + '/' + totalPairs;
}

function updateTimer() {
  if (!gameStarted) return;
  document.getElementById('v-time').textContent = formatTime(Date.now() - startTime);
}

function formatTime(ms) {
  var sec = Math.floor(ms / 1000);
  var min = Math.floor(sec / 60);
  sec = sec % 60;
  return min + ':' + (sec < 10 ? '0' : '') + sec;
}

// ============ EVENTS ============
document.getElementById('board').addEventListener('click', function(e) {
  var card = e.target.closest('.card');
  if (!card) return;
  flipCard(parseInt(card.dataset.idx, 10));
});

document.querySelectorAll('.diff-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    cols = parseInt(btn.dataset.cols, 10);
    rows = parseInt(btn.dataset.rows, 10);
    document.querySelectorAll('.diff-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    newGame();
  });
});

document.getElementById('btn-reset').addEventListener('click', newGame);

// ============ INIT ============
newGame();

})();
</script>
</body>
</html>
