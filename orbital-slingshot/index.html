<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="theme-color" content="#000000">
  <title>Orbital Slingshot</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      height: 100%;
      background: #050508;
      overflow: hidden;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      position: absolute;
      top: 0; left: 0;
      touch-action: none;
    }
    #hud-top {
      position: absolute;
      top: 0; left: 0; right: 0;
      padding: 10px 14px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      pointer-events: none;
    }
    #level-info { display: flex; flex-direction: column; gap: 2px; }
    #level-num {
      font-size: 0.55rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #444;
    }
    #level-name {
      font-size: 0.8rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #aaa;
    }
    #shot-count {
      font-size: 0.55rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: #444;
      text-align: right;
    }
    #msg {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(1.4rem, 5vw, 2.8rem);
      letter-spacing: 0.3em;
      text-transform: uppercase;
      font-weight: 200;
      pointer-events: none;
      display: none;
      text-shadow: 0 0 50px currentColor;
      white-space: nowrap;
    }
    #hint {
      position: absolute;
      bottom: 54px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.45rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: #333;
      pointer-events: none;
      white-space: nowrap;
    }
    #controls {
      position: absolute;
      bottom: max(8px, env(safe-area-inset-bottom, 8px));
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 6px;
    }
    .btn {
      padding: 6px 14px;
      background: transparent;
      border: 1px solid #1a1a1a;
      color: #444;
      font-family: inherit;
      font-size: 0.55rem;
      cursor: pointer;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      min-width: 44px;
      min-height: 44px;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .btn:active { border-color: #555; color: #888; }
    #level-hint {
      position: absolute;
      top: 50px;
      left: 50%;
      transform: translateX(-50%);
      font-size: 0.45rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #2a2a2a;
      pointer-events: none;
      white-space: nowrap;
      transition: color 0.3s;
    }
    #level-hint.visible { color: #444; }
  </style>
</head>
<body>
  <canvas id="canvas"></canvas>
  <div id="hud-top">
    <div id="level-info">
      <span id="level-num">LEVEL 1 / 6</span>
      <span id="level-name">FIRST CONTACT</span>
    </div>
    <span id="shot-count">SHOTS: 0</span>
  </div>
  <div id="level-hint"></div>
  <div id="msg"></div>
  <div id="hint">DRAG FROM THE PROBE &mdash; RELEASE TO LAUNCH</div>
  <div id="controls">
    <button class="btn" id="btn-prev">&#9664;</button>
    <button class="btn" id="btn-reset">RESET</button>
    <button class="btn" id="btn-next">&#9654;</button>
  </div>

  <script>
  (function() {

    /* ---- CONFIG ---- */
    var G           = 500000;
    var SIM_DT      = 0.016;
    var SUBSTEPS    = 3;
    var PREV_STEPS  = 480;
    var TRAIL_LEN   = 110;
    var MAX_SPEED   = 420;
    var TARGET_R    = 38;
    var PROBE_R     = 6;
    var TIMEOUT_S   = 16;
    var LOGICAL_W   = 800;
    var LOGICAL_H   = 500;
    var SOFTENING   = 180;

    /* ---- LEVELS ---- */
    var LEVELS = [
      {
        name: 'FIRST CONTACT',
        hint: 'Aim past the planet — gravity will curve your path.',
        planets: [
          { x: 410, y: 230, mass: 2.5, radius: 36, r: 68, g: 136, b: 255 }
        ],
        start: { x: 105, y: 250 },
        target: { x: 650, y: 360 }
      },
      {
        name: 'SWING BY',
        hint: 'Loop around the planet to reverse direction.',
        planets: [
          { x: 395, y: 255, mass: 3.2, radius: 42, r: 255, g: 136, b: 68 }
        ],
        start: { x: 100, y: 410 },
        target: { x: 700, y: 100 }
      },
      {
        name: 'BINARY',
        hint: 'Two bodies — use both for a double slingshot.',
        planets: [
          { x: 275, y: 185, mass: 2.2, radius: 30, r: 68, g: 255, b: 200 },
          { x: 555, y: 325, mass: 2.2, radius: 30, r: 200, g: 68, b: 255 }
        ],
        start: { x: 100, y: 370 },
        target: { x: 715, y: 130 }
      },
      {
        name: 'THE CROSSING',
        hint: 'Navigate the heavy planet, use the small one to steer.',
        planets: [
          { x: 355, y: 240, mass: 4.0, radius: 52, r: 255, g: 200, b: 68 },
          { x: 620, y: 155, mass: 1.6, radius: 22, r: 68, g: 170, b: 255 }
        ],
        start: { x: 100, y: 425 },
        target: { x: 720, y: 370 }
      },
      {
        name: 'FIGURE EIGHT',
        hint: 'Can you thread the needle between two equal masses?',
        planets: [
          { x: 265, y: 250, mass: 2.8, radius: 38, r: 255, g: 68, b: 136 },
          { x: 535, y: 250, mass: 2.8, radius: 38, r: 136, g: 255, b: 68 }
        ],
        start: { x: 400, y: 55 },
        target: { x: 400, y: 445 }
      },
      {
        name: 'THE GAUNTLET',
        hint: 'Four bodies. Find the gap.',
        planets: [
          { x: 225, y: 155, mass: 2.0, radius: 28, r: 255, g: 100, b: 68 },
          { x: 375, y: 330, mass: 2.6, radius: 35, r: 68, g: 100, b: 255 },
          { x: 550, y: 150, mass: 2.0, radius: 28, r: 68, g: 255, b: 170 },
          { x: 690, y: 325, mass: 1.8, radius: 24, r: 255, g: 170, b: 68 }
        ],
        start: { x: 55, y: 250 },
        target: { x: 758, y: 250 }
      }
    ];

    /* ---- STATE ---- */
    var levelIndex  = 0;
    var phase       = 'aim';
    var shotCount   = 0;
    var probeX      = 0;
    var probeY      = 0;
    var probeVX     = 0;
    var probeVY     = 0;
    var trail       = [];
    var flightTime  = 0;
    var dragging    = false;
    var aimStartX   = 0;
    var aimStartY   = 0;
    var aimEndX     = 0;
    var aimEndY     = 0;
    var previewPath = [];
    var msgTimer    = 0;
    var stars       = [];
    var hintTimer   = 0;

    /* ---- CANVAS ---- */
    var canvas  = document.getElementById('canvas');
    var ctx     = canvas.getContext('2d');
    var scale   = 1;
    var offX    = 0;
    var offY    = 0;
    var W       = 0;
    var H       = 0;

    function resize() {
      W = canvas.width  = window.innerWidth;
      H = canvas.height = window.innerHeight;
      var sx = W / LOGICAL_W;
      var sy = H / LOGICAL_H;
      scale = Math.min(sx, sy) * 0.92;
      offX = (W - LOGICAL_W * scale) * 0.5;
      offY = (H - LOGICAL_H * scale) * 0.5;
      buildStars();
    }

    function toLogical(sx, sy) {
      return { x: (sx - offX) / scale, y: (sy - offY) / scale };
    }

    function buildStars() {
      stars = [];
      for (var i = 0; i < 260; i++) {
        stars.push({
          x: Math.random() * W,
          y: Math.random() * H,
          r: Math.random() < 0.25 ? Math.random() * 1.3 + 0.4 : Math.random() * 0.6 + 0.1,
          a: Math.random() * 0.55 + 0.06
        });
      }
    }

    /* ---- PHYSICS ---- */
    function accel(px, py, planets) {
      var ax = 0;
      var ay = 0;
      for (var i = 0; i < planets.length; i++) {
        var p   = planets[i];
        var dx  = p.x - px;
        var dy  = p.y - py;
        var d2  = dx * dx + dy * dy + SOFTENING;
        var d   = Math.sqrt(d2);
        var f   = G * p.mass / (d2 * d);
        ax += f * dx;
        ay += f * dy;
      }
      return { ax: ax, ay: ay };
    }

    function stepVerlet(px, py, vx, vy, dt, planets) {
      var a   = accel(px, py, planets);
      var nx  = px + vx * dt + 0.5 * a.ax * dt * dt;
      var ny  = py + vy * dt + 0.5 * a.ay * dt * dt;
      var a2  = accel(nx, ny, planets);
      var nvx = vx + 0.5 * (a.ax + a2.ax) * dt;
      var nvy = vy + 0.5 * (a.ay + a2.ay) * dt;
      return { x: nx, y: ny, vx: nvx, vy: nvy };
    }

    function hitsPlanet(px, py, planets) {
      for (var i = 0; i < planets.length; i++) {
        var p  = planets[i];
        var dx = px - p.x;
        var dy = py - p.y;
        var t  = p.radius + PROBE_R;
        if (dx * dx + dy * dy < t * t) { return true; }
      }
      return false;
    }

    function hitsTarget(px, py, tgt) {
      var dx = px - tgt.x;
      var dy = py - tgt.y;
      return dx * dx + dy * dy < TARGET_R * TARGET_R;
    }

    function outOfBounds(px, py) {
      return px < -90 || px > LOGICAL_W + 90 || py < -90 || py > LOGICAL_H + 90;
    }

    /* ---- VELOCITY COMPUTE ---- */
    function computeVel() {
      var dx   = aimEndX - aimStartX;
      var dy   = aimEndY - aimStartY;
      var vx   = dx * 2.9;
      var vy   = dy * 2.9;
      var spd  = Math.sqrt(vx * vx + vy * vy);
      if (spd > MAX_SPEED) {
        vx = vx * MAX_SPEED / spd;
        vy = vy * MAX_SPEED / spd;
      }
      return { vx: vx, vy: vy };
    }

    /* ---- PREVIEW ---- */
    function buildPreview() {
      var vel      = computeVel();
      var planets  = LEVELS[levelIndex].planets;
      var path     = [{ x: probeX, y: probeY }];
      var px       = probeX;
      var py       = probeY;
      var pvx      = vel.vx;
      var pvy      = vel.vy;
      for (var i = 0; i < PREV_STEPS; i++) {
        var r = stepVerlet(px, py, pvx, pvy, SIM_DT, planets);
        px  = r.x;  py  = r.y;
        pvx = r.vx; pvy = r.vy;
        if (i % 3 === 0) { path.push({ x: px, y: py }); }
        if (hitsPlanet(px, py, planets) || outOfBounds(px, py)) { break; }
      }
      return path;
    }

    /* ---- LEVEL MANAGEMENT ---- */
    function loadLevel(idx) {
      levelIndex = idx;
      shotCount  = 0;
      resetProbe();
      updateHUD();
      showLevelHint();
    }

    function resetProbe() {
      var lvl = LEVELS[levelIndex];
      probeX   = lvl.start.x;
      probeY   = lvl.start.y;
      probeVX  = 0; probeVY = 0;
      trail    = [];
      flightTime = 0;
      phase    = 'aim';
      dragging = false;
      previewPath = [];
      msgTimer = 0;
      document.getElementById('hint').style.display = 'block';
      hideMsg();
    }

    function updateHUD() {
      document.getElementById('level-num').textContent  = 'LEVEL ' + (levelIndex + 1) + ' / ' + LEVELS.length;
      document.getElementById('level-name').textContent = LEVELS[levelIndex].name;
      document.getElementById('shot-count').textContent = 'SHOTS: ' + shotCount;
    }

    function showLevelHint() {
      var el = document.getElementById('level-hint');
      el.textContent = LEVELS[levelIndex].hint;
      el.classList.add('visible');
      hintTimer = 5.5;
    }

    /* ---- MESSAGES ---- */
    function showMsg(text, color) {
      var el = document.getElementById('msg');
      el.textContent = text;
      el.style.color = color;
      el.style.display = 'block';
    }

    function hideMsg() {
      document.getElementById('msg').style.display = 'none';
    }

    /* ---- DRAW ---- */
    function rgba(r, g, b, a) {
      return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
    }

    function draw(ts) {
      ctx.clearRect(0, 0, W, H);
      ctx.fillStyle = '#050508';
      ctx.fillRect(0, 0, W, H);

      /* stars */
      for (var si = 0; si < stars.length; si++) {
        var s = stars[si];
        ctx.globalAlpha = s.a;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1.0;

      /* logical space */
      ctx.save();
      ctx.translate(offX, offY);
      ctx.scale(scale, scale);

      var lvl  = LEVELS[levelIndex];
      var tgt  = lvl.target;
      var pulse = 0.55 + 0.45 * Math.sin(ts * 0.0025);

      /* target glow */
      var tGrad = ctx.createRadialGradient(tgt.x, tgt.y, 0, tgt.x, tgt.y, TARGET_R + 22);
      tGrad.addColorStop(0, 'rgba(63,185,80,' + (pulse * 0.22) + ')');
      tGrad.addColorStop(1, 'rgba(0,0,0,0)');
      ctx.fillStyle = tGrad;
      ctx.beginPath();
      ctx.arc(tgt.x, tgt.y, TARGET_R + 22, 0, Math.PI * 2);
      ctx.fill();

      /* target ring */
      ctx.strokeStyle = 'rgba(63,185,80,' + pulse + ')';
      ctx.lineWidth   = 2 / scale;
      ctx.setLineDash([5 / scale, 5 / scale]);
      ctx.beginPath();
      ctx.arc(tgt.x, tgt.y, TARGET_R, 0, Math.PI * 2);
      ctx.stroke();
      ctx.setLineDash([]);

      /* target center dot */
      ctx.fillStyle = 'rgba(63,185,80,' + (pulse * 0.5) + ')';
      ctx.beginPath();
      ctx.arc(tgt.x, tgt.y, 4, 0, Math.PI * 2);
      ctx.fill();

      /* planets */
      for (var pi = 0; pi < lvl.planets.length; pi++) {
        var p  = lvl.planets[pi];
        var pr = p.r; var pg = p.g; var pb = p.b;

        /* atmosphere */
        var atm = ctx.createRadialGradient(p.x, p.y, p.radius * 0.8, p.x, p.y, p.radius * 3.2);
        atm.addColorStop(0, rgba(pr, pg, pb, 0.25));
        atm.addColorStop(1, rgba(0, 0, 0, 0));
        ctx.fillStyle = atm;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius * 3.2, 0, Math.PI * 2);
        ctx.fill();

        /* body */
        var body = ctx.createRadialGradient(
          p.x - p.radius * 0.32, p.y - p.radius * 0.32, 0,
          p.x, p.y, p.radius
        );
        body.addColorStop(0, '#e8e8ee');
        body.addColorStop(0.22, rgba(pr, pg, pb, 1));
        body.addColorStop(0.7, rgba(Math.floor(pr * 0.4), Math.floor(pg * 0.4), Math.floor(pb * 0.4), 1));
        body.addColorStop(1, '#080810');
        ctx.fillStyle = body;
        ctx.beginPath();
        ctx.arc(p.x, p.y, p.radius, 0, Math.PI * 2);
        ctx.fill();

        /* ring for massive planets */
        if (p.mass >= 3.5) {
          ctx.save();
          ctx.translate(p.x, p.y);
          ctx.scale(1, 0.28);
          ctx.strokeStyle = rgba(pr, pg, pb, 0.18);
          ctx.lineWidth   = 5 / scale;
          ctx.beginPath();
          ctx.arc(0, 0, p.radius * 1.6, 0, Math.PI * 2);
          ctx.stroke();
          ctx.restore();
        }
      }

      /* probe trail */
      if (trail.length > 1) {
        for (var ti = 1; ti < trail.length; ti++) {
          var tf = ti / trail.length;
          ctx.strokeStyle = 'rgba(255,200,80,' + (tf * 0.72) + ')';
          ctx.lineWidth   = (0.8 + tf * 2.8) / scale;
          ctx.beginPath();
          ctx.moveTo(trail[ti - 1].x, trail[ti - 1].y);
          ctx.lineTo(trail[ti].x, trail[ti].y);
          ctx.stroke();
        }
      }

      /* preview trajectory */
      if (phase === 'aim' && dragging && previewPath.length > 1) {
        ctx.strokeStyle = 'rgba(0,230,255,0.28)';
        ctx.lineWidth   = 1.5 / scale;
        ctx.setLineDash([4 / scale, 7 / scale]);
        ctx.beginPath();
        ctx.moveTo(previewPath[0].x, previewPath[0].y);
        for (var qi = 1; qi < previewPath.length; qi++) {
          ctx.lineTo(previewPath[qi].x, previewPath[qi].y);
        }
        ctx.stroke();
        ctx.setLineDash([]);

        /* aim arrow */
        var adx  = aimEndX - aimStartX;
        var ady  = aimEndY - aimStartY;
        var alen = Math.sqrt(adx * adx + ady * ady);
        if (alen > 4) {
          var vel2    = computeVel();
          var spd2    = Math.sqrt(vel2.vx * vel2.vx + vel2.vy * vel2.vy);
          var dispLen = 12 + (spd2 / MAX_SPEED) * 80;
          var nx  = adx / alen;
          var ny  = ady / alen;
          var ex  = aimStartX + nx * dispLen;
          var ey  = aimStartY + ny * dispLen;

          ctx.strokeStyle = 'rgba(0,230,255,0.9)';
          ctx.lineWidth   = 2 / scale;
          ctx.beginPath();
          ctx.moveTo(aimStartX, aimStartY);
          ctx.lineTo(ex, ey);
          ctx.stroke();

          /* arrowhead */
          var ang = Math.atan2(ny, nx);
          var hs  = 10 / scale;
          ctx.fillStyle = '#00e6ff';
          ctx.beginPath();
          ctx.moveTo(ex, ey);
          ctx.lineTo(ex - hs * Math.cos(ang - 0.42), ey - hs * Math.sin(ang - 0.42));
          ctx.lineTo(ex - hs * Math.cos(ang + 0.42), ey - hs * Math.sin(ang + 0.42));
          ctx.closePath();
          ctx.fill();
        }
      }

      /* probe */
      if (phase !== 'miss') {
        var pglow = ctx.createRadialGradient(probeX, probeY, 0, probeX, probeY, PROBE_R * 4.5);
        pglow.addColorStop(0,   'rgba(255,245,180,0.95)');
        pglow.addColorStop(0.30,'rgba(255,180,60,0.45)');
        pglow.addColorStop(0.70,'rgba(255,100,20,0.12)');
        pglow.addColorStop(1,   'rgba(0,0,0,0)');
        ctx.fillStyle = pglow;
        ctx.beginPath();
        ctx.arc(probeX, probeY, PROBE_R * 4.5, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.arc(probeX, probeY, PROBE_R, 0, Math.PI * 2);
        ctx.fill();
      }

      /* aim pulse ring */
      if (phase === 'aim' && !dragging) {
        var ringA = 0.12 + 0.10 * Math.sin(ts * 0.004);
        ctx.strokeStyle = 'rgba(0,230,255,' + ringA + ')';
        ctx.lineWidth   = 1.5 / scale;
        ctx.setLineDash([3 / scale, 3 / scale]);
        ctx.beginPath();
        ctx.arc(probeX, probeY, 26, 0, Math.PI * 2);
        ctx.stroke();
        ctx.setLineDash([]);
      }

      ctx.restore();
    }

    /* ---- GAME LOOP ---- */
    var lastTs = 0;

    function loop(ts) {
      var dt = Math.min((ts - lastTs) * 0.001, 0.05);
      lastTs = ts;
      /* fly physics */
      if (phase === 'fly') {
        flightTime += dt;
        var planets2 = LEVELS[levelIndex].planets;
        var tgt2     = LEVELS[levelIndex].target;
        var done     = false;

        for (var s = 0; s < SUBSTEPS && !done; s++) {
          var r2  = stepVerlet(probeX, probeY, probeVX, probeVY, SIM_DT, planets2);
          probeX  = r2.x;  probeY  = r2.y;
          probeVX = r2.vx; probeVY = r2.vy;
          trail.push({ x: probeX, y: probeY });
          if (trail.length > TRAIL_LEN) { trail.shift(); }

          if (hitsTarget(probeX, probeY, tgt2)) {
            phase    = 'success';
            msgTimer = 99;
            var isLast  = levelIndex === LEVELS.length - 1;
            var shotStr = shotCount === 1 ? '1 SHOT' : shotCount + ' SHOTS';
            showMsg(isLast ? 'MISSION COMPLETE' : 'TARGET REACHED \u2014 ' + shotStr, '#3fb950');
            document.getElementById('hint').style.display = 'none';
            document.getElementById('level-hint').textContent = isLast ? '' : 'TAP TO CONTINUE';
            document.getElementById('level-hint').classList.add('visible');
            done = true;
          } else if (hitsPlanet(probeX, probeY, planets2) || outOfBounds(probeX, probeY)) {
            phase    = 'miss';
            msgTimer = 1.7;
            showMsg('MISS', '#f85149');
            done = true;
          }
        }

        if (phase === 'fly' && flightTime > TIMEOUT_S) {
          phase    = 'miss';
          msgTimer = 1.7;
          showMsg('TIMEOUT', '#f85149');
        }
      }

      /* auto-reset after miss */
      if (msgTimer > 0 && phase === 'miss') {
        msgTimer -= dt;
        if (msgTimer <= 0) {
          hideMsg();
          resetProbe();
          updateHUD();
        }
      }

      /* hint fade */
      if (hintTimer > 0) {
        hintTimer -= dt;
        if (hintTimer <= 0) {
          document.getElementById('level-hint').classList.remove('visible');
        }
      }

      draw(ts);
      requestAnimationFrame(loop);
    }

    /* ---- INPUT ---- */
    function getLogPos(e) {
      var rect = canvas.getBoundingClientRect();
      return toLogical(e.clientX - rect.left, e.clientY - rect.top);
    }

    canvas.addEventListener('pointerdown', function(e) {
      canvas.setPointerCapture(e.pointerId);

      /* tap to advance on success */
      if (phase === 'success') {
        if (levelIndex < LEVELS.length - 1) {
          hideMsg();
          loadLevel(levelIndex + 1);
        }
        return;
      }

      if (phase !== 'aim') { return; }

      var pos  = getLogPos(e);
      var ddx  = pos.x - probeX;
      var ddy  = pos.y - probeY;
      /* generous touch target: 70 logical px radius */
      if (ddx * ddx + ddy * ddy < 70 * 70) {
        dragging   = true;
        aimStartX  = probeX;
        aimStartY  = probeY;
        aimEndX    = pos.x;
        aimEndY    = pos.y;
        previewPath = buildPreview();
      }
      e.preventDefault();
    });

    canvas.addEventListener('pointermove', function(e) {
      if (!dragging) { return; }
      var pos     = getLogPos(e);
      aimEndX     = pos.x;
      aimEndY     = pos.y;
      previewPath = buildPreview();
      e.preventDefault();
    });

    canvas.addEventListener('pointerup', function(e) {
      if (!dragging) { return; }
      dragging = false;
      var pos  = getLogPos(e);
      aimEndX  = pos.x;
      aimEndY  = pos.y;
      var vel  = computeVel();
      var spd  = Math.sqrt(vel.vx * vel.vx + vel.vy * vel.vy);
      previewPath = [];
      if (spd < 8) { return; }
      probeVX    = vel.vx;
      probeVY    = vel.vy;
      trail      = [{ x: probeX, y: probeY }];
      flightTime = 0;
      phase      = 'fly';
      shotCount++;
      document.getElementById('hint').style.display = 'none';
      updateHUD();
      e.preventDefault();
    });

    canvas.addEventListener('pointercancel', function() {
      dragging    = false;
      previewPath = [];
    });

    /* buttons */
    document.getElementById('btn-reset').addEventListener('pointerdown', function(e) {
      resetProbe();
      updateHUD();
      e.stopPropagation();
    });

    document.getElementById('btn-prev').addEventListener('pointerdown', function(e) {
      if (levelIndex > 0) { loadLevel(levelIndex - 1); }
      e.stopPropagation();
    });

    document.getElementById('btn-next').addEventListener('pointerdown', function(e) {
      if (levelIndex < LEVELS.length - 1) { loadLevel(levelIndex + 1); }
      e.stopPropagation();
    });

    /* keyboard */
    document.addEventListener('keydown', function(e) {
      if (e.key === 'r' || e.key === 'R') { resetProbe(); updateHUD(); }
      if (e.key === 'ArrowLeft' && levelIndex > 0) { loadLevel(levelIndex - 1); }
      if (e.key === 'ArrowRight') {
        if (phase === 'success' && levelIndex < LEVELS.length - 1) {
          hideMsg();
          loadLevel(levelIndex + 1);
        } else if (levelIndex < LEVELS.length - 1) {
          loadLevel(levelIndex + 1);
        }
      }
    });

    window.addEventListener('resize', resize);

    /* ---- INIT ---- */
    resize();
    loadLevel(0);
    requestAnimationFrame(loop);

  })();
  </script>
</body>
</html>
