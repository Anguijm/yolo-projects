<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'SF Mono','Fira Code',monospace;background:#0a0a0a;color:#ccc;padding:2rem;max-width:800px;margin:0 auto}
h1{font-size:1.3rem;color:#fff;margin-bottom:0.3rem}
.sub{color:#555;font-size:0.7rem;margin-bottom:1.5rem}
.search-box{position:relative;margin-bottom:1rem}
.search-box input{width:100%;background:#111;border:1px solid #333;color:#fff;padding:0.7rem 1rem 0.7rem 2.5rem;border-radius:8px;font-family:inherit;font-size:0.9rem}
.search-box input:focus{outline:none;border-color:#4ade80}
.search-icon{position:absolute;left:0.8rem;top:50%;transform:translateY(-50%);color:#444;font-size:1rem}
.categories{display:flex;gap:4px;margin-bottom:1rem;overflow-x:auto;padding-bottom:4px}
.cat-btn{padding:0.3rem 0.6rem;background:#1a1a1a;border:1px solid #222;border-radius:4px;cursor:pointer;font-size:0.65rem;color:#666;white-space:nowrap}
.cat-btn:hover{color:#ccc;border-color:#444}
.cat-btn.active{color:#4ade80;border-color:#166534;background:#0a1a0a}
.recent{margin-bottom:1rem}
.recent-label{font-size:0.65rem;color:#444;margin-bottom:0.3rem}
.recent-grid{display:flex;gap:2px;flex-wrap:wrap}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(42px,1fr));gap:2px}
.emoji-cell{width:42px;height:42px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;cursor:pointer;border-radius:6px;transition:background 0.1s}
.emoji-cell:hover{background:#1a1a1a}
.emoji-cell:active{transform:scale(0.9)}
.section-title{font-size:0.7rem;color:#444;margin:0.8rem 0 0.4rem;text-transform:uppercase;letter-spacing:0.05em}
.copied{position:fixed;top:1rem;right:1rem;background:#0a2a0a;color:#4ade80;border:1px solid #166534;padding:0.4rem 0.8rem;border-radius:6px;font-size:0.8rem;opacity:0;transition:opacity 0.3s;pointer-events:none;z-index:100}
.copied.show{opacity:1}
.count{font-size:0.7rem;color:#333;margin-bottom:0.5rem}



/* UI-UPGRADE:START */
/* Injected by sync_project_ui.py — readability bump. Additive at end so
   project-specific rules still win for intentional decorative text. */
html { font-size: 17px; }
body { line-height: 1.55; }
input, button, select, textarea {
  font-size: max(14px, 0.9rem);
  min-height: 32px;
}
/* UI-UPGRADE:END */

<div class="copied" id="copied"></div>

  <span class="search-icon">&#128269;</span>
  <input type="text" id="search" placeholder="Search emojis..." autofocus>

<div class="recent" id="recent-section" style="display:none">

const CATEGORIES = ['all', ...new Set(EMOJIS.map(e => e.c))];
let activeCategory = 'all';
let recent = [];
try { recent = JSON.parse(localStorage.getItem('emoji-recent') || '[]'); } catch(e) { recent = []; }
let flashTimer = null;

async function copyEmoji(emoji) {
  try {
    await navigator.clipboard.writeText(emoji);
  } catch(e) { /* clipboard denied — still update UI */ }
  // Update recent
  recent = [emoji, ...recent.filter(e => e !== emoji)].slice(0, 20);
  try { localStorage.setItem('emoji-recent', JSON.stringify(recent)); } catch(e) {}
  // Flash — clear any running timer to prevent early hide
  const el = document.getElementById('copied');
  el.textContent = `Copied ${emoji}`;
  el.classList.add('show');
  if (flashTimer) clearTimeout(flashTimer);
  flashTimer = setTimeout(() => el.classList.remove('show'), 1200);
  renderRecent();
}

function renderRecent() {
  const section = document.getElementById('recent-section');
  if (recent.length === 0) { section.style.display = 'none'; return; }
  section.style.display = '';
  document.getElementById('recent').innerHTML = recent.map(e =>
    `<div class="emoji-cell" onclick="copyEmoji('${e}')">${e}</div>`
  ).join('');
}

function render() {
  const q = document.getElementById('search').value.toLowerCase();
  let filtered = EMOJIS;
  if (activeCategory !== 'all') filtered = filtered.filter(e => e.c === activeCategory);
  if (q) filtered = filtered.filter(e => (e.n + ' ' + e.k + ' ' + e.e).toLowerCase().includes(q));

  document.getElementById('count').textContent = `${filtered.length} emojis`;

  if (q || activeCategory !== 'all') {
    document.getElementById('grid').innerHTML = filtered.map(e =>
      `<div class="emoji-cell" title="${e.n}" onclick="copyEmoji('${e.e}')">${e.e}</div>`
    ).join('');
  } else {
    // Group by category
    const groups = {};
    filtered.forEach(e => { (groups[e.c] = groups[e.c] || []).push(e); });
    let html = '';
    for (const [cat, emojis] of Object.entries(groups)) {
      html += `<div class="section-title" style="grid-column:1/-1">${cat}</div>`;
      html += emojis.map(e =>
        `<div class="emoji-cell" title="${e.n}" onclick="copyEmoji('${e.e}')">${e.e}</div>`
      ).join('');
    }
    document.getElementById('grid').innerHTML = html;
  }

  // Categories
  document.getElementById('categories').innerHTML = CATEGORIES.map(c =>
    `<div class="cat-btn ${c === activeCategory ? 'active' : ''}" onclick="setCategory('${c}')">${c}</div>`
  ).join('');
}

window.setCategory = function(c) { activeCategory = c; render(); };
window.copyEmoji = copyEmoji;

document.getElementById('search').addEventListener('input', render);
renderRecent();
render();
</script>
