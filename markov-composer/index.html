<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Markov Composer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #08080f; color: #c8d0e0; font-family: 'Segoe UI', system-ui, sans-serif; height: 100vh; display: flex; overflow: hidden; }

#sidebar { width: 300px; background: #0c0c18; border-right: 1px solid #1a1a2e; display: flex; flex-direction: column; z-index: 5; }
#sidebar-top { padding: 12px; border-bottom: 1px solid #1a1a2e; }
#sidebar-top h1 { font-size: 15px; color: #a78bfa; letter-spacing: 0.1em; margin-bottom: 8px; }
textarea { width: 100%; height: 120px; background: #10101c; border: 1px solid #2a2a40; color: #d0d8e8; padding: 8px; border-radius: 6px; font-family: inherit; font-size: 12px; resize: vertical; outline: none; }
textarea:focus { border-color: #a78bfa; }
textarea::placeholder { color: #333; }
.controls { padding: 12px; display: flex; flex-direction: column; gap: 10px; border-bottom: 1px solid #1a1a2e; }
.control label { font-size: 10px; color: #666; display: flex; justify-content: space-between; margin-bottom: 3px; }
.control label span { color: #aaa; font-weight: bold; }
input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; background: #1a1a2e; border-radius: 2px; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #a78bfa; cursor: pointer; }
.btn-row { display: flex; gap: 6px; }
.btn { padding: 6px 12px; background: #12121e; border: 1px solid #2a2a40; color: #aaa; border-radius: 5px; cursor: pointer; font-family: inherit; font-size: 11px; flex: 1; text-align: center; }
.btn:hover { border-color: #a78bfa; color: #fff; }
.btn.active { background: #a78bfa22; border-color: #a78bfa; color: #a78bfa; }
.btn.primary { background: #a78bfa; color: #000; border-color: #a78bfa; font-weight: bold; }
.btn.primary:hover { background: #c4b5fd; }

/* Output */
#output-area { flex: 1; padding: 12px; overflow-y: auto; }
#output-area h3 { font-size: 11px; color: #555; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 6px; }
#output-text { font-size: 13px; line-height: 1.7; color: #e0e8f0; min-height: 80px; }
#output-text .current-word { color: #a78bfa; font-weight: bold; text-decoration: underline; }
#stats-bar { padding: 8px 12px; background: #0a0a14; border-top: 1px solid #1a1a2e; font-size: 9px; color: #444; font-family: monospace; }

/* Main canvas */
#main { flex: 1; position: relative; }
canvas { display: block; width: 100%; height: 100%; }
#hud { position: absolute; top: 8px; left: 8px; font-size: 10px; color: #333; font-family: monospace; pointer-events: none; }

/* Sample texts */
#samples { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
#samples button { padding: 2px 6px; background: #10101c; border: 1px solid #1e1e30; color: #555; border-radius: 8px; cursor: pointer; font-size: 9px; font-family: inherit; }
#samples button:hover { border-color: #a78bfa; color: #aaa; }
</style>
</head>
<body>
<div id="sidebar">
  <div id="sidebar-top">
    <h1>MARKOV COMPOSER</h1>
    <textarea id="corpus" placeholder="Paste any text here... poems, stories, code, anything."></textarea>
    <div id="samples">
      <button data-s="shakespeare">Shakespeare</button>
      <button data-s="scifi">Sci-Fi</button>
      <button data-s="cooking">Cooking</button>
      <button data-s="philosophy">Philosophy</button>
    </div>
  </div>
  <div class="controls">
    <div class="control">
      <label>N-gram Order <span id="v-order">2</span></label>
      <input type="range" id="s-order" min="1" max="4" value="2">
    </div>
    <div class="control">
      <label>Speed <span id="v-speed">3</span> words/sec</label>
      <input type="range" id="s-speed" min="1" max="20" value="3">
    </div>
    <div class="control">
      <label>Max Nodes <span id="v-nodes">80</span></label>
      <input type="range" id="s-nodes" min="20" max="200" value="80" step="10">
    </div>
    <div class="btn-row">
      <button class="btn primary" id="btn-build">Build Chain</button>
    </div>
    <div class="btn-row">
      <button class="btn active" id="btn-generate">Generate</button>
      <button class="btn" id="btn-pause">Pause</button>
      <button class="btn" id="btn-clear">Clear</button>
    </div>
  </div>
  <div id="output-area">
    <h3>Generated Text</h3>
    <div id="output-text">Build a chain to start generating...</div>
  </div>
  <div id="stats-bar" id="stats">—</div>
</div>
<div id="main">
  <canvas id="graph"></canvas>
  <div id="hud"></div>
</div>

<script>
(function() {
'use strict';

// ============ CONFIG ============
const REPULSION = 800;
const ATTRACTION = 0.008;
const DAMPING = 0.92;
const CENTER_GRAVITY = 0.01;

// ============ STATE ============
const canvas = document.getElementById('graph');
const ctx = canvas.getContext('2d');
let W, H;
let chain = {}; // key: n-gram string, value: { nexts: [{word, count}], total }
let nodes = []; // [{id, word, x, y, vx, vy, size, connections}]
let edges = []; // [{from, to, weight}]
let nodeMap = new Map(); // word -> node index
let generating = false;
let currentNode = -1;
let generatedWords = [];
let genTimer = 0;
let order = 2;
let speed = 3;
let maxNodes = 80;
let trailNodes = []; // recent path for glow trail
let hoveredNode = -1;

function resize() {
  W = canvas.width = canvas.parentElement.clientWidth;
  H = canvas.height = canvas.parentElement.clientHeight;
}
window.addEventListener('resize', resize);
resize();

// ============ SAMPLE TEXTS ============
const SAMPLES = {
  shakespeare: `To be or not to be that is the question whether tis nobler in the mind to suffer the slings and arrows of outrageous fortune or to take arms against a sea of troubles and by opposing end them to die to sleep no more and by a sleep to say we end the heartache and the thousand natural shocks that flesh is heir to tis a consummation devoutly to be wished to die to sleep to sleep perchance to dream ay there is the rub for in that sleep of death what dreams may come when we have shuffled off this mortal coil must give us pause there is the respect that makes calamity of so long life`,
  scifi: `The stars burned cold above the station as the last transport docked with a shudder the captain watched through reinforced glass as the nebula shifted colors from deep purple to electric blue somewhere in the void a signal pulsed rhythmically like a heartbeat the crew gathered in the observation deck their faces lit by distant supernovae the ship hummed with energy drawn from the quantum field below them a planet of crystal spires reflected starlight in patterns that seemed almost deliberate almost like a message the AI whispered calculations into the silence probability matrices cascading through dimensions we had not yet named`,
  cooking: `Heat the olive oil in a large skillet over medium heat until shimmering add the diced onions and cook stirring occasionally until they become translucent about five minutes season with salt and pepper to taste add the minced garlic and cook for another minute until fragrant pour in the crushed tomatoes and bring to a gentle simmer reduce heat to low and let the sauce cook for twenty minutes stirring occasionally taste and adjust the seasoning fold in the fresh basil leaves and remove from heat serve over al dente pasta with a generous sprinkle of parmesan cheese and a drizzle of extra virgin olive oil`,
  philosophy: `What can be known and what must remain beyond the reach of knowledge the boundary between certainty and doubt shifts like sand beneath the tide we construct our understanding from fragments of experience each moment a new piece in an infinite puzzle the self observes the world and in observing changes both the observer and the observed are bound together in a dance of mutual creation consciousness arises from matter yet transcends it reaching toward something that cannot be measured or contained in equations the universe contemplates itself through eyes that evolved to hunt and gather yet now turn inward seeking meaning in the vast silence between stars`
};

// ============ MARKOV CHAIN ============
function buildChain(text) {
  const words = text.toLowerCase().replace(/[^\w\s']/g, '').split(/\s+/).filter(w => w.length > 0);
  if (words.length < order + 1) return;

  chain = {};
  for (let i = 0; i <= words.length - order - 1; i++) {
    const key = words.slice(i, i + order).join(' ');
    const next = words[i + order];
    if (!chain[key]) chain[key] = { nexts: {}, total: 0 };
    chain[key].nexts[next] = (chain[key].nexts[next] || 0) + 1;
    chain[key].total++;
  }

  buildGraph(words);
  generatedWords = [];
  document.getElementById('output-text').textContent = 'Click a node or press Generate...';
  updateStats(words.length);
}

function weightedRandom(nexts, total) {
  let r = Math.random() * total;
  for (const [word, count] of Object.entries(nexts)) {
    r -= count;
    if (r <= 0) return word;
  }
  return Object.keys(nexts)[0];
}

// ============ GRAPH CONSTRUCTION ============
function buildGraph(words) {
  // Find top N most connected words
  const wordFreq = {};
  words.forEach(w => { wordFreq[w] = (wordFreq[w] || 0) + 1; });
  const topWords = Object.entries(wordFreq)
    .sort((a, b) => b[1] - a[1])
    .slice(0, maxNodes)
    .map(e => e[0]);

  const wordSet = new Set(topWords);

  // Create nodes
  nodes = [];
  nodeMap = new Map();
  topWords.forEach((word, i) => {
    const angle = (i / topWords.length) * Math.PI * 2;
    const r = Math.min(W, H) * 0.3;
    nodes.push({
      id: i, word,
      x: W / 2 + Math.cos(angle) * r + (Math.random() - 0.5) * 50,
      y: H / 2 + Math.sin(angle) * r + (Math.random() - 0.5) * 50,
      vx: 0, vy: 0,
      size: 4 + Math.log(1 + wordFreq[word]) * 3,
      freq: wordFreq[word],
      highlight: 0
    });
    nodeMap.set(word, i);
  });

  // Create edges from chain transitions
  edges = [];
  const edgeSet = new Set();
  for (const [key, data] of Object.entries(chain)) {
    const keyWords = key.split(' ');
    const lastKeyWord = keyWords[keyWords.length - 1];
    if (!wordSet.has(lastKeyWord)) continue;
    for (const [next, count] of Object.entries(data.nexts)) {
      if (!wordSet.has(next)) continue;
      const fromIdx = nodeMap.get(lastKeyWord);
      const toIdx = nodeMap.get(next);
      if (fromIdx === undefined || toIdx === undefined || fromIdx === toIdx) continue;
      const edgeKey = `${fromIdx}-${toIdx}`;
      if (!edgeSet.has(edgeKey)) {
        edgeSet.add(edgeKey);
        edges.push({ from: fromIdx, to: toIdx, weight: count / data.total });
      }
    }
  }

  currentNode = -1;
  trailNodes = [];
}

// ============ FORCE-DIRECTED LAYOUT ============
function simulateForces() {
  const n = nodes.length;

  // Repulsion (all pairs)
  for (let i = 0; i < n; i++) {
    for (let j = i + 1; j < n; j++) {
      const dx = nodes[j].x - nodes[i].x;
      const dy = nodes[j].y - nodes[i].y;
      const distSq = dx * dx + dy * dy + 1;
      const force = REPULSION / distSq;
      const fx = force * dx / Math.sqrt(distSq);
      const fy = force * dy / Math.sqrt(distSq);
      nodes[i].vx -= fx; nodes[i].vy -= fy;
      nodes[j].vx += fx; nodes[j].vy += fy;
    }
  }

  // Attraction (edges)
  for (const e of edges) {
    const a = nodes[e.from], b = nodes[e.to];
    const dx = b.x - a.x, dy = b.y - a.y;
    const dist = Math.sqrt(dx * dx + dy * dy);
    const force = dist * ATTRACTION * (1 + e.weight);
    a.vx += dx / dist * force;
    a.vy += dy / dist * force;
    b.vx -= dx / dist * force;
    b.vy -= dy / dist * force;
  }

  // Center gravity
  for (const node of nodes) {
    node.vx += (W / 2 - node.x) * CENTER_GRAVITY;
    node.vy += (H / 2 - node.y) * CENTER_GRAVITY;
  }

  // Apply velocity with damping
  for (const node of nodes) {
    node.vx *= DAMPING;
    node.vy *= DAMPING;
    node.x += node.vx;
    node.y += node.vy;
    // Bounds
    node.x = Math.max(20, Math.min(W - 20, node.x));
    node.y = Math.max(20, Math.min(H - 20, node.y));
  }
}

// ============ GENERATION ============
function generateStep() {
  if (!generating || Object.keys(chain).length === 0) return;

  // Pick starting point if needed
  if (generatedWords.length < order) {
    const keys = Object.keys(chain);
    const startKey = keys[~~(Math.random() * keys.length)];
    generatedWords = startKey.split(' ');
    const lastWord = generatedWords[generatedWords.length - 1];
    if (nodeMap.has(lastWord)) {
      currentNode = nodeMap.get(lastWord);
      highlightNode(currentNode);
    }
    updateOutput();
    return;
  }

  // Get current n-gram
  const key = generatedWords.slice(-order).join(' ');
  if (!chain[key]) {
    // Dead end — restart
    generatedWords.push('...');
    const keys = Object.keys(chain);
    const newKey = keys[~~(Math.random() * keys.length)];
    generatedWords.push(...newKey.split(' '));
    updateOutput();
    return;
  }

  const nextWord = weightedRandom(chain[key].nexts, chain[key].total);
  generatedWords.push(nextWord);

  // Update current node (handle off-graph words gracefully)
  if (nodeMap.has(nextWord)) {
    currentNode = nodeMap.get(nextWord);
    highlightNode(currentNode);
    trailNodes.push(currentNode);
    if (trailNodes.length > 15) trailNodes.shift();
  } else {
    // Word not in top-N graph — fade out playhead
    currentNode = -1;
  }

  updateOutput();

  // Cap output
  if (generatedWords.length > 500) {
    generatedWords = generatedWords.slice(-200);
  }
}

function highlightNode(idx) {
  if (idx >= 0 && idx < nodes.length) {
    nodes[idx].highlight = 1;
  }
}

function updateOutput() {
  const el = document.getElementById('output-text');
  const words = generatedWords.slice(-100);
  const lastWord = words[words.length - 1];
  el.innerHTML = words.map((w, i) =>
    i === words.length - 1 ? `<span class="current-word">${w}</span>` : w
  ).join(' ');
  el.scrollTop = el.scrollHeight;
}

function updateStats(totalWords) {
  document.getElementById('stats-bar').textContent =
    `Chain: ${Object.keys(chain).length} states | Nodes: ${nodes.length} | Edges: ${edges.length} | Corpus: ${totalWords || '?'} words`;
}

// ============ RENDER ============
function render() {
  ctx.fillStyle = 'rgba(8, 8, 15, 0.25)';
  ctx.fillRect(0, 0, W, H);

  // Edges
  for (const e of edges) {
    const a = nodes[e.from], b = nodes[e.to];
    const isTrail = trailNodes.length >= 2 &&
      trailNodes.some((t, i) => i > 0 && ((trailNodes[i-1] === e.from && t === e.to) || (trailNodes[i-1] === e.to && t === e.from)));

    ctx.strokeStyle = isTrail ? `rgba(167, 139, 250, ${0.4 + e.weight * 0.5})` : `rgba(40, 40, 70, ${0.2 + e.weight * 0.3})`;
    ctx.lineWidth = isTrail ? 1.5 + e.weight * 3 : 0.3 + e.weight * 1.5;
    ctx.beginPath();
    ctx.moveTo(a.x, a.y);
    ctx.lineTo(b.x, b.y);
    ctx.stroke();
  }

  // Trail glow
  if (trailNodes.length >= 2) {
    ctx.strokeStyle = '#a78bfa44';
    ctx.lineWidth = 3;
    ctx.beginPath();
    ctx.moveTo(nodes[trailNodes[0]].x, nodes[trailNodes[0]].y);
    for (let i = 1; i < trailNodes.length; i++) {
      ctx.lineTo(nodes[trailNodes[i]].x, nodes[trailNodes[i]].y);
    }
    ctx.stroke();
  }

  // Nodes
  for (let i = 0; i < nodes.length; i++) {
    const n = nodes[i];
    const isCurrent = i === currentNode;
    const isHovered = i === hoveredNode;
    const isInTrail = trailNodes.includes(i);

    // Highlight decay
    if (n.highlight > 0) n.highlight -= 0.02;

    // Glow
    if (isCurrent || n.highlight > 0.3) {
      ctx.globalCompositeOperation = 'lighter';
      ctx.fillStyle = `rgba(167, 139, 250, ${(isCurrent ? 0.3 : n.highlight * 0.2)})`;
      ctx.beginPath();
      ctx.arc(n.x, n.y, n.size * 3, 0, Math.PI * 2);
      ctx.fill();
      ctx.globalCompositeOperation = 'source-over';
    }

    // Body
    const alpha = isCurrent ? 1 : isInTrail ? 0.8 : 0.5;
    ctx.fillStyle = isCurrent ? '#a78bfa' : isHovered ? '#c4b5fd' : isInTrail ? '#7c6cb5' : '#3a3a5c';
    ctx.globalAlpha = alpha;
    ctx.beginPath();
    ctx.arc(n.x, n.y, n.size, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;

    // Label
    if (isCurrent || isHovered || n.size > 8) {
      ctx.fillStyle = isCurrent ? '#fff' : isHovered ? '#e0d8f0' : '#888';
      ctx.font = `${isCurrent ? 'bold ' : ''}${Math.max(9, n.size)}px 'Segoe UI', system-ui`;
      ctx.textAlign = 'center';
      ctx.fillText(n.word, n.x, n.y - n.size - 4);
    }
  }
}

// ============ MAIN LOOP ============
let lastTime = 0;
function loop(ts) {
  const dt = Math.min(0.05, (ts - lastTime) / 1000);
  lastTime = ts;

  simulateForces();

  // Generation timing
  if (generating) {
    genTimer += dt;
    const interval = 1 / speed;
    while (genTimer >= interval) {
      genTimer -= interval;
      generateStep();
    }
  }

  render();
  requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ============ INPUT ============
canvas.addEventListener('mousemove', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = (e.clientX - rect.left) * (W / rect.width);
  const my = (e.clientY - rect.top) * (H / rect.height);
  hoveredNode = -1;
  for (let i = 0; i < nodes.length; i++) {
    const dx = mx - nodes[i].x, dy = my - nodes[i].y;
    if (dx * dx + dy * dy < (nodes[i].size + 6) ** 2) {
      hoveredNode = i;
      break;
    }
  }
  canvas.style.cursor = hoveredNode >= 0 ? 'pointer' : 'default';
});

canvas.addEventListener('click', e => {
  if (hoveredNode >= 0 && Object.keys(chain).length > 0) {
    // Steer generation to this word
    const word = nodes[hoveredNode].word;
    if (generatedWords.length >= order) {
      // Replace last n-gram ending with clicked word
      generatedWords.push(word);
    } else {
      // Find a key containing this word
      const keys = Object.keys(chain).filter(k => k.includes(word));
      if (keys.length > 0) {
        generatedWords = keys[0].split(' ');
      }
    }
    currentNode = hoveredNode;
    highlightNode(hoveredNode);
    trailNodes.push(hoveredNode);
    if (trailNodes.length > 15) trailNodes.shift();
    updateOutput();
    generating = true;
    document.getElementById('btn-generate').classList.add('active');
    document.getElementById('btn-pause').classList.remove('active');
  }
});

// ============ UI ============
document.getElementById('btn-build').addEventListener('click', () => {
  const text = document.getElementById('corpus').value.trim();
  if (text.length < 20) return;
  buildChain(text);
});

document.getElementById('btn-generate').addEventListener('click', () => {
  generating = true;
  document.getElementById('btn-generate').classList.add('active');
  document.getElementById('btn-pause').classList.remove('active');
});
document.getElementById('btn-pause').addEventListener('click', () => {
  generating = false;
  document.getElementById('btn-pause').classList.add('active');
  document.getElementById('btn-generate').classList.remove('active');
});
document.getElementById('btn-clear').addEventListener('click', () => {
  generatedWords = [];
  currentNode = -1;
  trailNodes = [];
  document.getElementById('output-text').textContent = 'Cleared. Click a node or press Generate...';
});

let rebuildTimer;
document.getElementById('s-order').addEventListener('input', function() {
  order = parseInt(this.value);
  document.getElementById('v-order').textContent = order;
  // Debounced rebuild — prevents spam while dragging slider
  clearTimeout(rebuildTimer);
  rebuildTimer = setTimeout(() => {
    const text = document.getElementById('corpus').value.trim();
    if (text.length >= 20) buildChain(text);
  }, 200);
});
document.getElementById('s-speed').addEventListener('input', function() {
  speed = parseInt(this.value);
  document.getElementById('v-speed').textContent = speed;
});
document.getElementById('s-nodes').addEventListener('input', function() {
  maxNodes = parseInt(this.value);
  document.getElementById('v-nodes').textContent = maxNodes;
});

// Sample texts
document.querySelectorAll('#samples button').forEach(btn => {
  btn.addEventListener('click', () => {
    const text = SAMPLES[btn.dataset.s];
    if (text) {
      document.getElementById('corpus').value = text;
      buildChain(text);
    }
  });
});

// Keyboard
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'TEXTAREA') return;
  if (e.key === ' ') { generating = !generating; e.preventDefault(); }
  if (e.key === 'c') {
    generatedWords = []; currentNode = -1; trailNodes = [];
    document.getElementById('output-text').textContent = 'Cleared.';
  }
});

})();
</script>
</body>
</html>
