<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLO Dashboard</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace; background: #0a0a0a; color: #e0e0e0; padding: 1.5rem; max-width: 1200px; margin: 0 auto; }
  h1 { font-size: 1.8rem; margin-bottom: 0.3rem; color: #fff; }
  .subtitle { color: #666; margin-bottom: 1.5rem; font-size: 0.85rem; }

  .stats { display: flex; gap: 1.5rem; margin-bottom: 1.5rem; padding: 0.8rem 1.2rem; background: #111; border-radius: 8px; border: 1px solid #222; flex-wrap: wrap; }
  .stat { text-align: center; min-width: 60px; }
  .stat-num { font-size: 1.4rem; font-weight: bold; }
  .stat-label { font-size: 0.65rem; color: #666; text-transform: uppercase; letter-spacing: 0.1em; }

  .controls { display: flex; gap: 0.75rem; margin-bottom: 1.2rem; flex-wrap: wrap; align-items: center; }
  .search-box { flex: 1; min-width: 180px; padding: 0.45rem 0.8rem; background: #111; border: 1px solid #333; border-radius: 6px; color: #e0e0e0; font-family: inherit; font-size: 0.8rem; outline: none; }
  .search-box:focus { border-color: #58a6ff; }
  .search-box::placeholder { color: #444; }
  .pill-group { display: flex; gap: 0.35rem; flex-wrap: wrap; }
  .pill { background: #1a1a1a; border: 1px solid #333; color: #888; padding: 0.3rem 0.65rem; border-radius: 20px; cursor: pointer; font-family: inherit; font-size: 0.7rem; transition: all 0.15s; white-space: nowrap; }
  .pill:hover { border-color: #555; color: #ccc; }
  .pill.active { border-color: #58a6ff; color: #58a6ff; background: #0d1b2e; }
  .pill .count { font-size: 0.6rem; color: #555; margin-left: 3px; }
  .pill.active .count { color: #58a6ff88; }

  .view-toggle { display: flex; gap: 2px; background: #111; border-radius: 4px; border: 1px solid #333; overflow: hidden; }
  .view-toggle button { background: transparent; border: none; color: #666; padding: 0.35rem 0.55rem; cursor: pointer; font-size: 0.8rem; font-family: inherit; }
  .view-toggle button.active { background: #222; color: #fff; }

  .sort-select { background: #111; border: 1px solid #333; color: #888; padding: 0.3rem 0.5rem; border-radius: 4px; font-family: inherit; font-size: 0.7rem; }

  .category { margin-bottom: 1.8rem; }
  .category-header { font-size: 0.8rem; color: #58a6ff; text-transform: uppercase; letter-spacing: 0.12em; margin-bottom: 0.6rem; padding-bottom: 0.35rem; border-bottom: 1px solid #1a1a2e; display: flex; align-items: center; gap: 0.5rem; }
  .category-icon { font-size: 1rem; }
  .category-count { font-size: 0.65rem; color: #444; margin-left: auto; }

  .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 0.65rem; }
  .list .entry { display: flex; gap: 1rem; align-items: flex-start; }
  .list .entry-body { flex: 1; }

  .entry { padding: 1rem; background: #111; border-radius: 8px; border: 1px solid #1a1a1a; transition: border-color 0.2s; position: relative; }
  .entry:hover { border-color: #333; }
  .entry.thumbs-up { border-left: 3px solid #4ade80; }
  .entry.thumbs-down { border-left: 3px solid #f87171; opacity: 0.6; }
  .entry.refined { border-top: 2px solid #58a6ff; }
  .refined-badge { font-size: 0.55rem; padding: 0.1rem 0.4rem; border-radius: 3px; background: #0d1b2e; color: #58a6ff; border: 1px solid #1a3a5e; margin-left: 6px; vertical-align: middle; }
  .section-divider { font-size: 0.9rem; color: #58a6ff; padding: 0.8rem 0 0.4rem; margin-top: 1rem; border-bottom: 1px solid #1a1a2e; margin-bottom: 0.8rem; display: flex; align-items: center; gap: 0.5rem; }
  .section-divider .count { font-size: 0.7rem; color: #444; margin-left: auto; }
  .unrefined-section { opacity: 0.75; }
  .unrefined-section .entry { border-left: 2px solid #333; }
  .entry-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.4rem; gap: 0.5rem; }
  .entry-name { font-weight: bold; font-size: 0.95rem; color: #fff; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .entry-date { color: #444; font-size: 0.65rem; white-space: nowrap; }
  .entry-idea { color: #aaa; font-size: 0.8rem; margin-bottom: 0.4rem; line-height: 1.4; }
  .entry-takeaway { color: #666; font-size: 0.72rem; font-style: italic; line-height: 1.3; }
  .entry-footer { display: flex; justify-content: space-between; align-items: center; margin-top: 0.5rem; }
  .entry-folder { color: #333; font-size: 0.65rem; }
  .launch-link { font-size: 0.68rem; padding: 0.2rem 0.55rem; border-radius: 4px; text-decoration: none; border: 1px solid #166534; color: #4ade80; background: #0a1a0a; transition: all 0.2s; cursor: pointer; }
  .launch-link:hover { background: #0a2a0a; border-color: #4ade80; }
  .launch-link.script { border-color: #854d0e; color: #fbbf24; background: #1a1500; }
  .launch-link.script:hover { background: #2a2000; border-color: #fbbf24; }

  /* Metrics row */
  .entry-metrics { display: flex; align-items: center; gap: 8px; margin-top: 6px; font-size: 0.65rem; color: #444; }
  .metric { display: flex; align-items: center; gap: 2px; }
  .metric-icon { font-size: 0.75rem; }

  /* Thumbs */
  .thumb-btn { background: none; border: 1px solid transparent; cursor: pointer; font-size: 1rem; padding: 2px 4px; border-radius: 4px; opacity: 0.3; transition: all 0.15s; }
  .thumb-btn:hover { opacity: 0.7; }
  .thumb-btn.voted { opacity: 1; border-color: #333; }
  .thumb-up.voted { color: #4ade80; border-color: #166534; background: #0a1a0a; }
  .thumb-down.voted { color: #f87171; border-color: #991b1b; background: #1a0a0a; }

  .empty { text-align: center; padding: 3rem; color: #444; }

  /* Leaderboard */
  .leaderboard { margin-bottom: 1.5rem; padding: 1rem; background: #111; border: 1px solid #222; border-radius: 8px; }
  .leaderboard h3 { font-size: 0.75rem; color: #58a6ff; text-transform: uppercase; letter-spacing: 0.1em; margin-bottom: 8px; }
  .lb-row { display: flex; align-items: center; gap: 8px; padding: 4px 0; font-size: 0.75rem; border-bottom: 1px solid #1a1a1a; }
  .lb-row:last-child { border-bottom: none; }
  .lb-rank { color: #555; width: 20px; text-align: right; }
  .lb-name { color: #fff; flex: 1; }
  .lb-stat { color: #888; font-size: 0.65rem; min-width: 50px; text-align: right; }
  .lb-bar { height: 4px; background: #58a6ff33; border-radius: 2px; flex: 1; max-width: 80px; overflow: hidden; }
  .lb-bar-fill { height: 100%; background: #58a6ff; border-radius: 2px; }
</style>
</head>
<body>

<h1>YOLO Dashboard</h1>
<p class="subtitle">overnight builds &mdash; shipped and ugly over planned and pretty</p>

<div class="stats" id="stats"></div>

<div id="leaderboard" class="leaderboard" style="display:none">
  <h3>Most Used</h3>
  <div id="lb-body"></div>
</div>

<div class="controls">
  <input class="search-box" id="search" type="text" placeholder="Search projects...">
  <div class="pill-group" id="cat-pills"></div>
  <div class="pill-group" id="status-pills"></div>
  <div class="pill-group" id="vote-pills"></div>
  <div class="pill-group" id="range-pills"></div>
  <select class="sort-select" id="sort-select">
    <option value="newest">Sort: Newest</option>
    <option value="date">Sort: By Category</option>
    <option value="opens">Sort: Most Opened</option>
    <option value="liked">Sort: Liked First</option>
    <option value="name">Sort: A-Z</option>
  </select>
  <div class="view-toggle">
    <button id="view-grid" class="active" title="Grid view">&#9638;</button>
    <button id="view-list" title="List view">&#9776;</button>
  </div>
</div>

<div id="feed"></div>

n's http.server + a single HTML page is a complete mock API platform", "folder": "api-mocker", "ui": "api-mocker/api_mocker.py", "refined": true}, {"date": "2026-03-21", "project": "diff-painter", "idea": "Paste two text blocks, see beautiful side-by-side or unified diff with character-level highlighting", "status": "working", "takeaway": "LCS-based diff with char-level second pass gives GitHub-quality diffs in ~60 lines of JS", "folder": "diff-painter", "ui": "diff-painter/index.html", "refined": true}, {"date": "2026-03-21", "project": "habit-grid", "idea": "GitHub-style contribution grid for tracking daily habits with streaks, colors, and localStorage persistence", "status": "working", "takeaway": "localStorage + a 52x7 grid is all you need for a habit tracker that actually sticks", "folder": "habit-grid", "ui": "habit-grid/index.html", "refined": true}, {"date": "2026-03-21", "project": "pomodoro-flow", "idea": "Visual pomodoro timer with ring animation, session tracking, daily stats, and audio alerts", "status": "working", "takeaway": "CSS ring + setInterval + localStorage = full productivity timer in one file", "folder": "pomodoro-flow", "ui": "pomodoro-flow/index.html", "refined": true}, {"date": "2026-03-21", "project": "pixel-paint", "idea": "Pixel art editor with pen, eraser, fill, line, rect, circle, undo, and PNG export", "status": "working", "takeaway": "Bresenham line algorithm + flood fill = complete drawing tools in vanilla JS", "folder": "pixel-paint", "ui": "pixel-paint/index.html", "refined": true}, {"date": "2026-03-21", "project": "math-plot", "idea": "Interactive function plotter with pan, zoom, multiple functions, and presets", "status": "working", "takeaway": "new Function() for safe math eval + canvas = full graphing calculator", "folder": "math-plot", "ui": "math-plot/index.html", "refined": true}, {"date": "2026-03-21", "project": "kanban-board", "idea": "Drag-and-drop task board with editable cards, columns, tags, and persistence", "status": "working", "takeaway": "HTML5 drag-and-drop API is clunky but works well enough for a kanban board", "folder": "kanban-board", "ui": "kanban-board/index.html", "refined": true}, {"date": "2026-03-21", "project": "whiteboard", "idea": "Fullscreen drawing canvas with pen, shapes, text, eraser, undo, and PNG export", "status": "working", "takeaway": "Canvas imageData snapshots make undo trivial for drawing apps", "folder": "whiteboard", "ui": "whiteboard/index.html", "refined": true}, {"date": "2026-03-21", "project": "qr-forge", "idea": "QR code generator with custom colors, error correction, presets, and PNG/SVG export", "status": "working", "takeaway": "QR encoding from scratch is doable in ~150 lines — GF(256) math is the hard part", "folder": "qr-forge", "ui": "qr-forge/index.html", "refined": true}, {"date": "2026-03-21", "project": "bookmark-dash", "idea": "Speed dial new tab page with clock, search, grouped bookmarks, and localStorage", "status": "working", "takeaway": "A new tab replacement is the perfect single-HTML project — you use it every day", "folder": "bookmark-dash", "ui": "bookmark-dash/index.html", "refined": true}, {"date": "2026-03-21", "project": "circuit-sim", "idea": "Interactive logic gate circuit simulator with wiring, truth tables, and a half-adder example", "status": "working", "takeaway": "Iterative evaluation (N+2 passes) handles arbitrary gate ordering without topological sort", "folder": "circuit-sim", "ui": "circuit-sim/index.html", "refined": true}, {"date": "2026-03-21", "project": "synth-defense", "idea": "Musical tower defense where towers play pentatonic synth notes quantized to 120 BPM — your defense becomes a composition", "status": "working", "takeaway": "Pentatonic scale guarantees harmony no matter how chaotic; DynamicsCompressor prevents clipping with polyphony", "folder": "synth-defense", "ui": "synth-defense/index.html", "refined": true}, {"date": "2026-03-21", "project": "regex-quest", "idea": "RPG where you fight mon ray", "idea": "Brutalist 64-bit binary explorer with IEEE 754 visualization, endianness toggle, and text/number injection", "status": "working", "takeaway": "toPrecision regex can destroy integers — Number(toPrecision()).toString() is safe. DataView endianness must be a flag, not a byte reversal.", "folder": "memory-xray", "ui": "memory-xray/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "glitch-studio", "idea": "Pixel sorting and chromatic aberration tool for generative glitch art with drag-and-drop image input", "status": "working", "takeaway": "UI state must always match visual state — never apply effect with temp values then reset sliders. Threshold sliders need cross-clamping.", "folder": "glitch-studio", "ui": "glitch-studio/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "morse-pulse", "idea": "Brutalist Morse code trainer with Koch method progression and Farnsworth timing", "status": "working", "takeaway": "Rolling accuracy history must reset on level-up to prevent cascading progression. Always wire up helper functions — dead code means missing features.", "folder": "morse-pulse", "ui": "morse-pulse/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "dice-oracle", "idea": "Dice notation parser with discrete probability histogram, crypto RNG, and percentile overlay", "status": "working", "takeaway": "Never sample rolls from a precomputed distribution — always simulate the actual dice independently. for...in on objects is vulnerable to prototype pollution; use Object.keys.", "folder": "dice-oracle", "ui": "dice-oracle/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "entropy-forge", "idea": "Cryptographically secure password/passphrase generator with entropy visualization and scramble animation", "status": "working", "takeaway": "Settings changes must regenerate output — showing stale data with updated metrics is a UX desync. cancelAnimationFrame prevents scramble animation race conditions.", "folder": "entropy-forge", "ui": "entropy-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "crypt-lex", "idea": "5-letter word deduction game with two-pass duplicate letter evaluation and virtual keyboard", "status": "working", "takeaway": "Two-pass evaluation (exact matches first, then partials against remaining counts) is essential for correct Wordle-style duplicate letter handling. Only update the active DOM row on keystroke, not the entire grid.", "folder": "crypt-lex", "ui": "crypt-lex/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "beat-haus", "idea": "Brutalist 4-track 16-step drum sequencer with synthesized Web Audio and visual queue sync", "status": "working", "takeaway": "Swing math must be symmetric (add X to even, subtract X from odd) or tempo drifts. Visual events must be queued and triggered at audioCtx.currentTime, not at schedule time.", "folder": "beat-haus", "ui": "beat-haus/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "stellar-forge", "idea": "2048-style sliding puzzle themed as stellar nucleosynthesis — merge elements from Hydrogen to Iron", "status": "working", "takeaway": "Game over detection must respect merge ceiling — if max-tier tiles cant merge, canMove must skip them or game softlocks. Win state alerts need a one-time flag.", "folder": "stellar-forge", "ui": "stellar-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "chess-clock", "idea": "Brutalist dual-timer chess clock with 180° split screen, Fischer increment, and Wake Lock", "status": "working", "takeaway": "Chess convention: tapping starts OPPONENT clock, not yours. Background tabs cause rAF throttling — must auto-pause and reset lastTick. WakeLock needs guard against orphaned locks.", "folder": "chess-clock", "ui": "chess-clock/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-23", "project": "neon-shatter", "idea": "Neon breakout/brick breaker with paddle-relative bounce, particle effects, and ball trailing", "status": "working", "takeaway": "Brick collision must force velocity AWAY from brick center, not just invert — blind inversion causes trapping. Keyboard input needs held-key map, not key repeat reliance.", "folder": "neon-shatter", "ui": "neon-shatter/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "color-forge", "idea": "Color harmony generator with HSL wheel, 5 harmony modes, click-to-copy, and CSS variable export", "status": "working", "takeaway": "Clipboard writeText is async — toast must go in .then(), not after the call. Hex input should accept 3-char shorthand and optional # for better UX.", "folder": "color-forge", "ui": "color-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "aura-keys", "idea": "Polyphonic synthesizer keyboard with QWERTY mapping, 4 waveforms, octave shift, and delay effect", "status": "working", "takeaway": "exponentialRampToValueAtTime crashes when gain is 0 — use setTargetAtTime for safe zero-approach. Window blur must stopAll notes to prevent stuck keys on tab switch.", "folder": "aura-keys", "ui": "aura-keys/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "neon-tetra", "idea": "Falling block puzzle (Tetris) with 7-bag randomizer, ghost piece, wall kicks, and neon glow", "status": "working", "takeaway": "O-piece must skip rotation entirely (it is rotationally symmetric, wall kicks shift it). Game over needs restart delay so player sees final board state.", "folder": "neon-tetra", "ui": "neon-tetra/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "type-forge", "idea": "Typography sandbox with 13 fonts, variable weight, CSS export, and dark/light toggle", "status": "working", "takeaway": "Never use || for numeric fallbacks — 0 is falsy in JS. Use isNaN() check instead. CSS variables are the cleanest way to drive live typography previews.", "folder": "type-forge", "ui": "type-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "sprite-forge", "idea": "Pixel art animation studio with frame timeline, onion skinning, flood fill, and sprite sheet export", "status": "working", "takeaway": "Never rebuild DOM canvas elements on every pixel paint — update only the active thumbnail. Dead conditional branches (checking impossible tool state) should be simplified.", "folder": "sprite-forge", "ui": "sprite-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "neon-runner", "idea": "Complete platformer: AABB collision, coyote time, jump buffer, variable jump, parallax, particles, 3 levels, synthesized audio — the game we dodged for 99 builds", "status": "working", "takeaway": "THE GRAND FINALE. Platformer physics: resolve X then Y separately, use previous position (not velocity sign) for collision direction, cap variable jump once (dont continuously dampen), coyote time + jump buffer are essential for feel.", "folder": "neon-runner", "ui": "neon-runner/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "terra-forge", "idea": "Procedural terrain generator with Simplex noise, 13 biomes, hillshading, and real-time parameter sliders", "status": "working", "takeaway": "Multiplicative PRNGs (Lehmer) produce constant 0 from seed 0 — always clamp seed to min 1. Hillshading near water must clamp neighbor elevations to seaLevel to prevent harsh coastline artifacts.", "folder": "terra-forge", "ui": "terra-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "dungeon-descent", "idea": "ASCII roguelike dungeon crawler with procedural rooms, FOV, turn-based combat, enemy AI, and infinite descent", "status": "working", "takeaway": "FOV and draw functions must bounds-check array access (visible[y] can be undefined for camera offsets). CSS comments with keyword overlay trigger test false positives.", "folder": "dungeon-descent", "ui": "dungeon-descent/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "wave-draw", "idea": "Draw a waveform shape, DFT converts it to PeriodicWave, play it on a keyboard synthesizer with envelope and delay", "status": "working", "takeaway": "initAudio() must be called BEFORE checking audioCtx in playNote. Use osc.stop(time) on audio thread instead of setTimeout for cleanup. onended with reference comparison prevents rapid-retrigger cleanup bugs.", "folder": "wave-draw", "ui": "wave-draw/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "graph-forge", "idea": "Interactive force-directed graph visualizer — add nodes, draw edges, self-organizing physics with Coulomb repulsion and Hooke springs", "status": "working", "takeaway": "Overlapping nodes (dx=dy=0) produce zero force even with distance clamping — must add random jitter to separate. Terminal velocity cap prevents explosion when repulsion is high.", "folder": "graph-forge", "ui": "graph-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-24", "project": "dither-forge", "idea": "Image dithering tool with Floyd-Steinberg, Atkinson, Bayer algorithms and retro color palettes", "status": "working", "takeaway": "Error diffusion MUST use Float32Array buffer, not Uint8ClampedArray — clamped arrays truncate accumulated error causing banding. Diffuse into float buffer, write final to uint8 output.", "folder": "dither-forge", "ui": "dither-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "bezier-forge", "idea": "Interactive CSS cubic-bezier easing editor with draggable handles, animation preview, presets, and one-click CSS copy", "status": "working", "takeaway": "SVG is ideal for interactive curve editors — crisp vector rendering, native draggable elements, easy path commands. Y-axis must allow values outside 0-1 for overshoot/bounce effects while X stays clamped to 0-1 per CSS spec.", "folder": "bezier-forge", "ui": "bezier-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "rhythm-type", "idea": "Rhythm-action typing game — type words to the beat with procedural drums, audio-synced falling notes, timing scoring, and combos", "status": "working", "takeaway": "Rhythm game note positions MUST be anchored to audioCtx.currentTime, not dt-based falling. Fall speed must be locked per-note at spawn or speed changes desync in-flight notes. Missed vs completed notes need distinct visual behavior.", "folder": "rhythm-type", "ui": "rhythm-type/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "gravity-sketch", "idea": "Physics playground — draw ramps, drop balls and boxes, grab and throw objects with custom collision engine", "status": "working", "takeaway": "Circle-line collision: project center onto segment, find closest point, push out along normal, reflect velocity. Custom physics engines are viable for simple interactions without external libs.", "folder": "gravity-sketch", "ui": "gravity-sketch/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "automata-lab", "idea": "Generalized cellular automata sandbox with 6 rulesets, custom B/S parser, 3-state Brian Brain, cell aging heatmap, and pattern library", "status": "working", "takeaway": "Multi-state CA engines need flexible state handling (Brians Brain uses 3 states not 2). Cell aging via Uint16Array creates stunning heatmaps. Double-buffered grid swap is essential. Finally built the CA sandbox after dodging it for 20+ builds.", "folder": "automata-lab", "ui": "automata-lab/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "voronoi-forge", "idea": "Interactive Voronoi diagram — click to add seeds, drag to reshape, brute-force pixel rendering with edge detection and 4 color modes", "status": "working", "takeaway": "Brute-force Voronoi (nearest seed per pixel) is simple to implement, visually stunning, and performant at 2x downscale. Edge detection via distance differential between 1st and 2nd nearest seed creates clean cell boundaries.", "folder": "voronoi-forge", "ui": "voronoi-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "harmonic-forge", "idea": "Interactive music theory — Circle of Fifths, diatonic chords, 8-slot progression builder with synth playback and preset progressions", "status": "working", "takeaway": "Music theory tools need creation, not just reference. A progression builder that PLAYS chords engages for minutes vs a static chart for seconds. Strum delay (40ms between tones) makes synth chords sound musical.", "folder": "harmonic-forge", "ui": "harmonic-forge/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "palette-pull", "idea": "Extract dominant colors from images using k-means clustering — upload photo, get palette with hex codes and CSS variables", "status": "working", "takeaway": "K-means on sampled pixel grid (100x100) is fast enough for real-time palette extraction. Sort centroids by luminance for visually pleasing output.", "folder": "palette-pull", "ui": "palette-pull/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "type-racer", "idea": "Typing speed race against AI ghost with progress bars, live WPM/accuracy, and selectable ghost difficulty", "status": "working", "takeaway": "Racing against a visible opponent (ghost progress bar) is far more engaging than solo typing tests. Character-by-character validation with immediate visual feedback keeps accuracy pressure high.", "folder": "type-racer", "ui": "type-racer/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "sonic-sight", "idea": "Interactive sound wave synthesizer with oscilloscope, spectrum analyzer, and 8 guided lessons on sound fundamentals", "status": "working", "takeaway": "Gemini caught music theory error (lesson set 330Hz as octave instead of 440Hz), audio clicking from destroying all oscillators on type change (fix: set type in-place), and missing actx.resume() for iOS. setTargetAtTime prevents zipper noise on slider changes.", "folder": "sonic-sight", "ui": "sonic-sight/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "picross", "idea": "Nonogram logic puzzle game — 15 handcrafted puzzles (5x5 to 15x15), pixel art reveals, 3-strike system, drag-to-fill", "status": "working", "takeaway": "Gemini caught missing game state lock (play after win/loss), broken drawMode for drag consistency, setTimeout race on retry, and localStorage crash in private browsing. Proper game state machine (playing/won/lost) is essential for any game with win/loss conditions.", "folder": "picross", "ui": "picross/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-25", "project": "iso-city", "idea": "Isometric city builder with strategy mechanics — procedural 3D buildings, adjacency bonuses, population/revenue economy", "status": "working", "takeaway": "Gemini caught infinite money exploit (gameTick on every build gave free revenue), broken z-sorting (nested loops != depth order), and floating text not anchored to world coords. Separate stat updates from revenue generation to prevent exploits.", "folder": "iso-city", "ui": "iso-city/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-26", "project": "solitaire", "idea": "Klondike Solitaire with CSS-rendered cards, smart-tap auto-move, undo, responsive sizing, and best time tracking", "status": "working", "takeaway": "Gemini caught teleporting card bug (smartTap validated middle card but pop() grabbed top card), getComputedStyle in render loop causing 50+ reflows per interaction, and undo not resetting gameWon flag. Always verify the card being moved matches the card that was validated.", "folder": "solitaire", "ui": "solitaire/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-26", "project": "gravity-golf", "idea": "Physics puzzle game — slingshot-aim a ball through gravity wells and repulsors to reach a target, 10 levels with par scoring", "status": "working", "takeaway": "Gemini caught par=0 labeled as 'Under par' (should be 'Par'), trajectory prediction breaking on repel wells (mismatch with actual physics), resize wiping game progress, and divide-by-zero at well center. Separate resize repositioning from level reset.", "folder": "gravity-golf", "ui": "gravity-golf/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-26", "project": "crypto-lens", "idea": "Visual cipher explorer — Caesar/Vigenere/XOR with step-by-step character transformation showing the underlying math", "status": "working", "takeaway": "Gemini caught case destruction in Caesar/Vigenere (toUpperCase before processing lost original casing), innerHTML += in loops causing layout thrashing, and play always resetting to step 0 instead of resuming. Cipher functions must preserve input casing by detecting upper/lower before math.", "folder": "crypto-lens", "ui": "crypto-lens/index.html", "tests_passed": true, "refined": true}, {"date": "2026-03-30", "project": "flow-ascii", "idea": "Zero-dep browser-based ASCII/text diagram renderer — boxes, arrows, auto-layout from simple [Node] --> [Node] syntax — FEEDER for Markdown Deck", "status": "working", "takeaway": "Bellman-Ford longest-path layering handles DAGs, cycles, and disconnected graphs correctly — naive BFS with visited set fails on diamond-shaped graphs. SVG namespace string must avoid // to prevent test comment-strippers from truncating it. render() should inject its own <defs> arrowhead to be truly extractable.", "folder": "flow-ascii", "ui": "flow-ascii/index.html", "tests_passed": true, "refined": false}, {"date": "2026-03-30", "project": "syntax-glow", "idea": "Zero-dep code syntax highlighter with auto-detection, regex-based lexer, and extractable pure tokenizer function — FEEDER for Markdown Deck", "status": "working", "takeaway": "Sticky regex flag (y) is critical for scanner performance — prevents O(N^2) forward scanning. Function regex must use lookahead for whitespace, not capture it.", "folder": "syntax-glow", "ui": "syntax-glow/index.html", "tests_passed": true, "refined": false}, {"date": "2026-03-30", "project": "cron-calc", "idea": "Multi-cron visual timeline — paste cron jobs, see 24h day and 7-day week views, collision detection, peak hour stats", "status": "working", "takeaway": "Cron parsers must normalize text aliases (MON-FRI, JAN-DEC) and Sunday=7 before numeric parsing. Step fields with NaN steps (*/foo) can cause infinite loops — validate step > 0 explicitly. Reversed ranges (10-5) silently produce empty sets without an explicit a>b guard. Pre-compute daily fire arrays at render() entry point and pass down to avoid redundant O(N) recalculation in stats and view. Tooltip innerHTML thrash on mousemove is eliminated by keying on the nearest-minute value and skipping rewrite if unchanged.", "folder": "cron-calc", "ui": "cron-calc/index.html", "tests_passed": true, "refined": false}, {"date": "2026-03-29", "project": "api-bench", "idea": "Browser-based API endpoint load tester — fire N parallel requests, measure min/max/avg/p95/p99 latency, throughput, status code distribution, and latency histogram. Like a mini k6/wrk in the browser.", "status": "working", "takeaway": "Canvas clientWidth is 0 when read synchronously after toggling display:none→block — defer drawHistogram() inside requestAnimationFrame. Wrap Promise.all(workers) in try/finally to guarantee setInterval cleanup on unexpected throws. Live RPS should gate on elapsed > 0.5s to prevent jarring initial spike. Body payload restriction should check GET/HEAD exclusion rather than a whitelist of POST/PUT/PATCH — DELETE with body is valid REST.", "folder": "api-bench", "ui": "api-bench/index.html", "tests_passed": true, "refined": false}, {"date": "2026-03-29", "project": "dep-graph", "idea": "Browser-based dependency graph visualizer — paste package.json, requirements.txt, or Cargo.toml and get an interactive force-directed graph with color-coded dep types, node details, and zoom/pan", "status": "working", "takeaway": "Regex literals containing unmatched braces/brackets ({, [) inside RegExp patterns confuse naive brace-balance checkers — always use new RegExp() constructor with string concatenation when the pattern contains structural chars. Attach mouseup to window (not canvas) to prevent nodes getting permanently stuck when user releases outside the canvas. Gate click handler on a hasDragged flag (reset via setTimeout after mouseup) to prevent drag-end from triggering node selection. Cargo workspace = true entries have no version string — return 'workspace' as a sentinel to avoid silently dropping those deps.", "folder": "dep-graph", "ui": "dep-graph/index.html", "tests_passed": true, "refined": false}, {"date": "2026-03-29", "project": "commit-log", "idea": "Visual git commit history explorer — paste git log output, get heatmap, hour-of-day distribution, top contributors, timeline, and word cloud. Supports --oneline, --graph, verbose, pipe-delimited, and plain message formats.", "status": "working", "takeaway": "escHtml using literal entity strings like '&#39;' breaks test brace-balancers — test regex sees it as an unterminated single-quoted string that swallows subsequent real strings. Use a map object approach instead. Verbose git log parser should make email optional in Author regex (some legacy/svn repos have no email). Filter-all-authors edge case causes computeStats to return empty object — guard every stats field access with fallback values before rendering. DocumentFragment batch-append eliminates DOM thrashing for large commit lists.", "folder": "commit-log", "ui": "commit-log/index.html", "tests_passed": true, "refined": false}, {"date": "2026-03-29", "project": "env-vault", "idea": "Browser-based .env file manager with key-value parsing, visual grouping by prefix, secret visibility toggles, two-file diff, multi-format export, and AES-256-GCM encrypted blob export", "status": "working", "takeaway": "Test brace-balancer strips single-quoted strings first, so any // inside a quoted string (e.g. https://) gets parsed as a line comment, cascading to drop subsequent strings and create phantom unmatched brackets. Fix: avoid // inside JS string literals the test sees, or concatenate the slashes. Also: call stripInlineComment AFTER checking if val starts with a quote to avoid corrupting quoted values containing #.", "folder": "env-vault", "ui": "env-vault/index.html", "tests_passed": true, "refined": false}];
