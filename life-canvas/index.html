<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Life Canvas</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #000; overflow: hidden; touch-action: none; -webkit-tap-highlight-color: transparent; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; }
#controls { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(0,0,0,0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); border-top: 1px solid rgba(255,255,255,0.06); padding: 10px 14px; display: flex; flex-wrap: wrap; gap: 6px; align-items: center; z-index: 10; }
.ctrl-btn { padding: 5px 12px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: rgba(255,255,255,0.5); border-radius: 14px; font-size: 0.65rem; cursor: pointer; font-family: inherit; }
.ctrl-btn:active { background: rgba(255,255,255,0.15); color: #fff; }
.ctrl-btn.active { border-color: #0ff; color: #0ff; }
input[type=range] { width: 70px; height: 3px; -webkit-appearance: none; background: rgba(255,255,255,0.1); border-radius: 2px; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #0ff; cursor: pointer; }
#gen { font-size: 0.6rem; color: rgba(255,255,255,0.2); font-family: monospace; margin-left: auto; }
#presets { display: none; position: fixed; bottom: 50px; left: 10px; right: 10px; background: rgba(0,0,0,0.9); border: 1px solid rgba(255,255,255,0.08); border-radius: 10px; padding: 10px; z-index: 15; }
#presets.show { display: block; }
#presets h3 { font-size: 0.65rem; color: rgba(255,255,255,0.3); margin-bottom: 6px; letter-spacing: 0.1em; }
.preset-btn { display: inline-block; padding: 4px 10px; margin: 2px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08); color: rgba(255,255,255,0.4); border-radius: 10px; font-size: 0.6rem; cursor: pointer; font-family: inherit; }
.preset-btn:active { border-color: #0ff; color: #0ff; }





/* UI-UPGRADE:START */
/* Injected by sync_project_ui.py — accessibility override.
   Uses !important to beat project-specific illegible "retro terminal"
   styling (grey-on-black body text, 0.38rem fonts, etc.). max() preserves
   hierarchy for elements already larger than the floor. */
html { font-size: 19px !important; }
body {
  line-height: 1.65 !important;
  color: #e8e8e8 !important;
  -webkit-font-smoothing: antialiased;
}
/* Enforce minimum 15px on all readable text containers. max() means any
   project rule asking for MORE than 15px wins; anything smaller gets lifted. */
body, p, div, span, li, td, th, label, a,
dl, dt, dd, blockquote, caption, code, pre, kbd, samp, figcaption {
  font-size: max(15px, 1em) !important;
}
/* Form controls get larger minimum + bigger tap targets */
input, button, select, textarea {
  font-size: max(16px, 1rem) !important;
  min-height: 40px !important;
  line-height: 1.4 !important;
}
/* Heading floor — preserves larger intentional sizes via max() */
h1 { font-size: max(26px, 1.6em) !important; }
h2 { font-size: max(22px, 1.35em) !important; }
h3 { font-size: max(19px, 1.2em) !important; }
h4, h5, h6 { font-size: max(17px, 1.05em) !important; }
/* Fix low-contrast "dim" text across common class naming conventions.
   Replaces #333/#444/#555/#666 greys with #b8b8b8 (contrast ~7.6:1 on #000). */
.dim, .muted, .hint, .help, .subtitle, .secondary, .meta, .sub,
.small, .tiny, .mini, .note, .footer, .desc, .description,
[class*="-dim"], [class*="-muted"], [class*="-hint"], [class*="-help"],
[class*="-meta"], [class*="-sub"], [class*="-label"], [class*="-desc"],
[class*="-note"] {
  color: #b8b8b8 !important;

</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <button class="ctrl-btn" id="btn-play">Play</button>
  <button class="ctrl-btn" id="btn-step">Step</button>
  <button class="ctrl-btn" id="btn-clear">Clear</button>
  <button class="ctrl-btn" id="btn-patterns">Patterns</button>
  <input type="range" id="sl-speed" min="1" max="30" value="10">
  <span id="gen">Gen 0</span>
</div>
<div id="presets">
  <h3>STAMP A PATTERN</h3>
  <button class="preset-btn" data-pattern="glider">Glider</button>
  <button class="preset-btn" data-pattern="lwss">Spaceship</button>
  <button class="preset-btn" data-pattern="pulsar">Pulsar</button>
  <button class="preset-btn" data-pattern="gosper">Gosper Gun</button>
  <button class="preset-btn" data-pattern="rpentomino">R-Pentomino</button>
  <button class="preset-btn" data-pattern="random">Random Fill</button>
</div>

<script>
(function() {
'use strict';

// ============ CONFIG ============
var CELL = 10;
var GHOST_DECAY = 0.03;

// ============ STATE ============
var canvas = document.getElementById('c');
var ctx = canvas.getContext('2d');
var cols, rows;
var grid, nextGrid, ghostGrid;
var generation = 0;
var playing = false;
var speed = 10;
var animId = null;
var lastTick = 0;
var painting = false;
var paintValue = 1;
var stampPattern = null;
var lastMouseCell = null;

// ============ PATTERNS ============
var PATTERNS = {
  glider: [[0,0],[1,0],[2,0],[2,-1],[1,-2]],
  lwss: [[0,0],[1,0],[2,0],[3,0],[4,-1],[4,-3],[0,-1],[0,-3],[1,-4],[3,-4]],
  rpentomino: [[1,0],[2,0],[0,1],[1,1],[1,2]],
  pulsar: (function() {
    var p = [];
    var offsets = [[2,0],[3,0],[4,0],[2,5],[3,5],[4,5],[0,2],[0,3],[0,4],[5,2],[5,3],[5,4]];
    for (var q = 0; q < 4; q++) {
      var sx = (q % 2 === 0) ? 1 : -1;
      var sy = (q < 2) ? 1 : -1;
      for (var i = 0; i < offsets.length; i++) {
        p.push([offsets[i][0] * sx, offsets[i][1] * sy]);
      }
    }
    return p;
  })(),
  gosper: [
    [0,4],[0,5],[1,4],[1,5],
    [10,4],[10,5],[10,6],[11,3],[11,7],[12,2],[12,8],[13,2],[13,8],
    [14,5],[15,3],[15,7],[16,4],[16,5],[16,6],[17,5],
    [20,2],[20,3],[20,4],[21,2],[21,3],[21,4],[22,1],[22,5],
    [24,0],[24,1],[24,5],[24,6],
    [34,2],[34,3],[35,2],[35,3]
  ]
};

// ============ INIT ============
function resize() {
  var w = window.innerWidth;
  var h = window.innerHeight - 50;
  cols = Math.floor(w / CELL);
  rows = Math.floor(h / CELL);
  canvas.width = cols * CELL;
  canvas.height = rows * CELL;
  initGrids();
}

function initGrids() {
  grid = new Int16Array(cols * rows);
  nextGrid = new Int16Array(cols * rows);
  ghostGrid = new Float32Array(cols * rows);
  generation = 0;
  updateGenDisplay();
}

var resizeTimer;
window.addEventListener('resize', function() {
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(resize, 200);
});
resize();

// ============ SIMULATION ============
function idx(x, y) { return y * cols + x; }

function step() {
  for (var y = 0; y < rows; y++) {
    for (var x = 0; x < cols; x++) {
      var neighbors = 0;
      for (var dy = -1; dy <= 1; dy++) {
        for (var dx = -1; dx <= 1; dx++) {
          if (dx === 0 && dy === 0) continue;
          var nx = (x + dx + cols) % cols; // Toroidal wrap
          var ny = (y + dy + rows) % rows;
          if (grid[idx(nx, ny)] > 0) neighbors++;
        }
      }
      var i = idx(x, y);
      var alive = grid[i] > 0;
      if (alive && (neighbors === 2 || neighbors === 3)) {
        nextGrid[i] = grid[i] + 1; // Age up
      } else if (!alive && neighbors === 3) {
        nextGrid[i] = 1; // Born
      } else {
        if (alive) ghostGrid[i] = 0.5; // Leave ghost
        nextGrid[i] = 0; // Dead
      }
    }
  }
  // Swap grids
  var tmp = grid;
  grid = nextGrid;
  nextGrid = tmp;
  // Clear nextGrid for next step
  nextGrid.fill(0);
  generation++;
  updateGenDisplay();
}

// ============ RENDERING ============
function render() {
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  for (var y = 0; y < rows; y++) {
    for (var x = 0; x < cols; x++) {
      var i = idx(x, y);
      var age = grid[i];
      var ghost = ghostGrid[i];

      if (age > 0) {
        // Living cell: color by age
        // Newborn (1) = bright cyan, aging → deep purple
        var hue = 180 + Math.min(age * 3, 120); // 180 (cyan) → 300 (purple)
        var lightness = Math.max(20, 70 - age * 2);
        ctx.fillStyle = 'hsl(' + hue + ', 80%, ' + lightness + '%)';
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
      } else if (ghost > 0.01) {
        // Ghost trail (fading)
        ctx.fillStyle = 'rgba(100, 60, 180, ' + ghost + ')';
        ctx.fillRect(x * CELL + 1, y * CELL + 1, CELL - 2, CELL - 2);
        ghostGrid[i] -= GHOST_DECAY;
        if (ghostGrid[i] < 0) ghostGrid[i] = 0;
      }
    }
  }

  // Stamp preview at mouse position
  if (stampPattern && lastMouseCell) {
    ctx.fillStyle = 'rgba(0,255,255,0.4)';
    for (var si = 0; si < stampPattern.length; si++) {
      var spx = ((lastMouseCell.x + stampPattern[si][0]) % cols + cols) % cols;
      var spy = ((lastMouseCell.y + stampPattern[si][1]) % rows + rows) % rows;
      ctx.fillRect(spx * CELL + 1, spy * CELL + 1, CELL - 2, CELL - 2);
    }
  }
}

function updateGenDisplay() {
  document.getElementById('gen').textContent = 'Gen ' + generation;
}

// ============ GAME LOOP ============
function loop(now) {
  if (playing) {
    var interval = 1000 / speed;
    if (now - lastTick >= interval) {
      step();
      lastTick = now;
    }
  }
  render();
  animId = requestAnimationFrame(loop);
}
requestAnimationFrame(loop);

// ============ INPUT ============
function cellFromEvent(e) {
  var rect = canvas.getBoundingClientRect();
  var x = Math.floor((e.clientX - rect.left) / CELL);
  var y = Math.floor((e.clientY - rect.top) / CELL);
  if (x >= 0 && x < cols && y >= 0 && y < rows) return { x: x, y: y };
  return null;
}

canvas.addEventListener('pointerdown', function(e) {
  e.preventDefault();
  var cell = cellFromEvent(e);
  if (!cell) return;

  if (stampPattern) {
    placePattern(stampPattern, cell.x, cell.y);
    stampPattern = null;
    return;
  }

  painting = true;
  var i = idx(cell.x, cell.y);
  paintValue = grid[i] > 0 ? 0 : 1;
  grid[i] = paintValue;
});

canvas.addEventListener('pointermove', function(e) {
  e.preventDefault();
  lastMouseCell = cellFromEvent(e);
  if (!painting) return;
  if (lastMouseCell) grid[idx(lastMouseCell.x, lastMouseCell.y)] = paintValue;
});

canvas.addEventListener('pointerup', function() { painting = false; });
canvas.addEventListener('pointerleave', function() { painting = false; });
canvas.addEventListener('pointercancel', function() { painting = false; });

// Prevent scroll during drawing (scoped to canvas only)
canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
}, { passive: false });

// ============ CONTROLS ============
document.getElementById('btn-play').addEventListener('click', function() {
  playing = !playing;
  this.textContent = playing ? 'Pause' : 'Play';
  this.classList.toggle('active', playing);
  lastTick = performance.now();
});

document.getElementById('btn-step').addEventListener('click', function() {
  if (!playing) step();
});

document.getElementById('btn-clear').addEventListener('click', function() {
  grid.fill(0);
  ghostGrid.fill(0);
  generation = 0;
  updateGenDisplay();
});

document.getElementById('sl-speed').addEventListener('input', function() {
  speed = parseInt(this.value);
});

document.getElementById('btn-patterns').addEventListener('click', function() {
  document.getElementById('presets').classList.toggle('show');
});

document.querySelectorAll('.preset-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    var name = btn.dataset.pattern;
    document.getElementById('presets').classList.remove('show');
    if (name === 'random') {
      randomFill();
    } else {
      stampPattern = PATTERNS[name];
      // Will be placed on next canvas click
    }
  });
});

function placePattern(pattern, cx, cy) {
  for (var i = 0; i < pattern.length; i++) {
    var px = (cx + pattern[i][0] + cols) % cols;
    var py = (cy + pattern[i][1] + rows) % rows;
    grid[idx(px, py)] = 1;
  }
}

function randomFill() {
  for (var i = 0; i < grid.length; i++) {
    grid[i] = Math.random() < 0.25 ? 1 : 0;
  }
}

})();
</script>
