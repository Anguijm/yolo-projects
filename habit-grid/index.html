<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Habit Grid</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0a; color: #ccc; padding: 2rem; max-width: 900px; margin: 0 auto; }
h1 { font-size: 1.4rem; color: #fff; margin-bottom: 0.3rem; }
.sub { color: #555; font-size: 0.75rem; margin-bottom: 1.5rem; }
.toolbar { display: flex; gap: 0.5rem; margin-bottom: 1.5rem; align-items: center; flex-wrap: wrap; }
button { background: #1a1a1a; border: 1px solid #333; color: #999; padding: 0.35rem 0.7rem; border-radius: 4px; cursor: pointer; font-family: inherit; font-size: 0.7rem; }
button:hover { color: #fff; border-color: #555; }
button.primary { background: #0a2a0a; color: #4ade80; border-color: #166534; }
input[type="text"] { background: #111; border: 1px solid #333; color: #ccc; padding: 0.35rem 0.6rem; border-radius: 4px; font-family: inherit; font-size: 0.75rem; width: 180px; }
input[type="text"]:focus { outline: none; border-color: #4ade80; }
select { background: #111; border: 1px solid #333; color: #ccc; padding: 0.35rem 0.5rem; border-radius: 4px; font-family: inherit; font-size: 0.7rem; }
.habit-section { margin-bottom: 2rem; }
.habit-header { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.6rem; }
.habit-name { font-size: 0.9rem; color: #fff; cursor: pointer; }
.habit-name:hover { text-decoration: underline; }
.habit-streak { font-size: 0.7rem; color: #4ade80; }
.habit-total { font-size: 0.7rem; color: #555; }
.habit-delete { font-size: 0.6rem; color: #444; cursor: pointer; margin-left: auto; }
.habit-delete:hover { color: #f87171; }
.grid-container { overflow-x: auto; }
.grid-row { display: flex; align-items: center; gap: 0; }
.month-labels { display: flex; margin-bottom: 2px; padding-left: 28px; }
.month-label { font-size: 0.55rem; color: #444; }
.day-label { font-size: 0.5rem; color: #333; width: 24px; text-align: right; padding-right: 4px; }
.cell { width: 13px; height: 13px; margin: 1px; border-radius: 2px; cursor: pointer; transition: all 0.1s; }
.cell:hover { transform: scale(1.3); }
.cell-0 { background: #111; }
.cell-1 { background: #0a3a0a; }
.cell-2 { background: #0a5a0a; }
.cell-3 { background: #0a7a0a; }
.cell-4 { background: #4ade80; }
.stats-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(120px, 1fr)); gap: 0.8rem; margin-bottom: 1.5rem; }
.stat-card { background: #111; padding: 0.8rem; border-radius: 6px; border: 1px solid #1a1a1a; text-align: center; }
.stat-num { font-size: 1.3rem; font-weight: bold; color: #fff; }
.stat-label { font-size: 0.6rem; color: #555; text-transform: uppercase; margin-top: 0.1rem; }
.tooltip { position: fixed; background: #1a1a1a; border: 1px solid #333; border-radius: 4px; padding: 0.4rem 0.6rem; font-size: 0.7rem; pointer-events: none; z-index: 100; display: none; }



/* UI-UPGRADE:START */
/* Injected by sync_project_ui.py — readability bump. Additive at end so
   project-specific rules still win for intentional decorative text. */
html { font-size: 17px; }
body { line-height: 1.55; }
input, button, select, textarea {
  font-size: max(14px, 0.9rem);
  min-height: 32px;
}
/* UI-UPGRADE:END */
</style>
</head>
<body>

<h1>Habit Grid</h1>
<p class="sub">GitHub-style contribution grid for tracking daily habits</p>

<div class="toolbar">
  <input type="text" id="new-habit" placeholder="New habit name...">
  <select id="new-color">
    <option value="green">Green</option>
    <option value="blue">Blue</option>
    <option value="purple">Purple</option>
    <option value="orange">Orange</option>
    <option value="pink">Pink</option>
  </select>
  <button class="primary" onclick="addHabit()">Add Habit</button>
  <button onclick="exportData()">Export</button>
  <button onclick="importData()">Import</button>
</div>

<div class="stats-grid" id="stats"></div>
<div id="habits"></div>
<div class="tooltip" id="tooltip"></div>

<script>
const COLORS = {
  green:  ['#111', '#0a3a0a', '#0a5a0a', '#0a7a0a', '#4ade80'],
  blue:   ['#111', '#0a1a3a', '#0a2a5a', '#0a3a7a', '#60a5fa'],
  purple: ['#111', '#1a0a3a', '#2a0a5a', '#3a0a7a', '#a78bfa'],
  orange: ['#111', '#2a1a00', '#3a2a00', '#5a3a00', '#fb923c'],
  pink:   ['#111', '#2a0a1a', '#3a0a2a', '#5a0a3a', '#f472b6'],
};

const DAY_LABELS = ['','Mon','','Wed','','Fri',''];
const WEEKS = 52;

var parsedData = [];
try {
  parsedData = JSON.parse(localStorage.getItem('habit-grid-data') || '[]');
  if (!Array.isArray(parsedData)) parsedData = [];
} catch(e) { parsedData = []; }
let habits = parsedData;

function save() { try { localStorage.setItem('habit-grid-data', JSON.stringify(habits)); } catch(e) {} }

function localDate(d) {
  d = d || new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

function today() { return localDate(); }

function dateKey(weeksAgo, dayOfWeek) {
  const d = new Date();
  d.setDate(d.getDate() - d.getDay() - (weeksAgo * 7) + dayOfWeek);
  return localDate(d);
}

function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }

function getStreak(habit) {
  let streak = 0;
  const d = new Date();
  // Check today first
  if (habit.days[localDate(d)]) { streak++; }
  // Then walk backwards from yesterday
  d.setDate(d.getDate() - 1);
  while (true) {
    var key = localDate(d);
    if (habit.days[key]) { streak++; d.setDate(d.getDate() - 1); }
    else break;
  }
  return streak;
}

function getTotal(habit) {
  return Object.keys(habit.days).length;
}

function addHabit() {
  const name = document.getElementById('new-habit').value.trim();
  if (!name) return;
  const color = document.getElementById('new-color').value;
  habits.push({ id: Date.now(), name, color, days: {} });
  document.getElementById('new-habit').value = '';
  save(); render();
}

function toggleDay(habitId, dateStr) {
  const habit = habits.find(h => h.id === habitId);
  if (!habit) return;
  if (habit.days[dateStr]) delete habit.days[dateStr];
  else habit.days[dateStr] = 1;
  save(); render();
}

function deleteHabit(id) {
  if (!confirm('Delete this habit?')) return;
  habits = habits.filter(h => h.id !== id);
  save(); render();
}

function render() {
  // Stats
  const totalHabits = habits.length;
  const todayCount = habits.filter(h => h.days[today()]).length;
  const totalDays = habits.reduce((s, h) => s + getTotal(h), 0);
  const longestStreak = habits.reduce((s, h) => Math.max(s, getStreak(h)), 0);

  document.getElementById('stats').innerHTML = `
    <div class="stat-card"><div class="stat-num">${totalHabits}</div><div class="stat-label">Habits</div></div>
    <div class="stat-card"><div class="stat-num">${todayCount}/${totalHabits}</div><div class="stat-label">Done Today</div></div>
    <div class="stat-card"><div class="stat-num">${totalDays}</div><div class="stat-label">Total Check-ins</div></div>
    <div class="stat-card"><div class="stat-num">${longestStreak}</div><div class="stat-label">Best Streak</div></div>
  `;

  // Habits
  const el = document.getElementById('habits');
  if (habits.length === 0) {
    el.innerHTML = '<div style="color:#444;text-align:center;padding:3rem">No habits yet. Add one above.</div>';
    return;
  }

  el.innerHTML = habits.map(habit => {
    const colors = COLORS[habit.color] || COLORS.green;
    const streak = getStreak(habit);
    const total = getTotal(habit);

    // Build month labels
    let monthLabels = '<div class="month-labels">';
    let lastMonth = -1;
    for (let w = WEEKS - 1; w >= 0; w--) {
      const d = new Date();
      d.setDate(d.getDate() - d.getDay() - (w * 7));
      const m = d.getMonth();
      if (m !== lastMonth) {
        monthLabels += `<span class="month-label" style="width:${13 + 2}px">${d.toLocaleString('default',{month:'short'})}</span>`;
        lastMonth = m;
      } else {
        monthLabels += `<span style="width:${13 + 2}px"></span>`;
      }
    }
    monthLabels += '</div>';

    // Build grid (7 rows x 52 cols)
    let gridHtml = '';
    for (let dow = 0; dow < 7; dow++) {
      gridHtml += '<div class="grid-row">';
      gridHtml += `<span class="day-label">${DAY_LABELS[dow]}</span>`;
      for (let w = WEEKS - 1; w >= 0; w--) {
        const dk = dateKey(w, dow);
        const val = habit.days[dk] ? 4 : 0;
        gridHtml += `<div class="cell" style="background:${colors[val]}" data-habit="${habit.id}" data-date="${dk}" title="${dk}"></div>`;
      }
      gridHtml += '</div>';
    }

    return `<div class="habit-section">
      <div class="habit-header">
        <span class="habit-name">${escHtml(habit.name)}</span>
        <span class="habit-streak">${streak}d streak</span>
        <span class="habit-total">${total} total</span>
        <span class="habit-delete" onclick="deleteHabit(${habit.id})">delete</span>
      </div>
      <div class="grid-container">${monthLabels}${gridHtml}</div>
    </div>`;
  }).join('');

  // Cell click handlers
  document.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => {
      toggleDay(parseInt(cell.dataset.habit), cell.dataset.date);
    });
    cell.addEventListener('mouseenter', e => {
      const tt = document.getElementById('tooltip');
      const habit = habits.find(h => h.id === parseInt(cell.dataset.habit));
      const checked = habit && habit.days[cell.dataset.date];
      tt.textContent = `${cell.dataset.date} ${checked ? '(done)' : ''}`;
      tt.style.display = 'block';
      tt.style.left = (e.clientX + 10) + 'px';
      tt.style.top = (e.clientY - 30) + 'px';
    });
    cell.addEventListener('mouseleave', () => {
      document.getElementById('tooltip').style.display = 'none';
    });
  });
}

window.deleteHabit = deleteHabit;

window.exportData = function() {
  const blob = new Blob([JSON.stringify(habits, null, 2)], {type: 'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'habit-grid-export.json';
  a.click();
};

window.importData = function() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.addEventListener('change', async e => {
    if (!e.target.files.length) return;
    const text = await e.target.files[0].text();
    try {
      var data = JSON.parse(text);
      if (!Array.isArray(data)) throw new Error('Not an array');
      habits = data;
      save(); render();
    } catch(err) { alert('Invalid JSON: ' + err.message); }
  });
  input.click();
};

render();
</script>
