<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mandelbrot Explorer</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0a0a; color: #eee; font-family: 'Segoe UI', system-ui, sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
#topbar { display: flex; align-items: center; gap: 12px; padding: 8px 16px; background: #1a1a2e; border-bottom: 1px solid #333; z-index: 10; flex-wrap: wrap; }
#topbar h1 { font-size: 16px; color: #ff6b9d; white-space: nowrap; }
#topbar label { font-size: 11px; color: #aaa; }
#topbar select, #topbar input[type=range] { font-size: 12px; background: #16213e; color: #ccc; border: 1px solid #444; border-radius: 4px; padding: 2px 6px; }
#topbar input[type=range] { width: 100px; vertical-align: middle; }
#topbar button { padding: 4px 12px; background: #16213e; border: 1px solid #444; color: #ccc; border-radius: 4px; cursor: pointer; font-size: 12px; }
#topbar button:hover { background: #0f3460; color: #fff; }
#topbar .info { font-size: 11px; color: #666; margin-left: auto; }
canvas { display: block; cursor: crosshair; flex: 1; }
#coords { position: fixed; bottom: 10px; left: 10px; font-size: 12px; color: #888; font-family: monospace; z-index: 5; background: #000a; padding: 4px 8px; border-radius: 4px; }
#loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 14px; color: #ff6b9d; display: none; z-index: 20; }
</style>
</head>
<body>
<div id="topbar">
  <h1>MANDELBROT</h1>
  <label>Iterations: <span id="iter-val">256</span></label>
  <input type="range" id="iter-slider" min="50" max="2000" value="256" step="10">
  <label>Palette:</label>
  <select id="palette-select">
    <option value="classic">Classic</option>
    <option value="fire">Fire</option>
    <option value="ocean">Ocean</option>
    <option value="neon">Neon</option>
    <option value="grayscale">Grayscale</option>
    <option value="rainbow">Rainbow</option>
  </select>
  <button id="btn-reset">Reset View</button>
  <button id="btn-julia">Julia Mode</button>
  <button id="btn-save">Save PNG</button>
  <span class="info" id="render-info">Zoom: 1x</span>
</div>
<canvas id="canvas"></canvas>
<div id="coords">Re: 0.000 Im: 0.000</div>
<div id="loading">Rendering...</div>

<script>
(function() {
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');

let width, height;
let centerX = -0.5, centerY = 0;
let zoom = 1;
let maxIter = 256;
let currentPalette = 'classic';
let juliaMode = false;
let juliaC = { r: -0.7, i: 0.27015 };

// Palette generation
function generatePalette(name, size) {
  const pal = new Uint8Array(size * 3);
  for (let i = 0; i < size; i++) {
    const t = i / size;
    let r, g, b;
    switch (name) {
      case 'classic':
        r = ~~(9 * (1-t) * t * t * t * 255);
        g = ~~(15 * (1-t) * (1-t) * t * t * 255);
        b = ~~(8.5 * (1-t) * (1-t) * (1-t) * t * 255);
        break;
      case 'fire':
        r = ~~(Math.min(255, t * 3 * 255));
        g = ~~(Math.max(0, Math.min(255, (t - 0.33) * 3 * 255)));
        b = ~~(Math.max(0, Math.min(255, (t - 0.66) * 3 * 255)));
        break;
      case 'ocean':
        r = ~~(t * t * 100);
        g = ~~(t * 180 + 40);
        b = ~~(200 + t * 55);
        break;
      case 'neon':
        r = ~~(128 + 127 * Math.sin(t * Math.PI * 2));
        g = ~~(128 + 127 * Math.sin(t * Math.PI * 2 + 2.094));
        b = ~~(128 + 127 * Math.sin(t * Math.PI * 2 + 4.189));
        break;
      case 'grayscale':
        r = g = b = ~~(t * 255);
        break;
      case 'rainbow':
        r = ~~(128 + 127 * Math.sin(t * 6.28));
        g = ~~(128 + 127 * Math.sin(t * 6.28 + 2));
        b = ~~(128 + 127 * Math.sin(t * 6.28 + 4));
        break;
      default:
        r = g = b = ~~(t * 255);
    }
    pal[i * 3] = Math.max(0, Math.min(255, r));
    pal[i * 3 + 1] = Math.max(0, Math.min(255, g));
    pal[i * 3 + 2] = Math.max(0, Math.min(255, b));
  }
  return pal;
}

let palette = generatePalette(currentPalette, 2048);

// Reusable ImageData — only recreated on resize
let imgData, buf32;

function resize() {
  width = window.innerWidth;
  height = window.innerHeight - document.getElementById('topbar').offsetHeight;
  canvas.width = width;
  canvas.height = height;
  imgData = ctx.createImageData(width, height);
  buf32 = new Uint32Array(imgData.data.buffer);
  renderFractal();
}

// Progressive rendering: skip pixels during interaction, full render when idle
let renderTimer = null;
function scheduleFullRender() {
  clearTimeout(renderTimer);
  renderTimer = setTimeout(() => renderFractal(1), 50);
}

function renderFractal(step) {
  step = step || 1;
  const scale = 4 / (zoom * Math.min(width, height));
  const startX = centerX - width / 2 * scale;
  const startY = centerY - height / 2 * scale;

  const palSize = 2048;
  const bailout = 4;
  const log2 = Math.log(2);

  const jm = juliaMode;
  const jcr = juliaC.r, jci = juliaC.i;

  for (let py = 0; py < height; py += step) {
    const ci = startY + py * scale;
    for (let px = 0; px < width; px += step) {
      const cr = startX + px * scale;

      let zr, zi, jr, ji;
      if (jm) { zr = cr; zi = ci; jr = jcr; ji = jci; }
      else { zr = 0; zi = 0; jr = cr; ji = ci; }

      let iter = 0;
      let zr2 = zr * zr, zi2 = zi * zi;

      while (zr2 + zi2 <= bailout && iter < maxIter) {
        zi = 2 * zr * zi + ji;
        zr = zr2 - zi2 + jr;
        zr2 = zr * zr;
        zi2 = zi * zi;
        iter++;
      }

      let color;
      if (iter === maxIter) {
        color = 0xFF000000;
      } else {
        const log_zn = Math.log(zr2 + zi2) / 2;
        const nu = Math.log(log_zn / log2) / log2;
        const smoothIter = iter + 1 - nu;
        const t = smoothIter / maxIter;
        var palIdx = ~~(t * palSize) % palSize;
        if (palIdx < 0) palIdx += palSize;
        const pi = palIdx * 3;
        color = 0xFF000000 | (palette[pi + 2] << 16) | (palette[pi + 1] << 8) | palette[pi];
      }

      // Fill block for progressive rendering
      if (step > 1) {
        for (let dy = 0; dy < step && py + dy < height; dy++)
          for (let dx = 0; dx < step && px + dx < width; dx++)
            buf32[(py + dy) * width + (px + dx)] = color;
      } else {
        buf32[py * width + px] = color;
      }
    }
  }

  ctx.putImageData(imgData, 0, 0);
  updateInfo();
}

function updateInfo() {
  const zoomLevel = zoom.toExponential(2);
  document.getElementById('render-info').textContent = `Zoom: ${zoomLevel}x | ${width}x${height}`;
}

// Interaction
let isDragging = false;
let dragStartX, dragStartY, dragCenterX, dragCenterY;

canvas.addEventListener('mousedown', e => {
  isDragging = true;
  dragStartX = e.clientX;
  dragStartY = e.clientY;
  dragCenterX = centerX;
  dragCenterY = centerY;
  canvas.style.cursor = 'grabbing';
});

canvas.addEventListener('mousemove', e => {
  const scale = 4 / (zoom * Math.min(width, height));
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const re = centerX + (mx - width / 2) * scale;
  const im = centerY + (my - height / 2) * scale;
  document.getElementById('coords').textContent = `Re: ${re.toFixed(12)} Im: ${im.toFixed(12)}`;

  // Interactive Julia: hold Shift to pick Julia C from mouse position
  if (e.shiftKey && !juliaMode) {
    juliaC.r = re;
    juliaC.i = im;
  }

  if (isDragging) {
    const dx = (e.clientX - dragStartX) * scale;
    const dy = (e.clientY - dragStartY) * scale;
    centerX = dragCenterX - dx;
    centerY = dragCenterY - dy;
    renderFractal(4); // Progressive: 4x4 blocks while dragging
    scheduleFullRender();
  }
});

canvas.addEventListener('mouseup', () => {
  isDragging = false;
  canvas.style.cursor = 'crosshair';
});

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const scale = 4 / (zoom * Math.min(width, height));

  // Zoom toward mouse position
  const worldX = centerX + (mx - width / 2) * scale;
  const worldY = centerY + (my - height / 2) * scale;

  const factor = e.deltaY < 0 ? 1.3 : 1 / 1.3;
  zoom *= factor;

  // Adjust center so mouse point stays fixed
  const newScale = 4 / (zoom * Math.min(width, height));
  centerX = worldX - (mx - width / 2) * newScale;
  centerY = worldY - (my - height / 2) * newScale;

  renderFractal(2); // Progressive while scrolling
  scheduleFullRender();
}, { passive: false });

// Double-click to zoom in
canvas.addEventListener('dblclick', e => {
  const rect = canvas.getBoundingClientRect();
  const mx = e.clientX - rect.left;
  const my = e.clientY - rect.top;
  const scale = 4 / (zoom * Math.min(width, height));
  centerX += (mx - width / 2) * scale;
  centerY += (my - height / 2) * scale;
  zoom *= 3;
  renderFractal();
});

// UI controls
document.getElementById('iter-slider').addEventListener('input', e => {
  maxIter = parseInt(e.target.value);
  document.getElementById('iter-val').textContent = maxIter;
  renderFractal();
});

document.getElementById('palette-select').addEventListener('change', e => {
  currentPalette = e.target.value;
  palette = generatePalette(currentPalette, 2048);
  renderFractal();
});

document.getElementById('btn-reset').addEventListener('click', () => {
  centerX = juliaMode ? 0 : -0.5;
  centerY = 0;
  zoom = 1;
  renderFractal();
});

document.getElementById('btn-julia').addEventListener('click', function() {
  juliaMode = !juliaMode;
  this.style.background = juliaMode ? '#ff6b9d' : '#16213e';
  this.style.color = juliaMode ? '#000' : '#ccc';
  centerX = juliaMode ? 0 : -0.5;
  centerY = 0;
  zoom = 1;
  renderFractal();
});

document.getElementById('btn-save').addEventListener('click', () => {
  const link = document.createElement('a');
  link.download = `mandelbrot-${Date.now()}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
});

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target.tagName === 'INPUT' || e.target.tagName === 'SELECT') return;
  if (e.key === '+' || e.key === '=') { zoom *= 1.5; renderFractal(); }
  if (e.key === '-') { zoom /= 1.5; renderFractal(); }
  if (e.key === 'r') { centerX = juliaMode ? 0 : -0.5; centerY = 0; zoom = 1; renderFractal(); }
});

window.addEventListener('resize', resize);
resize();
})();
</script>
</body>
</html>
