<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Lab</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'SF Mono', 'Fira Code', monospace; background: #0a0a0a; color: #ccc; padding: 2rem; max-width: 1000px; margin: 0 auto; }
h1 { font-size: 1.4rem; color: #fff; margin-bottom: 0.3rem; }
.sub { color: #555; font-size: 0.75rem; margin-bottom: 1.5rem; }
.picker-area { display: flex; gap: 1.5rem; margin-bottom: 2rem; flex-wrap: wrap; }
.color-preview { width: 120px; height: 120px; border-radius: 12px; border: 2px solid #333; cursor: pointer; position: relative; }
.sliders { flex: 1; min-width: 250px; }
.slider-row { display: flex; align-items: center; gap: 0.8rem; margin-bottom: 0.6rem; }
.slider-label { font-size: 0.7rem; color: #666; width: 20px; text-align: right; }
.slider-row input[type="range"] { flex: 1; accent-color: #4ade80; }
.slider-val { font-size: 0.75rem; color: #888; width: 40px; }
.values { flex: 1; min-width: 200px; }
.val-row { display: flex; justify-content: space-between; padding: 0.3rem 0; border-bottom: 1px solid #111; font-size: 0.8rem; cursor: pointer; }
.val-row:hover { background: #111; }
.val-label { color: #666; }
.val-code { color: #fff; }
.section-title { font-size: 0.85rem; color: #fff; margin: 1.5rem 0 0.8rem; }
.palette { display: flex; gap: 4px; margin-bottom: 1rem; }
.palette-cell { flex: 1; height: 60px; border-radius: 6px; cursor: pointer; position: relative; transition: transform 0.1s; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 4px; }
.palette-cell:hover { transform: scaleY(1.1); }
.palette-label { font-size: 0.55rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 2px rgba(0,0,0,0.8); }
.contrast-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; margin-bottom: 1.5rem; }
.contrast-card { padding: 1rem; border-radius: 8px; text-align: center; }
.contrast-ratio { font-size: 1.5rem; font-weight: bold; }
.contrast-label { font-size: 0.65rem; margin-top: 0.3rem; }
.contrast-badge { display: inline-block; padding: 0.15rem 0.4rem; border-radius: 3px; font-size: 0.6rem; font-weight: bold; margin-top: 0.3rem; }
.pass { background: #0a2a0a; color: #4ade80; border: 1px solid #166534; }
.fail { background: #2a0a0a; color: #f87171; border: 1px solid #991b1b; }
.harmony { display: flex; gap: 4px; margin-bottom: 0.8rem; }
.harmony-cell { flex: 1; height: 50px; border-radius: 6px; cursor: pointer; display: flex; align-items: flex-end; justify-content: center; padding-bottom: 3px; }
.harmony-label { font-size: 0.5rem; color: rgba(255,255,255,0.7); text-shadow: 0 1px 2px rgba(0,0,0,0.5); }
.harm-row { margin-bottom: 1rem; }
.harm-name { font-size: 0.7rem; color: #666; margin-bottom: 0.3rem; }
.export-area { background: #111; border-radius: 8px; padding: 1rem; font-size: 0.75rem; margin-top: 1rem; }
.export-area pre { color: #4ade80; white-space: pre-wrap; }
input[type="color"] { position: absolute; opacity: 0; width: 100%; height: 100%; cursor: pointer; }
.copied { position: fixed; top: 1rem; right: 1rem; background: #0a2a0a; color: #4ade80; border: 1px solid #166534; padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.75rem; font-family: inherit; opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: 100; }
.copied.show { opacity: 1; }
</style>
</head>
<body>

<h1>Color Lab</h1>
<p class="sub">Interactive color palette generator with contrast checker</p>
<div class="copied" id="copied">Copied!</div>

<div class="picker-area">
  <div class="color-preview" id="preview">
    <input type="color" id="native-picker" value="#4ade80">
  </div>
  <div class="sliders">
    <div class="slider-row"><span class="slider-label">H</span><input type="range" id="h" min="0" max="360" value="145"><span class="slider-val" id="h-val">145</span></div>
    <div class="slider-row"><span class="slider-label">S</span><input type="range" id="s" min="0" max="100" value="69"><span class="slider-val" id="s-val">69</span></div>
    <div class="slider-row"><span class="slider-label">L</span><input type="range" id="l" min="0" max="100" value="58"><span class="slider-val" id="l-val">58</span></div>
    <div class="slider-row"><span class="slider-label">A</span><input type="range" id="a" min="0" max="100" value="100"><span class="slider-val" id="a-val">100</span></div>
  </div>
  <div class="values" id="values"></div>
</div>

<div class="section-title">Shades &amp; Tints</div>
<div class="palette" id="shades"></div>

<div class="section-title">Contrast Check (against white &amp; black)</div>
<div class="contrast-grid" id="contrast"></div>

<div class="section-title">Color Harmonies</div>
<div id="harmonies"></div>

<div class="section-title">Export</div>
<div class="export-area"><pre id="export"></pre></div>

<script>
let H = 145, S = 69, L = 58, A = 100;

const hSlider = document.getElementById('h');
const sSlider = document.getElementById('s');
const lSlider = document.getElementById('l');
const aSlider = document.getElementById('a');
const preview = document.getElementById('preview');
const nativePicker = document.getElementById('native-picker');

function hslToRgb(h, s, l) {
  s /= 100; l /= 100;
  const k = n => (n + h / 30) % 12;
  const a = s * Math.min(l, 1 - l);
  const f = n => l - a * Math.max(-1, Math.min(k(n) - 3, Math.min(9 - k(n), 1)));
  return [Math.round(f(0) * 255), Math.round(f(8) * 255), Math.round(f(4) * 255)];
}

function rgbToHex(r, g, b) {
  return '#' + [r, g, b].map(v => v.toString(16).padStart(2, '0')).join('');
}

function hexToHsl(hex) {
  let r = parseInt(hex.slice(1, 3), 16) / 255;
  let g = parseInt(hex.slice(3, 5), 16) / 255;
  let b = parseInt(hex.slice(5, 7), 16) / 255;
  const max = Math.max(r, g, b), min = Math.min(r, g, b);
  let h, s, l = (max + min) / 2;
  if (max === min) { h = s = 0; }
  else {
    const d = max - min;
    s = l > 0.5 ? d / (2 - max - min) : d / (max + min);
    switch (max) {
      case r: h = ((g - b) / d + (g < b ? 6 : 0)) / 6; break;
      case g: h = ((b - r) / d + 2) / 6; break;
      case b: h = ((r - g) / d + 4) / 6; break;
    }
  }
  return [Math.round(h * 360), Math.round(s * 100), Math.round(l * 100)];
}

function luminance(r, g, b) {
  const [rs, gs, bs] = [r, g, b].map(v => { v /= 255; return v <= 0.03928 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4); });
  return 0.2126 * rs + 0.7152 * gs + 0.0722 * bs;
}

function contrastRatio(rgb1, rgb2) {
  const l1 = luminance(...rgb1) + 0.05;
  const l2 = luminance(...rgb2) + 0.05;
  return l1 > l2 ? l1 / l2 : l2 / l1;
}

function copyText(text) {
  navigator.clipboard.writeText(text);
  const el = document.getElementById('copied');
  el.textContent = `Copied: ${text}`;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), 1500);
}

function render() {
  const rgb = hslToRgb(H, S, L);
  const hex = rgbToHex(...rgb);
  const hslStr = `hsl(${H}, ${S}%, ${L}%)`;
  const rgbStr = `rgb(${rgb.join(', ')})`;

  preview.style.background = hslStr;
  document.getElementById('h-val').textContent = H;
  document.getElementById('s-val').textContent = S;
  document.getElementById('l-val').textContent = L;
  document.getElementById('a-val').textContent = A;

  // Values
  document.getElementById('values').innerHTML = [
    ['HEX', hex],
    ['RGB', rgbStr],
    ['HSL', hslStr],
    ['HSLA', `hsla(${H}, ${S}%, ${L}%, ${(A/100).toFixed(2)})`],
    ['RGBA', `rgba(${rgb.join(', ')}, ${(A/100).toFixed(2)})`],
  ].map(([label, code]) =>
    `<div class="val-row" onclick="copyText('${code}')"><span class="val-label">${label}</span><span class="val-code">${code}</span></div>`
  ).join('');

  // Shades
  const shades = [];
  for (let i = 0; i <= 10; i++) {
    const li = i * 10;
    const c = hslToRgb(H, S, li);
    const hx = rgbToHex(...c);
    shades.push({ hex: hx, l: li });
  }
  document.getElementById('shades').innerHTML = shades.map(s =>
    `<div class="palette-cell" style="background:${s.hex}" onclick="copyText('${s.hex}')"><span class="palette-label">${s.hex}</span></div>`
  ).join('');

  // Contrast
  const white = [255, 255, 255], black = [0, 0, 0];
  const crWhite = contrastRatio(rgb, white);
  const crBlack = contrastRatio(rgb, black);
  document.getElementById('contrast').innerHTML = [
    { bg: hslStr, fg: '#fff', ratio: crWhite, label: 'On White Text' },
    { bg: hslStr, fg: '#000', ratio: crBlack, label: 'On Black Text' },
  ].map(c => {
    const aa = c.ratio >= 4.5;
    const aaa = c.ratio >= 7;
    return `<div class="contrast-card" style="background:${c.bg};color:${c.fg}">
      <div class="contrast-ratio">${c.ratio.toFixed(2)}:1</div>
      <div class="contrast-label">${c.label}</div>
      <span class="contrast-badge ${aa ? 'pass' : 'fail'}">AA ${aa ? 'PASS' : 'FAIL'}</span>
      <span class="contrast-badge ${aaa ? 'pass' : 'fail'}">AAA ${aaa ? 'PASS' : 'FAIL'}</span>
    </div>`;
  }).join('');

  // Harmonies
  const harmonies = [
    { name: 'Complementary', offsets: [0, 180] },
    { name: 'Triadic', offsets: [0, 120, 240] },
    { name: 'Analogous', offsets: [-30, 0, 30] },
    { name: 'Split Complementary', offsets: [0, 150, 210] },
    { name: 'Square', offsets: [0, 90, 180, 270] },
  ];
  document.getElementById('harmonies').innerHTML = harmonies.map(harm => {
    const cells = harm.offsets.map(off => {
      const hh = (H + off + 360) % 360;
      const c = hslToRgb(hh, S, L);
      const hx = rgbToHex(...c);
      return `<div class="harmony-cell" style="background:${hx}" onclick="copyText('${hx}')"><span class="harmony-label">${hx}</span></div>`;
    }).join('');
    return `<div class="harm-row"><div class="harm-name">${harm.name}</div><div class="harmony">${cells}</div></div>`;
  }).join('');

  // Export
  const cssVars = `--color-primary: ${hex};\n--color-primary-rgb: ${rgb.join(', ')};\n--color-primary-hsl: ${H}, ${S}%, ${L}%;`;
  const tailwind = `'primary': '${hex}',`;
  document.getElementById('export').textContent = `/* CSS Custom Properties */\n${cssVars}\n\n/* Tailwind */\n${tailwind}`;
}

[hSlider, sSlider, lSlider, aSlider].forEach(el => {
  el.addEventListener('input', () => {
    H = parseInt(hSlider.value);
    S = parseInt(sSlider.value);
    L = parseInt(lSlider.value);
    A = parseInt(aSlider.value);
    nativePicker.value = rgbToHex(...hslToRgb(H, S, L));
    render();
  });
});

nativePicker.addEventListener('input', e => {
  const [h, s, l] = hexToHsl(e.target.value);
  H = h; S = s; L = l;
  hSlider.value = H; sSlider.value = S; lSlider.value = L;
  render();
});

window.copyText = copyText;
render();
</script>
</body>
</html>
