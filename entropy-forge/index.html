<title>Entropy Forge</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #0a0a0a; color: #ccc; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace; overflow-y: auto; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
#app { max-width: 480px; margin: 0 auto; padding: 16px 12px; }

h1 { font-size: 0.8rem; color: #444; letter-spacing: 0.3em; font-weight: 300; margin-bottom: 12px; text-transform: uppercase; }

/* Output */
#output-wrap { border: 1px solid #1a1a1a; padding: 16px; margin-bottom: 8px; min-height: 60px; display: flex; align-items: center; justify-content: center; cursor: pointer; position: relative; }
#output-wrap:active { background: #111; }
#output { font-size: clamp(0.75rem, 3.5vw, 1.1rem); word-break: break-all; text-align: center; color: #fff; letter-spacing: 0.05em; line-height: 1.6; user-select: all; }
#copy-hint { position: absolute; bottom: 4px; right: 8px; font-size: 0.4rem; color: #1a1a1a; letter-spacing: 0.1em; }
#copy-flash { position: absolute; inset: 0; background: #fff; opacity: 0; pointer-events: none; transition: opacity 0.05s; }
#copy-flash.flash { opacity: 0.15; }

/* Entropy bar */
#entropy-bar { height: 3px; background: #111; margin-bottom: 12px; }
#entropy-fill { height: 100%; width: 0; transition: width 0.3s, background 0.3s; }
#entropy-info { display: flex; justify-content: space-between; font-size: 0.45rem; color: #333; margin-bottom: 12px; letter-spacing: 0.1em; }

/* Mode toggle */
#mode-toggle { display: flex; gap: 0; margin-bottom: 12px; }
.mode-btn { flex: 1; padding: 6px; background: transparent; border: 1px solid #1a1a1a; color: #333; font-family: inherit; font-size: 0.6rem; cursor: pointer; text-align: center; letter-spacing: 0.15em; text-transform: uppercase; }
.mode-btn.active { border-color: #444; color: #aaa; background: #111; }

/* Controls */
.ctrl-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
.ctrl-label { font-size: 0.5rem; color: #333; min-width: 50px; letter-spacing: 0.1em; text-transform: uppercase; }
.ctrl-val { font-size: 0.55rem; color: #555; min-width: 24px; text-align: right; }
input[type="range"] { flex: 1; height: 3px; accent-color: #555; }

/* Checkboxes */
.checks { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 12px; }
.check-item { display: flex; align-items: center; gap: 4px; cursor: pointer; }
.check-item input { accent-color: #555; }
.check-item label { font-size: 0.5rem; color: #444; letter-spacing: 0.1em; cursor: pointer; }

/* Buttons */
#btn-gen { width: 100%; padding: 10px; background: #111; border: 1px solid #222; color: #666; font-family: inherit; font-size: 0.65rem; cursor: pointer; letter-spacing: 0.2em; text-transform: uppercase; margin-bottom: 8px; }
#btn-gen:active { border-color: #555; color: #aaa; }

/* Passphrase controls */
#phrase-ctrls { display: none; }
#string-ctrls { display: block; }

<body>
<div id="app">
  <h1>Entropy Forge</h1>

  <div id="output-wrap">
    <div id="output">—</div>
    <div id="copy-hint">TAP TO COPY</div>
    <div id="copy-flash"></div>
  </div>

  <div id="entropy-bar"><div id="entropy-fill"></div></div>
  <div id="entropy-info">
    <span id="entropy-bits">0 bits</span>
    <span id="entropy-label">—</span>
  </div>

  <div id="mode-toggle">
    <button class="mode-btn active" data-mode="string">String</button>
    <button class="mode-btn" data-mode="phrase">Passphrase</button>
  </div>

  <div id="string-ctrls">
    <div class="ctrl-row">
      <span class="ctrl-label">Length</span>
      <input type="range" id="sl-len" min="8" max="64" value="20">
      <span class="ctrl-val" id="v-len">20</span>
    </div>
    <div class="checks">
      <div class="check-item"><input type="checkbox" id="ck-upper" checked><label for="ck-upper">A-Z</label></div>
      <div class="check-item"><input type="checkbox" id="ck-lower" checked><label for="ck-lower">a-z</label></div>
      <div class="check-item"><input type="checkbox" id="ck-num" checked><label for="ck-num">0-9</label></div>
      <div class="check-item"><input type="checkbox" id="ck-sym" checked><label for="ck-sym">!@#$</label></div>
    </div>
  </div>

  <div id="phrase-ctrls">
    <div class="ctrl-row">
      <span class="ctrl-label">Words</span>
      <input type="range" id="sl-words" min="3" max="8" value="5">
      <span class="ctrl-val" id="v-words">5</span>
    </div>
  </div>

  <button id="btn-gen">Generate</button>
</div>

// ============ STATE ============
var mode = 'string'; // 'string' or 'phrase'
var strLen = 20;
var wordCount = 5;
var useUpper = true, useLower = true, useNum = true, useSym = true;
var currentPassword = '';

// ============ CRYPTO RNG ============
function cryptoRandInt(max) {
  if (max <= 0) return 0;
  // Rejection sampling to avoid modulo bias
  var limit = Math.floor(4294967296 / max) * max;
  var arr = new Uint32Array(1);
  do {
    crypto.getRandomValues(arr);
  } while (arr[0] >= limit);
  return arr[0] % max;
}

// ============ GENERATION ============
function buildPool() {
  var pool = '';
  if (useUpper) pool += 'ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if (useLower) pool += 'abcdefghijklmnopqrstuvwxyz';
  if (useNum) pool += '0123456789';
  if (useSym) pool += '!@#$%^&*()-_=+[]{}|;:,.<>?';
  return pool;
}

function generateString() {
  var pool = buildPool();
  if (pool.length === 0) return '';
  var result = '';
  for (var i = 0; i < strLen; i++) {
    result += pool[cryptoRandInt(pool.length)];
  }
  return result;
}

function generatePhrase() {
  var words = [];
  for (var i = 0; i < wordCount; i++) {
    words.push(WORDS[cryptoRandInt(WORDS.length)]);
  }
  return words.join('-');
}

// ============ ENTROPY ============
function calcEntropy() {
  if (mode === 'string') {
    var pool = buildPool();
    if (pool.length === 0) return 0;
    return Math.floor(strLen * Math.log2(pool.length));
  } else {
    return Math.floor(wordCount * Math.log2(WORDS.length));
  }
}

function entropyLabel(bits) {
  if (bits < 40) return 'WEAK';
  if (bits < 60) return 'FAIR';
  if (bits < 80) return 'STRONG';
  if (bits < 100) return 'VERY STRONG';
  return 'EXCELLENT';
}

function entropyColor(bits) {
  if (bits < 40) return '#f85149';
  if (bits < 60) return '#d29922';
  if (bits < 80) return '#3fb950';
  return '#58a6ff';
}

function updateEntropy() {
  var bits = calcEntropy();
  var fill = document.getElementById('entropy-fill');
  var pct = Math.min(100, bits / 128 * 100);
  fill.style.width = pct + '%';
  fill.style.background = entropyColor(bits);
  document.getElementById('entropy-bits').textContent = bits + ' bits';
  document.getElementById('entropy-label').textContent = entropyLabel(bits);
  document.getElementById('entropy-label').style.color = entropyColor(bits);
}

// ============ SCRAMBLE ANIMATION ============
var scrambleAnimId = null;

function scrambleReveal(finalStr, callback) {
  if (scrambleAnimId) cancelAnimationFrame(scrambleAnimId);
  var outputEl = document.getElementById('output');
  var pool = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
  var iterations = 8;
  var step = 0;

  function frame() {
    if (step >= iterations) {
      outputEl.textContent = finalStr;
      if (callback) callback();
      return;
    }
    // Progressive reveal: more chars settle each iteration
    var settled = Math.floor((step / iterations) * finalStr.length);
    var display = '';
    for (var i = 0; i < finalStr.length; i++) {
      if (i < settled) {
        display += finalStr[i];
      } else {
        display += pool[Math.floor(Math.random() * pool.length)];
      }
    }
    outputEl.textContent = display;
    step++;
    scrambleAnimId = requestAnimationFrame(frame);
  }
  // Store real password immediately for copy
  currentPassword = finalStr;
  frame();
}

// ============ GENERATE ============
function generate() {
  var pw = mode === 'string' ? generateString() : generatePhrase();
  if (!pw) {
    document.getElementById('output').textContent = 'Select character types';
    currentPassword = '';
    updateEntropy();
    return;
  }
  scrambleReveal(pw);
  updateEntropy();
}

// ============ COPY ============
document.getElementById('output-wrap').addEventListener('click', function() {
  if (!currentPassword) return;
  var flash = document.getElementById('copy-flash');
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(currentPassword).then(function() {
      flash.classList.add('flash');
      setTimeout(function() { flash.classList.remove('flash'); }, 100);
    });
  } else {
    // Fallback
    var ta = document.createElement('textarea');
    ta.value = currentPassword;
    ta.style.position = 'fixed';
    ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.focus();
    ta.select();
    ta.setSelectionRange(0, 99999);
    document.execCommand('copy');
    document.body.removeChild(ta);
    flash.classList.add('flash');
    setTimeout(function() { flash.classList.remove('flash'); }, 100);
  }
});

// ============ CONTROLS ============
document.querySelectorAll('.mode-btn').forEach(function(btn) {
  btn.addEventListener('click', function() {
    mode = btn.dataset.mode;
    document.querySelectorAll('.mode-btn').forEach(function(b) { b.classList.remove('active'); });
    btn.classList.add('active');
    document.getElementById('string-ctrls').style.display = mode === 'string' ? 'block' : 'none';
    document.getElementById('phrase-ctrls').style.display = mode === 'phrase' ? 'block' : 'none';
    generate();
  });
});

document.getElementById('sl-len').addEventListener('input', function(e) {
  strLen = parseInt(e.target.value, 10);
  document.getElementById('v-len').textContent = strLen;
  generate();
});

document.getElementById('sl-words').addEventListener('input', function(e) {
  wordCount = parseInt(e.target.value, 10);
  document.getElementById('v-words').textContent = wordCount;
  generate();
});

document.getElementById('ck-upper').addEventListener('change', function() { useUpper = this.checked; generate(); });
document.getElementById('ck-lower').addEventListener('change', function() { useLower = this.checked; generate(); });
document.getElementById('ck-num').addEventListener('change', function() { useNum = this.checked; generate(); });
document.getElementById('ck-sym').addEventListener('change', function() { useSym = this.checked; generate(); });

document.getElementById('btn-gen').addEventListener('click', generate);

// Keyboard shortcut
document.addEventListener('keydown', function(e) {
  if (e.key === 'Enter') generate();
});

// ============ INIT ============
generate();

})();
