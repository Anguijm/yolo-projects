<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a0a">
<title>svg-fields — populate SVG templates</title>
<style>
  :root {
    --bg-page: #0a0a0a;
    --bg-surface: #111;
    --bg-elevated: #1a1a1a;
    --bg-hover: #222;
    --text-primary: #fff;
    --text-body: #ccc;
    --text-secondary: #aaa;
    --text-tertiary: #555;
    --text-label: #444;
    --text-muted: #333;
    --border-default: #1a1a1a;
    --border-visible: #222;
    --border-active: #444;
    --border-focus: #555;
    --accent: #0ff;
    --error: #f85149;
    --success: #3fb950;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--bg-page); }
  body {
    font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
    color: var(--text-body);
    font-size: 0.75rem;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border-default);
    background: var(--bg-surface);
    flex-wrap: wrap;
  }
  h1 {
    font-size: 0.7rem;
    font-weight: 200;
    color: var(--text-secondary);
    text-transform: uppercase;
    letter-spacing: 0.3em;
    margin: 0;
    flex-shrink: 0;
  }
  h1 .accent { color: var(--accent); }
  .hint {
    font-size: 0.55rem;
    color: var(--text-tertiary);
    letter-spacing: 0.1em;
    flex: 1;
    min-width: 0;
  }
  .btn {
    padding: 5px 10px;
    background: transparent;
    border: 1px solid var(--border-default);
    color: var(--text-label);
    font-family: inherit;
    font-size: 0.55rem;
    cursor: pointer;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--border-active); color: var(--text-secondary); }
  .btn:active { border-color: var(--border-focus); color: var(--text-secondary); }
  .btn.primary { border-color: var(--border-active); color: var(--text-secondary); }
  .btn.primary:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.3; cursor: not-allowed; pointer-events: none; }
  .file-input { display: none; }
  main {
    flex: 1;
    display: grid;
    grid-template-columns: minmax(240px, 320px) 1fr;
    min-height: 0;
    overflow: hidden;
  }
  @media (max-width: 700px) {
    main { grid-template-columns: 1fr; grid-template-rows: auto 1fr; }
  }
  .fields-panel {
    border-right: 1px solid var(--border-default);
    background: var(--bg-surface);
    overflow-y: auto;
    overflow-x: hidden;
    padding: 12px;
  }
  @media (max-width: 700px) {
    .fields-panel { border-right: none; border-bottom: 1px solid var(--border-default); max-height: 40vh; }
  }
  .panel-title {
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.25em;
    color: var(--text-label);
    margin: 0 0 10px 0;
    font-weight: 400;
  }
  .field-row {
    margin-bottom: 10px;
    padding: 4px 6px;
    margin-left: -6px;
    margin-right: -6px;
    border-left: 2px solid transparent;
  }
  .field-row:hover {
    border-left-color: var(--accent);
  }
  /* Highlight the corresponding element in the preview */
  .preview-stage [data-highlight="on"] {
    fill: var(--accent) !important;
    filter: drop-shadow(0 0 2px var(--accent));
  }
  .field-row label {
    display: block;
    font-size: 0.5rem;
    text-transform: uppercase;
    letter-spacing: 0.2em;
    color: var(--text-tertiary);
    margin-bottom: 3px;
  }
  .field-row label .field-count {
    color: var(--text-muted);
    margin-left: 6px;
  }
  .field-row input[type="text"],
  .field-row textarea {
    width: 100%;
    padding: 5px 7px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-default);
    color: var(--text-body);
    font-family: inherit;
    font-size: 0.7rem;
    resize: vertical;
    min-height: 26px;
  }
  .field-row textarea { min-height: 48px; }
  .field-row input:focus,
  .field-row textarea:focus {
    outline: none;
    border-color: var(--border-focus);
    color: var(--text-primary);
  }
  .empty-state {
    color: var(--text-tertiary);
    font-size: 0.6rem;
    line-height: 1.6;
    padding: 20px 0;
  }
  .empty-state code {
    color: var(--accent);
    background: var(--bg-elevated);
    padding: 1px 4px;
    font-size: 0.65rem;
  }
  .preview-panel {
    background: var(--bg-page);
    overflow: auto;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    position: relative;
  }
  .preview-stage {
    max-width: 100%;
    max-height: 100%;
    background: #fff;
    box-shadow: 0 0 0 1px var(--border-visible), 0 0 40px rgba(0, 255, 255, 0.03);
  }
  .preview-stage svg {
    display: block;
    max-width: 100%;
    height: auto;
  }
  .drop-zone {
    position: absolute;
    inset: 0;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.55rem;
    color: var(--text-tertiary);
    letter-spacing: 0.25em;
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.15s ease;
    background: rgba(0, 255, 255, 0.04);
    border: 2px dashed var(--accent);
  }
  .drop-zone.active { opacity: 1; }
  .toast {
    position: fixed;
    bottom: 12px;
    left: 50%;
    transform: translateX(-50%);
    padding: 6px 12px;
    background: var(--bg-elevated);
    border: 1px solid var(--border-focus);
    color: var(--text-secondary);
    font-size: 0.55rem;
    text-transform: uppercase;
    letter-spacing: 0.15em;
    z-index: 10;
    pointer-events: none;
    opacity: 0;
    transition: opacity 0.2s ease;
  }
  .toast.show { opacity: 1; }
  .toast.error { border-color: var(--error); color: var(--error); }
  .toast.success { border-color: var(--success); color: var(--success); }
  .meta {
    font-size: 0.5rem;
    color: var(--text-muted);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    padding-top: 10px;
    margin-top: 10px;
    border-top: 1px solid var(--border-default);
  }
  .meta .key { color: var(--text-tertiary); }
  .meta .val { color: var(--text-secondary); }
  .order-toggle {
    display: flex;
    gap: 4px;
    margin-bottom: 10px;
  }
  .order-toggle .btn { flex: 1; padding: 4px 6px; }
  .order-toggle .btn.active {
    border-color: var(--accent);
    color: var(--accent);
  }
</style>
</head>
<body>
<header>
  <h1>svg<span class="accent">·</span>fields</h1>
  <span class="hint" id="hint">Drop SVG · Paste · Or load sample to edit every text element</span>
  <input type="file" id="file-input" class="file-input" accept=".svg,image/svg+xml">
  <button class="btn" id="open-btn" aria-label="Open SVG file">open svg</button>
  <button class="btn" id="sample-btn" aria-label="Load sample certificate SVG">sample</button>
  <button class="btn" id="paste-btn" aria-label="Paste SVG from clipboard">paste</button>
  <button class="btn primary" id="download-btn" aria-label="Download populated SVG" disabled>download</button>
</header>

<main>
  <aside class="fields-panel" id="fields-panel">
    <h2 class="panel-title">Fields</h2>
    <div id="fields-container"></div>
    <div class="meta" id="meta" style="display: none;">
      <div><span class="key">fields:</span> <span class="val" id="meta-count">0</span></div>
      <div><span class="key">order:</span> <span class="val" id="meta-order">document</span></div>
      <div><span class="key">bytes:</span> <span class="val" id="meta-bytes">0</span></div>
    </div>
  </aside>

  <section class="preview-panel" id="preview-panel">
    <div class="preview-stage" id="preview-stage"></div>
    <div class="drop-zone" id="drop-zone">drop svg here</div>
  </section>
</main>

<div class="toast" id="toast"></div>

<script>
(function () {
  'use strict';

  // ── State ────────────────────────────────────────────────────────────
  // We hold a parsed SVG document in memory and mutate its text nodes
  // directly when the user edits a field. Preview re-serializes the DOC;
  // download serializes it to a blob. This preserves every attribute,
  // namespace, comment, and style in the input SVG — we only touch text.
  let parsedDoc = null;       // DOMParser result; persists across edits
  let originalBytes = 0;      // input byte count for meta display
  let fields = [];            // [{ id, label, element, textNode, original }]
  let hoveredFieldId = null;  // current hover target for highlight

  // ── DOM refs ─────────────────────────────────────────────────────────
  const fieldsContainer = document.getElementById('fields-container');
  const previewStage = document.getElementById('preview-stage');
  const dropZone = document.getElementById('drop-zone');
  const previewPanel = document.getElementById('preview-panel');
  const fileInput = document.getElementById('file-input');
  const openBtn = document.getElementById('open-btn');
  const sampleBtn = document.getElementById('sample-btn');
  const pasteBtn = document.getElementById('paste-btn');
  const downloadBtn = document.getElementById('download-btn');
  const hint = document.getElementById('hint');
  const toast = document.getElementById('toast');
  const meta = document.getElementById('meta');
  const metaCount = document.getElementById('meta-count');
  const metaBytes = document.getElementById('meta-bytes');

  // ── Sample SVG — a process flow diagram, no markers required ─────────
  // Realistic "existing SVG" use case: labels already in place, user edits them directly.
  const SAMPLE_SVG = `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 420" font-family="system-ui, sans-serif">
  <rect width="640" height="420" fill="#fafafa"/>
  <text x="320" y="30" text-anchor="middle" font-size="16" font-weight="600" fill="#222">Release Pipeline</text>
  <text x="320" y="50" text-anchor="middle" font-size="11" fill="#666">from commit to production</text>
  <g font-size="12" fill="#222" text-anchor="middle">
    <rect x="40" y="90" width="130" height="60" fill="#fff" stroke="#666" rx="4"/>
    <text x="105" y="115">Build</text>
    <text x="105" y="135" font-size="10" fill="#888">compile + lint</text>
    <rect x="210" y="90" width="130" height="60" fill="#fff" stroke="#666" rx="4"/>
    <text x="275" y="115">Test</text>
    <text x="275" y="135" font-size="10" fill="#888">unit + integration</text>
    <rect x="380" y="90" width="130" height="60" fill="#fff" stroke="#666" rx="4"/>
    <text x="445" y="115">Review</text>
    <text x="445" y="135" font-size="10" fill="#888">council + human</text>
    <rect x="40" y="220" width="130" height="60" fill="#fff" stroke="#666" rx="4"/>
    <text x="105" y="245">Stage</text>
    <text x="105" y="265" font-size="10" fill="#888">canary deploy</text>
    <rect x="210" y="220" width="130" height="60" fill="#fff" stroke="#666" rx="4"/>
    <text x="275" y="245">Verify</text>
    <text x="275" y="265" font-size="10" fill="#888">smoke + metrics</text>
    <rect x="380" y="220" width="130" height="60" fill="#fff" stroke="#666" rx="4"/>
    <text x="445" y="245">Ship</text>
    <text x="445" y="265" font-size="10" fill="#888">prod rollout</text>
  </g>
  <g stroke="#888" fill="none" stroke-width="1">
    <path d="M170,120 L210,120"/>
    <path d="M340,120 L380,120"/>
    <path d="M445,150 L445,210 M170,250 L210,250 M340,250 L380,250"/>
    <path d="M445,150 Q445,180 105,180 Q105,195 105,220"/>
  </g>
  <text x="320" y="360" text-anchor="middle" font-size="10" fill="#666">owner: platform team</text>
  <text x="320" y="378" text-anchor="middle" font-size="10" fill="#666">updated: 2026-04-23</text>
</svg>`;

  // ── Walk the parsed DOM and collect editable text nodes ─────────────
  // Editable = a text/tspan/title/desc/textPath element with one or more
  // direct non-whitespace text node children. Each such child becomes a field.
  const EDITABLE_TAGS = new Set(['text', 'tspan', 'title', 'desc', 'textpath']);

  function collectFields(doc) {
    const out = [];
    let seq = 0;
    function walk(el) {
      if (!el || !el.tagName) return;
      const tag = el.tagName.toLowerCase();
      if (EDITABLE_TAGS.has(tag)) {
        // Scan immediate children for non-empty text nodes
        el.childNodes.forEach((child) => {
          if (child.nodeType === 3 && child.textContent && child.textContent.trim()) {
            const original = child.textContent;
            out.push({
              id: 'f' + (seq++),
              label: labelFor(el, original),
              element: el,
              textNode: child,
              original: original,
            });
          }
        });
      }
      // Recurse into all element children (even non-editable parents may contain editables)
      Array.from(el.children).forEach(walk);
    }
    walk(doc.documentElement);
    // Tag each element with a visual marker attribute so we can highlight on hover.
    // We use a custom data attribute that serializes harmlessly — and we'll strip it on download.
    out.forEach((f) => {
      if (!f.element.hasAttribute('data-svgfields-id')) {
        f.element.setAttribute('data-svgfields-id', f.id);
      }
    });
    return out;
  }

  function labelFor(element, textContent) {
    // Precedence: data-field > id > mustache content > truncated text
    const df = element.getAttribute('data-field');
    if (df) return df;
    const id = element.getAttribute('id');
    if (id) return id;
    // If the text is just a single mustache placeholder, show its name
    const trimmed = textContent.trim();
    const m = /^\{\{\s*([a-zA-Z_][a-zA-Z0-9_-]*)\s*\}\}$/.exec(trimmed);
    if (m) return m[1];
    // Otherwise use truncated content
    return trimmed.length > 40 ? trimmed.slice(0, 37) + '…' : trimmed;
  }

  // ── Serialize the current DOC state for preview / download ──────────
  function serializeDoc() {
    if (!parsedDoc) return '';
    return new XMLSerializer().serializeToString(parsedDoc);
  }

  function renderPreview() {
    previewStage.innerHTML = serializeDoc();
    // Apply highlight style to the hovered element's counterpart in the rendered SVG
    if (hoveredFieldId) {
      const rendered = previewStage.querySelector('[data-svgfields-id="' + hoveredFieldId + '"]');
      if (rendered) rendered.setAttribute('data-highlight', 'on');
    }
  }

  // ── Fields form ─────────────────────────────────────────────────────
  function renderFields() {
    fieldsContainer.innerHTML = '';
    if (fields.length === 0) {
      const empty = document.createElement('div');
      empty.className = 'empty-state';
      empty.innerHTML = parsedDoc
        ? 'No text elements found in this SVG. This tool edits <code>&lt;text&gt;</code>, <code>&lt;tspan&gt;</code>, <code>&lt;title&gt;</code>, and <code>&lt;desc&gt;</code> elements.'
        : 'Load an SVG to see its text fields.<br><br>Every <code>&lt;text&gt;</code>, <code>&lt;tspan&gt;</code>, and <code>&lt;title&gt;</code> element becomes a field you can edit. Layout and styling are preserved — only text changes.';
      fieldsContainer.appendChild(empty);
      meta.style.display = parsedDoc ? 'block' : 'none';
      if (parsedDoc) {
        metaCount.textContent = '0';
        metaBytes.textContent = originalBytes.toLocaleString();
      }
      return;
    }

    fields.forEach((field) => {
      const row = document.createElement('div');
      row.className = 'field-row';
      row.dataset.fieldId = field.id;

      const label = document.createElement('label');
      label.setAttribute('for', field.id);
      label.textContent = field.label;
      row.appendChild(label);

      // Textarea for long content (>40 chars) or explicit <desc>
      const isLong = field.original.length > 40 || field.element.tagName.toLowerCase() === 'desc';
      const input = document.createElement(isLong ? 'textarea' : 'input');
      if (!isLong) input.type = 'text';
      input.id = field.id;
      input.value = field.textNode.textContent;
      input.setAttribute('aria-label', field.label);
      input.addEventListener('input', (e) => {
        field.textNode.textContent = e.target.value;
        renderPreview();
      });
      input.addEventListener('focus', () => setHover(field.id));
      input.addEventListener('blur', () => setHover(null));
      row.addEventListener('mouseenter', () => setHover(field.id));
      row.addEventListener('mouseleave', () => setHover(null));
      row.appendChild(input);

      fieldsContainer.appendChild(row);
    });

    meta.style.display = 'block';
    metaCount.textContent = String(fields.length);
    metaBytes.textContent = originalBytes.toLocaleString();
  }

  function setHover(fieldId) {
    hoveredFieldId = fieldId;
    renderPreview();
  }

  // ── Load SVG ────────────────────────────────────────────────────────
  function loadSvgText(text, source) {
    if (!text || typeof text !== 'string') {
      showToast('No content provided', 'error');
      return;
    }
    const trimmed = text.trim();
    if (!/^<(\?xml|svg|\!DOCTYPE)/i.test(trimmed)) {
      showToast('Not an SVG', 'error');
      return;
    }
    const parser = new DOMParser();
    const doc = parser.parseFromString(trimmed, 'image/svg+xml');
    if (doc.querySelector('parsererror') || !doc.documentElement || doc.documentElement.tagName.toLowerCase() !== 'svg') {
      showToast('SVG parse failed', 'error');
      return;
    }
    parsedDoc = doc;
    originalBytes = trimmed.length;
    fields = collectFields(parsedDoc);
    hoveredFieldId = null;
    renderFields();
    renderPreview();
    downloadBtn.disabled = false;
    hint.textContent = source + ' · ' + fields.length + ' text element' + (fields.length === 1 ? '' : 's');
    if (fields.length > 0) {
      const first = fieldsContainer.querySelector('input, textarea');
      if (first) first.focus();
    }
  }

  function loadFile(file) {
    if (!file) return;
    const reader = new FileReader();
    reader.onload = (ev) => loadSvgText(String(ev.target.result || ''), file.name);
    reader.onerror = () => showToast('Read failed', 'error');
    reader.readAsText(file);
  }

  // ── Download ────────────────────────────────────────────────────────
  function download() {
    if (!parsedDoc) return;
    // Clone the doc so we can strip our internal data-svgfields-id markers
    // without mutating state. The exported SVG should be clean.
    const clone = parsedDoc.cloneNode(true);
    clone.querySelectorAll('[data-svgfields-id]').forEach((el) => {
      el.removeAttribute('data-svgfields-id');
    });
    clone.querySelectorAll('[data-highlight]').forEach((el) => {
      el.removeAttribute('data-highlight');
    });
    const text = new XMLSerializer().serializeToString(clone);
    const blob = new Blob([text], { type: 'image/svg+xml' });
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = deriveFilename();
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(() => URL.revokeObjectURL(url), 1000);
    showToast('Downloaded ' + a.download, 'success');
  }

  function deriveFilename() {
    // Honor the source filename if we have one; otherwise default to edited.svg
    const h = hint.textContent || '';
    const m = /^([^\s·]+\.svg)/i.exec(h);
    if (m) return m[1].replace(/\.svg$/i, '') + '.edited.svg';
    return 'edited.svg';
  }

  // ── Toast ────────────────────────────────────────────────────────────
  let toastTimer = null;
  function showToast(msg, kind) {
    toast.textContent = msg;
    toast.className = 'toast show' + (kind ? ' ' + kind : '');
    if (toastTimer) clearTimeout(toastTimer);
    toastTimer = setTimeout(() => toast.className = 'toast', 1800);
  }

  // ── Event wiring ─────────────────────────────────────────────────────
  openBtn.addEventListener('click', () => fileInput.click());
  fileInput.addEventListener('change', (e) => {
    const f = e.target.files && e.target.files[0];
    if (f) loadFile(f);
    fileInput.value = '';
  });
  sampleBtn.addEventListener('click', () => loadSvgText(SAMPLE_SVG, 'sample'));
  pasteBtn.addEventListener('click', async () => {
    try {
      const text = await navigator.clipboard.readText();
      if (!text) { showToast('Clipboard empty', 'error'); return; }
      loadSvgText(text, 'pasted');
    } catch (e) {
      showToast('Clipboard denied — use Open or drag-drop', 'error');
    }
  });
  downloadBtn.addEventListener('click', download);

  // Drag and drop anywhere on the preview panel
  let dragDepth = 0;
  previewPanel.addEventListener('dragenter', (e) => {
    e.preventDefault();
    dragDepth++;
    dropZone.classList.add('active');
  });
  previewPanel.addEventListener('dragleave', (e) => {
    e.preventDefault();
    dragDepth--;
    if (dragDepth <= 0) { dragDepth = 0; dropZone.classList.remove('active'); }
  });
  previewPanel.addEventListener('dragover', (e) => e.preventDefault());
  previewPanel.addEventListener('drop', (e) => {
    e.preventDefault();
    dragDepth = 0;
    dropZone.classList.remove('active');
    const f = e.dataTransfer && e.dataTransfer.files && e.dataTransfer.files[0];
    if (f) loadFile(f);
  });

  // Keyboard — Ctrl+S to download, Ctrl+O to open, Ctrl+V paste handled by button
  document.addEventListener('keydown', (e) => {
    if ((e.ctrlKey || e.metaKey) && e.key === 's' && !downloadBtn.disabled) {
      e.preventDefault();
      download();
    }
    if ((e.ctrlKey || e.metaKey) && e.key === 'o') {
      e.preventDefault();
      fileInput.click();
    }
  });

  // ── Initial render ──────────────────────────────────────────────────
  renderFields();

})();
</script>
</body>
</html>
