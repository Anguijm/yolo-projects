<title>Reaction Diffusion</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #0a0a0a;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
  color: #ccc;
  user-select: none;
  -webkit-user-select: none;
}
.app {
  display: flex;
  height: 100%;
  align-items: stretch;
}
.canvas-wrap {
  flex: 1;
  display: flex;
  align-items: center;
  justify-content: center;
  min-width: 0;
  background: #000;
}
#canvas {
  image-rendering: pixelated;
  image-rendering: crisp-edges;
  cursor: crosshair;
  touch-action: none;
}
#sidebar {
  width: 178px;
  background: #0a0a0a;
  border-left: 1px solid #1a1a1a;
  overflow-y: auto;
  overflow-x: hidden;
  padding: 8px;
  display: flex;
  flex-direction: column;
  gap: 8px;
  flex-shrink: 0;
}
.section-label {
  font-size: 0.44rem;
  color: #444;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  padding-bottom: 3px;
  border-bottom: 1px solid #1a1a1a;
  margin-bottom: 2px;
}
.btn-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
}
.btn {
  padding: 5px 4px;
  background: transparent;
  border: 1px solid #1a1a1a;
  color: #444;
  font-family: inherit;
  font-size: 0.5rem;
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  text-align: center;
}
.btn:active { border-color: #555; color: #888; }
.btn.active { border-color: #0ff; color: #0ff; }
.control-row {
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.ctrl-label {
  font-size: 0.44rem;
  color: #444;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.ctrl-label span { color: #666; font-variant-numeric: tabular-nums; }
input[type="range"] {
  width: 100%;
  height: 3px;
  accent-color: #555;
  cursor: pointer;
}
.btn-row {
  display: flex;
  flex-wrap: wrap;
  gap: 3px;
}
.action-row {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 3px;
}
.fps-line {
  font-size: 0.4rem;
  color: #2a2a2a;
  letter-spacing: 0.1em;
  text-align: right;
  margin-top: auto;
  padding-top: 4px;
}
@media (max-width: 520px) {
  .app { flex-direction: column; }
  #sidebar {
    width: 100%;
    height: 188px;
    min-height: 188px;
    flex-shrink: 0;
    border-left: none;
    border-top: 1px solid #1a1a1a;
    flex-direction: row;
    flex-wrap: nowrap;
    overflow-x: auto;
    overflow-y: hidden;
    align-items: flex-start;
    gap: 10px;
    padding: 6px 8px;
  }
  .sidebar-section { flex-shrink: 0; }
  .btn-grid { grid-template-columns: repeat(4, auto); }
  .action-row { grid-template-columns: repeat(4, auto); }
  .fps-line { display: none; }
}

<body>
<div class="app">
  <div class="canvas-wrap" id="canvasWrap">
    <canvas id="canvas"></canvas>
  </div>
  <div id="sidebar">
    <div class="sidebar-section">
      <div class="section-label">Preset</div>
      <div class="btn-grid" id="presetBtns"></div>
    </div>
    <div class="sidebar-section control-row">
      <label class="ctrl-label">F <span id="fVal">0.0545</span></label>
      <input type="range" id="fSlider" min="0.010" max="0.100" step="0.0001" value="0.0545">
    </div>
    <div class="sidebar-section control-row">
      <label class="ctrl-label">K <span id="kVal">0.0620</span></label>
      <input type="range" id="kSlider" min="0.040" max="0.080" step="0.0001" value="0.0620">
    </div>
    <div class="sidebar-section control-row">
      <label class="ctrl-label">Speed <span id="speedVal">2</span></label>
      <input type="range" id="speedSlider" min="1" max="8" step="1" value="2">
    </div>
    <div class="sidebar-section">
      <div class="section-label">Color</div>
      <div class="btn-row" id="colorBtns"></div>
    </div>
    <div class="sidebar-section">
      <div class="section-label">Brush</div>
      <div class="btn-row" id="brushBtns"></div>
    </div>
    <div class="sidebar-section action-row">
      <button class="btn" id="resetBtn">Reset</button>
      <button class="btn" id="seedBtn">Seed</button>
      <button class="btn" id="pauseBtn">Pause</button>
      <button class="btn" id="saveBtn">Save</button>
    </div>
    <div class="fps-line" id="fpsDisplay">-- fps</div>
  </div>
</div>
<script>
(function () {
'use strict';

var G = 200;
var Da = 1.0;
var Db = 0.5;
var F = 0.0545;
var K = 0.062;
var stepsPerFrame = 2;
var colorMode = 0;
var brushSize = 8;
var paused = false;
var painting = false;
var paintX = 0;
var paintY = 0;
var activeBrushIdx = 2;
var lastFpsTime = -1;
var frameCount = 0;

var bufA = new Float32Array(G * G);
var bufB = new Float32Array(G * G);
var nxtA = new Float32Array(G * G);
var nxtB = new Float32Array(G * G);
var imgData = null;
var buf32 = null;

var canvas = document.getElementById('canvas');
var ctx = canvas.getContext('2d');
canvas.width = G;
canvas.height = G;

var PRESETS = [
  { name: 'CORAL',   f: 0.0545, k: 0.062 },
  { name: 'MITOSIS', f: 0.028,  k: 0.062 },
  { name: 'MAZE',    f: 0.029,  k: 0.057 },
  { name: 'ZEBRA',   f: 0.022,  k: 0.059 },
  { name: 'RIPPLE',  f: 0.014,  k: 0.054 },
  { name: 'WORM',    f: 0.078,  k: 0.061 },
  { name: 'SPOTS',   f: 0.035,  k: 0.065 },
  { name: 'PULSE',   f: 0.025,  k: 0.060 }
];

var COLOR_NAMES = ['MONO', 'THERMAL', 'ACID', 'OCEAN'];
var BRUSH_NAMES = ['XS', 'S', 'M', 'L'];
var BRUSH_RADII = [2, 4, 8, 14];

function init() {
  var i, dx, dy, idx;
  for (i = 0; i < G * G; i++) {
    bufA[i] = 1.0; bufB[i] = 0.0;
    nxtA[i] = 0.0; nxtB[i] = 0.0;
  }
  var cx = G >> 1;
  var cy = G >> 1;
  for (dy = -6; dy <= 6; dy++) {
    for (dx = -6; dx <= 6; dx++) {
      if (dx * dx + dy * dy <= 36) {
        idx = (cy + dy) * G + (cx + dx);
        bufB[idx] = 1.0;
        bufA[idx] = 0.0;
      }
    }
  }
  imgData = ctx.createImageData(G, G);
  buf32 = new Uint32Array(imgData.data.buffer);
}

function addSeed() {
  var s, cx, cy, r, dx, dy, idx;
  for (s = 0; s < 10; s++) {
    cx = Math.floor(Math.random() * (G - 24) + 12);
    cy = Math.floor(Math.random() * (G - 24) + 12);
    r = 4;
    for (dy = -r; dy <= r; dy++) {
      for (dx = -r; dx <= r; dx++) {
        if (dx * dx + dy * dy <= r * r) {
          idx = (cy + dy) * G + (cx + dx);
          bufB[idx] = 1.0;
          bufA[idx] = 0.0;
        }
      }
    }
  }
}

function paintAt(gx, gy) {
  var r = brushSize;
  var r2 = r * r;
  var dx, dy, px, py, idx;
  for (dy = -r; dy <= r; dy++) {
    for (dx = -r; dx <= r; dx++) {
      if (dx * dx + dy * dy > r2) { continue; }
      px = gx + dx;
      py = gy + dy;
      if (px < 0 || px >= G || py < 0 || py >= G) { continue; }
      idx = py * G + px;
      bufB[idx] = 1.0;
      bufA[idx] = 0.0;
    }
  }
}

function step() {
  var a, b, abb, lapA, lapB, tmp;
  var x, y, xn, xp, yn, yp;
  var rowY, rowYn, rowYp, i, swp;
  for (y = 0; y < G; y++) {
    yn = (y - 1 + G) % G;
    yp = (y + 1) % G;
    rowY  = y  * G;
    rowYn = yn * G;
    rowYp = yp * G;
    for (x = 0; x < G; x++) {
      xn = (x - 1 + G) % G;
      xp = (x + 1) % G;
      i = rowY + x;

      lapA = 0.05 * bufA[rowYn + xn] + 0.20 * bufA[rowYn + x] + 0.05 * bufA[rowYn + xp]
           + 0.20 * bufA[rowY  + xn] - 1.00 * bufA[i]         + 0.20 * bufA[rowY  + xp]
           + 0.05 * bufA[rowYp + xn] + 0.20 * bufA[rowYp + x] + 0.05 * bufA[rowYp + xp];

      lapB = 0.05 * bufB[rowYn + xn] + 0.20 * bufB[rowYn + x] + 0.05 * bufB[rowYn + xp]
           + 0.20 * bufB[rowY  + xn] - 1.00 * bufB[i]         + 0.20 * bufB[rowY  + xp]
           + 0.05 * bufB[rowYp + xn] + 0.20 * bufB[rowYp + x] + 0.05 * bufB[rowYp + xp];

      a = bufA[i];
      b = bufB[i];
      abb = a * b * b;

      tmp = a + Da * lapA - abb + F * (1.0 - a);
      nxtA[i] = tmp < 0 ? 0 : (tmp > 1 ? 1 : tmp);

      tmp = b + Db * lapB + abb - (F + K) * b;
      nxtB[i] = tmp < 0 ? 0 : (tmp > 1 ? 1 : tmp);
    }
  }
  swp = bufA; bufA = nxtA; nxtA = swp;
  swp = bufB; bufB = nxtB; nxtB = swp;
}

function render() {
  /* Use Uint32Array view for single 32-bit write per pixel (little-endian: 0xAABBGGRR) */
  var i, b, sv, r, g, bl;
  for (i = 0; i < G * G; i++) {
    b = bufB[i];
    if (colorMode === 0) {
      sv = (b * 255) | 0;
      buf32[i] = 0xFF000000 | (sv << 16) | (sv << 8) | sv;
    } else if (colorMode === 1) {
      if (b < 0.25) {
        sv = b * 4;
        r = (sv * 64) | 0; g = 0; bl = (128 + sv * 127) | 0;
      } else if (b < 0.5) {
        sv = (b - 0.25) * 4;
        r = (64 + sv * 191) | 0; g = 0; bl = (255 * (1 - sv)) | 0;
      } else if (b < 0.75) {
        sv = (b - 0.5) * 4;
        r = 255; g = (sv * 200) | 0; bl = 0;
      } else {
        sv = (b - 0.75) * 4;
        r = 255; g = (200 + sv * 55) | 0; bl = (sv * 255) | 0;
      }
      buf32[i] = 0xFF000000 | (bl << 16) | (g << 8) | r;
    } else if (colorMode === 2) {
      if (b < 0.33) {
        sv = b / 0.33;
        r = (sv * 128) | 0; g = 0; bl = (sv * 180) | 0;
      } else if (b < 0.66) {
        sv = (b - 0.33) / 0.33;
        r = (128 * (1 - sv)) | 0; g = (sv * 220) | 0; bl = (180 * (1 - sv)) | 0;
      } else {
        sv = (b - 0.66) / 0.34;
        r = (sv * 255) | 0; g = (220 + sv * 35) | 0; bl = (sv * 100) | 0;
      }
      buf32[i] = 0xFF000000 | (bl << 16) | (g << 8) | r;
    } else {
      if (b < 0.5) {
        sv = b * 2;
        r = 0; g = (sv * 180) | 0; bl = (80 + sv * 175) | 0;
      } else {
        sv = (b - 0.5) * 2;
        r = (sv * 255) | 0; g = (180 + sv * 75) | 0; bl = 255;
      }
      buf32[i] = 0xFF000000 | (bl << 16) | (g << 8) | r;
    }
  }
  ctx.putImageData(imgData, 0, 0);
}

function loop(ts) {
  if (lastFpsTime < 0) { lastFpsTime = ts; }
  /* Always handle paint + render so drawing works while paused */
  if (!paused) {
    var s;
    for (s = 0; s < stepsPerFrame; s++) { step(); }
  }
  if (painting) { paintAt(paintX, paintY); }
  render();
  frameCount++;
  if (ts - lastFpsTime >= 1000) {
    var fps = Math.round(frameCount * 1000 / (ts - lastFpsTime));
    document.getElementById('fpsDisplay').textContent = fps + ' fps';
    frameCount = 0;
    lastFpsTime = ts;
  }
  requestAnimationFrame(loop);
}

function canvasToGrid(e) {
  var rect = canvas.getBoundingClientRect();
  return {
    x: Math.floor((e.clientX - rect.left) / rect.width * G),
    y: Math.floor((e.clientY - rect.top) / rect.height * G)
  };
}

canvas.addEventListener('pointerdown', function (e) {
  e.preventDefault();
  painting = true;
  canvas.setPointerCapture(e.pointerId);
  var c = canvasToGrid(e);
  paintX = c.x; paintY = c.y;
  paintAt(c.x, c.y);
});
canvas.addEventListener('pointermove', function (e) {
  if (!painting) { return; }
  e.preventDefault();
  var c = canvasToGrid(e);
  paintX = c.x; paintY = c.y;
});
canvas.addEventListener('pointerup', function () { painting = false; });
canvas.addEventListener('pointercancel', function () { painting = false; });

function sizeCanvas() {
  var wrap = document.getElementById('canvasWrap');
  var w = wrap.clientWidth;
  var h = wrap.clientHeight;
  var sz = Math.min(w, h) - 8;
  if (sz < 80) { sz = 80; }
  canvas.style.width = sz + 'px';
  canvas.style.height = sz + 'px';
}
window.addEventListener('resize', sizeCanvas);

var pbDiv = document.getElementById('presetBtns');
PRESETS.forEach(function (pr, i) {
  var btn = document.createElement('button');
  btn.className = 'btn' + (i === 0 ? ' active' : '');
  btn.textContent = pr.name;
  btn.addEventListener('click', function () {
    F = pr.f;
    K = pr.k;
    document.getElementById('fSlider').value = String(pr.f);
    document.getElementById('kSlider').value = String(pr.k);
    document.getElementById('fVal').textContent = pr.f.toFixed(4);
    document.getElementById('kVal').textContent = pr.k.toFixed(4);
    pbDiv.querySelectorAll('.btn').forEach(function (b2, j) {
      b2.classList.toggle('active', j === i);
    });
    /* Apply params only — click Reset for a fresh start */
  });
  pbDiv.appendChild(btn);
});

var cbDiv = document.getElementById('colorBtns');
COLOR_NAMES.forEach(function (name, i) {
  var btn = document.createElement('button');
  btn.className = 'btn' + (i === 0 ? ' active' : '');
  btn.textContent = name;
  btn.addEventListener('click', function () {
    colorMode = i;
    cbDiv.querySelectorAll('.btn').forEach(function (b2, j) {
      b2.classList.toggle('active', j === i);
    });
  });
  cbDiv.appendChild(btn);
});

var bbDiv = document.getElementById('brushBtns');
BRUSH_NAMES.forEach(function (name, i) {
  var btn = document.createElement('button');
  btn.className = 'btn' + (i === activeBrushIdx ? ' active' : '');
  btn.textContent = name;
  btn.addEventListener('click', function () {
    brushSize = BRUSH_RADII[i];
    activeBrushIdx = i;
    bbDiv.querySelectorAll('.btn').forEach(function (b2, j) {
      b2.classList.toggle('active', j === i);
    });
  });
  bbDiv.appendChild(btn);
});

document.getElementById('fSlider').addEventListener('input', function () {
  var v = parseFloat(this.value);
  if (!isNaN(v) && v >= 0.0 && v <= 0.2) { F = v; }
  document.getElementById('fVal').textContent = F.toFixed(4);
});
document.getElementById('kSlider').addEventListener('input', function () {
  var v = parseFloat(this.value);
  if (!isNaN(v) && v >= 0.0 && v <= 0.2) { K = v; }
  document.getElementById('kVal').textContent = K.toFixed(4);
});
document.getElementById('speedSlider').addEventListener('input', function () {
  stepsPerFrame = parseInt(this.value, 10);
  document.getElementById('speedVal').textContent = String(stepsPerFrame);
});

document.getElementById('resetBtn').addEventListener('click', function () { init(); });
document.getElementById('seedBtn').addEventListener('click', function () { addSeed(); });
document.getElementById('pauseBtn').addEventListener('click', function () {
  paused = !paused;
  this.textContent = paused ? 'Play' : 'Pause';
  this.classList.toggle('active', paused);
});
document.getElementById('saveBtn').addEventListener('click', function () {
  var off = document.createElement('canvas');
  off.width = G * 3;
  off.height = G * 3;
  var octx = off.getContext('2d');
  octx.imageSmoothingEnabled = false;
  octx.drawImage(canvas, 0, 0, G * 3, G * 3);
  var a = document.createElement('a');
  a.download = 'reaction-diffusion.png';
  a.href = off.toDataURL('image/png');
  document.body.appendChild(a);
  a.click();
  document.body.removeChild(a);
});

/* Initialize — brushSize derived from BRUSH_RADII after array is defined */
brushSize = BRUSH_RADII[activeBrushIdx];
init();
sizeCanvas();
requestAnimationFrame(loop);

}());
</script>
