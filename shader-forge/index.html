<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>SHADER FORGE</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #0a0a0a;
  overflow: hidden;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
  color: #ccc;
}

:root {
  --accent: #0ff;
  --bg-page: #0a0a0a;
  --bg-surface: #111;
  --bg-elevated: #1a1a1a;
  --bg-hover: #222;
  --border-default: #1a1a1a;
  --border-active: #444;
  --text-primary: #fff;
  --text-body: #ccc;
  --text-secondary: #aaa;
  --text-tertiary: #555;
  --text-label: #444;
  --color-error: #f85149;
  --color-success: #3fb950;
  --color-warning: #d29922;
}

#app {
  display: flex;
  height: 100vh;
  width: 100vw;
}

/* LEFT PANEL */
#left-panel {
  width: 380px;
  min-width: 280px;
  display: flex;
  flex-direction: column;
  border-right: 1px solid var(--border-default);
  background: var(--bg-page);
  flex-shrink: 0;
}

#header {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
}

#title {
  font-size: 0.7rem;
  font-weight: 700;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--accent);
}

#stats {
  font-size: 0.5rem;
  letter-spacing: 0.1em;
  color: var(--text-tertiary);
  font-variant-numeric: tabular-nums;
}

#preset-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  padding: 8px 12px;
  border-bottom: 1px solid var(--border-default);
  flex-shrink: 0;
}

.preset-btn {
  padding: 3px 7px;
  background: transparent;
  border: 1px solid var(--border-default);
  color: var(--text-tertiary);
  font-family: inherit;
  font-size: 0.45rem;
  cursor: pointer;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  transition: color 0.1s, border-color 0.1s;
}
.preset-btn:hover { border-color: var(--border-active); color: var(--text-body); }
.preset-btn.active { border-color: var(--accent); color: var(--accent); }

#editor-wrap {
  flex: 1;
  position: relative;
  overflow: hidden;
}

#editor {
  width: 100%;
  height: 100%;
  background: var(--bg-page);
  color: #ccc;
  border: none;
  outline: none;
  resize: none;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
  font-size: 0.65rem;
  line-height: 1.5;
  padding: 10px 12px;
  tab-size: 2;
  white-space: pre;
  overflow-wrap: normal;
  overflow-x: auto;
  overflow-y: auto;
  caret-color: var(--accent);
  field-sizing: content;
}

#error-panel {
  display: none;
  background: #1a0808;
  border-top: 1px solid #3a1010;
  padding: 8px 12px;
  font-size: 0.55rem;
  color: var(--color-error);
  max-height: 120px;
  overflow-y: auto;
  flex-shrink: 0;
  white-space: pre-wrap;
}
#error-panel.visible { display: block; }

#controls {
  display: flex;
  align-items: center;
  gap: 6px;
  padding: 8px 12px;
  border-top: 1px solid var(--border-default);
  flex-shrink: 0;
  flex-wrap: wrap;
}

.btn {
  padding: 4px 10px;
  background: transparent;
  border: 1px solid var(--border-default);
  color: var(--text-label);
  font-family: inherit;
  font-size: 0.5rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  transition: color 0.1s, border-color 0.1s;
}
.btn:hover { border-color: var(--border-active); color: var(--text-body); }
.btn:active { border-color: #666; color: #fff; }
.btn.primary { border-color: var(--accent); color: var(--accent); }
.btn.primary:hover { background: rgba(0,255,255,0.05); }
.btn.danger { border-color: var(--color-error); color: var(--color-error); }

#compile-hint {
  font-size: 0.45rem;
  color: var(--text-tertiary);
  letter-spacing: 0.05em;
  margin-left: auto;
}

/* RIGHT PANEL - CANVAS */
#right-panel {
  flex: 1;
  position: relative;
  overflow: hidden;
  background: #000;
}

#gl-canvas {
  width: 100%;
  height: 100%;
  display: block;
  cursor: crosshair;
}

#canvas-overlay {
  position: absolute;
  top: 8px;
  right: 8px;
  display: flex;
  flex-direction: column;
  gap: 4px;
  align-items: flex-end;
}

.overlay-badge {
  font-size: 0.45rem;
  letter-spacing: 0.08em;
  color: rgba(255,255,255,0.25);
  background: rgba(0,0,0,0.5);
  padding: 2px 6px;
  text-transform: uppercase;
}

#uniform-panel {
  position: absolute;
  bottom: 8px;
  right: 8px;
  background: rgba(0,0,0,0.65);
  border: 1px solid rgba(255,255,255,0.06);
  padding: 6px 10px;
  font-size: 0.45rem;
  color: rgba(255,255,255,0.3);
  letter-spacing: 0.06em;
  line-height: 1.7;
}

#toast {
  position: fixed;
  bottom: 20px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0,255,255,0.1);
  border: 1px solid var(--accent);
  color: var(--accent);
  padding: 6px 16px;
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  z-index: 100;
}
#toast.show { opacity: 1; }

/* MOBILE */
@media (max-width: 640px) {
  #app { flex-direction: column; }
  #left-panel {
    width: 100%;
    min-width: unset;
    height: 55vh;
    border-right: none;
    border-top: 1px solid var(--border-default);
    order: 2;
  }
  #right-panel {
    height: 45vh;
    order: 1;
  }
  #editor { font-size: 0.6rem; }
}
</style>
</head>
<body>
<div id="app">
  <div id="left-panel">
    <div id="header">
      <span id="title">Shader Forge</span>
      <span id="stats">-- fps &nbsp;|&nbsp; paused: off</span>
    </div>
    <div id="preset-row">
      <button class="preset-btn active" data-preset="mandelbrot">Mandelbrot</button>
      <button class="preset-btn" data-preset="julia">Julia</button>
      <button class="preset-btn" data-preset="voronoi">Voronoi</button>
      <button class="preset-btn" data-preset="plasma">Plasma</button>
      <button class="preset-btn" data-preset="fbm">FBM Noise</button>
      <button class="preset-btn" data-preset="kaleid">Kaleidoscope</button>
      <button class="preset-btn" data-preset="raymarch">Raymarching</button>
      <button class="preset-btn" data-preset="warp">Domain Warp</button>
    </div>
    <div id="editor-wrap">
      <textarea id="editor" spellcheck="false" autocomplete="off" autocorrect="off" autocapitalize="off"></textarea>
    </div>
    <div id="error-panel"></div>
    <div id="controls">
      <button class="btn primary" id="btn-compile">Compile</button>
      <button class="btn" id="btn-pause">Pause</button>
      <button class="btn" id="btn-screenshot">Shot</button>
      <button class="btn" id="btn-reset">Reset</button>
      <span id="compile-hint">ctrl+enter</span>
    </div>
  </div>
  <div id="right-panel">
    <canvas id="gl-canvas"></canvas>
    <div id="canvas-overlay">
      <div class="overlay-badge" id="badge-fps">0 fps</div>
      <div class="overlay-badge" id="badge-res">0×0</div>
    </div>
    <div id="uniform-panel">
      u_time &nbsp;&nbsp; float &nbsp;&nbsp; seconds<br>
      u_resolution &nbsp; vec2 &nbsp;&nbsp; pixels<br>
      u_mouse &nbsp;&nbsp; vec2 &nbsp;&nbsp; norm 0-1
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
(function() {
'use strict';

// ─── PRESETS ────────────────────────────────────────────────────────────────

var PREAMBLE = [
  'precision highp float;',
  'uniform float u_time;',
  'uniform vec2 u_resolution;',
  'uniform vec2 u_mouse;',
  ''
].join('\n');

var PRESETS = {
  mandelbrot: [
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_resolution * 0.5) / min(u_resolution.x, u_resolution.y);',
    '  float zoom = 2.5 + sin(u_time * 0.1) * 0.8;',
    '  vec2 c = uv * zoom - vec2(0.5, 0.0);',
    '  vec2 z = vec2(0.0);',
    '  float iter = 0.0;',
    '  const float MAX = 128.0;',
    '  for (float i = 0.0; i < MAX; i++) {',
    '    if (dot(z, z) > 4.0) break;',
    '    z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;',
    '    iter = i;',
    '  }',
    '  float t = iter / MAX;',
    '  vec3 col = 0.5 + 0.5 * cos(3.14159 * 2.0 * (t * 3.0 + vec3(0.0, 0.33, 0.67) + u_time * 0.05));',
    '  col *= smoothstep(0.0, 0.02, t);',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n'),

  julia: [
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_resolution * 0.5) / min(u_resolution.x, u_resolution.y) * 3.0;',
    '  float angle = u_time * 0.15;',
    '  vec2 c = vec2(cos(angle) * 0.7885, sin(angle) * 0.7885);',
    '  vec2 z = uv;',
    '  float iter = 0.0;',
    '  const float MAX = 96.0;',
    '  for (float i = 0.0; i < MAX; i++) {',
    '    if (dot(z, z) > 4.0) break;',
    '    z = vec2(z.x*z.x - z.y*z.y, 2.0*z.x*z.y) + c;',
    '    iter = i;',
    '  }',
    '  float t = iter / MAX;',
    '  float band = fract(t * 8.0 + u_time * 0.1);',
    '  vec3 col = mix(vec3(0.0, 0.02, 0.15), vec3(0.0, 1.0, 0.8), smoothstep(0.0, 0.5, band));',
    '  col = mix(col, vec3(1.0), smoothstep(0.9, 1.0, band));',
    '  gl_FragColor = vec4(col * (1.0 - smoothstep(0.95, 1.0, t)), 1.0);',
    '}'
  ].join('\n'),

  voronoi: [
    'vec2 hash2(vec2 p) {',
    '  p = vec2(dot(p, vec2(127.1, 311.7)), dot(p, vec2(269.5, 183.3)));',
    '  return fract(sin(p) * 43758.5453);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_resolution.y * 6.0;',
    '  vec2 i_uv = floor(uv);',
    '  vec2 f_uv = fract(uv);',
    '  float minDist = 8.0;',
    '  float minDist2 = 8.0;',
    '  vec2 minCell = vec2(0.0);',
    '  for (int y = -1; y <= 1; y++) {',
    '    for (int x = -1; x <= 1; x++) {',
    '      vec2 neighbor = vec2(float(x), float(y));',
    '      vec2 cell = i_uv + neighbor;',
    '      vec2 off = hash2(cell);',
    '      off = 0.5 + 0.45 * sin(u_time * 0.5 + 6.28318 * off);',
    '      vec2 r = neighbor + off - f_uv;',
    '      float d = dot(r, r);',
    '      if (d < minDist) { minDist2 = minDist; minDist = d; minCell = cell; }',
    '      else if (d < minDist2) { minDist2 = d; }',
    '    }',
    '  }',
    '  float edge = minDist2 - minDist;',
    '  float h = hash2(minCell).x;',
    '  vec3 col = 0.5 + 0.5 * cos(6.28318 * (h + vec3(0.0, 0.33, 0.67)));',
    '  col *= 0.7 + 0.3 * smoothstep(0.0, 0.05, edge);',
    '  col -= smoothstep(0.0, 0.03, sqrt(minDist)) * 0.5;',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n'),

  plasma: [
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_resolution;',
    '  float t = u_time * 0.5;',
    '  float s1 = sin(uv.x * 8.0 + t);',
    '  float s2 = sin(uv.y * 8.0 + t * 1.3);',
    '  float s3 = sin((uv.x + uv.y) * 6.0 + t * 0.7);',
    '  float s4 = sin(sqrt(dot(uv - 0.5, uv - 0.5)) * 12.0 - t * 2.0);',
    '  float v = (s1 + s2 + s3 + s4) * 0.25;',
    '  float r = 0.5 + 0.5 * sin(v * 3.14159 + 0.0);',
    '  float g = 0.5 + 0.5 * sin(v * 3.14159 + 2.094);',
    '  float b = 0.5 + 0.5 * sin(v * 3.14159 + 4.189);',
    '  gl_FragColor = vec4(r, g, b, 1.0);',
    '}'
  ].join('\n'),

  fbm: [
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);',
    '}',
    '',
    'float noise(vec2 p) {',
    '  vec2 i = floor(p);',
    '  vec2 f = fract(p);',
    '  f = f * f * (3.0 - 2.0 * f);',
    '  return mix(',
    '    mix(hash(i), hash(i + vec2(1,0)), f.x),',
    '    mix(hash(i + vec2(0,1)), hash(i + vec2(1,1)), f.x),',
    '    f.y);',
    '}',
    '',
    'float fbm(vec2 p) {',
    '  float v = 0.0, a = 0.5;',
    '  for (int i = 0; i < 6; i++) {',
    '    v += a * noise(p);',
    '    p = p * 2.0 + vec2(1.7, 9.2);',
    '    a *= 0.5;',
    '  }',
    '  return v;',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_resolution;',
    '  uv = uv * 3.0 + vec2(u_time * 0.05, 0.0);',
    '  float f = fbm(uv + fbm(uv + fbm(uv)));',
    '  vec3 col = mix(vec3(0.1, 0.05, 0.3), vec3(0.0, 0.8, 0.9), f);',
    '  col = mix(col, vec3(1.0, 0.95, 0.8), f * f * f);',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n'),

  kaleid: [
    'vec2 hash2(vec2 p) {',
    '  p = vec2(dot(p,vec2(127.1,311.7)), dot(p,vec2(269.5,183.3)));',
    '  return fract(sin(p)*43758.5453);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_resolution * 0.5) / min(u_resolution.x, u_resolution.y);',
    '  float r = length(uv);',
    '  float a = atan(uv.y, uv.x);',
    '  const float SIDES = 6.0;',
    '  a = mod(a, 3.14159 * 2.0 / SIDES);',
    '  a = abs(a - 3.14159 / SIDES);',
    '  uv = vec2(cos(a), sin(a)) * r;',
    '  uv = uv * 3.0 + u_time * 0.12;',
    '  float v = 0.0;',
    '  v += sin(uv.x * 3.0 + u_time) * 0.5;',
    '  v += sin(uv.y * 4.0 - u_time * 1.2) * 0.3;',
    '  v += sin((uv.x + uv.y) * 2.5 + u_time * 0.7) * 0.2;',
    '  vec3 col = 0.5 + 0.5 * cos(v * 3.14159 + vec3(0.0, 2.094, 4.189) + u_time * 0.1);',
    '  col *= smoothstep(1.2, 0.4, r);',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n'),

  raymarch: [
    'float sdSphere(vec3 p, float r) { return length(p) - r; }',
    'float sdBox(vec3 p, vec3 b) {',
    '  vec3 q = abs(p) - b;',
    '  return length(max(q, 0.0)) + min(max(q.x, max(q.y, q.z)), 0.0);',
    '}',
    '',
    'float smin(float a, float b, float k) {',
    '  float h = max(k - abs(a-b), 0.0) / k;',
    '  return min(a, b) - h*h*h*k*(1.0/6.0);',
    '}',
    '',
    'float scene(vec3 p) {',
    '  float t = u_time * 0.5;',
    '  vec3 p1 = p - vec3(sin(t)*0.6, 0.0, 0.0);',
    '  vec3 p2 = p - vec3(-sin(t)*0.6, cos(t)*0.4, 0.0);',
    '  vec3 p3 = p - vec3(0.0, -cos(t)*0.6, sin(t)*0.4);',
    '  return smin(smin(sdSphere(p1, 0.45), sdSphere(p2, 0.4), 0.3), sdSphere(p3, 0.38), 0.3);',
    '}',
    '',
    'vec3 normal(vec3 p) {',
    '  vec2 e = vec2(0.001, 0.0);',
    '  return normalize(vec3(',
    '    scene(p+e.xyy)-scene(p-e.xyy),',
    '    scene(p+e.yxy)-scene(p-e.yxy),',
    '    scene(p+e.yyx)-scene(p-e.yyx)',
    '  ));',
    '}',
    '',
    'void main() {',
    '  vec2 uv = (gl_FragCoord.xy - u_resolution*0.5) / min(u_resolution.x, u_resolution.y);',
    '  vec3 ro = vec3(0.0, 0.0, 2.5);',
    '  vec3 rd = normalize(vec3(uv, -1.5));',
    '  float d = 0.0;',
    '  vec3 p = ro;',
    '  bool hit = false;',
    '  for (int i = 0; i < 80; i++) {',
    '    float s = scene(p);',
    '    if (s < 0.001) { hit = true; break; }',
    '    if (d > 6.0) break;',
    '    d += s; p = ro + rd * d;',
    '  }',
    '  if (hit) {',
    '    vec3 n = normal(p);',
    '    vec3 light = normalize(vec3(1.0, 2.0, 3.0));',
    '    float diff = max(dot(n, light), 0.0);',
    '    float spec = pow(max(dot(reflect(-light, n), -rd), 0.0), 32.0);',
    '    vec3 col = vec3(0.0, 0.8, 1.0) * diff + vec3(1.0) * spec * 0.6;',
    '    col += vec3(0.02, 0.02, 0.08);',
    '    col = pow(col, vec3(0.4545));',
    '    gl_FragColor = vec4(col, 1.0);',
    '  } else {',
    '    vec3 bg = vec3(0.01, 0.01, 0.04) + length(uv) * 0.05 * vec3(0.0, 0.3, 0.8);',
    '    gl_FragColor = vec4(bg, 1.0);',
    '  }',
    '}'
  ].join('\n'),

  warp: [
    'float hash(vec2 p) {',
    '  return fract(sin(dot(p, vec2(127.1,311.7)))*43758.5453);',
    '}',
    'float noise(vec2 p) {',
    '  vec2 i=floor(p), f=fract(p);',
    '  f=f*f*(3.0-2.0*f);',
    '  return mix(mix(hash(i),hash(i+vec2(1,0)),f.x),mix(hash(i+vec2(0,1)),hash(i+vec2(1,1)),f.x),f.y);',
    '}',
    '',
    'void main() {',
    '  vec2 uv = gl_FragCoord.xy / u_resolution;',
    '  vec2 p = uv * 4.0;',
    '  float t = u_time * 0.2;',
    '  for (int i = 0; i < 4; i++) {',
    '    p += vec2(',
    '      noise(p + vec2(t * 0.5, 0.0)),',
    '      noise(p + vec2(0.0, t * 0.5))',
    '    ) * 1.5;',
    '    t += 1.9;',
    '  }',
    '  float v = noise(p);',
    '  vec3 a = vec3(0.05, 0.0, 0.2);',
    '  vec3 b = vec3(0.0, 0.9, 0.6);',
    '  vec3 c = vec3(1.0, 0.95, 0.4);',
    '  vec3 col = mix(a, b, v);',
    '  col = mix(col, c, v * v * v);',
    '  gl_FragColor = vec4(col, 1.0);',
    '}'
  ].join('\n')
};

// ─── ELEMENTS ───────────────────────────────────────────────────────────────

var canvas = document.getElementById('gl-canvas');
var editor = document.getElementById('editor');
var errorPanel = document.getElementById('error-panel');
var statsEl = document.getElementById('stats');
var badgeFps = document.getElementById('badge-fps');
var badgeRes = document.getElementById('badge-res');
var toast = document.getElementById('toast');
var presetBtns = document.querySelectorAll('.preset-btn');

// ─── WEBGL STATE ────────────────────────────────────────────────────────────

var gl = null;
var program = null;
var vertexBuf = null;
var uniformTime = null;
var uniformRes = null;
var uniformMouse = null;

var paused = false;
var startTime = 0;
var pausedTime = 0;
var pausedAt = 0;
var frameCount = 0;
var lastFpsTime = 0;
var currentFps = 0;
var mouseX = 0;
var mouseY = 0;
var rafId = null;
var compileTimeout = null;
var activePreset = 'mandelbrot';
var toastTimeout = null;

var VERT_SRC = [
  'attribute vec2 a_pos;',
  'void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }'
].join('\n');

function initGL() {
  var opts = { antialias: false, alpha: false, depth: false, stencil: false, preserveDrawingBuffer: true };
  gl = canvas.getContext('webgl', opts) || canvas.getContext('experimental-webgl', opts);
  if (!gl) {
    showError('WebGL not supported in this browser.');
    return false;
  }
  vertexBuf = gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuf);
  gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
  return true;
}

function compileShader(src, type) {
  var sh = gl.createShader(type);
  gl.shaderSource(sh, src);
  gl.compileShader(sh);
  if (!gl.getShaderParameter(sh, gl.COMPILE_STATUS)) {
    var err = gl.getShaderInfoLog(sh);
    gl.deleteShader(sh);
    return { error: err };
  }
  return { shader: sh };
}

function buildProgram(fragSrc) {
  var vResult = compileShader(VERT_SRC, gl.VERTEX_SHADER);
  if (vResult.error) { showError('VERTEX:\n' + vResult.error); return false; }

  var fullFrag = PREAMBLE + fragSrc;
  var fResult = compileShader(fullFrag, gl.FRAGMENT_SHADER);
  if (fResult.error) {
    gl.deleteShader(vResult.shader);
    // Offset line numbers by preamble lines
    var preambleLines = PREAMBLE.split('\n').length - 1;
    var errText = fResult.error.replace(/ERROR: \d+:(\d+)/g, function(match, lineNum) {
      var adjusted = parseInt(lineNum, 10) - preambleLines;
      return 'ERROR: line ' + Math.max(1, adjusted);
    });
    showError(errText);
    return false;
  }

  var prog = gl.createProgram();
  gl.attachShader(prog, vResult.shader);
  gl.attachShader(prog, fResult.shader);
  gl.linkProgram(prog);
  gl.deleteShader(vResult.shader);
  gl.deleteShader(fResult.shader);

  if (!gl.getProgramParameter(prog, gl.LINK_STATUS)) {
    showError('LINK:\n' + gl.getProgramInfoLog(prog));
    gl.deleteProgram(prog);
    return false;
  }

  if (program) { gl.deleteProgram(program); }
  program = prog;
  gl.useProgram(program);

  var aPos = gl.getAttribLocation(program, 'a_pos');
  gl.bindBuffer(gl.ARRAY_BUFFER, vertexBuf);
  gl.enableVertexAttribArray(aPos);
  gl.vertexAttribPointer(aPos, 2, gl.FLOAT, false, 0, 0);

  uniformTime  = gl.getUniformLocation(program, 'u_time');
  uniformRes   = gl.getUniformLocation(program, 'u_resolution');
  uniformMouse = gl.getUniformLocation(program, 'u_mouse');

  hideError();
  return true;
}

function resizeCanvas() {
  var dpr = window.devicePixelRatio || 1;
  var w = Math.round(canvas.clientWidth * dpr);
  var h = Math.round(canvas.clientHeight * dpr);
  if (w !== canvas.width || h !== canvas.height) {
    canvas.width = w;
    canvas.height = h;
    if (gl) { gl.viewport(0, 0, w, h); }
    var cssW = canvas.clientWidth;
    var cssH = canvas.clientHeight;
    badgeRes.textContent = cssW + '\xd7' + cssH;
  }
}

function getElapsed() {
  if (paused) { return (pausedAt - startTime) / 1000; }
  return (performance.now() - startTime - pausedTime) / 1000;
}

function render(now) {
  rafId = requestAnimationFrame(render);
  if (!gl || !program) return;

  resizeCanvas();
  if (paused) return;

  frameCount++;
  if (now - lastFpsTime >= 1000) {
    currentFps = Math.round(frameCount * 1000 / (now - lastFpsTime));
    frameCount = 0;
    lastFpsTime = now;
    badgeFps.textContent = currentFps + ' fps';
    statsEl.textContent = currentFps + ' fps  |  paused: ' + (paused ? 'on' : 'off');
  }

  var elapsed = getElapsed();
  gl.uniform1f(uniformTime, elapsed);
  gl.uniform2f(uniformRes, canvas.width, canvas.height);
  gl.uniform2f(uniformMouse, mouseX, mouseY);
  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ─── ERROR DISPLAY ──────────────────────────────────────────────────────────

function showError(msg) {
  errorPanel.textContent = msg;
  errorPanel.classList.add('visible');
}

function hideError() {
  errorPanel.classList.remove('visible');
}

// ─── COMPILE ────────────────────────────────────────────────────────────────

function compile() {
  if (!gl) return;
  buildProgram(editor.value);
}

function scheduleCompile() {
  clearTimeout(compileTimeout);
  compileTimeout = setTimeout(compile, 1200);
}

// ─── PRESET LOADING ─────────────────────────────────────────────────────────

function loadPreset(name) {
  if (!PRESETS[name]) return;
  activePreset = name;
  editor.value = PRESETS[name];
  compile();
  presetBtns.forEach(function(btn) {
    btn.classList.toggle('active', btn.dataset.preset === name);
  });
  // Reset time for fresh visual start
  startTime = performance.now();
  pausedTime = 0;
  if (paused) { pausedAt = performance.now(); }
}

// ─── MOUSE / TOUCH ──────────────────────────────────────────────────────────

canvas.addEventListener('mousemove', function(e) {
  var rect = canvas.getBoundingClientRect();
  mouseX = (e.clientX - rect.left) / rect.width;
  mouseY = 1.0 - (e.clientY - rect.top) / rect.height;
});

canvas.addEventListener('touchstart', function(e) {
  var rect = canvas.getBoundingClientRect();
  var t = e.touches[0];
  mouseX = (t.clientX - rect.left) / rect.width;
  mouseY = 1.0 - (t.clientY - rect.top) / rect.height;
}, { passive: true });

canvas.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var rect = canvas.getBoundingClientRect();
  var t = e.touches[0];
  mouseX = (t.clientX - rect.left) / rect.width;
  mouseY = 1.0 - (t.clientY - rect.top) / rect.height;
}, { passive: false });

// ─── CONTROLS ───────────────────────────────────────────────────────────────

document.getElementById('btn-compile').addEventListener('click', compile);

document.getElementById('btn-pause').addEventListener('click', function() {
  paused = !paused;
  if (paused) {
    pausedAt = performance.now();
    this.textContent = 'Resume';
    this.classList.add('primary');
  } else {
    pausedTime += performance.now() - pausedAt;
    this.textContent = 'Pause';
    this.classList.remove('primary');
  }
  statsEl.textContent = currentFps + ' fps  |  paused: ' + (paused ? 'on' : 'off');
});

document.getElementById('btn-screenshot').addEventListener('click', function() {
  // Force one render to ensure preserveDrawingBuffer is useful
  if (gl && program) {
    var elapsed = getElapsed();
    gl.uniform1f(uniformTime, elapsed);
    gl.uniform2f(uniformRes, canvas.width, canvas.height);
    gl.uniform2f(uniformMouse, mouseX, mouseY);
    gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
  }
  canvas.toBlob(function(blob) {
    if (!blob) { showToast('Screenshot failed'); return; }
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'shader-forge-' + Date.now() + '.png';
    a.style.display = 'none';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    setTimeout(function() { URL.revokeObjectURL(url); }, 1000);
    showToast('Saved PNG');
  });
});

document.getElementById('btn-reset').addEventListener('click', function() {
  startTime = performance.now();
  pausedTime = 0;
  frameCount = 0;
  if (paused) { pausedAt = performance.now(); }
  showToast('Time reset');
});

presetBtns.forEach(function(btn) {
  btn.addEventListener('click', function() {
    loadPreset(btn.dataset.preset);
  });
});

editor.addEventListener('keydown', function(e) {
  // Ctrl/Cmd+Enter = compile
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter') {
    e.preventDefault();
    compile();
    return;
  }
  // Tab = insert 2 spaces
  if (e.key === 'Tab') {
    e.preventDefault();
    var start = editor.selectionStart;
    var end = editor.selectionEnd;
    editor.value = editor.value.slice(0, start) + '  ' + editor.value.slice(end);
    editor.selectionStart = editor.selectionEnd = start + 2;
    scheduleCompile();
    return;
  }
  // Auto-compile after pause
  scheduleCompile();
});

editor.addEventListener('paste', scheduleCompile);

// ─── TOAST ──────────────────────────────────────────────────────────────────

function showToast(msg) {
  clearTimeout(toastTimeout);
  toast.textContent = msg;
  toast.classList.add('show');
  toastTimeout = setTimeout(function() { toast.classList.remove('show'); }, 1800);
}

// ─── RESIZE ─────────────────────────────────────────────────────────────────

var resizeDebounce = null;
window.addEventListener('resize', function() {
  clearTimeout(resizeDebounce);
  resizeDebounce = setTimeout(resizeCanvas, 150);
});

// ─── INIT ───────────────────────────────────────────────────────────────────

startTime = performance.now();
lastFpsTime = performance.now();

if (initGL()) {
  resizeCanvas();
  loadPreset('mandelbrot');
  rafId = requestAnimationFrame(render);
} else {
  document.getElementById('right-panel').style.background = '#0a0a0a';
  document.getElementById('right-panel').innerHTML = '<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);color:#555;font-size:0.6rem;letter-spacing:0.2em;text-align:center;text-transform:uppercase">WebGL not available<br><br>Try a different browser</div>';
}

})();
</script>
</body>
</html>
