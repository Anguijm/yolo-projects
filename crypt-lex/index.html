<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Crypt-Lex</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { height: 100%; background: #0a0a0a; color: #ccc; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace; overflow: hidden; touch-action: manipulation; -webkit-tap-highlight-color: transparent; }
#app { height: 100%; display: flex; flex-direction: column; align-items: center; padding: 8px; }

/* Header */
#header { font-size: 0.7rem; color: #333; letter-spacing: 0.3em; margin-bottom: 6px; text-transform: uppercase; }

/* Status */
#status { font-size: 0.55rem; min-height: 1.4em; color: #444; letter-spacing: 0.1em; margin-bottom: 6px; text-align: center; }
#status.win { color: #3fb950; }
#status.lose { color: #f85149; }

/* Grid */
#grid { display: grid; grid-template-rows: repeat(6, 1fr); gap: 4px; margin-bottom: 8px; }
.row { display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px; }
.tile { width: clamp(42px, 13vw, 56px); height: clamp(42px, 13vw, 56px); border: 1px solid #1a1a1a; display: flex; align-items: center; justify-content: center; font-size: clamp(1.2rem, 4vw, 1.6rem); font-weight: 600; text-transform: uppercase; color: #888; }
.tile.filled { border-color: #333; color: #ddd; }
.tile.correct { background: #1a4a1a; border-color: #3fb950; color: #3fb950; }
.tile.present { background: #3a2a0a; border-color: #d29922; color: #d29922; }
.tile.absent { background: #1a1a1a; border-color: #333; color: #555; }

/* Reveal animation */
@keyframes reveal { 0% { transform: scaleY(0); } 50% { transform: scaleY(0); } 100% { transform: scaleY(1); } }
.tile.revealing { animation: reveal 0.3s ease-out; }

/* Shake animation */
@keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-4px); } 75% { transform: translateX(4px); } }
.row.shake { animation: shake 0.15s ease-in-out 2; }

/* Keyboard */
#keyboard { display: flex; flex-direction: column; gap: 4px; align-items: center; width: 100%; max-width: 500px; }
.kb-row { display: flex; gap: 3px; justify-content: center; width: 100%; }
.key { flex: 1; max-width: 36px; height: clamp(36px, 10vw, 46px); border: 1px solid #1a1a1a; background: #111; display: flex; align-items: center; justify-content: center; font-size: clamp(0.6rem, 2.5vw, 0.8rem); color: #666; cursor: pointer; text-transform: uppercase; font-family: inherit; font-weight: 500; }
.key:active { background: #222; }
.key.wide { max-width: 52px; font-size: 0.5rem; letter-spacing: 0.05em; }
.key.correct { background: #1a4a1a; border-color: #3fb950; color: #3fb950; }
.key.present { background: #3a2a0a; border-color: #d29922; color: #d29922; }
.key.absent { background: #1a1a1a; border-color: #222; color: #333; }

/* New game button */
#btn-new { display: none; margin-top: 8px; padding: 6px 16px; background: transparent; border: 1px solid #222; color: #444; font-family: inherit; font-size: 0.55rem; cursor: pointer; letter-spacing: 0.15em; text-transform: uppercase; }
#btn-new:active { border-color: #555; color: #888; }
</style>
</head>
<body>
<div id="app">
  <div id="header">Crypt-Lex</div>
  <div id="status"></div>
  <div id="grid"></div>
  <div id="keyboard"></div>
  <button id="btn-new">New Game</button>
</div>

for (var i = 0; i < EXTRA.length; i++) {
  if (VALID.indexOf(EXTRA[i]) === -1) VALID.push(EXTRA[i]);

// ============ STATE ============
var target = '';
var guesses = []; // array of strings
var currentGuess = '';
var gameOver = false;
var ROW_COUNT = 6;
var keyStates = {}; // letter -> 'correct'|'present'|'absent'

// ============ INIT GAME ============
function newGame() {
  target = TARGETS[Math.floor(Math.random() * TARGETS.length)];
  guesses = [];
  currentGuess = '';
  gameOver = false;
  keyStates = {};
  document.getElementById('status').textContent = '';
  document.getElementById('status').className = '';
  document.getElementById('btn-new').style.display = 'none';
  buildGrid();
  buildKeyboard();
}

// ============ GRID ============
function buildGrid() {
  var grid = document.getElementById('grid');
  grid.innerHTML = '';
  for (var r = 0; r < ROW_COUNT; r++) {
    var row = document.createElement('div');
    row.className = 'row';
    row.dataset.row = r;
    for (var c = 0; c < 5; c++) {
      var tile = document.createElement('div');
      tile.className = 'tile';
      row.appendChild(tile);
    }
    grid.appendChild(row);
  }
}

function updateGrid() {
  var rows = document.getElementById('grid').children;
  // Render submitted guesses
  for (var g = 0; g < guesses.length; g++) {
    var tiles = rows[g].children;
    var result = evaluate(guesses[g]);
    for (var i = 0; i < 5; i++) {
      tiles[i].textContent = guesses[g][i];
      tiles[i].className = 'tile ' + result[i];
    }
  }
  // Render current input
  var currentRow = guesses.length;
  if (currentRow < ROW_COUNT) {
    var tiles = rows[currentRow].children;
    for (var i = 0; i < 5; i++) {
      tiles[i].textContent = currentGuess[i] || '';
      tiles[i].className = currentGuess[i] ? 'tile filled' : 'tile';
    }
    // Clear remaining rows
    for (var r = currentRow + 1; r < ROW_COUNT; r++) {
      var t = rows[r].children;
      for (var i = 0; i < 5; i++) { t[i].textContent = ''; t[i].className = 'tile'; }
    }
  }
}

// ============ TWO-PASS EVALUATION ============
function evaluate(guess) {
  var result = ['absent', 'absent', 'absent', 'absent', 'absent'];
  var targetCounts = {};
  for (var i = 0; i < 5; i++) {
    targetCounts[target[i]] = (targetCounts[target[i]] || 0) + 1;
  }
  // Pass 1: Exact matches
  for (var i = 0; i < 5; i++) {
    if (guess[i] === target[i]) {
      result[i] = 'correct';
      targetCounts[guess[i]]--;
    }
  }
  // Pass 2: Present (wrong position)
  for (var i = 0; i < 5; i++) {
    if (result[i] !== 'correct' && targetCounts[guess[i]] > 0) {
      result[i] = 'present';
      targetCounts[guess[i]]--;
    }
  }
  return result;
}

// ============ KEYBOARD ============
var KB_ROWS = [
  ['q','w','e','r','t','y','u','i','o','p'],
  ['a','s','d','f','g','h','j','k','l'],
  ['enter','z','x','c','v','b','n','m','back']
];

function buildKeyboard() {
  var kb = document.getElementById('keyboard');
  kb.innerHTML = '';
  for (var r = 0; r < KB_ROWS.length; r++) {
    var row = document.createElement('div');
    row.className = 'kb-row';
    for (var k = 0; k < KB_ROWS[r].length; k++) {
      var key = document.createElement('div');
      var letter = KB_ROWS[r][k];
      key.className = 'key';
      if (letter === 'enter' || letter === 'back') key.classList.add('wide');
      key.dataset.key = letter;
      key.textContent = letter === 'back' ? '⌫' : letter;
      row.appendChild(key);
    }
    kb.appendChild(row);
  }
}

function updateKeyboard() {
  var keys = document.querySelectorAll('.key');
  for (var i = 0; i < keys.length; i++) {
    var letter = keys[i].dataset.key;
    if (keyStates[letter]) {
      keys[i].classList.remove('correct', 'present', 'absent');
      keys[i].classList.add(keyStates[letter]);
    }
  }
}

function updateKeyStates(guess, result) {
  var STATE_PRIORITY = { 'absent': 1, 'present': 2, 'correct': 3 };
  for (var i = 0; i < 5; i++) {
    var letter = guess[i];
    var current = keyStates[letter];
    if (!current || STATE_PRIORITY[result[i]] > STATE_PRIORITY[current]) {
      keyStates[letter] = result[i];
    }
  }
}

// ============ INPUT ============
function updateActiveRow() {
  var rows = document.getElementById('grid').children;
  if (guesses.length >= ROW_COUNT) return;
  var tiles = rows[guesses.length].children;
  for (var i = 0; i < 5; i++) {
    tiles[i].textContent = currentGuess[i] || '';
    tiles[i].className = currentGuess[i] ? 'tile filled' : 'tile';
  }
}

function addLetter(letter) {
  if (gameOver || currentGuess.length >= 5) return;
  currentGuess += letter;
  updateActiveRow();
}

function removeLetter() {
  if (gameOver || currentGuess.length === 0) return;
  currentGuess = currentGuess.slice(0, -1);
  updateActiveRow();
}

function submitGuess() {
  if (gameOver || currentGuess.length !== 5) return;

  // Validate
  if (VALID.indexOf(currentGuess) === -1) {
    // Shake the current row
    var rows = document.getElementById('grid').children;
    var row = rows[guesses.length];
    row.classList.remove('shake');
    void row.offsetWidth; // Force reflow to restart animation on rapid presses
    row.classList.add('shake');
    document.getElementById('status').textContent = 'Not in word list';
    setTimeout(function() {
      if (!gameOver) document.getElementById('status').textContent = '';
    }, 1500);
    return;
  }

  var result = evaluate(currentGuess);
  // Render this row directly instead of re-evaluating all rows
  var tiles = document.getElementById('grid').children[guesses.length].children;
  for (var i = 0; i < 5; i++) {
    tiles[i].textContent = currentGuess[i];
    tiles[i].className = 'tile ' + result[i];
  }
  guesses.push(currentGuess);
  updateKeyStates(currentGuess, result);
  currentGuess = '';
  updateKeyboard();

  // Check win
  if (result.every(function(r) { return r === 'correct'; })) {
    gameOver = true;
    var msgs = ['Genius!', 'Magnificent!', 'Impressive!', 'Solid!', 'Good.', 'Phew!'];
    document.getElementById('status').textContent = msgs[guesses.length - 1] || 'Nice!';
    document.getElementById('status').className = 'win';
    document.getElementById('btn-new').style.display = 'block';
    return;
  }

  // Check lose
  if (guesses.length >= ROW_COUNT) {
    gameOver = true;
    document.getElementById('status').textContent = target.toUpperCase();
    document.getElementById('status').className = 'lose';
    document.getElementById('btn-new').style.display = 'block';
  }
}

// ============ EVENTS ============
document.addEventListener('keydown', function(e) {
  if (e.ctrlKey || e.metaKey || e.altKey) return;
  if (e.key === 'Enter') { submitGuess(); return; }
  if (e.key === 'Backspace') { e.preventDefault(); removeLetter(); return; }
  var key = e.key.toLowerCase();
  if (/^[a-z]$/.test(key)) addLetter(key);
});

document.getElementById('keyboard').addEventListener('click', function(e) {
  var key = e.target.closest('.key');
  if (!key) return;
  var letter = key.dataset.key;
  if (letter === 'enter') submitGuess();
  else if (letter === 'back') removeLetter();
  else addLetter(letter);
});

document.getElementById('btn-new').addEventListener('click', newGame);

// ============ START ============
newGame();

})();
</script>
