# Ruff config for yolo-projects.
#
# Scope: actively-maintained Python only. The 200+ project subdirectories
# (markdown-deck, naval-scribe, individual one-off tools) plus the
# experiments/ directory contain throwaway prototypes that lint at ~80
# F401/F541/E701/E702 errors. Linting all of them on every PR adds
# noise without value — those tools either ship as single-file HTML
# (no Python in the deliverable) or are research spikes that intentionally
# bend style.
#
# What IS in scope:
#   - scripts/         — Phase 4 card generator + setup utilities
#   - .harness/scripts/ — council runner + harness infrastructure
#
# To extend: add a path here, then run `ruff check <new-path>` and
# clean up the residual errors before adding it. Don't widen the scope
# silently — the intent is "what we promise to keep clean," not
# "everything in the repo."

include = [
  "scripts/**/*.py",
  ".harness/scripts/**/*.py",
]
