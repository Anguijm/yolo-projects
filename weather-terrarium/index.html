<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Weather Terrarium</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #000; overflow: hidden; height: 100vh; font-family: 'Segoe UI', system-ui, sans-serif; }
canvas { display: block; position: fixed; inset: 0; }
#controls {
  position: fixed; top: 16px; right: 16px; z-index: 10;
  background: rgba(10, 10, 20, 0.75); backdrop-filter: blur(12px);
  border: 1px solid rgba(255,255,255,0.08); border-radius: 14px;
  padding: 18px 20px; width: 240px; color: #ccc;
  font-size: 12px;
}
#controls h2 { font-size: 13px; color: #fff; margin-bottom: 12px; letter-spacing: 0.1em; text-transform: uppercase; }
.slider-group { margin-bottom: 14px; }
.slider-group label { display: flex; justify-content: space-between; margin-bottom: 4px; color: #999; font-size: 11px; }
.slider-group label span { color: #fff; font-weight: bold; }
input[type=range] { -webkit-appearance: none; width: 100%; height: 4px; border-radius: 2px; background: #222; outline: none; }
input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 14px; height: 14px; border-radius: 50%; background: #fff; cursor: pointer; border: 2px solid #333; }
#weather-label { text-align: center; font-size: 14px; color: #fff; margin-top: 4px; font-weight: bold; letter-spacing: 0.05em; }
#presets { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 10px; }
#presets button { padding: 3px 8px; background: rgba(255,255,255,0.06); border: 1px solid rgba(255,255,255,0.1); color: #aaa; border-radius: 12px; cursor: pointer; font-size: 10px; font-family: inherit; }
#presets button:hover { background: rgba(255,255,255,0.12); color: #fff; }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="controls">
  <h2>Weather Terrarium</h2>
  <div class="slider-group">
    <label>Temperature <span id="temp-val">20</span>&deg;C</label>
    <input type="range" id="temp" min="-20" max="45" value="20">
  </div>
  <div class="slider-group">
    <label>Humidity <span id="hum-val">50</span>%</label>
    <input type="range" id="hum" min="0" max="100" value="50">
  </div>
  <div class="slider-group">
    <label>Wind <span id="wind-val">0</span> km/h</label>
    <input type="range" id="wind" min="-60" max="60" value="0">
  </div>
  <div class="slider-group">
    <label>Time of Day <span id="tod-val">12</span>h</label>
    <input type="range" id="tod" min="0" max="24" value="12" step="0.5">
  </div>
  <div id="weather-label">Clear</div>
  <div id="presets">
    <button data-p="thunderstorm">Storm</button>
    <button data-p="blizzard">Blizzard</button>
    <button data-p="desert">Desert</button>
    <button data-p="aurora">Aurora</button>
    <button data-p="spring">Spring</button>
    <button data-p="foggy">Fog</button>
  </div>
</div>

<script>
(function() {
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
let W, H;

// State
let temp = 20, humidity = 50, wind = 0, timeOfDay = 12;

// Smoothed state — lerp toward targets for smooth transitions
let smoothTemp = 20, smoothHum = 50, smoothWind = 0;
const LERP_SPEED = 2; // units per second convergence rate factor

var weatherLabelEl = document.getElementById('weather-label');
var lastWeatherLabel = '';
var frameTime = 0;

let resizeTimer;
function resize() {
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  generateLandscape();
}
window.addEventListener('resize', () => {
  // Quick resize for canvas dimensions, debounce landscape regeneration
  W = canvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  clearTimeout(resizeTimer);
  resizeTimer = setTimeout(generateLandscape, 150);
});

// ---- Landscape ----
let hills = [];
function generateLandscape() {
  hills = [];
  for (let layer = 0; layer < 4; layer++) {
    const pts = [];
    const baseY = H * (0.65 + layer * 0.08);
    const amp = 30 + layer * 15;
    const freq = 0.002 + layer * 0.001;
    const phase = layer * 100;
    for (let x = 0; x <= W; x += 4) {
      const y = baseY + Math.sin(x * freq + phase) * amp + Math.sin(x * freq * 2.7 + phase * 1.3) * amp * 0.4;
      pts.push(x, y);
    }
    hills.push({ pts, depth: layer });
  }
}

// ---- Particle pool ----
const MAX_PARTICLES = 3000;
const pool = [];
for (let i = 0; i < MAX_PARTICLES; i++) {
  pool.push({ active: false, x: 0, y: 0, vx: 0, vy: 0, life: 0, maxLife: 0, size: 0, type: '', alpha: 1 });
}

function spawn(type, x, y, vx, vy, life, size) {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = pool[i];
    if (!p.active) {
      p.active = true; p.x = x; p.y = y; p.vx = vx; p.vy = vy;
      p.life = life; p.maxLife = life; p.size = size; p.type = type; p.alpha = 1;
      return p;
    }
  }
  return null;
}

// ---- Weather classification ----
function getWeather() { return getWeatherEx(temp, humidity); }
function getWeatherEx(t, h) {
  if (t <= -5 && h > 60) return 'Blizzard';
  if (t <= 0 && h > 40) return 'Snow';
  if (t > 25 && h > 75) return 'Thunderstorm';
  if (t > 10 && h > 65) return 'Rain';
  if (h > 80) return 'Fog';
  if (t > 35 && h < 30) return 'Dust Storm';
  if (t > 30 && h < 40) return 'Haze';
  if (t < -10 && h < 30) return 'Aurora';
  if (h > 50) return 'Cloudy';
  if (t > 15 && t < 30 && h < 50) return 'Clear';
  return 'Clear';
}

// ---- Sky colors ----
function getSkyColors(weather, tod) {
  const night = tod < 5 || tod > 21;
  const dawn = tod >= 5 && tod < 7;
  const dusk = tod >= 19 && tod <= 21;

  if (night) {
    if (weather === 'Aurora') return ['#050520', '#0a1030', '#051025'];
    if (weather === 'Blizzard' || weather === 'Snow') return ['#151520', '#1a1a2a', '#0f0f18'];
    return ['#050510', '#0a0a18', '#050508'];
  }
  if (dawn || dusk) {
    if (weather === 'Thunderstorm') return ['#1a1520', '#2a1a25', '#151015'];
    return ['#1a0a20', '#cc5533', '#ffaa44'];
  }
  if (weather === 'Thunderstorm') return ['#1a1a25', '#252530', '#1a1a20'];
  if (weather === 'Rain') return ['#2a2a35', '#3a3a48', '#252530'];
  if (weather === 'Fog') return ['#3a3a3a', '#4a4a4a', '#353535'];
  if (weather === 'Blizzard' || weather === 'Snow') return ['#4a4a55', '#5a5a68', '#404050'];
  if (weather === 'Dust Storm') return ['#4a3a20', '#5a4a30', '#3a2a15'];
  if (weather === 'Haze') return ['#5a4a30', '#8a7050', '#4a3a20'];

  // Clear/Cloudy day
  const tBlue = Math.max(0, Math.min(1, (temp + 10) / 50));
  const r = ~~(30 + tBlue * 40);
  const g = ~~(80 + tBlue * 60);
  const b = ~~(160 + tBlue * 60);
  return [`rgb(${r},${g},${b})`, `rgb(${r+30},${g+30},${b+20})`, `rgb(${r+10},${g+15},${b+10})`];
}

// ---- Cloud generation ----
function drawClouds(weather) {
  const cloudiness = Math.max(0, Math.min(1, humidity / 100));
  if (cloudiness < 0.2 && weather !== 'Fog') return;

  const count = ~~(cloudiness * 12);
  const time = Date.now() / 1000;

  for (let i = 0; i < count; i++) {
    const baseX = ((i * 173.7 + time * (5 + wind * 0.3)) % (W + 400)) - 200;
    const baseY = 40 + (i * 67.3 % (H * 0.3));
    const scale = 0.6 + (i % 3) * 0.3;

    const alpha = weather === 'Thunderstorm' ? 0.7 : weather === 'Fog' ? 0.5 : 0.35;
    const brightness = weather === 'Thunderstorm' ? 40 : weather === 'Snow' || weather === 'Blizzard' ? 180 : 200;

    for (let j = 0; j < 5; j++) {
      const ox = (j - 2) * 35 * scale;
      const oy = Math.sin(j * 1.5) * 10 * scale;
      const r = (30 + j * 8) * scale;
      ctx.globalAlpha = alpha * (1 - Math.abs(j - 2) * 0.15);
      ctx.fillStyle = `rgb(${brightness},${brightness},${brightness + 10})`;
      ctx.beginPath();
      ctx.arc(baseX + ox, baseY + oy, r, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ---- Stars ----
let stars = [];
function initStars() {
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({ x: Math.random(), y: Math.random() * 0.6, size: 0.5 + Math.random() * 1.5, twinkle: Math.random() * Math.PI * 2 });
  }
}
initStars();

function drawStars(tod, cloudiness) {
  const nightFactor = tod < 5 || tod > 21 ? 1 : tod < 7 ? (7 - tod) / 2 : tod > 19 ? (tod - 19) / 2 : 0;
  if (nightFactor <= 0 || cloudiness > 0.7) return;
  const alpha = nightFactor * (1 - cloudiness);
  const time = Date.now() / 2000;
  for (const s of stars) {
    const twinkle = 0.4 + 0.6 * Math.sin(time + s.twinkle);
    ctx.globalAlpha = alpha * twinkle;
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(s.x * W, s.y * H, s.size, 0, Math.PI * 2);
    ctx.fill();
  }
  ctx.globalAlpha = 1;
}

// ---- Aurora ----
function drawAurora(tod) {
  const night = tod < 5 || tod > 21;
  if (!night) return;
  const time = Date.now() / 3000;
  for (let band = 0; band < 5; band++) {
    ctx.beginPath();
    ctx.moveTo(0, H * 0.15);
    for (let x = 0; x <= W; x += 8) {
      const y = H * (0.12 + band * 0.04) +
        Math.sin(x * 0.003 + time + band) * 30 +
        Math.sin(x * 0.007 + time * 1.3 + band * 2) * 15;
      ctx.lineTo(x, y);
    }
    ctx.lineTo(W, H * 0.4);
    ctx.lineTo(0, H * 0.4);
    ctx.closePath();
    const hue = 120 + band * 30;
    ctx.fillStyle = `hsla(${hue}, 80%, 50%, ${0.06 + Math.sin(time + band) * 0.03})`;
    ctx.fill();
  }
}

// ---- Lightning ----
let lightningFlash = 0;
let lightningBranches = [];

function generateLightning(x, y) {
  const branches = [];
  function branch(px, py, angle, depth, maxDepth) {
    if (depth > maxDepth) return;
    const len = 20 + Math.random() * 40;
    const nx = px + Math.cos(angle) * len;
    const ny = py + Math.sin(angle) * len;
    branches.push({ x1: px, y1: py, x2: nx, y2: ny, width: (maxDepth - depth + 1) * 0.8 });
    branch(nx, ny, angle + (Math.random() - 0.5) * 0.8, depth + 1, maxDepth);
    if (Math.random() < 0.35) {
      branch(nx, ny, angle + (Math.random() - 0.5) * 1.5, depth + 1, maxDepth - 1);
    }
  }
  branch(x, y, Math.PI / 2 + (Math.random() - 0.5) * 0.3, 0, 8);
  return branches;
}

function drawLightning() {
  if (lightningFlash <= 0) return;
  for (const b of lightningBranches) {
    ctx.strokeStyle = `rgba(200, 200, 255, ${lightningFlash})`;
    ctx.lineWidth = b.width;
    ctx.beginPath();
    ctx.moveTo(b.x1, b.y1);
    ctx.lineTo(b.x2, b.y2);
    ctx.stroke();
  }
  // Flash overlay
  ctx.fillStyle = `rgba(200, 200, 255, ${lightningFlash * 0.15})`;
  ctx.fillRect(0, 0, W, H);
}

// ---- Landscape drawing ----
function drawLandscape(weather) {
  const snowCover = (weather === 'Snow' || weather === 'Blizzard') ? 1 : temp < 0 ? 0.5 : 0;

  for (let li = hills.length - 1; li >= 0; li--) {
    const hill = hills[li];
    const depth = hill.depth;
    const darkFactor = 1 - depth * 0.15;

    let r, g, b;
    if (snowCover > 0.5) {
      r = ~~(180 + depth * 15); g = ~~(185 + depth * 15); b = ~~(195 + depth * 10);
    } else if (weather === 'Dust Storm' || temp > 35) {
      r = ~~((80 + depth * 20) * darkFactor); g = ~~((65 + depth * 15) * darkFactor); b = ~~((30 + depth * 10) * darkFactor);
    } else {
      r = ~~((25 + depth * 15) * darkFactor); g = ~~((60 + depth * 20) * darkFactor); b = ~~((20 + depth * 10) * darkFactor);
    }

    ctx.fillStyle = `rgb(${r},${g},${b})`;
    ctx.beginPath();
    ctx.moveTo(hill.pts[0], hill.pts[1]);
    for (let i = 2; i < hill.pts.length; i += 2) {
      ctx.lineTo(hill.pts[i], hill.pts[i + 1]);
    }
    ctx.lineTo(W, H);
    ctx.lineTo(0, H);
    ctx.closePath();
    ctx.fill();
  }
}

// ---- Fog ----
function drawFog(weather) {
  if (weather !== 'Fog' && humidity < 70) return;
  const fogAlpha = weather === 'Fog' ? 0.4 : (humidity - 70) / 100 * 0.25;
  const time = Date.now() / 4000;
  for (let i = 0; i < 6; i++) {
    const y = H * (0.5 + i * 0.08) + Math.sin(time + i * 2) * 20;
    const grad = ctx.createLinearGradient(0, y - 40, 0, y + 40);
    grad.addColorStop(0, 'transparent');
    grad.addColorStop(0.5, `rgba(180,180,190,${fogAlpha * (1 - i * 0.1)})`);
    grad.addColorStop(1, 'transparent');
    ctx.fillStyle = grad;
    ctx.fillRect(0, y - 40, W, 80);
  }
}

// ---- Particle spawning ----
function spawnWeatherParticles(weather, dt) {
  const windForce = wind * 0.5;

  if (weather === 'Rain' || weather === 'Thunderstorm') {
    const rate = weather === 'Thunderstorm' ? 40 : 20;
    for (let i = 0; i < rate; i++) {
      const x = Math.random() * (W + 200) - 100;
      spawn('rain', x, -10, windForce * 2, 400 + Math.random() * 200, 2, 1.5 + Math.random());
    }
  }

  if (weather === 'Snow' || weather === 'Blizzard') {
    const rate = weather === 'Blizzard' ? 25 : 10;
    for (let i = 0; i < rate; i++) {
      const x = Math.random() * (W + 200) - 100;
      spawn('snow', x, -10, windForce + (Math.random() - 0.5) * 20, 30 + Math.random() * 40, 8 + Math.random() * 5, 2 + Math.random() * 3);
    }
  }

  if (weather === 'Dust Storm' || weather === 'Haze') {
    const rate = weather === 'Dust Storm' ? 15 : 5;
    for (let i = 0; i < rate; i++) {
      const x = wind > 0 ? -10 : W + 10;
      const y = H * 0.4 + Math.random() * H * 0.5;
      spawn('dust', x, y, windForce * 3 + (Math.random() - 0.5) * 30, (Math.random() - 0.5) * 20, 4 + Math.random() * 3, 1 + Math.random() * 2);
    }
  }
}

// ---- Update & draw particles ----
function updateParticles(dt) {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = pool[i];
    if (!p.active) continue;

    p.x += p.vx * dt;
    p.y += p.vy * dt;
    p.life -= dt;

    if (p.type === 'snow') {
      p.x += Math.sin(frameTime / 500 + i) * 0.3; // Drift
    }

    if (p.life <= 0 || p.y > H + 20 || p.x < -50 || p.x > W + 50) {
      p.active = false;
      continue;
    }

    p.alpha = Math.min(1, p.life / (p.maxLife * 0.3));
  }
}

function drawParticles() {
  for (let i = 0; i < MAX_PARTICLES; i++) {
    const p = pool[i];
    if (!p.active) continue;

    ctx.globalAlpha = p.alpha;

    if (p.type === 'rain') {
      ctx.strokeStyle = 'rgba(150,180,220,0.6)';
      ctx.lineWidth = p.size * 0.5;
      ctx.beginPath();
      ctx.moveTo(p.x, p.y);
      ctx.lineTo(p.x - p.vx * 0.015, p.y - p.vy * 0.015);
      ctx.stroke();
    } else if (p.type === 'snow') {
      ctx.fillStyle = 'rgba(230,235,245,0.8)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    } else if (p.type === 'dust') {
      ctx.fillStyle = 'rgba(180,150,100,0.5)';
      ctx.beginPath();
      ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
      ctx.fill();
    }
  }
  ctx.globalAlpha = 1;
}

// ---- Main loop ----
let lastTime = 0;
let lightningTimer = 0;

function lerp(current, target, speed, dt) {
  const diff = target - current;
  if (Math.abs(diff) < 0.1) return target;
  return current + diff * Math.min(1, speed * dt);
}

function loop(ts) {
  const dt = Math.min(0.05, (ts - lastTime) / 1000);
  lastTime = ts;
  frameTime = ts;

  // Smooth transitions — weather changes gradually
  smoothTemp = lerp(smoothTemp, temp, LERP_SPEED, dt);
  smoothHum = lerp(smoothHum, humidity, LERP_SPEED, dt);
  smoothWind = lerp(smoothWind, wind, LERP_SPEED * 1.5, dt);

  // Swap globals to smoothed values for rendering (restore in finally)
  var _t = temp, _h = humidity, _w = wind;
  temp = smoothTemp; humidity = smoothHum; wind = smoothWind;
  try {
  var weather = getWeather();
  if (weather !== lastWeatherLabel && weatherLabelEl) {
    weatherLabelEl.textContent = weather;
    lastWeatherLabel = weather;
  }

  const skyColors = getSkyColors(weather, timeOfDay);
  const cloudiness = humidity / 100;

  // Sky gradient
  const grad = ctx.createLinearGradient(0, 0, 0, H * 0.7);
  grad.addColorStop(0, skyColors[0]);
  grad.addColorStop(0.5, skyColors[1]);
  grad.addColorStop(1, skyColors[2]);
  ctx.fillStyle = grad;
  ctx.fillRect(0, 0, W, H);

  // Stars
  drawStars(timeOfDay, cloudiness);

  // Aurora
  if (weather === 'Aurora') drawAurora(timeOfDay);

  // Clouds
  drawClouds(weather);

  // Landscape
  drawLandscape(weather);

  // Fog
  drawFog(weather);

  // Spawn & update particles
  spawnWeatherParticles(weather, dt);
  updateParticles(dt);
  drawParticles();

  // Lightning
  if (weather === 'Thunderstorm') {
    lightningTimer -= dt;
    if (lightningTimer <= 0) {
      lightningFlash = 1;
      lightningBranches = generateLightning(Math.random() * W, 0);
      lightningTimer = 2 + Math.random() * 5;
    }
  }
  if (lightningFlash > 0) {
    drawLightning();
    lightningFlash -= dt * 3;
  }

  } finally { temp = _t; humidity = _h; wind = _w; }
  requestAnimationFrame(loop);
}

resize();
requestAnimationFrame(loop);

// ---- UI bindings ----
function bind(id, cb) {
  const el = document.getElementById(id);
  el.addEventListener('input', () => cb(el.value));
}
bind('temp', v => { temp = parseFloat(v); document.getElementById('temp-val').textContent = v; });
bind('hum', v => { humidity = parseFloat(v); document.getElementById('hum-val').textContent = v; });
bind('wind', v => { wind = parseFloat(v); document.getElementById('wind-val').textContent = v; });
bind('tod', v => { timeOfDay = parseFloat(v); document.getElementById('tod-val').textContent = parseFloat(v).toFixed(1); });

// Presets
const presets = {
  thunderstorm: { temp: 32, hum: 90, wind: 40, tod: 15 },
  blizzard: { temp: -12, hum: 85, wind: -50, tod: 14 },
  desert: { temp: 42, hum: 10, wind: 20, tod: 13 },
  aurora: { temp: -15, hum: 15, wind: 5, tod: 23 },
  spring: { temp: 18, hum: 45, wind: 8, tod: 10 },
  foggy: { temp: 12, hum: 90, wind: 2, tod: 7 }
};

document.querySelectorAll('#presets button').forEach(btn => {
  btn.addEventListener('click', () => {
    const p = presets[btn.dataset.p];
    if (!p) return;
    temp = p.temp; humidity = p.hum; wind = p.wind; timeOfDay = p.tod;
    document.getElementById('temp').value = temp;
    document.getElementById('hum').value = humidity;
    document.getElementById('wind').value = wind;
    document.getElementById('tod').value = timeOfDay;
    document.getElementById('temp-val').textContent = temp;
    document.getElementById('hum-val').textContent = humidity;
    document.getElementById('wind-val').textContent = wind;
    document.getElementById('tod-val').textContent = timeOfDay.toFixed(1);
  });
});

// Click to shake / interact
canvas.addEventListener('click', () => {
  // Spawn a burst of particles at click
  for (let i = 0; i < 30; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 50 + Math.random() * 100;
    spawn('dust', W / 2 + (Math.random() - 0.5) * 200, H * 0.6,
      Math.cos(angle) * speed, Math.sin(angle) * speed - 50, 2, 2 + Math.random() * 2);
  }
});

})();
</script>
</body>
</html>
