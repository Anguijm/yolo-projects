<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>HTTP Status</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body {
  height: 100%;
  background: #0a0a0a;
  color: #ccc;
  font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Courier New", monospace;
  overflow-y: auto;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
}

:root {
  --accent: #0ff;
  --bg-page: #0a0a0a;
  --bg-surface: #111;
  --bg-elevated: #1a1a1a;
  --bg-hover: #222;
  --text-primary: #fff;
  --text-body: #ccc;
  --text-secondary: #aaa;
  --text-tertiary: #555;
  --text-label: #444;
  --border-default: #1a1a1a;
  --border-active: #444;
  --border-focus: #555;
  --color-success: #3fb950;
  --color-warning: #d29922;
  --color-error: #f85149;
  --color-info: #58a6ff;
}

header {
  position: sticky;
  top: 0;
  z-index: 100;
  background: #0a0a0a;
  border-bottom: 1px solid #1a1a1a;
  padding: 8px 12px;
}

.header-top {
  display: flex;
  align-items: center;
  gap: 8px;
  margin-bottom: 6px;
}

.title {
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.2em;
  color: #555;
  flex: 1;
}

.title span {
  color: var(--accent);
}

.mode-toggle {
  padding: 3px 8px;
  background: transparent;
  border: 1px solid #1a1a1a;
  color: #444;
  font-family: inherit;
  font-size: 0.55rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.mode-toggle:hover { border-color: #333; color: #666; }
.mode-toggle.active { border-color: var(--accent); color: var(--accent); }

.search-row {
  display: flex;
  gap: 6px;
  align-items: center;
  margin-bottom: 6px;
}

#search {
  flex: 1;
  background: #111;
  border: 1px solid #222;
  color: #aaa;
  padding: 5px 8px;
  font-family: inherit;
  font-size: 0.7rem;
  outline: none;
}
#search:focus { border-color: #555; }
#search::placeholder { color: #333; }

.filter-row {
  display: flex;
  gap: 4px;
  flex-wrap: wrap;
}

.filter-btn {
  padding: 3px 8px;
  background: transparent;
  border: 1px solid #1a1a1a;
  color: #444;
  font-family: inherit;
  font-size: 0.55rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.filter-btn:hover { border-color: #333; color: #666; }
.filter-btn.active { border-color: var(--accent); color: var(--accent); }

.copy-all-btn {
  padding: 3px 8px;
  background: transparent;
  border: 1px solid #1a1a1a;
  color: #444;
  font-family: inherit;
  font-size: 0.55rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  margin-left: auto;
}
.copy-all-btn:hover { border-color: #333; color: #666; }
.copy-all-btn.copied { border-color: var(--color-success); color: var(--color-success); }

main {
  padding: 8px 12px;
}

.result-count {
  font-size: 0.5rem;
  color: #333;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  margin-bottom: 8px;
}

/* NORMAL MODE: card grid */
.cards-grid {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
  gap: 6px;
}

.card {
  border: 1px solid #1a1a1a;
  padding: 8px 10px;
  cursor: pointer;
  transition: border-color 0.1s;
  background: transparent;
}
.card:hover { border-color: #333; }
.card.expanded { border-color: #444; }

.card-header {
  display: flex;
  align-items: baseline;
  gap: 8px;
  margin-bottom: 4px;
}

.code-num {
  font-size: 1.1rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
  color: var(--text-primary);
}

.code-1xx .code-num { color: #aaa; }
.code-2xx .code-num { color: var(--color-success); }
.code-3xx .code-num { color: var(--color-warning); }
.code-4xx .code-num { color: var(--color-error); }
.code-5xx .code-num { color: #c678dd; }

.code-name {
  font-size: 0.65rem;
  color: #888;
  text-transform: uppercase;
  letter-spacing: 0.05em;
  flex: 1;
}

.card-desc {
  font-size: 0.62rem;
  color: #666;
  line-height: 1.4;
  margin-bottom: 4px;
}

.card-actions {
  display: flex;
  gap: 4px;
  margin-top: 6px;
}

.copy-btn {
  padding: 2px 6px;
  background: transparent;
  border: 1px solid #1a1a1a;
  color: #333;
  font-family: inherit;
  font-size: 0.5rem;
  cursor: pointer;
  letter-spacing: 0.05em;
  text-transform: uppercase;
}
.copy-btn:hover { border-color: #333; color: #555; }
.copy-btn.copied { border-color: var(--color-success); color: var(--color-success); }

/* EXPANDED DETAIL */
.detail-section {
  margin-top: 8px;
  padding-top: 8px;
  border-top: 1px solid #1a1a1a;
}

.detail-label {
  font-size: 0.45rem;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  color: #333;
  margin-bottom: 4px;
}

.detail-list {
  list-style: none;
  margin-bottom: 8px;
}

.detail-list li {
  font-size: 0.6rem;
  color: #666;
  padding: 1px 0;
  padding-left: 8px;
  position: relative;
  line-height: 1.4;
}
.detail-list li::before {
  content: "—";
  position: absolute;
  left: 0;
  color: #333;
}

.headers-row {
  display: flex;
  flex-wrap: wrap;
  gap: 4px;
  margin-bottom: 8px;
}

.header-tag {
  font-size: 0.5rem;
  padding: 1px 5px;
  border: 1px solid #222;
  color: #555;
  letter-spacing: 0.05em;
}

/* CHEAT SHEET MODE */
body.cheatsheet main { padding: 6px 8px; }

.cheatsheet-grid {
  display: none;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 3px;
}

body.cheatsheet .cards-grid { display: none; }
body.cheatsheet .cheatsheet-grid { display: grid; }

.cs-card {
  border: 1px solid #1a1a1a;
  padding: 5px 7px;
  cursor: pointer;
}
.cs-card:hover { border-color: #333; background: #111; }

.cs-num {
  font-size: 0.85rem;
  font-weight: 700;
  font-variant-numeric: tabular-nums;
}
.cs-name {
  font-size: 0.45rem;
  color: #555;
  margin-top: 1px;
  white-space: nowrap;
  overflow: hidden;
  text-overflow: ellipsis;
}

.cs-1xx .cs-num { color: #aaa; }
.cs-2xx .cs-num { color: var(--color-success); }
.cs-3xx .cs-num { color: var(--color-warning); }
.cs-4xx .cs-num { color: var(--color-error); }
.cs-5xx .cs-num { color: #c678dd; }

/* MODAL overlay for cheatsheet click */
.modal-overlay {
  display: none;
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  z-index: 200;
  align-items: center;
  justify-content: center;
  padding: 16px;
}
.modal-overlay.open { display: flex; }

.modal-box {
  background: #111;
  border: 1px solid #333;
  max-width: 520px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 14px 16px;
  position: relative;
}

.modal-close {
  position: absolute;
  top: 8px;
  right: 10px;
  background: transparent;
  border: none;
  color: #444;
  font-family: inherit;
  font-size: 0.6rem;
  cursor: pointer;
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.modal-close:hover { color: #888; }

.modal-code-num { font-size: 2rem; font-weight: 700; color: var(--text-primary); }
.modal-code-name { font-size: 0.7rem; color: #777; text-transform: uppercase; letter-spacing: 0.08em; margin-bottom: 8px; }
.modal-desc { font-size: 0.65rem; color: #888; line-height: 1.5; margin-bottom: 12px; }

/* Toast */
.toast {
  position: fixed;
  bottom: 16px;
  right: 16px;
  background: #1a1a1a;
  border: 1px solid #333;
  color: #0ff;
  font-family: inherit;
  font-size: 0.55rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 6px 12px;
  border-radius: 4px;
  opacity: 0;
  transition: opacity 0.2s;
  z-index: 300;
  pointer-events: none;
}
.toast.show { opacity: 1; }

/* No results */
.no-results {
  font-size: 0.6rem;
  color: #333;
  text-align: center;
  padding: 32px 0;
  text-transform: uppercase;
  letter-spacing: 0.1em;
}
</style>
</head>
<body>

<header>
  <div class="header-top">
    <div class="title"><span>HTTP</span> STATUS</div>
    <button class="mode-toggle" id="cheatsheetToggle">Cheat Sheet</button>
  </div>
  <div class="search-row">
    <input type="text" id="search" placeholder="Search code or name..." autocomplete="off" spellcheck="false">
    <button class="copy-all-btn" id="copyAllBtn">Copy All</button>
  </div>
  <div class="filter-row">
    <button class="filter-btn active" data-filter="all">All</button>
    <button class="filter-btn" data-filter="1xx">1xx</button>
    <button class="filter-btn" data-filter="2xx">2xx</button>
    <button class="filter-btn" data-filter="3xx">3xx</button>
    <button class="filter-btn" data-filter="4xx">4xx</button>
    <button class="filter-btn" data-filter="5xx">5xx</button>
  </div>
</header>

<main>
  <div class="result-count" id="resultCount"></div>
  <div class="cards-grid" id="cardsGrid"></div>
  <div class="cheatsheet-grid" id="cheatsheetGrid"></div>
  <div class="no-results" id="noResults" style="display:none">No codes match</div>
</main>

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-box" id="modalBox">
    <button class="modal-close" id="modalClose">Close</button>
    <div class="modal-code-num" id="modalNum"></div>
    <div class="modal-code-name" id="modalName"></div>
    <div class="modal-desc" id="modalDesc"></div>
    <div class="detail-label">Common Causes</div>
    <ul class="detail-list" id="modalCauses"></ul>
    <div class="detail-label">Fix Suggestions</div>
    <ul class="detail-list" id="modalFixes"></ul>
    <div class="detail-label">Related Headers</div>
    <div class="headers-row" id="modalHeaders"></div>
    <div class="card-actions" style="margin-top:8px">
      <button class="copy-btn" id="modalCopyBtn">Copy as Markdown</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

  {"code":428,"name":"Precondition Required","desc":"Server requires request to be conditional to prevent lost-update problems.","causes":["Missing If-Match header on update","Endpoint requires optimistic lock token","Server enforces conditional writes"],"fixes":["Add If-Match header with current ETag","Fetch resource first to get ETag","Implement conditional request in client"],"headers":["If-Match","ETag"]},
  {"code":429,"name":"Too Many Requests","desc":"Client has sent too many requests in a given time window. Rate limit exceeded.","causes":["API rate limit hit","DDoS or burst traffic","Missing rate limit handling in client","Retry loop without backoff"],"fixes":["Implement exponential backoff retry","Respect Retry-After header","Cache responses to reduce request volume","Request rate limit increase"],"headers":["Retry-After","X-RateLimit-Limit","X-RateLimit-Remaining","X-RateLimit-Reset"]},
  {"code":431,"name":"Request Header Fields Too Large","desc":"Server refuses to process request because one or more headers are too large.","causes":["Very large Cookie header","Oversized Authorization token","Too many headers in request","Custom headers with huge values"],"fixes":["Reduce cookie size or count","Trim JWT or token payloads","Clear unused cookies","Audit header sizes in client"],"headers":["Cookie","Authorization"]},

<script>
(function() {
  var dataEl = document.getElementById('status-data');
  var allCodes = [];
  if (dataEl) {
    try { allCodes = JSON.parse(dataEl.textContent || '[]'); } catch(e) { console.error('Status data parse error', e); }
  }

  var currentFilter = 'all';
  var currentSearch = '';
  var expandedCard = null;
  var toastTimeout = null;

  function escHtml(s) {
    return String(s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/\x27/g,'&#039;');
  }

  function getCategory(code) {
    if (code < 200) return '1xx';
    if (code < 300) return '2xx';
    if (code < 400) return '3xx';
    if (code < 500) return '4xx';
    return '5xx';
  }

  function getFilteredCodes() {
    return allCodes.filter(function(c) {
      var catMatch = currentFilter === 'all' || getCategory(c.code) === currentFilter;
      var q = currentSearch.toLowerCase().trim();
      var name = (c.name || '').toLowerCase();
      var desc = (c.desc || '').toLowerCase();
      var searchMatch = !q || String(c.code).includes(q) || name.includes(q) || desc.includes(q);
      return catMatch && searchMatch;
    });
  }

  function showToast(msg) {
    var t = document.getElementById('toast');
    if (!t) return;
    t.textContent = msg;
    t.classList.add('show');
    clearTimeout(toastTimeout);
    toastTimeout = setTimeout(function() { t.classList.remove('show'); }, 2000);
  }

  function triggerCopyUI(btn) {
    showToast('Copied to clipboard');
    if (!btn) return;
    var orig = btn._origText !== undefined ? btn._origText : btn.textContent;
    btn._origText = orig;
    btn.textContent = 'Copied!';
    btn.classList.add('copied');
    clearTimeout(btn._copyTimeout);
    btn._copyTimeout = setTimeout(function() {
      btn.textContent = orig;
      btn._origText = undefined;
      btn.classList.remove('copied');
    }, 1500);
  }

  function copyText(text, btn) {
    function doFallback() {
      var ta = document.createElement('textarea');
      ta.value = text;
      ta.style.position = 'fixed';
      ta.style.top = '-9999px';
      document.body.appendChild(ta);
      ta.select();
      try { document.execCommand('copy'); } catch(e) {}
      document.body.removeChild(ta);
      triggerCopyUI(btn);
    }
    if (navigator.clipboard && navigator.clipboard.writeText) {
      navigator.clipboard.writeText(text).then(function() { triggerCopyUI(btn); }).catch(doFallback);
    } else {
      doFallback();
    }
  }

  function codeToMarkdown(c) {
    var causes = c.causes || [];
    var fixes = c.fixes || [];
    var headers = c.headers || [];
    var lines = [
      '## ' + c.code + ' ' + (c.name || ''),
      '',
      c.desc || '',
      '',
      '**Common Causes:**',
    ];
    causes.forEach(function(ca) { lines.push('- ' + ca); });
    lines.push('');
    lines.push('**Fix Suggestions:**');
    fixes.forEach(function(f) { lines.push('- ' + f); });
    if (headers.length) {
      lines.push('');
      lines.push('**Related Headers:** ' + headers.join(', '));
    }
    return lines.join('\n');
  }

  function allToMarkdownTable() {
    var filtered = getFilteredCodes();
    var rows = ['| Code | Name | Description |', '|------|------|-------------|'];
    filtered.forEach(function(c) {
      rows.push('| ' + c.code + ' | ' + c.name + ' | ' + c.desc.replace(/\|/g, '\\|') + ' |');
    });
    return rows.join('\n');
  }

  function makeDetailHtml(c) {
    var causes = c.causes || [];
    var fixes = c.fixes || [];
    var headers = c.headers || [];
    var causesHtml = causes.map(function(x) { return '<li>' + escHtml(x) + '</li>'; }).join('');
    var fixesHtml = fixes.map(function(x) { return '<li>' + escHtml(x) + '</li>'; }).join('');
    var headersHtml = headers.length
      ? headers.map(function(h) { return '<span class="header-tag">' + escHtml(h) + '</span>'; }).join('')
      : '<span style="color:#333;font-size:0.5rem">None</span>';

    return '<div class="detail-section">' +
      '<div class="detail-label">Common Causes</div>' +
      '<ul class="detail-list">' + causesHtml + '</ul>' +
      '<div class="detail-label">Fix Suggestions</div>' +
      '<ul class="detail-list">' + fixesHtml + '</ul>' +
      '<div class="detail-label">Related Headers</div>' +
      '<div class="headers-row">' + headersHtml + '</div>' +
      '<div class="card-actions">' +
      '<button class="copy-btn" data-code="' + c.code + '">Copy as Markdown</button>' +
      '</div>' +
      '</div>';
  }

  function renderCards() {
    var filtered = getFilteredCodes();
    var grid = document.getElementById('cardsGrid');
    var noResults = document.getElementById('noResults');
    var count = document.getElementById('resultCount');

    count.textContent = filtered.length + ' of ' + allCodes.length + ' codes';
    expandedCard = null;

    if (!filtered.length) {
      grid.innerHTML = '';
      noResults.style.display = 'block';
      return;
    }
    noResults.style.display = 'none';

    grid.innerHTML = filtered.map(function(c) {
      var cat = getCategory(c.code);
      return '<div class="card code-' + cat + '" data-code="' + c.code + '">' +
        '<div class="card-header">' +
        '<span class="code-num">' + c.code + '</span>' +
        '<span class="code-name">' + c.name + '</span>' +
        '</div>' +
        '<div class="card-desc">' + c.desc + '</div>' +
        '</div>';
    }).join('');

    grid.querySelectorAll('.card').forEach(function(card) {
      card.addEventListener('click', function(e) {
        if (e.target.classList.contains('copy-btn')) return;
        var code = parseInt(card.getAttribute('data-code'), 10);
        var codeObj = allCodes.find(function(x) { return x.code === code; });
        if (!codeObj) return;

        if (expandedCard === card) {
          var detail = card.querySelector('.detail-section');
          if (detail) detail.remove();
          card.classList.remove('expanded');
          expandedCard = null;
          return;
        }
        if (expandedCard) {
          var oldDetail = expandedCard.querySelector('.detail-section');
          if (oldDetail) oldDetail.remove();
          expandedCard.classList.remove('expanded');
        }
        card.insertAdjacentHTML('beforeend', makeDetailHtml(codeObj));
        card.classList.add('expanded');
        expandedCard = card;

        var copyBtn = card.querySelector('.copy-btn[data-code]');
        if (copyBtn) {
          copyBtn.addEventListener('click', function(ev) {
            ev.stopPropagation();
            copyText(codeToMarkdown(codeObj), copyBtn);
          });
        }
      });
    });
  }

  function renderCheatsheet() {
    var filtered = getFilteredCodes();
    var grid = document.getElementById('cheatsheetGrid');
    grid.innerHTML = filtered.map(function(c) {
      var cat = getCategory(c.code);
      return '<div class="cs-card cs-' + cat + '" data-code="' + c.code + '">' +
        '<div class="cs-num">' + c.code + '</div>' +
        '<div class="cs-name">' + c.name + '</div>' +
        '</div>';
    }).join('');

    grid.querySelectorAll('.cs-card').forEach(function(card) {
      card.addEventListener('click', function() {
        var code = parseInt(card.getAttribute('data-code'), 10);
        var codeObj = allCodes.find(function(x) { return x.code === code; });
        if (!codeObj) return;
        openModal(codeObj);
      });
    });
  }

  function render() {
    renderCards();
    renderCheatsheet();
  }

  function openModal(c) {
    var causes = c.causes || [];
    var fixes = c.fixes || [];
    var headers = c.headers || [];
    document.getElementById('modalNum').textContent = c.code;
    document.getElementById('modalName').textContent = c.name || '';
    document.getElementById('modalDesc').textContent = c.desc || '';

    var causesEl = document.getElementById('modalCauses');
    causesEl.innerHTML = causes.map(function(x) { return '<li>' + escHtml(x) + '</li>'; }).join('');

    var fixesEl = document.getElementById('modalFixes');
    fixesEl.innerHTML = fixes.map(function(x) { return '<li>' + escHtml(x) + '</li>'; }).join('');

    var headersEl = document.getElementById('modalHeaders');
    headersEl.innerHTML = headers.length
      ? headers.map(function(h) { return '<span class="header-tag">' + escHtml(h) + '</span>'; }).join('')
      : '<span style="color:#333;font-size:0.5rem">None</span>';

    var copyBtn = document.getElementById('modalCopyBtn');
    copyBtn.onclick = function() { copyText(codeToMarkdown(c), copyBtn); };

    document.getElementById('modalOverlay').classList.add('open');
  }

  function closeModal() {
    var overlay = document.getElementById('modalOverlay');
    overlay.classList.remove('open');
    overlay.style.display = '';
  }

  document.getElementById('modalClose').addEventListener('click', closeModal);
  document.getElementById('modalOverlay').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  document.addEventListener('keydown', function(e) {
    if (e.key === 'Escape') closeModal();
  });

  document.getElementById('search').addEventListener('input', function() {
    currentSearch = this.value;
    render();
  });

  document.querySelectorAll('.filter-btn').forEach(function(btn) {
    btn.addEventListener('click', function() {
      currentFilter = this.getAttribute('data-filter');
      document.querySelectorAll('.filter-btn').forEach(function(b) { b.classList.remove('active'); });
      this.classList.add('active');
      render();
    });
  });

  document.getElementById('copyAllBtn').addEventListener('click', function() {
    copyText(allToMarkdownTable(), this);
  });

  document.getElementById('cheatsheetToggle').addEventListener('click', function() {
    document.body.classList.toggle('cheatsheet');
    this.classList.toggle('active');
  });

  render();
})();
</script>

</body>
