<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Flock Mind</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#050508;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;font-family:system-ui,sans-serif}
canvas{display:block;position:absolute;inset:0}
#panel{position:fixed;top:10px;right:10px;width:200px;background:rgba(8,8,14,0.88);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px;z-index:5;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);opacity:0.35;transition:opacity 0.3s}
#panel:hover{opacity:1}
.p-title{font-size:0.6rem;color:#555;letter-spacing:0.2em;margin-bottom:8px;font-weight:300}
.p-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.p-label{font-size:0.4rem;color:#444;min-width:62px;letter-spacing:0.05em}
.p-val{font-size:0.4rem;color:#555;font-family:monospace;min-width:26px;text-align:right}
input[type="range"]{flex:1;height:2px;accent-color:#555}
.p-btn{padding:4px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#666;font-family:inherit;font-size:0.45rem;cursor:pointer;border-radius:4px;letter-spacing:0.08em}
.p-btn:active{border-color:rgba(255,255,255,0.2);color:#aaa}
.p-btns{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.p-sep{height:1px;background:rgba(255,255,255,0.04);margin:6px 0}
#fps{position:fixed;bottom:6px;left:8px;font-size:0.4rem;color:#222;font-family:monospace;z-index:2}
#hint{position:fixed;bottom:6px;right:8px;font-size:0.4rem;color:#1a1a1a;z-index:2}





/* UI-UPGRADE:START */
/* Injected by sync_project_ui.py — accessibility override.
   Uses !important to beat project-specific illegible "retro terminal"
   styling (grey-on-black body text, 0.38rem fonts, etc.). max() preserves
   hierarchy for elements already larger than the floor. */
html { font-size: 19px !important; }
body {
  line-height: 1.65 !important;
  color: #e8e8e8 !important;
  -webkit-font-smoothing: antialiased;
}
/* Enforce minimum 15px on all readable text containers. max() means any
   project rule asking for MORE than 15px wins; anything smaller gets lifted. */
body, p, div, span, li, td, th, label, a,
dl, dt, dd, blockquote, caption, code, pre, kbd, samp, figcaption {
  font-size: max(15px, 1em) !important;
}
/* Form controls get larger minimum + bigger tap targets */
input, button, select, textarea {
  font-size: max(16px, 1rem) !important;
  min-height: 40px !important;
  line-height: 1.4 !important;
}
/* Heading floor — preserves larger intentional sizes via max() */
h1 { font-size: max(26px, 1.6em) !important; }
h2 { font-size: max(22px, 1.35em) !important; }
h3 { font-size: max(19px, 1.2em) !important; }
h4, h5, h6 { font-size: max(17px, 1.05em) !important; }
/* Fix low-contrast "dim" text across common class naming conventions.
   Replaces #333/#444/#555/#666 greys with #b8b8b8 (contrast ~7.6:1 on #000). */
.dim, .muted, .hint, .help, .subtitle, .secondary, .meta, .sub,
.small, .tiny, .mini, .note, .footer, .desc, .description,
[class*="-dim"], [class*="-muted"], [class*="-hint"], [class*="-help"],
[class*="-meta"], [class*="-sub"], [class*="-label"], [class*="-desc"],
[class*="-note"] {
  color: #b8b8b8 !important;
}
/* UI-UPGRADE:END */
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="panel">
  <div class="p-title">FLOCK MIND</div>
  <div class="p-btns">
    <button class="p-btn" id="btn-reset">Reset</button>
    <button class="p-btn" id="btn-scatter">Scatter</button>
    <button class="p-btn" id="btn-predator">Predator: Off</button>
  </div>
  <div class="p-sep"></div>
  <div class="p-row"><span class="p-label">Count</span><input type="range" id="sl-count" min="100" max="1500" step="50" value="600"><span class="p-val" id="v-count">600</span></div>
  <div class="p-row"><span class="p-label">Separation</span><input type="range" id="sl-sep" min="0" max="3" step="0.1" value="1.5"><span class="p-val" id="v-sep">1.5</span></div>
  <div class="p-row"><span class="p-label">Alignment</span><input type="range" id="sl-ali" min="0" max="2" step="0.05" value="1.0"><span class="p-val" id="v-ali">1.0</span></div>
  <div class="p-row"><span class="p-label">Cohesion</span><input type="range" id="sl-coh" min="0" max="2" step="0.05" value="0.8"><span class="p-val" id="v-coh">0.8</span></div>
  <div class="p-row"><span class="p-label">Max Speed</span><input type="range" id="sl-spd" min="1" max="6" step="0.2" value="3"><span class="p-val" id="v-spd">3.0</span></div>
  <div class="p-row"><span class="p-label">View Range</span><input type="range" id="sl-range" min="20" max="120" step="5" value="50"><span class="p-val" id="v-range">50</span></div>
</div>
<div id="fps">0 fps</div>
<div id="hint">click: attract &middot; predator mode: cursor repels</div>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H;
var NUM_GROUPS=4;
var COLORS=['#0ff','#f0f','#3fb950','#ffcc33'];

// Boid data (SoA)
var count=600;
var bx,by,bvx,bvy,bgroup,nfx,nfy; // Float32Array / Uint8Array
var sepWeight=1.5,aliWeight=1.0,cohWeight=0.8;
var maxSpeed=3,viewRange=50;
var predatorMode=false;
var mouseX=-9999,mouseY=-9999,mouseDown=false;

function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
}

function initBoids(){
  bx=new Float32Array(count);by=new Float32Array(count);
  bvx=new Float32Array(count);bvy=new Float32Array(count);
  bgroup=new Uint8Array(count);
  nfx=new Float32Array(count);nfy=new Float32Array(count);
  for(var i=0;i<count;i++){
    bx[i]=Math.random()*W;by[i]=Math.random()*H;
    var angle=Math.random()*Math.PI*2;
    var spd=1+Math.random()*2;
    bvx[i]=Math.cos(angle)*spd;bvy[i]=Math.sin(angle)*spd;
    bgroup[i]=Math.floor(Math.random()*NUM_GROUPS);
  }
}

// ============ UPDATE ============
function update(){
  var r2=viewRange*viewRange;
  var sepR=viewRange*0.4;var sepR2=sepR*sepR;

  // Two-pass: calculate all forces first, then apply
  // (nfx/nfy are pre-allocated globals — reset each frame)
  for(var i=0;i<count;i++){nfx[i]=0;nfy[i]=0;}

  // PASS 1: Calculate forces
  for(var i=0;i<count;i++){
    var xi=bx[i],yi=by[i],vxi=bvx[i],vyi=bvy[i],gi=bgroup[i];
    var sx=0,sy=0,sc=0;
    var ax=0,ay=0,ac=0;
    var cx=0,cy=0,cc=0;

    for(var j=0;j<count;j++){
      if(i===j)continue;
      var dx=bx[j]-xi,dy=by[j]-yi;
      if(dx>W/2)dx-=W;else if(dx<-W/2)dx+=W;
      if(dy>H/2)dy-=H;else if(dy<-H/2)dy+=H;
      var d2=dx*dx+dy*dy;
      if(d2>r2)continue;

      if(d2<sepR2&&d2>0.1){
        sx-=dx/d2;sy-=dy/d2;sc++; // Inverse-distance separation
      }
      if(bgroup[j]===gi){
        ax+=bvx[j];ay+=bvy[j];ac++;
        cx+=dx;cy+=dy;cc++;
      }
    }

    var fx=0,fy=0;
    if(sc>0){fx+=sx*sepWeight;fy+=sy*sepWeight}
    if(ac>0){fx+=(ax/ac-vxi)*aliWeight;fy+=(ay/ac-vyi)*aliWeight}
    if(cc>0){fx+=cx/cc*cohWeight*0.01;fy+=cy/cc*cohWeight*0.01}

    // Mouse interaction (guard against phantom -9999 position)
    if((mouseDown||predatorMode)&&mouseX>-1){
      var mdx=mouseX-xi,mdy=mouseY-yi;
      var md2=mdx*mdx+mdy*mdy;
      if(md2<40000&&md2>1){
        var md=Math.sqrt(md2);
        var mf=predatorMode?-3:1.5;
        fx+=mdx/md*mf;fy+=mdy/md*mf;
      }
    }

    nfx[i]=fx;nfy[i]=fy;
  }

  // PASS 2: Apply forces, velocity, position
  for(var i=0;i<count;i++){
    bvx[i]+=nfx[i];bvy[i]+=nfy[i];
    var spd=Math.sqrt(bvx[i]*bvx[i]+bvy[i]*bvy[i]);
    var minSpeed=Math.min(0.5,maxSpeed*0.5);
    if(spd===0){bvx[i]=(Math.random()-0.5);bvy[i]=(Math.random()-0.5);spd=minSpeed||0.1}
    if(spd>maxSpeed){bvx[i]=bvx[i]/spd*maxSpeed;bvy[i]=bvy[i]/spd*maxSpeed}
    else if(spd<minSpeed){bvx[i]=bvx[i]/spd*minSpeed;bvy[i]=bvy[i]/spd*minSpeed}
    bx[i]+=bvx[i];by[i]+=bvy[i];
    bx[i]=(bx[i]%W+W)%W;
    by[i]=(by[i]%H+H)%H;
  }
}

// ============ RENDER ============
function draw(){
  // Trail effect
  ctx.fillStyle='rgba(5,5,8,0.15)';
  ctx.fillRect(0,0,W,H);

  // Draw boids as oriented triangles, batched by group
  var size=4;
  for(var g=0;g<NUM_GROUPS;g++){
    ctx.fillStyle=COLORS[g];
    ctx.beginPath();
    for(var i=0;i<count;i++){
      if(bgroup[i]!==g)continue;
      var angle=Math.atan2(bvy[i],bvx[i]);
      var x=bx[i],y=by[i];
      // Triangle pointing in velocity direction
      ctx.moveTo(x+Math.cos(angle)*size,y+Math.sin(angle)*size);
      ctx.lineTo(x+Math.cos(angle+2.5)*size*0.6,y+Math.sin(angle+2.5)*size*0.6);
      ctx.lineTo(x+Math.cos(angle-2.5)*size*0.6,y+Math.sin(angle-2.5)*size*0.6);
    }
    ctx.fill();
  }

  // Predator cursor
  if(predatorMode){
    ctx.strokeStyle='rgba(255,50,80,0.3)';
    ctx.lineWidth=1;
    ctx.beginPath();
    ctx.arc(mouseX,mouseY,60,0,Math.PI*2);
    ctx.stroke();
  }
}

// ============ CONTROLS ============
function bindSlider(id,vid,fmt,setter){
  document.getElementById(id).addEventListener('input',function(e){
    var v=parseFloat(e.target.value);if(isNaN(v))return;
    setter(v);document.getElementById(vid).textContent=fmt(v);
  });
}
bindSlider('sl-count','v-count',function(v){return v|0},function(v){count=v|0;initBoids()});
bindSlider('sl-sep','v-sep',function(v){return v.toFixed(1)},function(v){sepWeight=v});
bindSlider('sl-ali','v-ali',function(v){return v.toFixed(1)},function(v){aliWeight=v});
bindSlider('sl-coh','v-coh',function(v){return v.toFixed(1)},function(v){cohWeight=v});
bindSlider('sl-spd','v-spd',function(v){return v.toFixed(1)},function(v){maxSpeed=v});
bindSlider('sl-range','v-range',function(v){return v|0},function(v){viewRange=v});

document.getElementById('btn-reset').addEventListener('click',initBoids);
document.getElementById('btn-scatter').addEventListener('click',function(){
  for(var i=0;i<count;i++){
    var angle=Math.random()*Math.PI*2;
    bvx[i]=Math.cos(angle)*maxSpeed;bvy[i]=Math.sin(angle)*maxSpeed;
  }
});
document.getElementById('btn-predator').addEventListener('click',function(){
  predatorMode=!predatorMode;
  this.textContent='Predator: '+(predatorMode?'On':'Off');
  this.style.borderColor=predatorMode?'rgba(255,50,80,0.4)':'';
  this.style.color=predatorMode?'#f85149':'';
});

// Mouse
canvas.addEventListener('pointerdown',function(e){mouseDown=true;mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('pointermove',function(e){mouseX=e.clientX;mouseY=e.clientY});
canvas.addEventListener('pointerleave',function(){mouseDown=false;mouseX=-9999;mouseY=-9999});
window.addEventListener('pointerup',function(){mouseDown=false});

// ============ LOOP ============
var fpsFrames=0,fpsTime=performance.now();
function loop(){
  update();draw();
  fpsFrames++;
  var now=performance.now();
  if(now-fpsTime>=1000){
    document.getElementById('fps').textContent=fpsFrames+' fps';
    fpsFrames=0;fpsTime=now;
  }
  requestAnimationFrame(loop);
}

// ============ INIT ============
resize();window.addEventListener('resize',function(){resize();initBoids()});
initBoids();
requestAnimationFrame(loop);

})();
</script>
