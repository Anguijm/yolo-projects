<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="theme-color" content="#000000">
<title>Tension Matrix</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;background:#050508;overflow:hidden;touch-action:none;-webkit-tap-highlight-color:transparent;font-family:system-ui,sans-serif}
canvas{display:block;position:absolute;inset:0;cursor:crosshair}
#panel{position:fixed;top:10px;left:10px;width:200px;background:rgba(8,8,14,0.88);border:1px solid rgba(255,255,255,0.06);border-radius:10px;padding:10px;z-index:5;backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);opacity:0.35;transition:opacity 0.3s;max-height:calc(100vh - 20px);overflow-y:auto}
#panel:hover{opacity:1}
.p-title{font-size:0.6rem;color:#555;letter-spacing:0.2em;margin-bottom:8px;font-weight:300}
.p-row{display:flex;align-items:center;gap:4px;margin-bottom:5px}
.p-label{font-size:0.4rem;color:#444;min-width:60px;letter-spacing:0.05em}
.p-val{font-size:0.4rem;color:#555;font-family:monospace;min-width:28px;text-align:right}
input[type="range"]{flex:1;height:2px;accent-color:#555}
.p-btn{padding:4px 8px;background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.08);color:#666;font-family:inherit;font-size:0.45rem;cursor:pointer;border-radius:4px;letter-spacing:0.08em}
.p-btn:active{border-color:rgba(255,255,255,0.2);color:#aaa}
.p-btns{display:flex;gap:3px;flex-wrap:wrap;margin-bottom:6px}
.p-sep{height:1px;background:rgba(255,255,255,0.04);margin:6px 0}
#hint{position:fixed;bottom:6px;right:8px;font-size:0.4rem;color:#1a1a1a;z-index:2}
#fps{position:fixed;bottom:6px;left:8px;font-size:0.4rem;color:#222;font-family:monospace;z-index:2}





/* UI-UPGRADE:START */
/* Injected by sync_project_ui.py — accessibility override.
   Uses !important to beat project-specific illegible "retro terminal"
   styling (grey-on-black body text, 0.38rem fonts, etc.). max() preserves
   hierarchy for elements already larger than the floor. */
html { font-size: 19px !important; }
body {
  line-height: 1.65 !important;
  color: #e8e8e8 !important;
  -webkit-font-smoothing: antialiased;
}
/* Enforce minimum 15px on all readable text containers. max() means any
   project rule asking for MORE than 15px wins; anything smaller gets lifted. */
body, p, div, span, li, td, th, label, a,
dl, dt, dd, blockquote, caption, code, pre, kbd, samp, figcaption {
  font-size: max(15px, 1em) !important;
}
/* Form controls get larger minimum + bigger tap targets */
input, button, select, textarea {
  font-size: max(16px, 1rem) !important;
  min-height: 40px !important;
  line-height: 1.4 !important;
}
/* Heading floor — preserves larger intentional sizes via max() */
h1 { font-size: max(26px, 1.6em) !important; }
h2 { font-size: max(22px, 1.35em) !important; }
h3 { font-size: max(19px, 1.2em) !important; }
h4, h5, h6 { font-size: max(17px, 1.05em) !important; }
/* Fix low-contrast "dim" text across common class naming conventions.
   Replaces #333/#444/#555/#666 greys with #b8b8b8 (contrast ~7.6:1 on #000). */
.dim, .muted, .hint, .help, .subtitle, .secondary, .meta, .sub,
.small, .tiny, .mini, .note, .footer, .desc, .description,
[class*="-dim"], [class*="-muted"], [class*="-hint"], [class*="-help"],
[class*="-meta"], [class*="-sub"], [class*="-label"], [class*="-desc"],
[class*="-note"] {
  color: #b8b8b8 !important;
}
/* UI-UPGRADE:END */
</style>

<body>
<canvas id="c"></canvas>
<div id="panel">
  <div class="p-title">TENSION MATRIX</div>
  <div class="p-btns">
    <button class="p-btn" id="btn-reset">Reset</button>
    <button class="p-btn" id="btn-curtain">Curtain</button>
    <button class="p-btn" id="btn-swing">Swing</button>
  </div>
  <div class="p-sep"></div>
  <div class="p-row"><span class="p-label">Gravity</span><input type="range" id="sl-grav" min="0" max="2" step="0.05" value="0.5"><span class="p-val" id="v-grav">0.5</span></div>
  <div class="p-row"><span class="p-label">Wind</span><input type="range" id="sl-wind" min="0" max="1.5" step="0.05" value="0.3"><span class="p-val" id="v-wind">0.3</span></div>
  <div class="p-row"><span class="p-label">Tear resist</span><input type="range" id="sl-tear" min="1.5" max="8" step="0.1" value="3"><span class="p-val" id="v-tear">3.0</span></div>
  <div class="p-row"><span class="p-label">Stiffness</span><input type="range" id="sl-iter" min="1" max="8" step="1" value="4"><span class="p-val" id="v-iter">4</span></div>
</div>
<div id="hint">drag: move &middot; right-click: tear &middot; shift+drag: cut</div>
<div id="fps">0 fps</div>

<script>
(function(){
'use strict';

var canvas=document.getElementById('c'),ctx=canvas.getContext('2d');
var W,H;

// ============ CONFIG ============
var COLS=45,ROWS=30,SPACING=0;
var gravity=0.5,wind=0.3,tearDist=3,iterations=4,friction=0.98;
var points=[],constraints=[],particles=[];

// ============ POINT ============
function Point(x,y,pinned){
  this.x=x;this.y=y;this.ox=x;this.oy=y;this.pinned=pinned;this.basePinned=pinned;
}

// ============ CONSTRAINT ============
function Constraint(p1,p2,dist){
  this.p1=p1;this.p2=p2;this.dist=dist;this.alive=true;
}

// ============ INIT ============
function resize(){
  W=window.innerWidth;H=window.innerHeight;
  canvas.width=W;canvas.height=H;
}

function initCloth(mode){
  points=[];constraints=[];particles=[];
  SPACING=Math.min((W-40)/COLS,(H-80)/ROWS);
  var startX=(W-COLS*SPACING)/2;
  var startY=30;

  for(var r=0;r<=ROWS;r++){
    for(var c=0;c<=COLS;c++){
      var x=startX+c*SPACING;
      var y=startY+r*SPACING;
      var pinned=false;
      if(mode==='curtain')pinned=(r===0);
      else if(mode==='swing')pinned=(r===0&&(c===0||c===COLS));
      else pinned=(r===0&&c%6===0); // default: pinned every 6
      points.push(new Point(x,y,pinned));
    }
  }

  // Structural constraints (horizontal + vertical)
  for(var r=0;r<=ROWS;r++){
    for(var c=0;c<=COLS;c++){
      var idx=r*(COLS+1)+c;
      if(c<COLS)constraints.push(new Constraint(points[idx],points[idx+1],SPACING));
      if(r<ROWS)constraints.push(new Constraint(points[idx],points[idx+COLS+1],SPACING));
    }
  }
}

// ============ PHYSICS ============
function update(){
  var t=performance.now()*0.001;

  // Apply forces
  for(var i=0;i<points.length;i++){
    var p=points[i];
    if(p.pinned)continue;
    var vx=(p.x-p.ox)*friction;
    var vy=(p.y-p.oy)*friction;
    // Wind (oscillating noise)
    var windF=wind*Math.sin(t*1.3+p.y*0.02)*Math.cos(t*0.7+p.x*0.01);
    p.ox=p.x;p.oy=p.y;
    p.x+=vx+windF;
    p.y+=vy+gravity;
  }

  // Satisfy constraints
  for(var iter=0;iter<iterations;iter++){
    for(var i=constraints.length-1;i>=0;i--){
      var c=constraints[i];
      if(!c.alive)continue;
      var dx=c.p2.x-c.p1.x;
      var dy=c.p2.y-c.p1.y;
      var d=Math.sqrt(dx*dx+dy*dy);
      if(d<0.001)continue;

      // Tear check
      if(d>c.dist*tearDist){
        c.alive=false;
        // Spark particles
        var mx=(c.p1.x+c.p2.x)/2,my=(c.p1.y+c.p2.y)/2;
        for(var s=0;s<4;s++){
          particles.push({x:mx,y:my,vx:(Math.random()-0.5)*3,vy:(Math.random()-0.5)*3,life:1,color:'#f0f'});
        }
        continue;
      }

      var diff=(d-c.dist)/d;
      var offX=dx*diff,offY=dy*diff;
      // Weight correction: free point takes full correction if other is pinned
      if(!c.p1.pinned&&!c.p2.pinned){
        c.p1.x+=offX*0.5;c.p1.y+=offY*0.5;
        c.p2.x-=offX*0.5;c.p2.y-=offY*0.5;
      }else if(!c.p1.pinned){c.p1.x+=offX;c.p1.y+=offY}
      else if(!c.p2.pinned){c.p2.x-=offX;c.p2.y-=offY}
    }
  }

  // Boundary
  for(var i=0;i<points.length;i++){
    var p=points[i];
    if(p.pinned)continue;
    if(p.y>H-5){p.y=H-5;p.oy=p.y}
    if(p.x<5){p.x=5;p.ox=p.x}
    if(p.x>W-5){p.x=W-5;p.ox=p.x}
  }

  // Particles
  for(var i=particles.length-1;i>=0;i--){
    var p=particles[i];
    p.x+=p.vx;p.y+=p.vy;p.vy+=0.1;p.life-=0.04;
    if(p.life<=0)particles.splice(i,1);
  }
}

// ============ RENDER ============
function draw(){
  ctx.fillStyle='rgba(5,5,8,0.4)';
  ctx.fillRect(0,0,W,H);

  // Draw constraints with tension coloring
  for(var i=0;i<constraints.length;i++){
    var c=constraints[i];
    if(!c.alive)continue;
    var dx=c.p2.x-c.p1.x,dy=c.p2.y-c.p1.y;
    var d=Math.sqrt(dx*dx+dy*dy);
    var tension=Math.min(1,(d-c.dist)/Math.max(0.001,c.dist*(tearDist-1)));
    tension=Math.max(0,tension);

    // Hue: 200 (cyan) → 320 (magenta) based on tension
    var hue=200+tension*120;
    var light=50+tension*30;
    var alpha=0.6+tension*0.4;
    ctx.strokeStyle='hsla('+hue+',80%,'+light+'%,'+alpha+')';
    ctx.lineWidth=tension>0.7?1.5:1;
    ctx.beginPath();
    ctx.moveTo(c.p1.x,c.p1.y);
    ctx.lineTo(c.p2.x,c.p2.y);
    ctx.stroke();
  }

  // Pinned points
  for(var i=0;i<points.length;i++){
    if(points[i].pinned){
      ctx.fillStyle='#444';
      ctx.fillRect(points[i].x-2,points[i].y-2,4,4);
    }
  }

  // Particles
  for(var i=0;i<particles.length;i++){
    var p=particles[i];
    ctx.fillStyle=p.color;
    ctx.globalAlpha=p.life;
    ctx.fillRect(p.x-1,p.y-1,2,2);
  }
  ctx.globalAlpha=1;
}

// ============ MOUSE ============
var mouseX=0,mouseY=0,pmouseX=0,pmouseY=0;
var dragging=false,dragPoint=null,cutting=false;

canvas.addEventListener('pointerdown',function(e){
  e.preventDefault();
  mouseX=e.clientX;mouseY=e.clientY;pmouseX=mouseX;pmouseY=mouseY;

  if(e.button===2||e.shiftKey){
    cutting=true;return;
  }

  // Find nearest point
  var bestDist=900,bestPt=null;
  for(var i=0;i<points.length;i++){
    var dx=points[i].x-mouseX,dy=points[i].y-mouseY;
    var d2=dx*dx+dy*dy;
    if(d2<bestDist){bestDist=d2;bestPt=points[i]}
  }
  if(bestPt){
    dragging=true;dragPoint=bestPt;
    dragPoint.pinned=true;
  }
});

canvas.addEventListener('pointermove',function(e){
  pmouseX=mouseX;pmouseY=mouseY;
  mouseX=e.clientX;mouseY=e.clientY;

  if(dragging&&dragPoint){
    dragPoint.x=mouseX;dragPoint.y=mouseY;
  }

  if(cutting){
    // Cut constraints intersecting mouse path
    for(var i=constraints.length-1;i>=0;i--){
      var c=constraints[i];
      if(!c.alive)continue;
      if(lineIntersects(pmouseX,pmouseY,mouseX,mouseY,c.p1.x,c.p1.y,c.p2.x,c.p2.y)){
        c.alive=false;
        var mx=(c.p1.x+c.p2.x)/2,my=(c.p1.y+c.p2.y)/2;
        for(var s=0;s<3;s++){
          particles.push({x:mx,y:my,vx:(Math.random()-0.5)*2,vy:(Math.random()-0.5)*2,life:1,color:'#ff3'});
        }
      }
    }
  }
});

window.addEventListener('pointerup',function(e){
  if(dragging&&dragPoint){
    // Toss: apply velocity from mouse movement
    dragPoint.ox=dragPoint.x-(mouseX-pmouseX)*0.5;
    dragPoint.oy=dragPoint.y-(mouseY-pmouseY)*0.5;
    dragPoint.pinned=dragPoint.basePinned; // Restore original pin state
    dragging=false;dragPoint=null;
  }
  cutting=false;
});

canvas.addEventListener('contextmenu',function(e){e.preventDefault()});

// Line segment intersection check
function lineIntersects(x1,y1,x2,y2,x3,y3,x4,y4){
  var d=(x1-x2)*(y3-y4)-(y1-y2)*(x3-x4);
  if(Math.abs(d)<0.001)return false;
  var t=((x1-x3)*(y3-y4)-(y1-y3)*(x3-x4))/d;
  var u=-((x1-x2)*(y1-y3)-(y1-y2)*(x1-x3))/d;
  return t>=0&&t<=1&&u>=0&&u<=1;
}

// ============ CONTROLS ============
function bindSlider(id,vid,setter){
  document.getElementById(id).addEventListener('input',function(e){
    var v=parseFloat(e.target.value);
    if(isNaN(v))return;
    setter(v);
    document.getElementById(vid).textContent=v.toFixed(v%1?1:0);
  });
}
bindSlider('sl-grav','v-grav',function(v){gravity=v});
bindSlider('sl-wind','v-wind',function(v){wind=v});
bindSlider('sl-tear','v-tear',function(v){tearDist=v});
bindSlider('sl-iter','v-iter',function(v){iterations=Math.round(v)});

document.getElementById('btn-reset').addEventListener('click',function(){initCloth('default')});
document.getElementById('btn-curtain').addEventListener('click',function(){initCloth('curtain')});
document.getElementById('btn-swing').addEventListener('click',function(){initCloth('swing')});

// ============ LOOP ============
var fpsFrames=0,fpsTime=performance.now();

function loop(){
  update();draw();
  fpsFrames++;
  var now=performance.now();
  if(now-fpsTime>=1000){
    document.getElementById('fps').textContent=fpsFrames+' fps';
    fpsFrames=0;fpsTime=now;
  }
  requestAnimationFrame(loop);
}

// ============ INIT ============
resize();window.addEventListener('resize',function(){resize();initCloth('default')});
initCloth('default');
requestAnimationFrame(loop);

})();
</script>
